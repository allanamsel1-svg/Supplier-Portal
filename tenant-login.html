<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBG Sourcing — Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0e1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-wordmark {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.04em;
  }
  .logo-sub {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .card {
    background: #131929;
    border: 1px solid #1e2d47;
    border-radius: 12px;
    padding: 36px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input {
    width: 100%;
    background: #0d1424;
    border: 1px solid #1e2d47;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: #f1f5f9;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #3b82f6; }
  input::placeholder { color: #374151; }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 44px; }
  .pw-toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 6px;
    color: #6b7280; display: flex; align-items: center; justify-content: center;
  }
  .pw-toggle:hover { color: #9ca3af; }
  .btn {
    width: 100%;
    background: #2563eb;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .btn:hover { background: #1d4ed8; }
  .btn:disabled { background: #1e3a6e; cursor: not-allowed; }
  .error {
    background: #1f0a0a;
    border: 1px solid #7f1d1d;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #fca5a5;
    margin-top: 16px;
    display: none;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #374151;
  }
  .footer a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-wordmark">TBG Sourcing</div>
    <div class="logo-sub">Sourcing Intelligence Platform</div>
  </div>
  <div class="card">
    <div class="card-title">Sign in to your account</div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password" title="Show/hide password">
          <svg id="pwIconShow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="pwIconHide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <button class="btn" id="loginBtn" type="button">Sign In</button>
    <div class="error" id="errorMsg"></div>
  </div>
  <div class="footer">
    Need access? <a href="mailto:sourcing@tbgsourcing.net">Contact us</a>
  </div>
</div>
<script>
(function () {
  'use strict';

  // White-label: on portal.buylinebrands.com pre-populate the Buyline Brands tenant
  // context and swap the TBG branding for Buyline Brands.
  var BUYLINE_HOST = 'portal.buylinebrands.com';
  var BUYLINE_TENANT_ID = 'f64c18ac-c0b4-4bba-a3e6-b64ef0fd3bf4';
  if (location.hostname === BUYLINE_HOST) {
    try { localStorage.setItem('tenant_id', BUYLINE_TENANT_ID); } catch (e) {}
    document.title = 'Buyline Brands — Sign In';
    var _wm = document.querySelector('.logo-wordmark'); if (_wm) _wm.textContent = 'Buyline Brands';
    var _sub = document.querySelector('.logo-sub'); if (_sub) _sub.textContent = 'Brand Portal';
  }

  var emailEl = document.getElementById('email');
  var passwordEl = document.getElementById('password');
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('errorMsg');
  var submitting = false;

  function showError(msg) {
    err.textContent = msg;
    err.style.display = 'block';
  }

  function clearError() {
    err.textContent = '';
    err.style.display = 'none';
  }

  async function doLogin() {
    if (submitting) return;
    clearError();

    var email = emailEl.value.trim();
    var password = passwordEl.value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    submitting = true;
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      var res = await fetch('/api/tenant-auth?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      });

      var data = {};
      try { data = await res.json(); } catch (e) { data = {}; }

      if (!res.ok || !data.token) {
        showError(data.error || 'Sign in failed.');
        submitting = false;
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      localStorage.setItem('tenant_token', data.token);
      localStorage.setItem('tenant_user', JSON.stringify(data.user || {}));
      window.location.href = 'tenant-dashboard.html';
    } catch (e) {
      showError('Connection error. Please try again.');
      submitting = false;
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  // Pre-fill email from ?email= (used by the admin "Copy Login Link" button).
  try {
    var preEmail = new URLSearchParams(window.location.search).get('email');
    if (preEmail) {
      emailEl.value = preEmail.trim();
      // Move focus to password since email is already filled.
      setTimeout(function () { passwordEl.focus(); }, 0);
    }
  } catch (e) {}

  // Password visibility toggle (eye / eye-slash).
  var pwToggle = document.getElementById('pwToggle');
  if (pwToggle) {
    pwToggle.addEventListener('click', function () {
      var showing = passwordEl.type === 'text';
      passwordEl.type = showing ? 'password' : 'text';
      document.getElementById('pwIconShow').style.display = showing ? '' : 'none';
      document.getElementById('pwIconHide').style.display = showing ? 'none' : '';
      pwToggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
  }

  // No inline onclick — wire events here.
  btn.addEventListener('click', doLogin);

  // Submit on Enter from either input field.
  [emailEl, passwordEl].forEach(function (el) {
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        doLogin();
      }
    });
  });

  // If already signed in with a valid token, skip straight to the dashboard.
  var existing = localStorage.getItem('tenant_token');
  if (existing) {
    fetch('/api/tenant-auth?action=validate', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + existing }
    })
      .then(function (r) { return r.json(); })
      .then(function (d) { if (d && d.valid) window.location.href = 'tenant-dashboard.html'; })
      .catch(function () {});
  }
})();
</script>
</body>
</html>
