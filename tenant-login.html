<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBG Sourcing — Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0e1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-wordmark {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.04em;
  }
  .logo-sub {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .card {
    background: #131929;
    border: 1px solid #1e2d47;
    border-radius: 12px;
    padding: 36px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input {
    width: 100%;
    background: #0d1424;
    border: 1px solid #1e2d47;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: #f1f5f9;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #3b82f6; }
  input::placeholder { color: #374151; }
  .btn {
    width: 100%;
    background: #2563eb;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .btn:hover { background: #1d4ed8; }
  .btn:disabled { background: #1e3a6e; cursor: not-allowed; }
  .error {
    background: #1f0a0a;
    border: 1px solid #7f1d1d;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #fca5a5;
    margin-top: 16px;
    display: none;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #374151;
  }
  .footer a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-wordmark">TBG Sourcing</div>
    <div class="logo-sub">Sourcing Intelligence Platform</div>
  </div>
  <div class="card">
    <div class="card-title">Sign in to your account</div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" type="button">Sign In</button>
    <div class="error" id="errorMsg"></div>
  </div>
  <div class="footer">
    Need access? <a href="mailto:sourcing@tbgsourcing.net">Contact us</a>
  </div>
</div>
<script>
(function () {
  'use strict';

  var emailEl = document.getElementById('email');
  var passwordEl = document.getElementById('password');
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('errorMsg');
  var submitting = false;

  function showError(msg) {
    err.textContent = msg;
    err.style.display = 'block';
  }

  function clearError() {
    err.textContent = '';
    err.style.display = 'none';
  }

  async function doLogin() {
    if (submitting) return;
    clearError();

    var email = emailEl.value.trim();
    var password = passwordEl.value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    submitting = true;
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      var res = await fetch('/api/tenant-auth?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      });

      var data = {};
      try { data = await res.json(); } catch (e) { data = {}; }

      if (!res.ok || !data.token) {
        showError(data.error || 'Sign in failed.');
        submitting = false;
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      localStorage.setItem('tenant_token', data.token);
      localStorage.setItem('tenant_user', JSON.stringify(data.user || {}));
      window.location.href = '/tenant-dashboard.html';
    } catch (e) {
      showError('Connection error. Please try again.');
      submitting = false;
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  // Pre-fill email from ?email= (used by the admin "Copy Login Link" button).
  try {
    var preEmail = new URLSearchParams(window.location.search).get('email');
    if (preEmail) {
      emailEl.value = preEmail.trim();
      // Move focus to password since email is already filled.
      setTimeout(function () { passwordEl.focus(); }, 0);
    }
  } catch (e) {}

  // No inline onclick — wire events here.
  btn.addEventListener('click', doLogin);

  // Submit on Enter from either input field.
  [emailEl, passwordEl].forEach(function (el) {
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        doLogin();
      }
    });
  });

  // If already signed in with a valid token, skip straight to the dashboard.
  var existing = localStorage.getItem('tenant_token');
  if (existing) {
    fetch('/api/tenant-auth?action=validate', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + existing }
    })
      .then(function (r) { return r.json(); })
      .then(function (d) { if (d && d.valid) window.location.href = '/tenant-dashboard.html'; })
      .catch(function () {});
  }
})();
</script>
</body>
</html>
