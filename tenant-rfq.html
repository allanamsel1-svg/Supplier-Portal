<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFQs — TBG Sourcing</title>
<link rel="stylesheet" href="/tenant-portal.css">
<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
</head>
<body>
<div id="sidebar"></div>

<div class="main">
  <div class="page-header">
    <div class="page-title">RFQ &amp; Product Development</div>
    <div class="page-sub" id="pageSub">Requests for quote and product development</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-tab="rfq">RFQs <span class="tab-count" id="cnt-rfq"></span></button>
    <button class="tab" data-tab="pd">Product Development <span class="tab-count" id="cnt-pd"></span></button>
    <button class="tab" data-tab="skus">SKU Library <span class="tab-count" id="cnt-skus"></span></button>
  </div>

  <div class="tab-pane" id="pane-rfq">
    <div class="toolbar">
      <input class="search-input" id="rfqSearch" placeholder="Search RFQs by project #, description, category…">
      <select class="filter-select" id="rfqStatus"><option value="all">All statuses</option></select>
    </div>
    <div id="box-rfq"><div class="loading">Loading RFQs…</div></div>
  </div>

  <div class="tab-pane" id="pane-pd">
    <div class="toolbar">
      <input class="search-input" id="pdSearch" placeholder="Search product development…">
    </div>
    <div id="box-pd"><div class="loading">Loading product development…</div></div>
  </div>

  <div class="tab-pane" id="pane-skus">
    <div class="toolbar">
      <input class="search-input" id="skuSearch" placeholder="Search by SKU code, name, description…">
      <select class="filter-select" id="skuCategory"><option value="all">All categories</option></select>
      <select class="filter-select" id="skuStatus">
        <option value="all">All statuses</option>
        <option value="draft">Draft</option>
        <option value="live">Live</option>
        <option value="active">Active</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="cards-grid" id="grid-skus"><div class="loading">Loading SKUs…</div></div>
  </div>
</div>

<div class="panel-overlay" id="panelOverlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-head">
    <div><h2 id="panelTitle"></h2><div class="sub" id="panelSub"></div></div>
    <button class="panel-close" id="panelCloseBtn">×</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script src="/tenant-shared.js"></script>
<script>
const TABS = ['rfq', 'pd', 'skus'];
let TID = null;
let rfqs = [], pds = [], skus = [];
const loaded = {};

function showTab(tab) {
  if (!TABS.includes(tab)) tab = 'rfq';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  if (tab === 'pd' && !loaded.pd) { loaded.pd = true; loadPD(); }
  if (tab === 'skus' && !loaded.skus) { loaded.skus = true; loadSKUs(); }
}
function goTab(tab) { location.hash = tab === 'rfq' ? '' : '#' + tab; }

// ── RFQs ──
async function loadRFQs() {
  rfqs = await supa(`rfqs?tenant_id=eq.${TID}&order=created_at.desc&select=*,rfq_factory_assignments(count)`);
  document.getElementById('cnt-rfq').textContent = rfqs.length;
  const statuses = Array.from(new Set(rfqs.map(r => r.status).filter(Boolean))).sort();
  const sel = document.getElementById('rfqStatus');
  statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
  renderRFQs();
}

function rfqTitle(r) { return [r.project_number, r.item_description].filter(Boolean).join(' — ') || 'Untitled RFQ'; }
function asgCount(r) { const a = r.rfq_factory_assignments; return (Array.isArray(a) && a[0] && a[0].count) || 0; }

function renderRFQs() {
  const q = (document.getElementById('rfqSearch').value || '').toLowerCase().trim();
  const st = document.getElementById('rfqStatus').value;
  let rows = rfqs.slice();
  if (st !== 'all') rows = rows.filter(r => r.status === st);
  if (q) rows = rows.filter(r => [r.project_number, r.item_description, r.category, r.sub_category]
    .some(v => (v || '').toLowerCase().includes(q)));
  const box = document.getElementById('box-rfq');
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">📋</span>No RFQs found.</div>'; return; }
  box.innerHTML = `<table class="data-table"><thead><tr><th>Project</th><th>Description</th><th>Category</th><th>Status</th><th>Factories</th><th>Created</th></tr></thead><tbody>${
    rows.map(r => `<tr class="clickable" data-id="${esc(r.id)}">
      <td>${esc(r.project_number || '—')}</td><td>${esc(r.item_description || '—')}</td>
      <td>${esc([r.category, r.sub_category].filter(Boolean).join(' › ') || '—')}</td>
      <td>${statusBadge(r.status)}</td><td>${asgCount(r)}</td><td>${fmtDate(r.created_at)}</td></tr>`).join('')
  }</tbody></table>`;
  box.querySelectorAll('tr.clickable').forEach(tr => tr.addEventListener('click', () => openRFQ(tr.dataset.id)));
}

async function openRFQ(id) {
  const r = rfqs.find(x => x.id === id);
  if (!r) return;
  openPanel(rfqTitle(r), [r.category, r.status].filter(Boolean).join(' · '), '<div class="loading">Loading details…</div>');

  const [assignments, quotes] = await Promise.all([
    supa(`rfq_factory_assignments?rfq_id=eq.${id}&select=*,factories(factory_name_english)&order=sent_at.desc`),
    supa(`rfq_quotes?rfq_id=eq.${id}&select=id,quote_option,status,total_fob_price,unit_fob_price,score_overall_v2,score_tier,compliance_status,factory_model_number&order=score_overall_v2.desc.nullslast`),
  ]);

  const details = kv([
    ['Project #', r.project_number],
    ['Status', statusBadge(r.status), true],
    ['Category', [r.category, r.sub_category, r.sub_sub_category].filter(Boolean).join(' › ')],
    ['Quantity', r.quote_quantity != null ? Number(r.quote_quantity).toLocaleString() : null],
    ['Target retail', r.target_retail_price ? money(r.target_retail_price) : null],
    ['Target wholesale', r.target_wholesale_price ? money(r.target_wholesale_price) : null],
    ['Max FOB', r.max_fob_price ? money(r.max_fob_price) : null],
    ['Target gross margin', r.target_gross_margin_pct != null ? pct(r.target_gross_margin_pct) : null],
    ['Est. landed cost', r.est_landed_cost ? money(r.est_landed_cost) : null],
    ['FOB port', r.fob_port],
    ['Prop 65 strategy', r.prop65_strategy],
    ['Created', fmtDate(r.created_at)],
  ]);

  const spec = (r.detailed_specifications || r.item_description)
    ? `<div class="sub-item"><div class="si-meta" style="white-space:pre-wrap;color:#cbd5e1;">${esc(r.detailed_specifications || r.item_description)}</div></div>`
    : '<div class="empty" style="padding:12px;">No specification text.</div>';

  const asgItems = assignments.length ? assignments.map(a => `<div class="sub-item">
      <div class="si-title">${esc(a.factories && a.factories.factory_name_english || 'Factory')}</div>
      <div class="si-meta">${statusBadge(a.status)} · sent ${fmtDate(a.sent_at)}${a.quoted_at ? ' · quoted ' + fmtDate(a.quoted_at) : ''}</div>
    </div>`).join('') : '<div class="empty" style="padding:12px;">No factory assignments.</div>';

  const quoteItems = quotes.length ? quotes.map(qt => `<div class="sub-item">
      <div class="si-title">${esc(qt.factory_model_number || ('Option ' + (qt.quote_option || '')))} ${qt.score_tier ? '· ' + esc(qt.score_tier) : ''}</div>
      <div class="si-meta">${[
        qt.status && 'status: ' + qt.status,
        qt.total_fob_price != null && 'FOB ' + money(qt.total_fob_price),
        qt.score_overall_v2 != null && 'score ' + qt.score_overall_v2,
        qt.compliance_status && 'compliance: ' + qt.compliance_status,
      ].filter(Boolean).map(esc).join(' · ') || '—'}</div>
    </div>`).join('') : '<div class="empty" style="padding:12px;">No quotes received.</div>';

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section"><h3>RFQ Details</h3>${details}</div>
    <div class="panel-section"><h3>Specifications</h3><div class="sub-list">${spec}</div></div>
    <div class="panel-section"><h3>Factory Assignments (${assignments.length})</h3><div class="sub-list">${asgItems}</div></div>
    <div class="panel-section"><h3>Quotes Received (${quotes.length})</h3><div class="sub-list">${quoteItems}</div></div>
  `;
}

// ── Product Development ──
async function loadPD() {
  pds = await supa(`product_development?tenant_id=eq.${TID}&order=created_at.desc&select=*,skus!product_development_sku_id_fkey(model_number,description)`);
  document.getElementById('cnt-pd').textContent = pds.length;
  renderPD();
}
function pdTitle(p) { return [p.pd_number, p.item_description || p.item_number].filter(Boolean).join(' — ') || 'PD item'; }
function renderPD() {
  const q = (document.getElementById('pdSearch').value || '').toLowerCase().trim();
  let rows = pds.slice();
  if (q) rows = rows.filter(p => [p.pd_number, p.item_description, p.item_number, p.category]
    .some(v => (v || '').toLowerCase().includes(q)));
  const box = document.getElementById('box-pd');
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🧪</span>No product development records.</div>'; return; }
  box.innerHTML = `<table class="data-table"><thead><tr><th>PD #</th><th>Item</th><th>Category</th><th>SKU</th><th>Status</th><th>Created</th></tr></thead><tbody>${
    rows.map(p => `<tr class="clickable" data-id="${esc(p.id)}">
      <td>${esc(p.pd_number || '—')}</td><td>${esc(p.item_description || p.item_number || '—')}</td>
      <td>${esc(p.category || '—')}</td><td>${esc(p.skus ? (p.skus.model_number || '') : '—')}</td>
      <td>${statusBadge(p.status || p.sku_lifecycle_status)}</td><td>${fmtDate(p.created_at)}</td></tr>`).join('')
  }</tbody></table>`;
  box.querySelectorAll('tr.clickable').forEach(tr => tr.addEventListener('click', () => openPD(tr.dataset.id)));
}

async function openPD(id) {
  const p = pds.find(x => x.id === id);
  if (!p) return;
  openPanel(pdTitle(p), [p.category, p.status].filter(Boolean).join(' · '), '<div class="loading">Loading details…</div>');
  const items = await supa(`product_development_items?product_development_id=eq.${id}&order=created_at.desc`);

  const details = kv([
    ['PD #', p.pd_number],
    ['Item #', p.item_number],
    ['Status', statusBadge(p.status || p.sku_lifecycle_status), true],
    ['Lifecycle', p.sku_lifecycle_status],
    ['Gates', p.gates_status],
    ['Category', p.category],
    ['Color', p.color_name],
    ['Linked SKU', p.skus ? esc(p.skus.model_number || '') + (p.skus.description ? ' — ' + esc(p.skus.description) : '') : null, true],
    ['FOB price', p.fob_price ? money(p.fob_price) : null],
    ['Target retail', p.target_retail_price ? money(p.target_retail_price) : null],
    ['Wholesale', p.wholesale_price ? money(p.wholesale_price) : null],
    ['Created', fmtDate(p.created_at)],
  ]);

  const desc = (p.detailed_description || p.item_description)
    ? `<div class="sub-item"><div class="si-meta" style="white-space:pre-wrap;color:#cbd5e1;">${esc(p.detailed_description || p.item_description)}</div></div>`
    : '<div class="empty" style="padding:12px;">No description.</div>';

  const itemRows = items.length ? items.map(it => `<div class="sub-item">
      <div class="si-title">Version ${esc(it.current_version || '—')} · ${statusBadge(it.status)}</div>
      <div class="si-meta">${[
        it.accepted_at && 'accepted ' + fmtDate(it.accepted_at),
        it.approved_at && 'approved ' + fmtDate(it.approved_at),
        it.master_case_pack_units && 'master pack ' + it.master_case_pack_units,
        it.cartons_confirmed_at && 'cartons confirmed',
      ].filter(Boolean).map(esc).join(' · ') || 'In progress'}</div>
    </div>`).join('') : '<div class="empty" style="padding:12px;">No development items / samples.</div>';

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section"><h3>Details</h3>${details}</div>
    <div class="panel-section"><h3>Description</h3><div class="sub-list">${desc}</div></div>
    <div class="panel-section"><h3>Items &amp; Sample Status (${items.length})</h3><div class="sub-list">${itemRows}</div></div>
  `;
}

// ── SKU Library (inline; same data as tenant-skus.html) ──
function skuCode(s) { return s.model_number || [s.brand_prefix, s.category_prefix, s.sequence_number].filter(Boolean).join('-') || '—'; }
function skuCat(s) { if (s.categories) return [s.categories.category, s.categories.sub_category].filter(Boolean).join(' › '); return s.category_prefix || ''; }
function skuCosting(s) { const c = s.sku_costing; return (Array.isArray(c) && c.length) ? c[0] : null; }

async function loadSKUs() {
  skus = await supa(`skus?tenant_id=eq.${TID}&order=created_at.desc&select=*,categories(category,sub_category),sku_costing(fob_price,total_fob,landed_cost,wholesale_price,retail_price,gross_margin_pct,net_margin_pct,effective_date)`);
  document.getElementById('cnt-skus').textContent = skus.length;
  const cats = Array.from(new Set(skus.map(skuCat).filter(Boolean))).sort();
  const sel = document.getElementById('skuCategory');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  renderSKUs();
}

function renderSKUs() {
  const q = (document.getElementById('skuSearch').value || '').toLowerCase().trim();
  const cat = document.getElementById('skuCategory').value;
  const st = document.getElementById('skuStatus').value;
  let rows = skus.slice();
  if (st !== 'all') rows = rows.filter(s => (s.status || '').toLowerCase() === st);
  if (cat !== 'all') rows = rows.filter(s => skuCat(s) === cat);
  if (q) rows = rows.filter(s => [skuCode(s), s.description, s.detailed_description].some(v => (v || '').toLowerCase().includes(q)));
  const grid = document.getElementById('grid-skus');
  if (!rows.length) { grid.innerHTML = '<div class="empty"><span class="empty-icon">📦</span>No SKUs found.</div>'; return; }
  grid.innerHTML = rows.map(s => {
    const c = skuCosting(s); const cat = skuCat(s);
    return `<div class="card" data-id="${esc(s.id)}">
      <div class="card-title">${esc(s.description || 'Unnamed SKU')}</div>
      <div class="card-meta">${esc(skuCode(s))}</div>
      <div>${statusBadge(s.status)}${cat ? ' <span class="chip">' + esc(cat) + '</span>' : ''}</div>
      <div class="card-row" style="margin-top:10px;color:var(--sidebar-text);">
        <span>FOB ${c ? money(c.total_fob || c.fob_price) : '—'}</span>
        <span>· Retail ${c ? money(c.retail_price) : '—'}</span>
        <span>· Margin ${c ? pct(c.gross_margin_pct) : '—'}</span>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(card => card.addEventListener('click', () => openSKU(card.dataset.id)));
}

async function openSKU(id) {
  const s = skus.find(x => x.id === id);
  if (!s) return;
  openPanel(s.description || skuCode(s), skuCode(s), '<div class="loading">Loading details…</div>');
  const [docs, sources] = await Promise.all([
    supa(`sku_documents?sku_id=eq.${id}&order=uploaded_at.desc`),
    supa(`sku_factory_sources?sku_id=eq.${id}&select=*,factories(factory_name_english)&order=effective_date.desc`),
  ]);
  const c = skuCosting(s);
  const details = kv([
    ['SKU code', skuCode(s)], ['Status', statusBadge(s.status), true], ['Category', skuCat(s)],
    ['Customer-specific', s.is_customer_specific ? 'Yes' : null], ['Cosmetic', s.is_cosmetic ? 'Yes' : null],
    ['Shelf life', s.shelf_life_days ? s.shelf_life_days + ' days' : null], ['Created', fmtDate(s.created_at)],
  ]);
  const cost = c ? kv([
    ['FOB price', money(c.fob_price)], ['Total FOB', money(c.total_fob)], ['Landed cost', money(c.landed_cost)],
    ['Wholesale', money(c.wholesale_price)], ['Retail', money(c.retail_price)],
    ['Gross margin', pct(c.gross_margin_pct)], ['Net margin', pct(c.net_margin_pct)],
  ]) : '<div class="empty" style="padding:12px;">No costing on record.</div>';
  const docItems = docs.length ? docs.map(d => `<div class="sub-item"><div class="si-title">${esc(d.document_type || d.file_name || 'Document')}</div><div class="si-meta">${[d.file_name, d.is_current ? 'current' : null, fmtDate(d.uploaded_at)].filter(Boolean).map(esc).join(' · ')}</div></div>`).join('') : '<div class="empty" style="padding:12px;">No documents.</div>';
  const srcItems = sources.length ? sources.map(fs => `<div class="sub-item"><div class="si-title">${esc(fs.factories && fs.factories.factory_name_english || 'Factory')}</div><div class="si-meta">${[fs.status && statusBadge(fs.status), fs.allocation_pct != null && 'alloc ' + fs.allocation_pct + '%', fs.fob_price != null && 'FOB ' + money(fs.fob_price)].filter(Boolean).join(' · ')}</div></div>`).join('') : '<div class="empty" style="padding:12px;">No factory sources.</div>';
  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section"><h3>Details</h3>${details}</div>
    <div class="panel-section"><h3>Costing</h3>${cost}</div>
    <div class="panel-section"><h3>Documents (${docs.length})</h3><div class="sub-list">${docItems}</div></div>
    <div class="panel-section"><h3>Factory Sources (${sources.length})</h3><div class="sub-list">${srcItems}</div></div>
  `;
}

(async function init() {
  const user = await tenantAuth();
  if (!user || !user.tenant) return;
  TID = user.tenant.id;
  renderSidebar(user);
  document.getElementById('pageSub').textContent = user.tenant.name + ' · RFQs and product development';

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => goTab(t.dataset.tab)));
  document.getElementById('rfqSearch').addEventListener('input', renderRFQs);
  document.getElementById('rfqStatus').addEventListener('change', renderRFQs);
  document.getElementById('pdSearch').addEventListener('input', renderPD);
  document.getElementById('skuSearch').addEventListener('input', renderSKUs);
  document.getElementById('skuCategory').addEventListener('change', renderSKUs);
  document.getElementById('skuStatus').addEventListener('change', renderSKUs);
  document.getElementById('panelCloseBtn').addEventListener('click', closePanel);
  document.getElementById('panelOverlay').addEventListener('click', closePanel);
  window.addEventListener('hashchange', () => showTab((location.hash || '#rfq').slice(1)));

  await loadRFQs();
  showTab((location.hash || '#rfq').slice(1));
  handleAiRfqAction();
})();

// AI toolbar pre-population for create_rfq (set by tenant-dashboard runSearch).
// This list view has no inline create form, so we surface the intent: pre-fill the
// search with the product and show a banner. The key is always cleared after reading.
function handleAiRfqAction() {
  var raw; try { raw = sessionStorage.getItem('ai_action_params'); } catch (e) { return; }
  if (!raw) return;
  var d; try { d = JSON.parse(raw); } catch (e) { try { sessionStorage.removeItem('ai_action_params'); } catch (x) {} return; }
  try { sessionStorage.removeItem('ai_action_params'); } catch (e) {}   // clear to prevent stale pre-pop on refresh
  if (!d || d.action !== 'create_rfq' || (Date.now() - (d.ts || 0)) > 30000) return;
  var p = d.params || {};
  showTab('rfq');
  var s = document.getElementById('rfqSearch');
  if (s && p.product) { s.value = p.product; if (typeof renderRFQs === 'function') renderRFQs(); }
  var pane = document.getElementById('pane-rfq');
  if (pane) {
    var banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(59,130,246,0.12);border:1px solid #3b82f6;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--text);';
    banner.textContent = '🆕 Starting a new RFQ' + (p.product ? ' for "' + p.product + '"' : '') +
      (p.quantity ? ' · qty ' + p.quantity : '') + (p.target_cost ? ' · target $' + p.target_cost : '') +
      '. Use your sourcing manager or the admin RFQ tool to create it.';
    pane.insertBefore(banner, pane.firstChild);
  }
}
</script>
</body>
</html>
