<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inspections — Supplier Portal</title>
<link rel="stylesheet" href="ri_shared.css">
<script src="paste-upload.js"></script>
<script>(function(){var t=localStorage.getItem('admin_theme')||'light';if(t==='dark')document.documentElement.classList.add('admin-dark');})();</script>
<script src="admin-theme.js"></script>
<style>
  *{box-sizing:border-box;}
  /* Admin login gate (matches admin.html / financials.html) */
  #login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .lb { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 2.5rem; width: 340px; max-width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
  .lb h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; color:var(--text); }
  .lb p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .lb input { width: 100%; padding: 9px 11px; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; color:var(--text); font-size: 14px; margin-bottom: 10px; font-family: inherit; }
  .lb-btn { width: 100%; padding: 10px; background: #1a1a2e; color:#fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .lb-err { font-size: 13px; color: #c00; margin-top: 8px; display: none; }
  #main { display: none; }

  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:50;}
  .topbar-l{display:flex;align-items:center;gap:12px;}
  .tm{width:28px;height:28px;background:#1a1a2e;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;}
  .topbar-title{font-size:14px;font-weight:600;}
  .back-link{font-size:13px;color:#888;text-decoration:none;}
  .topbar-r{display:flex;align-items:center;gap:10px;}
  .ic-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;}

  .layout{display:grid;grid-template-columns:380px 1fr;gap:0;height:calc(100vh - 52px);}
  @media(max-width:900px){.layout{grid-template-columns:1fr;height:auto;}}
  .lpanel{border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);}
  .rpanel{overflow-y:auto;padding:1.5rem;}

  .lp-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
  .lp-head h2{font-size:16px;font-weight:700;}
  .btn-new{background:#1a1a2e;color:#fff;border:none;border-radius:7px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
  .tabs{display:flex;gap:2px;padding:8px 12px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
  .tab{padding:5px 10px;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;color:#888;border-radius:6px;font-family:inherit;}
  .tab.active{background:var(--bg);color:var(--text);}
  .lp-search{padding:10px 12px;border-bottom:1px solid var(--border);}
  .lp-search input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;}

  .irow{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
  .irow:hover{background:var(--bg);}
  .irow.sel{background:var(--bg);border-left:3px solid #2244cc;}
  .irow-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;}
  .irow-po{font-size:13px;font-weight:700;}
  .irow-fac{font-size:12px;color:var(--text2);}
  .irow-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;}
  .type-badge{background:rgba(34,68,204,0.12);color:#2244cc;}
  .empty{color:#aaa;text-align:center;padding:3rem 1rem;font-size:14px;}

  .sec{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1rem;}
  .sec h3{font-size:13px;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text2);}
  .sec .sub{font-size:12px;color:#999;margin-bottom:12px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text2);}
  .field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;}
  .field textarea{resize:vertical;min-height:64px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-wrap:wrap;}
  .seg button{border:none;background:var(--bg);font-size:12px;font-weight:600;padding:7px 13px;cursor:pointer;font-family:inherit;color:#888;border-right:1px solid var(--border);}
  .seg button.on{background:#1a1a2e;color:#fff;}
  .btn{background:#1a1a2e;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn.alt{background:var(--bg);color:var(--text);border:1px solid var(--border);}
  .btn.green{background:#1a7a1a;} .btn.red{background:#b00;} .btn.amber{background:#a86b00;}
  .calc-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;margin:10px 0;}
  .mtable-wrap{overflow-x:auto;}
  table.mt{border-collapse:collapse;font-size:11px;min-width:760px;}
  table.mt th,table.mt td{border:1px solid var(--border);padding:4px 6px;text-align:center;}
  table.mt th{background:var(--bg);font-weight:700;}
  table.mt input{width:62px;padding:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg2);color:var(--text);font-size:11px;font-family:inherit;}
  table.mt input.upc{width:120px;}
  .ok{color:#1a7a1a;font-weight:700;} .bad{color:#b00;font-weight:700;}
  .var-card{background:rgba(245,158,11,0.1);border:1px solid #f0d860;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;}
  .var-card h4{font-size:12px;margin-bottom:6px;color:#a86b00;}
  .var-card ul{margin:4px 0 0 16px;} .var-card li{margin-bottom:3px;line-height:1.45;}
  .conf-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border);}
  .uploader{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;color:#999;font-size:13px;}
  .uploader.drag{border-color:#2244cc;color:#2244cc;}
  .hint{font-size:11px;color:#aaa;margin-top:4px;}
  .detail-head{margin-bottom:1rem;}
  .detail-head .dh-po{font-size:20px;font-weight:700;}
  .detail-head .dh-sub{font-size:13px;color:var(--text2);margin-top:2px;}
  .detail-head .dh-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;width:460px;max-width:100%;max-height:90vh;overflow-y:auto;}
  .modal h2{font-size:16px;font-weight:700;margin-bottom:1rem;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}

  @keyframes ipulse{0%,100%{opacity:1}50%{opacity:0.45}}
  .pulse{animation:ipulse 1.2s infinite;}
  /* Admin tabs + platform stat widgets */
  .admtabs{display:flex;gap:4px;padding:10px 1.25rem 0;border-bottom:1px solid var(--border);}
  .admtab{padding:9px 16px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#888;}
  .admtab.active{color:var(--text);border-bottom-color:var(--text);}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:1.25rem 1.5rem 0;}
  .pstat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;min-height:160px;display:flex;flex-direction:column;justify-content:flex-start;}
  .pstat-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px;}
  .pstat-val{font-size:32px;font-weight:700;color:var(--text);margin:8px 0 10px;line-height:1;}
  .pstat-sub{font-size:12px;color:#888;flex:1;}
  .an-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
  .an-card h3{font-size:14px;font-weight:700;margin-bottom:10px;}
  .an-row{display:flex;align-items:center;gap:10px;font-size:12px;margin:5px 0;}
  .an-bar{height:14px;border-radius:7px;background:#3b82f6;}
  .an-track{flex:1;height:14px;border-radius:7px;background:var(--border);overflow:hidden;}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="login">
  <div class="lb">
    <h1>Inspections</h1>
    <p>Admin sign-in required.</p>
    <input id="l-user" placeholder="Username" autocomplete="username">
    <input id="l-pass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lb-btn" onclick="doLogin()">Sign in</button>
    <div class="lb-err" id="l-err"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="topbar-l">
      <a class="back-link" href="admin.html">← Admin</a>
      <div class="tm">🔍</div>
      <div class="topbar-title">Inspections</div>
    </div>
    <div class="topbar-r">
      <button class="ic-btn" id="adminThemeToggle" onclick="toggleAdminTheme()" title="Toggle theme">🌙</button>
      <button class="ic-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="admtabs">
    <button class="admtab active" data-t="audits" onclick="showAdmTab('audits')">Factory Audits</button>
    <button class="admtab" data-t="psi" onclick="showAdmTab('psi')">PSI Inspections</button>
    <button class="admtab" data-t="analytics" onclick="showAdmTab('analytics')">Platform Analytics</button>
  </div>

  <div class="admpane" id="pane-audits">
    <div class="stats" id="audit-stats"></div>
    <div class="layout">
      <div class="lpanel">
        <div class="lp-head"><h2>Factory Audits</h2></div>
        <div class="tabs" id="audit-tabs">
          <button class="tab active" data-af="all" onclick="setAuditFilter('all')">All</button>
          <button class="tab" data-af="pending" onclick="setAuditFilter('pending')">Pending</button>
          <button class="tab" data-af="completed" onclick="setAuditFilter('completed')">Completed</button>
          <button class="tab" data-af="type" onclick="setAuditFilter('type')">By Audit Type</button>
        </div>
        <div class="lp-search"><input id="audit-search" placeholder="Search by factory name…" oninput="renderAuditList()"></div>
        <div id="audit-list"></div>
      </div>
      <div class="rpanel" id="audit-detail"><div class="empty">Select an audit.</div></div>
    </div>
  </div>

  <div class="admpane" id="pane-psi" style="display:none;">
  <div class="layout">
    <div class="lpanel">
      <div class="lp-head">
        <h2>Inspections</h2>
        <button class="btn-new" onclick="openNewModal()">+ New</button>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-f="all" onclick="setFilter('all')">All</button>
        <button class="tab" data-f="scheduled" onclick="setFilter('scheduled')">Scheduled</button>
        <button class="tab" data-f="in_progress" onclick="setFilter('in_progress')">In Progress</button>
        <button class="tab" data-f="completed" onclick="setFilter('completed')">Completed</button>
        <button class="tab" data-f="rework_required" onclick="setFilter('rework_required')">Rework Required</button>
      </div>
      <div class="lp-search"><input id="search" placeholder="Search by PO or factory…" oninput="renderList()"></div>
      <div id="list"></div>
    </div>

    <div class="rpanel" id="detail">
      <div class="empty">Select an inspection from the list, or create a new one.</div>
    </div>
  </div>
  </div>

  <div class="admpane" id="pane-analytics" style="display:none;">
    <div id="analytics-body"><div class="empty">Loading analytics…</div></div>
  </div>
</div>

<!-- NEW INSPECTION MODAL -->
<div class="modal-bg" id="newModal">
  <div class="modal">
    <h2>New Inspection</h2>
    <div class="field">
      <label>Tenant</label>
      <select id="nm-tenant" onchange="nmFilterPOs()"><option value="">All tenants</option></select>
    </div>
    <div class="field">
      <label>Purchase Order</label>
      <select id="nm-po"><option value="">Select a PO…</option></select>
    </div>
    <div class="field">
      <label>Inspection Type</label>
      <div class="seg" id="nm-type">
        <button class="on" data-v="PSI" onclick="nmType('PSI')">PSI</button>
        <button data-v="DUPRO" onclick="nmType('DUPRO')">DUPRO</button>
        <button data-v="IPC" onclick="nmType('IPC')">IPC</button>
      </div>
    </div>
    <div class="field">
      <label>Scheduled Date</label>
      <input id="nm-date" type="date">
    </div>
    <div class="lb-err" id="nm-err"></div>
    <div class="modal-actions">
      <button class="btn alt" onclick="closeNewModal()">Cancel</button>
      <button class="btn" id="nm-save" onclick="saveNewInspection()">Create Inspection</button>
    </div>
  </div>
</div>

<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
var H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};
function g(id){return document.getElementById(id);}
function esc(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function todayStr(){return new Date().toISOString().slice(0,10);}

async function sbGet(path){try{var r=await fetch(SB+'/rest/v1/'+path,{headers:H});if(!r.ok)return [];var d=await r.json();return Array.isArray(d)?d:[];}catch(e){return [];}}
async function sbPatch(path,body){try{var r=await fetch(SB+'/rest/v1/'+path,{method:'PATCH',headers:Object.assign({},H,{Prefer:'return=minimal'}),body:JSON.stringify(body)});return r.ok;}catch(e){return false;}}
async function sbPost(path,body,rep){try{var r=await fetch(SB+'/rest/v1/'+path,{method:'POST',headers:Object.assign({},H,{Prefer:rep?'return=representation':'return=minimal'}),body:JSON.stringify(body)});if(!r.ok)return null;return rep?await r.json():true;}catch(e){return null;}}

// ── State ──
var INSPECTIONS=[], TENANTS={}, FILTER='all', SELECTED=null, MEAS={};
var TENANT_VIEW=false, TV_TENANT='';  // landlord rule: admin never impersonates a tenant

// ── AQL engine ──
var AQL_BRACKETS=[
  [2,8,{I:2,II:3,III:5}],[9,15,{I:3,II:5,III:8}],[16,25,{I:5,II:8,III:13}],
  [26,50,{I:8,II:13,III:20}],[51,90,{I:13,II:20,III:32}],[91,150,{I:20,II:32,III:50}],
  [151,280,{I:32,II:50,III:80}],[281,500,{I:50,II:80,III:125}],[501,1200,{I:80,II:125,III:200}],
  [1201,3200,{I:125,II:200,III:315}],[3201,10000,{I:200,II:315,III:500}],
  [10001,35000,{I:315,II:500,III:800}],[35001,Infinity,{I:500,II:800,III:1250}]
];
// Major/Minor allowed per 80 samples, by AQL level. Critical always 0.
var AQL_ACCEPT={'1.0':{major:1,minor:3},'1.5':{major:2,minor:5},'2.5':{major:3,minor:7},'4.0':{major:5,minor:10}};
function sampleSizeFor(qty,level){
  qty=Number(qty)||0; level=level||'II';
  for(var i=0;i<AQL_BRACKETS.length;i++){var b=AQL_BRACKETS[i];if(qty>=b[0]&&qty<=b[1])return b[2][level]||b[2].II;}
  return 0;
}
function acceptanceFor(aql,sampleSize){
  var base=AQL_ACCEPT[String(aql)]||AQL_ACCEPT['2.5'];
  var scale=(sampleSize||0)/80;
  return {critical:0,major:Math.max(0,Math.round(base.major*scale)),minor:Math.max(0,Math.round(base.minor*scale))};
}

// ── List ──
async function loadList(){
  INSPECTIONS=await sbGet('inspections?select=*,purchase_orders(po_number,quantity,sku_id),factories(factory_name_english)&order=scheduled_date.asc');
  renderList();
  if(SELECTED){var s=INSPECTIONS.find(function(x){return x.id===SELECTED;});if(s)renderDetail(s);}
}
function methodIcon(m){return m==='third_party'?'🔍':m==='self_inspection'?'🏭':m==='tbg_arranged'?'📋':'•';}
function statusBadge(s){
  var map={scheduled:['#6b7280','rgba(107,114,128,0.15)'],factory_confirmed:['#2563eb','rgba(37,99,235,0.15)'],inspector_booked:['#a86b00','rgba(245,158,11,0.15)'],in_progress:['#a86b00','rgba(245,158,11,0.15)'],pass:['#1a7a1a','rgba(26,122,26,0.15)'],fail:['#b00','rgba(176,0,0,0.12)'],conditional_pass:['#a86b00','rgba(245,158,11,0.15)'],waived:['#6b7280','rgba(107,114,128,0.15)'],rework_required:['#b00','rgba(176,0,0,0.12)']};
  var c=map[s]||['#6b7280','rgba(107,114,128,0.15)'];
  var pulse=(s==='in_progress')?' pulse':'';
  return '<span class="badge'+pulse+'" style="color:'+c[0]+';background:'+c[1]+';">'+esc((s||'').replace(/_/g,' '))+'</span>';
}
function matchesFilter(insp){
  if(FILTER==='all')return true;
  if(FILTER==='scheduled')return insp.status==='scheduled';
  if(FILTER==='in_progress')return insp.status==='in_progress'||insp.status==='inspector_booked'||insp.status==='factory_confirmed';
  if(FILTER==='completed')return ['pass','fail','conditional_pass','waived'].indexOf(insp.status)>-1;
  if(FILTER==='rework_required')return insp.status==='rework_required';
  return true;
}
function setFilter(f){FILTER=f;document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.f===f);});renderList();}
// DFS order so rework children appear directly under their parent, with depth for indentation.
function buildOrdered(){
  var byParent={},idset={};
  INSPECTIONS.forEach(function(i){idset[i.id]=i;var p=i.parent_inspection_id||'_root';(byParent[p]=byParent[p]||[]).push(i);});
  var ordered=[];
  function visit(insp,depth){ordered.push({insp:insp,depth:depth});(byParent[insp.id]||[]).forEach(function(c){visit(c,depth+1);});}
  INSPECTIONS.forEach(function(i){if(!i.parent_inspection_id||!idset[i.parent_inspection_id])visit(i,0);});
  return ordered;
}
function renderList(){
  var q=(g('search').value||'').toLowerCase().trim();
  var ordered=buildOrdered().filter(function(o){
    var insp=o.insp;
    if(!matchesFilter(insp))return false;
    if(TENANT_VIEW&&TV_TENANT&&insp.tenant_id!==TV_TENANT)return false;
    if(q){var po=(insp.purchase_orders&&insp.purchase_orders.po_number||'').toLowerCase();var fac=(insp.factories&&insp.factories.factory_name_english||'').toLowerCase();if(po.indexOf(q)===-1&&fac.indexOf(q)===-1)return false;}
    return true;
  });
  if(!ordered.length){g('list').innerHTML='<div class="empty">No inspections.</div>';return;}
  g('list').innerHTML=ordered.map(function(o){
    var insp=o.insp;
    var po=insp.purchase_orders&&insp.purchase_orders.po_number||insp.po_id||'—';
    var fac=insp.factories&&insp.factories.factory_name_english||'—';
    var indent=o.depth>0?'margin-left:'+(o.depth*14)+'px;border-left:2px solid var(--border);':'';
    var reworkLbl=o.depth>0?'<span class="badge" style="background:rgba(176,0,0,0.1);color:#b00;">↳ Rework</span> ':'';
    return '<div class="irow'+(insp.id===SELECTED?' sel':'')+'" style="'+indent+'" onclick="selectInspection(\''+insp.id+'\')">'+
      '<div class="irow-top"><span class="irow-po">'+reworkLbl+esc(po)+'</span>'+statusBadge(insp.status)+'</div>'+
      '<div class="irow-fac">'+esc(fac)+'</div>'+
      '<div class="irow-meta"><span class="badge type-badge">'+esc(insp.inspection_type||'—')+'</span>'+
      '<span style="font-size:11px;color:var(--text2);">'+methodIcon(insp.inspection_method)+' '+esc(insp.scheduled_date||'—')+'</span></div>'+
    '</div>';
  }).join('');
}
function reworkDepth(insp){var d=0,cur=insp,guard=0;while(cur&&cur.parent_inspection_id&&guard<20){var p=INSPECTIONS.find(function(x){return x.id===cur.parent_inspection_id;});if(!p)break;d++;cur=p;guard++;}return d;}

function daysLabel(dateStr){
  if(!dateStr)return '';
  var t=new Date();t.setHours(0,0,0,0);var d=new Date(dateStr+'T00:00:00');if(isNaN(d))return '';
  var diff=Math.round((d.getTime()-t.getTime())/864e5);
  if(diff>0)return diff+' day'+(diff===1?'':'s')+' until inspection';
  if(diff<0)return Math.abs(diff)+' day'+(diff===-1?'':'s')+' since inspection';
  return 'Inspection is today';
}

// ── Measurements ──
var MEAS_TYPES=['unit','inner','master'];
var MEAS_LABELS={unit:'Unit',inner:'Inner Carton',master:'Master Carton'};
function skuSpec(sku,keys){if(!sku)return null;for(var i=0;i<keys.length;i++){if(sku[keys[i]]!=null&&sku[keys[i]]!=='')return sku[keys[i]];}return null;}
async function loadMeasurements(insp){
  MEAS={};
  var rows=await sbGet('inspection_measurements?inspection_id=eq.'+insp.id+'&select=*');
  rows.forEach(function(r){MEAS[r.measurement_type]=r;});
  // Best-effort spec auto-fill from linked SKU for the unit row.
  var sku=null;
  var skuId=insp.purchase_orders&&insp.purchase_orders.sku_id;
  if(skuId){var sr=await sbGet('skus?id=eq.'+skuId+'&select=*&limit=1');sku=sr[0]||null;}
  if(sku){
    var u=MEAS.unit||{measurement_type:'unit'};
    if(u.weight_spec==null)u.weight_spec=skuSpec(sku,['unit_weight','unit_weight_kg','weight','net_weight']);
    if(u.length_spec==null)u.length_spec=skuSpec(sku,['unit_length','unit_length_cm','length']);
    if(u.width_spec==null)u.width_spec=skuSpec(sku,['unit_width','unit_width_cm','width']);
    if(u.height_spec==null)u.height_spec=skuSpec(sku,['unit_height','unit_height_cm','height']);
    if(u.upc_spec==null)u.upc_spec=skuSpec(sku,['upc','upc_code','barcode']);
    MEAS.unit=u;
  }
  renderMeasTable();
}
function num(v){var n=parseFloat(v);return isNaN(n)?null:n;}
function within2(spec,actual){var s=num(spec),a=num(actual);if(s==null||a==null||s===0)return null;return Math.abs((a-s)/s)<=0.02;}
function matchCell(spec,actual){var w=within2(spec,actual);if(w==null)return '<span style="color:#bbb;">—</span>';return w?'<span class="ok">✓</span>':'<span class="bad">✗</span>';}
function renderMeasTable(){
  var cols=[['weight','Weight'],['length','L'],['width','W'],['height','H']];
  var head='<table class="mt"><tr><th>Measurement</th>';
  cols.forEach(function(c){head+='<th>'+c[1]+' Spec</th><th>'+c[1]+' Actual</th><th>✓/✗</th>';});
  head+='<th>Qty/Pack Spec</th><th>Qty/Pack Actual</th><th>✓/✗</th><th>UPC Spec</th><th>UPC Actual</th><th>✓/✗</th></tr>';
  var body=MEAS_TYPES.map(function(t){
    var r=MEAS[t]||{measurement_type:t};
    var tr='<tr data-type="'+t+'"><td style="font-weight:600;">'+MEAS_LABELS[t]+'</td>';
    cols.forEach(function(c){
      var sp=r[c[0]+'_spec'], ac=r[c[0]+'_actual'];
      tr+='<td><input data-k="'+c[0]+'_spec" value="'+(sp==null?'':esc(sp))+'" oninput="onMeasInput()"></td>'+
          '<td><input data-k="'+c[0]+'_actual" value="'+(ac==null?'':esc(ac))+'" oninput="onMeasInput()"></td>'+
          '<td data-m="'+c[0]+'">'+matchCell(sp,ac)+'</td>';
    });
    tr+='<td><input data-k="qty_per_pack_spec" value="'+(r.qty_per_pack_spec==null?'':esc(r.qty_per_pack_spec))+'" oninput="onMeasInput()"></td>'+
        '<td><input data-k="qty_per_pack_actual" value="'+(r.qty_per_pack_actual==null?'':esc(r.qty_per_pack_actual))+'" oninput="onMeasInput()"></td>'+
        '<td data-m="qty">'+matchCell(r.qty_per_pack_spec,r.qty_per_pack_actual)+'</td>'+
        '<td><input class="upc" data-k="upc_spec" value="'+(r.upc_spec==null?'':esc(r.upc_spec))+'" oninput="onMeasInput()"></td>'+
        '<td><input class="upc" data-k="upc_actual" value="'+(r.upc_actual==null?'':esc(r.upc_actual))+'" oninput="onMeasInput()"></td>'+
        '<td data-m="upc">'+(r.upc_spec&&r.upc_actual?(String(r.upc_spec).trim()===String(r.upc_actual).trim()?'<span class="ok">✓</span>':'<span class="bad">✗</span>'):'<span style="color:#bbb;">—</span>')+'</td>';
    tr+='</tr>';
    return tr;
  }).join('');
  g('meas-table').innerHTML=head+body+'</table>';
}
function readMeasFromDom(){
  var out={};
  document.querySelectorAll('#meas-table tr[data-type]').forEach(function(tr){
    var t=tr.dataset.type,obj={measurement_type:t};
    tr.querySelectorAll('input[data-k]').forEach(function(inp){obj[inp.dataset.k]=inp.value;});
    out[t]=obj;
  });
  return out;
}
function onMeasInput(){
  // live-update match cells
  document.querySelectorAll('#meas-table tr[data-type]').forEach(function(tr){
    var get=function(k){var i=tr.querySelector('input[data-k="'+k+'"]');return i?i.value:'';};
    ['weight','length','width','height'].forEach(function(c){
      var cell=tr.querySelector('td[data-m="'+c+'"]');if(cell)cell.innerHTML=matchCell(get(c+'_spec'),get(c+'_actual'));
    });
    var qc=tr.querySelector('td[data-m="qty"]');if(qc)qc.innerHTML=matchCell(get('qty_per_pack_spec'),get('qty_per_pack_actual'));
    var uc=tr.querySelector('td[data-m="upc"]');var us=get('upc_spec'),ua=get('upc_actual');
    if(uc)uc.innerHTML=(us&&ua)?(us.trim()===ua.trim()?'<span class="ok">✓</span>':'<span class="bad">✗</span>'):'<span style="color:#bbb;">—</span>';
  });
}
async function saveMeasurements(id){
  var data=readMeasFromDom();
  var insp=INSPECTIONS.find(function(x){return x.id===SELECTED;});
  var anyMismatch=false, mismatches=[], upcMismatch=null;
  for(var t in data){
    var d=data[t], row={inspection_id:id,measurement_type:t};
    [['weight','weight'],['length','length'],['width','width'],['height','height']].forEach(function(c){
      row[c[0]+'_spec']=num(d[c[0]+'_spec']); row[c[0]+'_actual']=num(d[c[0]+'_actual']);
      var w=within2(d[c[0]+'_spec'],d[c[0]+'_actual']); row[c[0]+'_match']=w;
      if(w===false){anyMismatch=true;mismatches.push({type:t,measurement:c[0],spec:d[c[0]+'_spec'],actual:d[c[0]+'_actual']});}
    });
    row.qty_per_pack_spec=(d.qty_per_pack_spec===''||d.qty_per_pack_spec==null)?null:parseInt(d.qty_per_pack_spec,10);
    row.qty_per_pack_actual=(d.qty_per_pack_actual===''||d.qty_per_pack_actual==null)?null:parseInt(d.qty_per_pack_actual,10);
    var qm=within2(d.qty_per_pack_spec,d.qty_per_pack_actual); row.qty_match=qm; if(qm===false)anyMismatch=true;
    row.upc_spec=d.upc_spec||null; row.upc_actual=d.upc_actual||null;
    row.upc_match=(d.upc_spec&&d.upc_actual)?(String(d.upc_spec).trim()===String(d.upc_actual).trim()):null;
    if(row.upc_match===false){anyMismatch=true;if(!upcMismatch)upcMismatch={type:t,spec:d.upc_spec,actual:d.upc_actual};}
    // upsert: delete existing row of this type then insert
    await fetch(SB+'/rest/v1/inspection_measurements?inspection_id=eq.'+id+'&measurement_type=eq.'+t,{method:'DELETE',headers:Object.assign({},H,{Prefer:'return=minimal'})});
    await sbPost('inspection_measurements',row);
  }
  await sbPatch('inspections?id=eq.'+id,{measurements_verified:!anyMismatch,upc_verified:upcMismatch?false:(data.unit&&data.unit.upc_actual?true:null),updated_at:new Date().toISOString()});
  alert('Measurements saved.'+(anyMismatch?' Variances detected — see analysis below.':''));
  if(upcMismatch)renderUpcAlert(insp,upcMismatch); else g('upc-alert').innerHTML='';
  if(anyMismatch&&mismatches.length)runVarianceAI(mismatches,insp);
  else g('variance-alerts').innerHTML='';
  loadMeasurements(insp);
}

    '<div style="font-size:12px;margin-bottom:8px;">Spec: <strong>'+esc(mm.spec)+'</strong> → Actual: <strong>'+esc(mm.actual)+'</strong></div>'+

async function upcAcceptUpdateSku(id,skuId,actual,spec){
  var insp=INSPECTIONS.find(function(x){return x.id===SELECTED;});

async function runVarianceAI(mismatches,insp){
  var box=g('variance-alerts'); if(!box)return;
  box.innerHTML='<div class="var-card"><h4>⚠ Analyzing variances…</h4></div>';
  var cat=(insp&&insp.purchase_orders&&insp.purchase_orders.category)||'consumer goods';
  var cards=[];
  for(var i=0;i<mismatches.length;i++){
    var m=mismatches[i];
    var sp=num(m.spec),ac=num(m.actual);
    var pct=(sp&&sp!==0)?(((ac-sp)/sp)*100).toFixed(1):'?';
    try{
      var r=await fetch('/api/inspection-variance-explain',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({measurement_type:m.type+' '+m.measurement,spec_value:m.spec,actual_value:m.actual,variance_pct:pct,product_category:cat})});
      var d=await r.json().catch(function(){return {};});
      var reasons=(d&&d.reasons)||[];
      cards.push('<div class="var-card"><h4>⚠ '+esc(MEAS_LABELS[m.type]+' '+m.measurement)+' variance: '+esc(m.spec)+' → '+esc(m.actual)+' ('+(pct>=0?'+':'')+pct+'%)</h4><ul>'+reasons.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul></div>');
    }catch(e){
      cards.push('<div class="var-card"><h4>⚠ '+esc(MEAS_LABELS[m.type]+' '+m.measurement)+' variance: '+esc(m.spec)+' → '+esc(m.actual)+'</h4><div class="hint">AI analysis unavailable.</div></div>');
    }
    box.innerHTML=cards.join('');
  }
}

// Scorecard + performance score + platform metric after a defect save.
var SCORE_WEIGHTS={responsiveness_score:0.20,quote_quality_score:0.20,sample_performance_score:0.15,production_reliability_score:0.25,compliance_hygiene_score:0.15,communication_tone_score:0.05};
function clamp(n){return Math.max(0,Math.min(10,n));}
async function applyScorecard(insp,outcome){
  if(!insp.factory_id)return;
  var cf=insp.critical_defects_found||0,mf=insp.major_defects_found||0,nf=insp.minor_defects_found||0;
  // 1. scorecard event
  await sbPost('factory_scorecard_events',{factory_id:insp.factory_id,event_type:'inspection',notes:JSON.stringify({inspection_id:insp.id,outcome:outcome,critical_found:cf,major_found:mf,minor_found:nf,aql_level:insp.aql_level,passed:outcome==='pass'})});
  // 2. performance score deltas
  var dProd=0,dComp=0;
  if(cf>0){dProd=-2;dComp=-1.5;}
  else if(outcome==='pass'){dProd=0.5;dComp=0.3;}
  else if(outcome==='conditional_pass'){dProd=0;dComp=-0.2;}
  else if(outcome==='fail'){dProd=-1;dComp=-0.5;}
  if(insp.status==='rework_required'){dProd-=0.8;}
  // 2b. Repeat / systemic defect pattern detection (last 5 completed inspections for this factory).
  var systemic=await detectSystemicDefects(insp);
  if(systemic.length){dProd-=1.5;dComp-=1.0;}
  var rows=await sbGet('factory_performance_scores?factory_id=eq.'+insp.factory_id+'&select=*&limit=1');
  var cur=rows[0]||{};
  function base(k){return cur[k]!=null?Number(cur[k]):5;}
  var scores={responsiveness_score:base('responsiveness_score'),quote_quality_score:base('quote_quality_score'),sample_performance_score:base('sample_performance_score'),production_reliability_score:clamp(base('production_reliability_score')+dProd),compliance_hygiene_score:clamp(base('compliance_hygiene_score')+dComp),communication_tone_score:base('communication_tone_score')};
  var composite=0; for(var k in SCORE_WEIGHTS){composite+=scores[k]*SCORE_WEIGHTS[k];}
  composite=Math.round(composite*100)/100;
  var tier=composite>=8?'A':composite>=6?'B':composite>=4?'C':'D';
  var patch={production_reliability_score:scores.production_reliability_score,compliance_hygiene_score:scores.compliance_hygiene_score,composite_score:composite,tier:tier,computed_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  if(rows.length){await sbPatch('factory_performance_scores?factory_id=eq.'+insp.factory_id,patch);}
  else{await sbPost('factory_performance_scores',Object.assign({factory_id:insp.factory_id},scores,{composite_score:composite,tier:tier,computed_at:new Date().toISOString()}));}
  // 3. platform metric (no tenant_id column exists)
  await sbPost('platform_metrics_log',{metric_type:'inspection_pass_rate',metric_value:outcome==='pass'?1:0,cohort:insp.inspection_method||null,recorded_at:new Date().toISOString()});
  // 4. systemic-defect action items + metric
  if(systemic.length){
    var facName=(insp.factories&&insp.factories.factory_name_english)||'this factory';
    for(var si=0;si<systemic.length;si++){
      var s=systemic[si];
      if(insp.tenant_id)await sbPost('tenant_action_items',{tenant_id:insp.tenant_id,type:'systemic_defect_detected',reference_id:insp.id,reference_type:'inspection',title:'Systemic defect pattern detected — '+facName,description:'Defect category "'+s.cat+'" has appeared in '+s.n+' of last 5 inspections for this factory. Review factory capability.',priority:'critical',status:'open'});
      await sbPost('platform_metrics_log',{metric_type:'systemic_defect_pattern',metric_value:s.n,cohort:s.cat,recorded_at:new Date().toISOString()});
    }
  }
}
// Returns array of {cat,n} where a defect category recurs in >=3 of the last 5 completed inspections.
async function detectSystemicDefects(insp){
  if(!insp.factory_id)return [];
  var curDefects=await sbGet('inspection_defects?inspection_id=eq.'+insp.id+'&select=defect_category');
  var cats=[]; curDefects.forEach(function(d){if(d.defect_category&&cats.indexOf(d.defect_category)===-1)cats.push(d.defect_category);});
  if(!cats.length)return [];
  var last5=await sbGet('inspections?factory_id=eq.'+insp.factory_id+'&status=in.(pass,fail,conditional_pass)&order=scheduled_date.desc&limit=5&select=id');
  var ids=last5.map(function(x){return x.id;});
  if(!ids.length)return [];
  var hist=await sbGet('inspection_defects?inspection_id=in.('+ids.join(',')+')&select=inspection_id,defect_category');
  var out=[];
  cats.forEach(function(cat){
    var set={}; hist.forEach(function(h){if(h.defect_category===cat)set[h.inspection_id]=1;});
    var n=Object.keys(set).length;
    if(n>=3)out.push({cat:cat,n:n});
  });
  return out;
}

// ════ TAB 1 — Factory Audits (platform/factory level only — NO tenant data) ════
var AUDITS=[], AUDIT_FILTER='all', AUDIT_SEL=null;
var AUDIT_COLORS={green:['#1a7a1a','rgba(26,122,26,0.15)','Green'],yellow:['#a86b00','rgba(245,158,11,0.15)','Yellow'],orange:['#c2410c','rgba(234,88,12,0.15)','Orange'],red:['#b00','rgba(176,0,0,0.12)','Red']};
function auditColorBadge(c){var x=AUDIT_COLORS[c]||['#6b7280','rgba(107,114,128,0.15)','Pending'];return '<span class="badge" style="color:'+x[0]+';background:'+x[1]+';">'+x[2]+'</span>';}
function auditColorHex(c){return (AUDIT_COLORS[c]||[])[0]||'#6b7280';}
function auditStatBadge(s){var m={scheduled:['#6b7280','rgba(107,114,128,0.15)'],in_progress:['#a86b00','rgba(245,158,11,0.15)'],report_pending:['#a86b00','rgba(245,158,11,0.15)'],completed:['#1a7a1a','rgba(26,122,26,0.15)'],cancelled:['#6b7280','rgba(107,114,128,0.15)']};var c=m[s]||['#6b7280','rgba(107,114,128,0.15)'];return '<span class="badge" style="color:'+c[0]+';background:'+c[1]+';">'+esc((s||'').replace(/_/g,' '))+'</span>';}
var AUDIT_SECNAMES={BV_FA:{QMS:'Quality Management',GMP:'Good Mfg Practice',PC:'Product Control',PROC:'Process Control'},BSCI:{LABOR:'Labor Conditions',HS:'Health & Safety',ENV:'Environment',ETHICS:'Business Ethics'},SMETA:{LABOR:'Labor Conditions',HS:'Health & Safety',ENV:'Environment',ETHICS:'Business Ethics'},ISO9001:{PLAN:'Plan',DO:'Do',CHECK:'Check',ACT:'Act'}};
function auditSecName(tc,c){return (AUDIT_SECNAMES[tc]&&AUDIT_SECNAMES[tc][c])||c;}
function auditDU(d){if(!d)return null;var t=new Date();t.setHours(0,0,0,0);var x=new Date(d+'T00:00:00');if(isNaN(x))return null;return Math.round((x-t)/864e5);}

async function loadAuditStats(){
  var box=g('audit-stats'); if(!box)return;
  var now=new Date(); var monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString();
  var month=await sbGet('factory_audits?created_at=gte.'+encodeURIComponent(monthStart)+'&select=id');
  var completed=await sbGet('factory_audits?status=eq.completed&select=color_rating');
  var passed=completed.filter(function(a){return a.color_rating==='green'||a.color_rating==='yellow';}).length;
  var passRate=completed.length?Math.round((passed/completed.length)*100):0;
  var pending=await sbGet('factory_audits?status=eq.report_pending&select=id');
  var certs=await sbGet('factory_certifications?expiry_date=not.is.null&select=expiry_date');
  var exp30=certs.filter(function(c){var d=auditDU(c.expiry_date);return d!=null&&d<=30;}).length;
  box.innerHTML=
    '<div class="pstat"><div class="pstat-label">Audits This Month</div><div class="pstat-val">'+month.length+'</div><div class="pstat-sub">platform-wide</div></div>'+
    '<div class="pstat"><div class="pstat-label">Audit Pass Rate</div><div class="pstat-val">'+passRate+'%</div><div class="pstat-sub">green + yellow of completed</div></div>'+
    '<div class="pstat"><div class="pstat-label">Pending Report Uploads</div><div class="pstat-val">'+pending.length+'</div><div class="pstat-sub">awaiting inspector report</div></div>'+
    '<div class="pstat"><div class="pstat-label">Certs Expiring (30d)</div><div class="pstat-val">'+exp30+'</div><div class="pstat-sub">across all factories</div></div>';
}
async function loadAudits(){
  AUDITS=await sbGet('factory_audits?select=*,factories(factory_name_english),factory_audit_types(name,code,generates_certification,certification_name)&order=scheduled_date.desc');
  renderAuditList();
}
function auditMatches(a){if(AUDIT_FILTER==='all'||AUDIT_FILTER==='type')return true;if(AUDIT_FILTER==='pending')return a.status==='scheduled'||a.status==='in_progress'||a.status==='report_pending';if(AUDIT_FILTER==='completed')return a.status==='completed';return true;}
function setAuditFilter(f){AUDIT_FILTER=f;document.querySelectorAll('#audit-tabs .tab').forEach(function(t){t.classList.toggle('active',t.dataset.af===f);});renderAuditList();}
function renderAuditList(){
  var q=(g('audit-search').value||'').toLowerCase().trim();
  var rows=AUDITS.filter(auditMatches).filter(function(a){if(!q)return true;return ((a.factories&&a.factories.factory_name_english)||'').toLowerCase().indexOf(q)>-1;});
  if(AUDIT_FILTER==='type')rows=rows.slice().sort(function(x,y){return ((x.factory_audit_types&&x.factory_audit_types.name)||'').localeCompare((y.factory_audit_types&&y.factory_audit_types.name)||'');});
  var box=g('audit-list');
  if(!rows.length){box.innerHTML='<div class="empty">No audits.</div>';return;}
  box.innerHTML=rows.map(function(a){
    var fac=(a.factories&&a.factories.factory_name_english)||'—';
    var at=(a.factory_audit_types&&a.factory_audit_types.name)||'—';
    return '<div class="irow'+(a.id===AUDIT_SEL?' sel':'')+'" onclick="selectAudit(\''+a.id+'\')">'+
      '<div class="irow-top"><span class="irow-po">'+esc(fac)+'</span>'+auditColorBadge(a.color_rating)+'</div>'+
      '<div class="irow-fac">'+esc(at)+'</div>'+
      '<div class="irow-meta">'+auditStatBadge(a.status)+'<span style="font-size:11px;color:var(--text2);">'+esc(a.conducted_date||a.scheduled_date||'—')+'</span></div>'+
    '</div>';
  }).join('');
}
function selectAudit(id){AUDIT_SEL=id;renderAuditList();var a=AUDITS.find(function(x){return x.id===id;});if(a)renderAuditDetail(a);}
async function renderAuditDetail(a){
  var fac=(a.factories&&a.factories.factory_name_english)||'—';
  var at=a.factory_audit_types||{};
  var pct=a.overall_pct!=null?Number(a.overall_pct):null;
  var html='<div class="detail-head"><div class="dh-po">'+esc(fac)+'</div><div class="dh-sub">'+esc(at.name||'—')+'</div>'+
    '<div class="dh-meta">'+auditStatBadge(a.status)+auditColorBadge(a.color_rating)+'<span style="font-size:12px;color:var(--text2);">'+esc(a.conducted_date?('Conducted '+a.conducted_date):('Scheduled '+(a.scheduled_date||'—')))+'</span></div>'+
    (pct!=null?'<div style="height:18px;border-radius:9px;background:var(--border);overflow:hidden;position:relative;margin-top:8px;"><div style="height:100%;border-radius:9px;width:'+Math.min(pct,100)+'%;background:'+auditColorHex(a.color_rating)+';"></div><span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#fff;">'+pct.toFixed(0)+'%</span></div>':'')+
  '</div>';
  // section scores
  html+='<div class="sec"><h3>Section Scores</h3>';
  var ss=a.section_scores&&typeof a.section_scores==='object'?a.section_scores:null;
  if(ss&&Object.keys(ss).length){html+=Object.keys(ss).map(function(code){var s=ss[code]||{};var p=s.pct!=null?Number(s.pct):0;return '<div style="margin-bottom:8px;"><div style="font-size:12px;display:flex;justify-content:space-between;"><span>'+esc(s.name||auditSecName(at.code,code))+'</span><span style="color:var(--text2);">'+(s.findings_count!=null?s.findings_count+' findings':'')+'</span></div><div style="height:16px;border-radius:8px;background:var(--border);overflow:hidden;position:relative;"><div style="height:100%;width:'+Math.min(p,100)+'%;background:'+auditColorHex(a.color_rating)+';"></div></div></div>';}).join('');}
  else html+='<div class="hint">Scores available after report upload.</div>';
  html+='</div>';
  html+='<div class="sec"><h3>Findings</h3><div id="ad-findings">Loading…</div></div>';
  html+='<div class="sec"><h3>Document Checklist</h3><div id="ad-docs">Loading…</div></div>';
  html+='<div class="sec"><h3>Audit Report</h3><div id="ad-report"></div></div>';
  if(at.generates_certification)html+='<div class="sec"><h3>Certification</h3><div id="ad-cert">Loading…</div></div>';
  g('audit-detail').innerHTML=html;
  // report section
  var rep=g('ad-report');
  if(a.report_url)rep.innerHTML='📄 <a href="'+esc(a.report_url)+'" target="_blank" style="color:#2266cc;">'+esc(a.report_filename||'Report')+'</a> <span class="hint">'+(a.report_uploaded_at?('· uploaded '+String(a.report_uploaded_at).slice(0,10)):'')+'</span>';
  else rep.innerHTML='<div class="hint">No report uploaded yet.</div><input type="file" accept="application/pdf,image/*" style="margin-top:6px;" onchange="adminUploadAuditReport(\''+a.id+'\',this)"><div class="hint" id="ad-upstatus"></div>';
  // findings
  var fnds=await sbGet('factory_audit_findings?audit_id=eq.'+a.id+'&select=*&order=section_code.asc,clause_number.asc');
  var fel=g('ad-findings');
  if(!fnds.length)fel.innerHTML='<div class="hint">No findings recorded yet — upload report to auto-extract.</div>';
  else{var cb={0:'🔴 Not Compliant',1:'🟠 Partial',2:'🟡 Minor Gap',3:'🟢 Compliant'};fel.innerHTML=fnds.map(function(f){return '<div style="padding:8px 0;border-bottom:1px solid var(--border);"><div style="font-size:12px;font-weight:600;">'+esc(f.clause_number||'')+' '+esc(f.clause_requirement||'')+'</div><div style="font-size:11px;margin:3px 0;">'+(f.compliance_level==null?'⬜ N/A':(cb[f.compliance_level]||''))+'</div><div style="font-size:12px;color:var(--text2);">'+esc(f.finding_text||'')+'</div><div class="field"><label>Corrective action</label><textarea onblur="saveAuditFinding(\''+f.id+'\',this.value)">'+esc(f.corrective_action||'')+'</textarea></div></div>';}).join('');}
  // docs
  var docs=await sbGet('factory_audit_documents?audit_id=eq.'+a.id+'&select=*&order=document_category.asc,document_name.asc');
  var del=g('ad-docs');
  if(!docs.length)del.innerHTML='<div class="hint">No documents in checklist.</div>';
  else del.innerHTML=docs.map(function(d){var opts=['pending','received','not_applicable','outstanding'].map(function(s){return '<option value="'+s+'"'+(d.status===s?' selected':'')+'>'+s.replace(/_/g,' ')+'</option>';}).join('');return '<div class="conf-row"><span>'+esc(d.document_name)+(d.required?' <span class="badge" style="background:rgba(176,0,0,0.1);color:#b00;">required</span>':'')+(d.file_url?' · <a href="'+esc(d.file_url)+'" target="_blank" style="color:#2266cc;">file</a>':'')+'</span><select onchange="setAuditDocStatus(\''+d.id+'\',this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:11px;">'+opts+'</select></div>';}).join('');
  // cert
  if(at.generates_certification){var cel=g('ad-cert');var crows=await sbGet('factory_certifications?audit_id=eq.'+a.id+'&limit=1');if(crows.length){var c=crows[0];var du=auditDU(c.expiry_date);var col=du==null?'#6b7280':du<30?'#ef4444':du<90?'#f59e0b':'#22c55e';cel.innerHTML='<div style="font-size:13px;font-weight:600;">'+esc(c.certification_name)+' <span class="badge" style="background:rgba(34,197,94,0.12);color:'+col+';">'+esc(c.status||'')+'</span></div><div class="hint">Issued by '+esc(c.issued_by||'—')+' · expires '+esc(c.expiry_date||'—')+(du!=null?(' ('+(du<0?'expired':du+'d')+')'):'')+'</div>';}else if(a.status==='completed')cel.innerHTML='<div class="hint">Certification will be issued after audit is finalized.</div>';else cel.innerHTML='<div class="hint">Certification pending audit completion.</div>';}
}
async function saveAuditFinding(id,val){await sbPatch('factory_audit_findings?id=eq.'+id,{corrective_action:val||null});}
async function setAuditDocStatus(id,val){var patch={status:val};if(val==='received')patch.received_at=new Date().toISOString();await sbPatch('factory_audit_documents?id=eq.'+id,patch);}
async function adminUploadAuditReport(auditId,input){
  var f=input.files[0]; if(!f)return; var st=g('ad-upstatus'); if(st)st.textContent='Uploading…';
  var path=auditId+'/'+Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  var up=await fetch(SB+'/storage/v1/object/audit-documents/'+encodeURIComponent(path),{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':f.type||'application/octet-stream'},body:f});
  if(!up.ok){if(st)st.textContent='Upload failed.';return;}
  await sbPatch('factory_audits?id=eq.'+auditId,{report_url:SB+'/storage/v1/object/public/audit-documents/'+path,report_filename:f.name,report_uploaded_at:new Date().toISOString(),status:'report_pending'});
  try{await fetch('/api/audit-report-received',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audit_id:auditId})});}catch(e){}
  await loadAudits();loadAuditStats();var a=AUDITS.find(function(x){return x.id===auditId;});if(a)renderAuditDetail(a);
}

// ════ TAB 3 — Platform Analytics (aggregate, NO tenant identities) ════
function anBar(label,val,max,suffix){var pc=max?Math.round((val/max)*100):0;return '<div class="an-row"><span style="width:160px;">'+esc(label)+'</span><div class="an-track"><div class="an-bar" style="width:'+Math.min(pc,100)+'%;"></div></div><span style="width:70px;text-align:right;">'+esc(val)+(suffix||'')+'</span></div>';}
async function loadAnalytics(){
  var body=g('analytics-body'); if(!body)return;
  var metrics=await sbGet('platform_metrics_log?metric_type=in.(inspection_pass_rate)&select=metric_value,cohort,recorded_at&order=recorded_at.desc&limit=2000');
  var audits=await sbGet('factory_audits?status=eq.completed&select=color_rating,overall_pct,factory_audit_types(name)&limit=2000');
  var certs=await sbGet('factory_certifications?expiry_date=not.is.null&select=expiry_date,certification_name&limit=2000');
  // 1. Inspection outcomes
  var inspTotal=metrics.length, inspPass=metrics.filter(function(m){return Number(m.metric_value)===1;}).length;
  var rework=metrics.filter(function(m){return m.cohort==='rework_required';}).length;
  var byMethod={}; metrics.forEach(function(m){var k=m.cohort||'unknown';if(!byMethod[k])byMethod[k]={t:0,p:0};byMethod[k].t++;if(Number(m.metric_value)===1)byMethod[k].p++;});
  var s1='<div class="an-card"><h3>Inspection Outcomes</h3>'+
    anBar('Overall pass rate',inspPass,inspTotal||1,'')+'<div class="hint">'+inspPass+' / '+inspTotal+' inspections passed</div>'+
    anBar('Rework events',rework,inspTotal||1,'')+
    '<div style="margin-top:8px;"><div class="hint">Pass count by inspection method (cohort):</div>'+Object.keys(byMethod).map(function(k){return anBar(k.replace(/_/g,' '),byMethod[k].p,byMethod[k].t||1,'');}).join('')+'</div></div>';
  // 2. Factory audit outcomes
  var byType={}, colorDist={green:0,yellow:0,orange:0,red:0};
  audits.forEach(function(a){var tn=(a.factory_audit_types&&a.factory_audit_types.name)||'—';if(!byType[tn])byType[tn]={n:0,pass:0,sum:0,cnt:0};byType[tn].n++;if(a.color_rating==='green'||a.color_rating==='yellow')byType[tn].pass++;if(a.overall_pct!=null){byType[tn].sum+=Number(a.overall_pct);byType[tn].cnt++;}if(colorDist[a.color_rating]!=null)colorDist[a.color_rating]++;});
  var s2='<div class="an-card"><h3>Factory Audit Outcomes</h3>'+
    '<div class="hint">Pass rate by audit type:</div>'+(Object.keys(byType).length?Object.keys(byType).map(function(t){return anBar(t,byType[t].pass,byType[t].n||1,'');}).join(''):'<div class="hint">No completed audits yet.</div>')+
    '<div class="hint" style="margin-top:8px;">Color rating distribution:</div>'+['green','yellow','orange','red'].map(function(c){return anBar(c,colorDist[c],audits.length||1,'');}).join('')+
    '<div class="hint" style="margin-top:8px;">Average compliance score by type:</div>'+Object.keys(byType).map(function(t){var avg=byType[t].cnt?Math.round(byType[t].sum/byType[t].cnt):0;return anBar(t,avg,100,'%');}).join('')+'</div>';
  // 3. Certification health — expiry per month, next 12 months
  var now=new Date(); var buckets=[]; for(var i=0;i<12;i++){var d=new Date(now.getFullYear(),now.getMonth()+i,1);buckets.push({key:d.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),y:d.getFullYear(),m:d.getMonth(),n:0});}
  certs.forEach(function(c){var d=new Date(c.expiry_date+'T00:00:00');if(isNaN(d))return;buckets.forEach(function(b){if(d.getFullYear()===b.y&&d.getMonth()===b.m)b.n++;});});
  var maxB=Math.max(1,Math.max.apply(null,buckets.map(function(b){return b.n;})));
  var s3='<div class="an-card"><h3>Certification Health — Expiry Forecast (12 mo)</h3>'+buckets.map(function(b){return anBar(b.key,b.n,maxB,'');}).join('')+'</div>';
  // 4. Shipment quality placeholders
  var s4='<div class="an-card"><h3>Shipment Quality</h3><div class="hint">On-time shipment rate — Data accumulating…</div><div class="hint">Return rate — Data accumulating…</div></div>';
  body.innerHTML=s1+s2+s3+s4;
}

function enter(){g('login').style.display='none';g('main').style.display='block';loadList();loadAudits();loadAuditStats();showAdmTab('audits');}
async function doLogin(){
  var u=g('l-user').value.trim(),p=g('l-pass').value,errEl=g('l-err');
  try{
    var r=await fetch('/api/admin-auth?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    var d=await r.json().catch(function(){return {};});
    if(d&&d.ok&&d.token){localStorage.setItem('admin_session',d.token);localStorage.setItem('admin_user',u||'admin');if(errEl)errEl.style.display='none';enter();return;}
    if(errEl){errEl.textContent=(d&&d.unconfigured)?'Admin auth not configured yet — set ADMIN_PASSWORD in Vercel.':'Incorrect username or password.';errEl.style.display='block';}
  }catch(e){if(errEl){errEl.textContent='Login error — please try again.';errEl.style.display='block';}}
}
function doLogout(){localStorage.removeItem('admin_session');g('main').style.display='none';g('login').style.display='flex';}
(async function(){
  var tok=localStorage.getItem('admin_session'); if(!tok)return;
  try{
    var r=await fetch('/api/admin-auth?action=verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tok})});
    var d=await r.json().catch(function(){return {};});
    if(d&&(d.ok||d.unconfigured))enter(); else localStorage.removeItem('admin_session');
  }catch(e){}
})();
