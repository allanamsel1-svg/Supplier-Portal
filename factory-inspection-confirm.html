<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inspection Confirmation — TBG Sourcing</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
  .card{background:#0d1424;border:1px solid #1e2d47;border-radius:16px;padding:2rem;width:520px;max-width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
  .brand .mk{width:34px;height:34px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;}
  .brand .nm{font-size:15px;font-weight:700;letter-spacing:0.02em;}
  .brand .nm span{display:block;font-size:11px;font-weight:400;color:#94a3b8;}
  h1{font-size:19px;font-weight:700;margin-bottom:4px;}
  .lead{font-size:13px;color:#94a3b8;margin-bottom:1.25rem;line-height:1.5;}
  .det{background:#0a0e1a;border:1px solid #1e2d47;border-radius:10px;padding:14px 16px;margin-bottom:1.25rem;}
  .det-row{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:13px;}
  .det-row .k{color:#94a3b8;} .det-row .v{font-weight:600;text-align:right;}
  .actions{display:flex;flex-direction:column;gap:10px;}
  .btn{border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;}
  .btn.confirm{background:#16a34a;} .btn.confirm:hover{background:#15803d;}
  .btn.flag{background:#dc2626;} .btn.flag:hover{background:#b91c1c;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .flagbox{display:none;margin-top:12px;}
  .flagbox.open{display:block;}
  textarea{width:100%;background:#0a0e1a;border:1px solid #1e2d47;border-radius:8px;padding:10px;color:#e2e8f0;font-size:13px;font-family:inherit;min-height:90px;resize:vertical;margin-bottom:10px;}
  .msg{text-align:center;padding:2rem 0;}
  .msg .ic{font-size:42px;margin-bottom:12px;}
  .msg h2{font-size:18px;margin-bottom:6px;}
  .msg p{font-size:13px;color:#94a3b8;}
  .loading,.err{text-align:center;color:#94a3b8;font-size:14px;padding:2rem 0;}
  .lang-toggle{margin-left:auto;display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:#94a3b8;font-size:12px;font-family:inherit;cursor:pointer;padding:0;}
  .lang-toggle .sep{color:#475569;}
  .lang-toggle [data-lang]{color:inherit;}
  .lang-toggle:hover{color:#e2e8f0;}
</style>
<script src="translations.js"></script>
</head>
<body>
<div class="card">
  <div class="brand"><div class="mk">🔍</div><div class="nm">TBG Sourcing<span data-i18n="inspection.brandSub">Inspection Confirmation</span></div><button class="lang-toggle" onclick="Lang.set(Lang.get()==='en'?'zh':Lang.get()==='zh'?'ko':'en')" aria-label="Toggle language"><span data-lang="en">EN</span><span class="sep">|</span><span data-lang="zh">中文</span><span class="sep">|</span><span data-lang="ko">한국어</span></button></div>
  <div id="content"><div class="loading" data-i18n="inspection.loading">Loading inspection…</div></div>
</div>

<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
var H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};
function g(id){return document.getElementById(id);}
function esc(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function qp(k){return new URLSearchParams(location.search).get(k);}

var INSP_ID=qp('inspection_id'), INSP=null;

async function sbGet(path){try{var r=await fetch(SB+'/rest/v1/'+path,{headers:H});if(!r.ok)return [];var d=await r.json();return Array.isArray(d)?d:[];}catch(e){return [];}}
async function sbPatch(path,body){try{var r=await fetch(SB+'/rest/v1/'+path,{method:'PATCH',headers:Object.assign({},H,{Prefer:'return=minimal'}),body:JSON.stringify(body)});return r.ok;}catch(e){return false;}}
async function sbPost(path,body){try{var r=await fetch(SB+'/rest/v1/'+path,{method:'POST',headers:Object.assign({},H,{Prefer:'return=minimal'}),body:JSON.stringify(body)});return r.ok;}catch(e){return false;}}
async function notify(subject,body){try{await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:'sourcing@tbgsourcing.net',subject:subject,body:body})});}catch(e){}}

// Re-render dispatcher: each view sets CUR to a closure; onLangChange replays it.
var CUR=null;
window.onLangChange=function(){ if(typeof CUR==='function') CUR(); };
function showErr(key){ CUR=function(){g('content').innerHTML='<div class="err">'+t(key)+'</div>';}; CUR(); }

async function load(){
  if(!INSP_ID){showErr('inspection.missingRef');return;}
  var rows=await sbGet('inspections?id=eq.'+encodeURIComponent(INSP_ID)+'&select=*,purchase_orders(po_number),factories(factory_name_english)&limit=1');
  if(!rows.length){showErr('inspection.notFound');return;}
  INSP=rows[0];
  if(INSP.factory_confirmed_at){renderDone('confirmed');return;}
  render();
}
function render(){
  CUR=render;
  var po=INSP.purchase_orders&&INSP.purchase_orders.po_number||INSP.po_id||'—';
  var fac=INSP.factories&&INSP.factories.factory_name_english||'—';
  g('content').innerHTML=
    '<h1>'+t('inspection.title')+'</h1>'+
    '<p class="lead">'+t('inspection.lead')+'</p>'+
    '<div class="det">'+
      '<div class="det-row"><span class="k">'+t('inspection.poNumber')+'</span><span class="v">'+esc(po)+'</span></div>'+
      '<div class="det-row"><span class="k">'+t('inspection.factory')+'</span><span class="v">'+esc(fac)+'</span></div>'+
      '<div class="det-row"><span class="k">'+t('inspection.type')+'</span><span class="v">'+esc(INSP.inspection_type||'—')+'</span></div>'+
      '<div class="det-row"><span class="k">'+t('inspection.scheduledDate')+'</span><span class="v">'+esc(INSP.scheduled_date||'—')+'</span></div>'+
      '<div class="det-row"><span class="k">'+t('inspection.inspector')+'</span><span class="v">'+esc(INSP.inspector_company||t('inspection.tbd'))+(INSP.inspector_contact_name?' · '+esc(INSP.inspector_contact_name):'')+'</span></div>'+
      '<div class="det-row"><span class="k">'+t('inspection.aqlLevel')+'</span><span class="v">'+esc(INSP.aql_level!=null?INSP.aql_level:'—')+(INSP.inspection_level?' / '+t('inspection.levelPrefix',{n:esc(INSP.inspection_level)}):'')+'</span></div>'+
    '</div>'+
    '<div class="actions">'+
      '<button class="btn confirm" id="b-confirm" onclick="doConfirm()">'+t('inspection.confirmBtn')+'</button>'+
      '<button class="btn flag" onclick="toggleFlag()">'+t('inspection.flagBtn')+'</button>'+
    '</div>'+
    '<div class="flagbox" id="flagbox">'+
      '<textarea id="flag-notes" placeholder="'+esc(t('inspection.flagPh'))+'"></textarea>'+
      '<button class="btn flag" id="b-flag" onclick="doFlag()">'+t('inspection.submitIssue')+'</button>'+
    '</div>';
}
function toggleFlag(){g('flagbox').classList.toggle('open');}
function renderDone(kind){
  CUR=function(){
    if(kind==='confirmed')g('content').innerHTML='<div class="msg"><div class="ic">✅</div><h2>'+t('inspection.confirmedTitle')+'</h2><p>'+t('inspection.confirmedBody')+'</p></div>';
    else g('content').innerHTML='<div class="msg"><div class="ic">⚠️</div><h2>'+t('inspection.flaggedTitle')+'</h2><p>'+t('inspection.flaggedBody')+'</p></div>';
  };
  CUR();
}
async function latestConfirmationId(){
  var rows=await sbGet('inspection_confirmations?inspection_id=eq.'+encodeURIComponent(INSP_ID)+'&factory_responded_at=is.null&select=id&order=sent_at.desc&limit=1');
  return rows.length?rows[0].id:null;
}
async function doConfirm(){
  var b=g('b-confirm'); if(b){b.disabled=true;b.textContent=t('inspection.submitting');}
  var now=new Date().toISOString();
  await sbPatch('inspections?id=eq.'+encodeURIComponent(INSP_ID),{factory_confirmed_at:now,status:'factory_confirmed',updated_at:now});
  var cid=await latestConfirmationId();
  if(cid)await sbPatch('inspection_confirmations?id=eq.'+cid,{factory_responded_at:now,confirmed:true});
  else await sbPost('inspection_confirmations',{inspection_id:INSP_ID,sent_at:now,factory_responded_at:now,confirmed:true});
  var po=INSP.purchase_orders&&INSP.purchase_orders.po_number||INSP.po_id||'—';
  await notify('Factory confirmed inspection for PO '+po,'The factory confirmed the goods will be ready for inspection.\n\nPO: '+po+'\nFactory: '+((INSP.factories&&INSP.factories.factory_name_english)||'—')+'\nScheduled: '+(INSP.scheduled_date||'—'));
  renderDone('confirmed');
}
async function doFlag(){
  var notes=(g('flag-notes').value||'').trim();
  if(!notes){alert(t('inspection.describeAlert'));return;}
  var b=g('b-flag'); if(b){b.disabled=true;b.textContent=t('inspection.submitting');}
  var now=new Date().toISOString();
  var cid=await latestConfirmationId();
  if(cid)await sbPatch('inspection_confirmations?id=eq.'+cid,{factory_responded_at:now,confirmed:false,response_notes:notes});
  else await sbPost('inspection_confirmations',{inspection_id:INSP_ID,sent_at:now,factory_responded_at:now,confirmed:false,response_notes:notes});
  var po=INSP.purchase_orders&&INSP.purchase_orders.po_number||INSP.po_id||'—';
  if(INSP.tenant_id){
    await sbPost('tenant_action_items',{tenant_id:INSP.tenant_id,type:'inspection_issue',reference_id:INSP_ID,reference_type:'inspection',title:'Factory flagged issue for upcoming inspection',description:'PO '+po+': '+notes,priority:'critical',status:'open',due_date:INSP.scheduled_date||null});
  }
  await notify('⚠ Factory flagged issue for PO '+po+' inspection','The factory flagged a potential issue ahead of the scheduled inspection.\n\nPO: '+po+'\nFactory: '+((INSP.factories&&INSP.factories.factory_name_english)||'—')+'\nScheduled: '+(INSP.scheduled_date||'—')+'\n\nIssue described:\n'+notes);
  renderDone('flagged');
}
load();
</script>
</body>
</html>
