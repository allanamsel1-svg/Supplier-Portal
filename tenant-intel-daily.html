<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Intel — TBG Sourcing</title>
<link rel="stylesheet" href="tenant-portal.css">
<style>
  .acc-list { display: flex; flex-direction: column; gap: 10px; max-width: 900px; }
  .acc { background: #131929; border: 1px solid #1e2d47; border-radius: 10px; overflow: hidden; }
  .acc-head { padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
  .acc-head:hover { background: #0f1e35; }
  .acc-title { font-size: 14px; font-weight: 600; color: #f1f5f9; }
  .acc-meta { font-size: 12px; color: #6b7280; margin-top: 3px; }
  .acc-right { font-size: 12px; color: #6b7280; white-space: nowrap; flex-shrink: 0; }
  .acc-body { padding: 0 16px 16px; font-size: 13px; color: #cbd5e1; line-height: 1.6; white-space: pre-wrap; border-top: 1px solid #131c30; display: none; }
  .acc.open .acc-body { display: block; padding-top: 14px; }
  .section-h { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #3b82f6; font-weight: 700; margin: 28px 0 12px; max-width: 900px; }
  .news-item { display: block; padding: 12px 16px; border: 1px solid #1e2d47; border-radius: 10px; background: #131929; text-decoration: none; margin-bottom: 8px; max-width: 900px; }
  .news-item:hover { border-color: #2563eb; background: #0f1e35; }
  .news-head { font-size: 13px; color: #f1f5f9; font-weight: 600; }
  .news-meta { font-size: 12px; color: #6b7280; margin-top: 3px; }
</style>
</head>
<body>
<div id="sidebar"></div>

<div class="main">
  <div class="page-header">
    <div class="page-title">Daily Intel Report</div>
    <div class="page-sub" id="pageSub">Daily news summaries and recent headlines</div>
  </div>

  <div id="box-summaries"><div class="loading">Loading daily summaries…</div></div>

  <div class="section-h">Recent News — last 7 days</div>
  <div id="box-news"><div class="loading">Loading news…</div></div>
</div>

<script src="tenant-shared.js"></script>
<script>
let TID = null;

function preview(text, n) { text = (text || '').replace(/\s+/g, ' ').trim(); return text.length > n ? text.slice(0, n) + '…' : text; }

async function loadSummaries() {
  const box = document.getElementById('box-summaries');
  const rows = await supa(`news_daily_summaries?tenant_id=eq.${TID}&order=summary_date.desc&limit=30`);
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🗞️</span>No daily summaries yet.</div>'; return; }
  box.innerHTML = '<div class="acc-list">' + rows.map(r => `<div class="acc">
    <div class="acc-head"><div>
      <div class="acc-title">${fmtDate(r.summary_date)}</div>
      <div class="acc-meta">${[r.article_count != null && r.article_count + ' headlines', r.signal_article_count != null && r.signal_article_count + ' signal'].filter(Boolean).map(esc).join(' · ') || preview(r.summary_text, 110)}</div></div>
      <div class="acc-right">${r.article_count != null ? r.article_count + ' 📰' : ''}</div></div>
    <div class="acc-body">${esc(r.summary_text || 'No summary text.')}</div></div>`).join('') + '</div>';
  box.querySelectorAll('.acc').forEach(el => el.querySelector('.acc-head').addEventListener('click', () => el.classList.toggle('open')));
}

async function loadRecentNews() {
  const box = document.getElementById('box-news');
  // last 7 days by article published_at (inner join to news_articles)
  const since = new Date(Date.now() - 7 * 864e5).toISOString();
  let rows = await supa(`retailer_news?tenant_id=eq.${TID}&select=id,ingested_at,news_articles!inner(headline,source_name,external_url,published_at),retailers(name)&news_articles.published_at=gte.${since}&order=ingested_at.desc&limit=50`);
  // Fallback: if nothing in the 7-day window, show the 50 most recent regardless of date.
  if (!rows.length) {
    rows = await supa(`retailer_news?tenant_id=eq.${TID}&select=id,ingested_at,news_articles(headline,source_name,external_url,published_at),retailers(name)&order=ingested_at.desc&limit=50`);
  }
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">📰</span>No recent news.</div>'; return; }
  box.innerHTML = rows.map(r => {
    const a = r.news_articles || {};
    return `<a class="news-item" href="${esc(a.external_url || '#')}" target="_blank" rel="noopener">
      <div class="news-head">${esc(a.headline || '(Untitled)')}</div>
      <div class="news-meta">${[a.source_name, r.retailers && r.retailers.name, fmtDate(a.published_at || r.ingested_at)].filter(Boolean).map(esc).join(' · ')} ↗</div>
    </a>`;
  }).join('');
}

(async function init() {
  const user = await tenantAuth();
  if (!user || !user.tenant) return;
  TID = user.tenant.id;
  renderSidebar(user);
  document.getElementById('pageSub').textContent = user.tenant.name + ' · daily intelligence';
  await loadSummaries();
  await loadRecentNews();
})();
</script>
</body>
</html>
