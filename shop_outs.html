<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Outs — TBG Sourcing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a2e;font-size:14px;}
.top{background:#1a1a2e;color:#fff;padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;}
.top-title{font-size:15px;font-weight:700;}
.top a,.top button{color:#aaa;font-size:12px;text-decoration:none;margin-left:16px;background:none;border:none;cursor:pointer;font-family:inherit;}
.top a:hover,.top button:hover{color:#fff;}
.top .primary{background:#2244cc;color:#fff;padding:6px 12px;border-radius:6px;font-weight:600;}
.top .primary:hover{background:#3355dd;color:#fff;}
.filters{background:#fff;border-bottom:1px solid #e0e0d8;padding:8px 1.5rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.filters input,.filters select{padding:6px 9px;font-size:12px;border:1px solid #e0e0d8;border-radius:6px;font-family:inherit;background:#fff;}
.filters input{width:220px;}
.main{display:flex;height:calc(100vh - 93px);overflow:hidden;}
.list{width:340px;flex-shrink:0;overflow-y:auto;border-right:1px solid #e0e0d8;background:#fff;}
.list-item{padding:12px 14px;border-bottom:0.5px solid #f0f0e8;cursor:pointer;}
.list-item:hover{background:#fafaf8;}
.list-item.sel{background:#eef2ff;border-left:3px solid #2244cc;}
.li-retailer{font-weight:700;font-size:13px;}
.li-date{font-size:11px;color:#888;margin-top:2px;}
.li-meta{font-size:11px;color:#666;margin-top:6px;display:flex;gap:10px;}
.detail{flex:1;overflow-y:auto;padding:1.5rem;background:#f5f5f0;}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1rem;padding-bottom:8px;border-bottom:0.5px solid #f0f0e8;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
.stat{background:#f8f8f4;border-radius:7px;padding:10px 12px;}
.stat-lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.stat-val{font-size:16px;font-weight:700;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;font-weight:600;}
.b-uploaded{background:#fff8e0;color:#664400;}
.b-processing{background:#e0f0ff;color:#003366;}
.b-reviewing{background:#f0e8ff;color:#440088;}
.b-complete{background:#edfaed;color:#1a7a1a;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#bbb;gap:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:6px 10px;background:#f8f8f4;color:#888;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.04em;}
td{padding:7px 10px;border-top:0.5px solid #f0f0e8;vertical-align:top;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.photo-thumb{position:relative;aspect-ratio:1;background:#f0f0e8;border-radius:6px;overflow:hidden;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .seq{position:absolute;top:4px;left:4px;background:rgba(0,0,0,0.7);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;}
.photo-thumb .type{position:absolute;bottom:4px;right:4px;background:rgba(255,255,255,0.95);color:#1a1a2e;font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-head{padding:1.25rem 1.5rem;border-bottom:1px solid #e0e0d8;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;color:#888;cursor:pointer;}
.modal-body{padding:1.5rem;}
.modal-foot{padding:1rem 1.5rem;border-top:1px solid #e0e0d8;display:flex;justify-content:flex-end;gap:10px;}
.btn{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;}
.btn-primary{background:#2244cc;color:#fff;}
.btn-primary:hover{background:#3355dd;}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;}
.btn-secondary{background:#f0f0e8;color:#444;}
.btn-secondary:hover{background:#e0e0d8;}

label{display:block;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 6px;}
input[type=text],input[type=date],select,textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid #e0e0d8;border-radius:7px;font-family:inherit;background:#fff;}
textarea{resize:vertical;min-height:60px;}

.dropzone{margin-top:8px;border:2px dashed #c0c0b8;border-radius:10px;padding:24px;text-align:center;background:#fafaf8;cursor:pointer;transition:all 0.15s;}
.dropzone:hover,.dropzone.dragover{border-color:#2244cc;background:#eef2ff;}
.dropzone-text{color:#888;font-size:13px;}
.dropzone-hint{color:#bbb;font-size:11px;margin-top:6px;}

.file-list{margin-top:12px;max-height:140px;overflow-y:auto;border:1px solid #f0f0e8;border-radius:7px;padding:6px;}
.file-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:12px;}
.file-row:hover{background:#fafaf8;}
.file-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-size{color:#888;font-size:11px;margin-left:10px;}

.progress{height:4px;background:#f0f0e8;border-radius:2px;overflow:hidden;margin-top:12px;}
.progress-bar{height:100%;background:#2244cc;width:0%;transition:width 0.2s;}
.progress-text{font-size:11px;color:#666;margin-top:6px;text-align:center;}
</style>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.js"></script>
</head>
<body>
<div class="top">
  <div class="top-title">🛒 Shop Outs</div>
  <div>
    <button class="primary" onclick="openNewModal()">+ New Shop Out</button>
    <a href="admin.html">← Admin</a>
  </div>
</div>
<div class="filters">
  <input type="text" id="q-search" placeholder="Search retailer or notes..." oninput="filterList()" />
  <select id="q-retailer" onchange="filterList()"><option value="">All Retailers</option></select>
  <select id="q-status" onchange="filterList()">
    <option value="">All Statuses</option>
    <option value="uploaded">Uploaded</option>
    <option value="processing">Processing</option>
    <option value="reviewing">Reviewing</option>
    <option value="complete">Complete</option>
  </select>
  <span id="q-count" style="font-size:11px;color:#888;margin-left:auto;"></span>
</div>
<div class="main">
  <div class="list" id="shop-list"><div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">Loading...</div></div>
  <div class="detail" id="shop-detail"><div class="empty"><div style="font-size:40px;">🛒</div><div>Select a shop-out or create a new one</div></div></div>
</div>

<!-- New Shop Out Modal -->
<div class="overlay" id="new-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">New Shop Out</div>
      <button class="modal-close" onclick="closeNewModal()">×</button>
    </div>
    <div class="modal-body">
      <label>Retailer *</label>
      <select id="new-retailer"><option value="">— Select retailer —</option></select>

      <label>Shop date *</label>
      <input type="date" id="new-date" />

      <label>Store location (optional)</label>
      <input type="text" id="new-location" placeholder="e.g., Plainfield NJ, Springfield store" />

      <label>Notes (optional)</label>
      <textarea id="new-notes" placeholder="End-cap promotions, mixed-category aisle, anything to remember..."></textarea>

      <label>Photos *</label>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
        <div class="dropzone-text">Click to select photos or drag and drop</div>
        <div class="dropzone-hint">HEIC, JPG, PNG accepted. First photo should be the storefront.</div>
      </div>
      <input type="file" id="file-input" multiple accept="image/*,.heic,.heif" style="display:none" onchange="handleFiles(this.files)" />

      <div id="file-list" class="file-list" style="display:none"></div>

      <div id="progress-container" style="display:none">
        <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="progress-text" id="progress-text"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeNewModal()">Cancel</button>
      <button class="btn btn-primary" id="submit-btn" onclick="submitNewShopOut()" disabled>Create Shop Out</button>
    </div>
  </div>
</div>

<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
var BUCKET='shop-out-photos';

function g(id){return document.getElementById(id);}
function h(url,opts){
  opts=opts||{};
  opts.headers=opts.headers||{};
  opts.headers.apikey=KEY;
  opts.headers.Authorization='Bearer '+KEY;
  return fetch(url,opts);
}
function esc(s){if(s==null)return'';return String(s).replace(/[<>&"]/g,function(c){return'&#'+c.charCodeAt(0)+';';});}

var allShopOuts=[],allRetailers=[],pendingFiles=[],currentId=null;

// ─────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────
async function init(){
  var params=new URLSearchParams(window.location.search);
  var pre=params.get('id');

  var results=await Promise.all([
    h(SB+'/rest/v1/shop_outs?select=*,customers(customer_name,customer_type,country)&order=shop_date.desc,created_at.desc')
      .then(function(r){return r.ok?r.json():[];}),
    h(SB+'/rest/v1/customers?select=id,customer_name,customer_type,country&order=customer_name')
      .then(function(r){return r.ok?r.json():[];})
  ]);

  allShopOuts=results[0]||[];
  allRetailers=results[1]||[];

  // Populate retailer filter dropdown
  var rSel=g('q-retailer');
  var seen={};
  allRetailers.forEach(function(c){
    if(seen[c.customer_name])return;
    seen[c.customer_name]=true;
    var o=document.createElement('option');
    o.value=c.id;
    o.textContent=c.customer_name+(c.country?' ('+c.country+')':'');
    rSel.appendChild(o);
  });

  // Populate new shop-out retailer dropdown — exclude holding companies
  var nSel=g('new-retailer');
  allRetailers
    .filter(function(c){return c.customer_type!=='holding_company';})
    .forEach(function(c){
      var o=document.createElement('option');
      o.value=c.id;
      o.textContent=c.customer_name+(c.country?' ('+c.country+')':'');
      nSel.appendChild(o);
    });

  // Default date to today
  g('new-date').value=new Date().toISOString().slice(0,10);

  renderList();

  if(pre){selectShopOut(pre);}
}

// ─────────────────────────────────────────────────────────────────────
// LIST RENDERING
// ─────────────────────────────────────────────────────────────────────
function renderList(){
  var q=(g('q-search').value||'').toLowerCase();
  var ret=g('q-retailer').value;
  var stat=g('q-status').value;

  var filtered=allShopOuts.filter(function(s){
    if(ret && s.customer_id!==ret)return false;
    if(stat && s.status!==stat)return false;
    if(q){
      var hay=((s.customers&&s.customers.customer_name)||'')+' '+(s.notes||'')+' '+(s.store_location_text||'')+' '+(s.description||'');
      if(hay.toLowerCase().indexOf(q)===-1)return false;
    }
    return true;
  });

  g('q-count').textContent=filtered.length+' of '+allShopOuts.length;

  var html=filtered.map(function(s){
    var ret=(s.customers&&s.customers.customer_name)||'(no retailer)';
    var d=s.shop_date||'';
    var sel=s.id===currentId?' sel':'';
    var statClass='b-'+s.status;
    return '<div class="list-item'+sel+'" onclick="selectShopOut(\''+s.id+'\')">'+
      '<div class="li-retailer">'+esc(ret)+'</div>'+
      '<div class="li-date">'+esc(d)+(s.store_location_text?' · '+esc(s.store_location_text):'')+'</div>'+
      '<div class="li-meta">'+
        '<span>📸 '+(s.total_photos||0)+'</span>'+
        '<span>📋 '+(s.total_observations||0)+'</span>'+
        '<span class="badge '+statClass+'">'+esc(s.status||'uploaded')+'</span>'+
      '</div>'+
    '</div>';
  }).join('');

  g('shop-list').innerHTML=html||'<div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">No shop-outs yet. Create your first one with the button above.</div>';
}

function filterList(){renderList();}

// ─────────────────────────────────────────────────────────────────────
// DETAIL VIEW
// ─────────────────────────────────────────────────────────────────────
async function selectShopOut(id){
  currentId=id;
  renderList();
  window.history.replaceState(null,'','?id='+id);
  g('shop-detail').innerHTML='<div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">Loading...</div>';

  var results=await Promise.all([
    h(SB+'/rest/v1/shop_outs?id=eq.'+id+'&select=*,customers(customer_name,customer_type,country)')
      .then(function(r){return r.ok?r.json():[];}),
    h(SB+'/rest/v1/shop_out_photos?shop_out_id=eq.'+id+'&select=*&order=photo_sequence_number')
      .then(function(r){return r.ok?r.json():[];}),
    h(SB+'/rest/v1/shop_out_observations?shop_out_id=eq.'+id+'&select=*&order=created_at')
      .then(function(r){return r.ok?r.json():[];})
  ]);

  var s=results[0][0];
  var photos=results[1]||[];
  var observations=results[2]||[];
  if(!s){g('shop-detail').innerHTML='<div class="empty"><div>Shop-out not found</div></div>';return;}

  renderDetail(s,photos,observations);
}

function renderDetail(s,photos,observations){
  var ret=(s.customers&&s.customers.customer_name)||'(no retailer)';
  var country=(s.customers&&s.customers.country)||'';
  var custType=(s.customers&&s.customers.customer_type)||'';

  var statClass='b-'+s.status;

  // Header
  var html='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">'+
    '<div>'+
      '<div style="font-size:22px;font-weight:700;">'+esc(ret)+'</div>'+
      '<div style="font-size:12px;color:#888;margin-top:4px;">'+
        esc(s.shop_date)+
        (s.store_location_text?' · '+esc(s.store_location_text):'')+
        (country?' · '+esc(country):'')+
        (custType?' · '+esc(custType):'')+
      '</div>'+
    '</div>'+
    '<span class="badge '+statClass+'" style="font-size:11px;padding:4px 12px;">'+esc(s.status)+'</span>'+
  '</div>';

  // Stats
  html+='<div class="card"><div class="stat-row">'+
    '<div class="stat"><div class="stat-lbl">Photos</div><div class="stat-val">'+(s.total_photos||photos.length)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">Observations</div><div class="stat-val">'+(s.total_observations||observations.length)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">Reviewed</div><div class="stat-val">'+(s.reviewed_observations||0)+'</div></div>'+
    '<div class="stat"><div class="stat-lbl">GPS</div><div class="stat-val" style="font-size:11px;">'+
      (s.gps_lat?Number(s.gps_lat).toFixed(4)+', '+Number(s.gps_lng).toFixed(4):'—')+
    '</div></div>'+
  '</div></div>';

  // Description / Notes
  if(s.description||s.notes){
    html+='<div class="card"><div class="card-title">Description & Notes</div>'+
      (s.description?'<div style="margin-bottom:8px;">'+esc(s.description)+'</div>':'')+
      (s.notes?'<div style="color:#666;font-size:13px;">'+esc(s.notes)+'</div>':'')+
    '</div>';
  }

  // Photos grid
  if(photos.length){
    html+='<div class="card"><div class="card-title">Photos ('+photos.length+')</div>';
    html+='<div class="photo-grid">'+photos.map(function(p){
      var url=SB+'/storage/v1/object/public/'+BUCKET+'/'+p.file_path;
      return '<div class="photo-thumb">'+
        '<img src="'+url+'" loading="lazy" onerror="this.style.display=\'none\'" />'+
        '<span class="seq">'+p.photo_sequence_number+'</span>'+
        (p.photo_type?'<span class="type">'+esc(p.photo_type)+'</span>':'')+
      '</div>';
    }).join('')+'</div>';
    html+='</div>';
  }

  // AI processing controls
  html+='<div class="card"><div class="card-title">AI Extraction</div>';
  if(observations.length===0){
    html+='<div style="color:#888;font-size:13px;margin-bottom:1rem;">No observations yet. Run AI extraction to pair photos and pull product data from each item.</div>';
    html+='<button class="btn btn-primary" id="run-ai-btn" onclick="runAiExtraction()">Run AI Extraction</button>'+
      '<div id="ai-progress-wrap" style="display:none;margin-top:12px;">'+
        '<div class="progress"><div class="progress-bar" id="ai-progress-bar" style="width:0%"></div></div>'+
        '<div class="progress-text" id="ai-progress-text"></div>'+
      '</div>';
  } else {
    html+='<div style="color:#888;font-size:13px;margin-bottom:1rem;">'+observations.length+' observation'+(observations.length===1?'':'s')+' extracted.</div>';
    html+=renderObservationsTable(observations);
  }
  html+='</div>';

  g('shop-detail').innerHTML=html;
}

function renderObservationsTable(observations){
  var rows=observations.map(function(o){
    var conf=o.ai_confidence?Math.round(o.ai_confidence*100)+'%':'—';
    return '<tr>'+
      '<td>'+esc(o.brand||'—')+'</td>'+
      '<td>'+esc(o.product_name||'—')+'</td>'+
      '<td>'+(o.retail_price?'$'+Number(o.retail_price).toFixed(2):'—')+'</td>'+
      '<td>'+esc(o.retailer_vendor_code||'—')+'</td>'+
      '<td>'+esc(o.country_of_origin||'—')+'</td>'+
      '<td>'+esc(o.ai_suggested_category||'—')+'</td>'+
      '<td>'+conf+'</td>'+
      '<td><span class="badge b-'+(o.review_status==='auto_accepted'?'complete':'uploaded')+'">'+esc(o.review_status||'pending')+'</span></td>'+
    '</tr>';
  }).join('');
  return '<table><thead><tr><th>Brand</th><th>Product</th><th>Price</th><th>MFG</th><th>COO</th><th>Category</th><th>Conf</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

// ─────────────────────────────────────────────────────────────────────
// NEW SHOP OUT — MODAL & FILE HANDLING
// ─────────────────────────────────────────────────────────────────────
function openNewModal(){
  g('new-modal').classList.add('show');
  pendingFiles=[];
  g('file-list').style.display='none';
  g('file-list').innerHTML='';
  g('submit-btn').disabled=true;
  g('progress-container').style.display='none';
  setupDropzone();
}
function closeNewModal(){
  g('new-modal').classList.remove('show');
  pendingFiles=[];
  g('file-input').value='';
}

function setupDropzone(){
  var dz=g('dropzone');
  ['dragenter','dragover'].forEach(function(e){
    dz.addEventListener(e,function(ev){ev.preventDefault();dz.classList.add('dragover');});
  });
  ['dragleave','drop'].forEach(function(e){
    dz.addEventListener(e,function(ev){ev.preventDefault();dz.classList.remove('dragover');});
  });
  dz.addEventListener('drop',function(ev){handleFiles(ev.dataTransfer.files);});
}

function handleFiles(fileList){
  for(var i=0;i<fileList.length;i++){pendingFiles.push(fileList[i]);}
  renderFileList();
  g('submit-btn').disabled=pendingFiles.length===0||!g('new-retailer').value;
}

function renderFileList(){
  if(pendingFiles.length===0){g('file-list').style.display='none';return;}
  g('file-list').style.display='block';
  g('file-list').innerHTML=pendingFiles.map(function(f,i){
    return '<div class="file-row">'+
      '<span class="file-name">'+esc(f.name)+'</span>'+
      '<span class="file-size">'+Math.round(f.size/1024)+' KB</span>'+
      '<button onclick="removeFile('+i+')" style="background:none;border:none;color:#c33;cursor:pointer;font-size:14px;margin-left:8px;">×</button>'+
    '</div>';
  }).join('');
}

function removeFile(i){pendingFiles.splice(i,1);renderFileList();g('submit-btn').disabled=pendingFiles.length===0||!g('new-retailer').value;}

// Re-check submit button when retailer changes
document.addEventListener('change',function(e){
  if(e.target.id==='new-retailer'){
    g('submit-btn').disabled=pendingFiles.length===0||!g('new-retailer').value;
  }
});

// ─────────────────────────────────────────────────────────────────────
// EXIF + HEIC + UPLOAD PIPELINE
// ─────────────────────────────────────────────────────────────────────
function dmsToDecimal(dms,ref){
  if(!dms||!dms.length)return null;
  var d=Number(dms[0])+Number(dms[1])/60+Number(dms[2])/3600;
  return(ref==='S'||ref==='W')?-d:d;
}

function extractExif(file){
  return new Promise(function(resolve){
    try{
      EXIF.getData(file,function(){
        var lat=EXIF.getTag(this,'GPSLatitude');
        var latRef=EXIF.getTag(this,'GPSLatitudeRef');
        var lng=EXIF.getTag(this,'GPSLongitude');
        var lngRef=EXIF.getTag(this,'GPSLongitudeRef');
        var dt=EXIF.getTag(this,'DateTimeOriginal');
        var make=EXIF.getTag(this,'Make');
        var model=EXIF.getTag(this,'Model');

        var timestamp=null;
        if(dt){
          // EXIF format: "YYYY:MM:DD HH:MM:SS"
          var m=dt.match(/^(\d{4}):(\d{2}):(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
          if(m){timestamp=m[1]+'-'+m[2]+'-'+m[3]+'T'+m[4]+':'+m[5]+':'+m[6]+'Z';}
        }

        resolve({
          timestamp:timestamp,
          lat:dmsToDecimal(lat,latRef),
          lng:dmsToDecimal(lng,lngRef),
          make:make||null,
          model:model||null
        });
      });
    }catch(e){
      console.warn('EXIF extraction failed',e);
      resolve({timestamp:null,lat:null,lng:null,make:null,model:null});
    }
  });
}

async function convertIfHeic(file){
  var name=(file.name||'').toLowerCase();
  var isHeic=file.type==='image/heic'||file.type==='image/heif'||name.endsWith('.heic')||name.endsWith('.heif');
  if(!isHeic)return file;
  try{
    var blob=await heic2any({blob:file,toType:'image/jpeg',quality:0.85});
    // heic2any returns blob (or array of blobs for multi-frame); normalize
    var out=Array.isArray(blob)?blob[0]:blob;
    return new File([out],name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'});
  }catch(e){
    console.error('HEIC conversion failed',e);
    throw new Error('HEIC conversion failed for '+file.name+': '+e.message);
  }
}

async function uploadToStorage(file,path){
  var r=await fetch(SB+'/storage/v1/object/'+BUCKET+'/'+path,{
    method:'POST',
    headers:{
      'apikey':KEY,
      'Authorization':'Bearer '+KEY,
      'Content-Type':file.type||'image/jpeg',
      'x-upsert':'true'
    },
    body:file
  });
  if(!r.ok){
    var err=await r.text();
    throw new Error('Storage upload failed: '+err);
  }
  return path;
}

async function submitNewShopOut(){
  var retailerId=g('new-retailer').value;
  var date=g('new-date').value;
  var location=g('new-location').value.trim();
  var notes=g('new-notes').value.trim();

  if(!retailerId||!date||pendingFiles.length===0){
    alert('Please pick a retailer, date, and at least one photo.');
    return;
  }

  g('submit-btn').disabled=true;
  g('progress-container').style.display='block';
  var totalSteps=pendingFiles.length+2; // +1 for shop-out create, +1 for final update
  var stepCount=0;
  function step(label){
    stepCount++;
    var pct=Math.round((stepCount/totalSteps)*100);
    g('progress-bar').style.width=pct+'%';
    g('progress-text').textContent=label;
  }

  try{
    // 1. Create shop_outs record
    step('Creating shop-out record...');
    var soPayload={
      customer_id:retailerId,
      shop_date:date,
      store_location_text:location||null,
      notes:notes||null,
      status:'uploaded',
      total_photos:0,
      captured_by:'admin'
    };
    var soR=await h(SB+'/rest/v1/shop_outs',{
      method:'POST',
      headers:{'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify(soPayload)
    });
    if(!soR.ok)throw new Error('Failed to create shop-out: '+await soR.text());
    var soRows=await soR.json();
    var shopOutId=soRows[0].id;

    // 2. Process each photo: convert if HEIC, extract EXIF, upload, insert record
    var firstPhotoId=null;
    var firstGpsLat=null,firstGpsLng=null;
    for(var i=0;i<pendingFiles.length;i++){
      var original=pendingFiles[i];
      var seq=i+1;
      step('Photo '+seq+' of '+pendingFiles.length+': '+original.name);

      // Extract EXIF from original (works for JPG; HEIC may fail silently)
      var exif=await extractExif(original);

      // Convert HEIC → JPG if needed
      var uploadFile=await convertIfHeic(original);

      // Determine extension
      var ext=(uploadFile.type==='image/png')?'png':(uploadFile.type==='image/webp'?'webp':'jpg');
      var pad=String(seq).padStart(4,'0');
      var path=shopOutId+'/'+pad+'.'+ext;

      // Upload to storage
      await uploadToStorage(uploadFile,path);

      // Insert shop_out_photos row
      var photoPayload={
        shop_out_id:shopOutId,
        file_path:path,
        photo_sequence_number:seq,
        exif_timestamp:exif.timestamp,
        exif_gps_lat:exif.lat,
        exif_gps_lng:exif.lng,
        exif_camera_make:exif.make,
        exif_camera_model:exif.model,
        photo_type:(seq===1?'storefront':'unclassified')
      };
      var pR=await h(SB+'/rest/v1/shop_out_photos',{
        method:'POST',
        headers:{'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify(photoPayload)
      });
      if(!pR.ok)throw new Error('Failed to insert photo record '+seq+': '+await pR.text());
      var pRows=await pR.json();
      if(seq===1){
        firstPhotoId=pRows[0].id;
        firstGpsLat=exif.lat;
        firstGpsLng=exif.lng;
      }
    }

    // 3. Update shop-out with first-photo references and totals
    step('Finalizing...');
    var updatePayload={
      total_photos:pendingFiles.length,
      storefront_photo_id:firstPhotoId,
      gps_lat:firstGpsLat,
      gps_lng:firstGpsLng
    };
    await h(SB+'/rest/v1/shop_outs?id=eq.'+shopOutId,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(updatePayload)
    });

    g('progress-text').textContent='Done.';
    setTimeout(function(){
      closeNewModal();
      // Reload list and select the new shop-out
      init().then(function(){selectShopOut(shopOutId);});
    },400);

  }catch(err){
    console.error(err);
    alert('Upload failed: '+err.message);
    g('submit-btn').disabled=false;
    g('progress-container').style.display='none';
  }
}

// ─────────────────────────────────────────────────────────────────────
// AI EXTRACTION — loops through photo pairs and calls /api/process-shop-out-pair
// ─────────────────────────────────────────────────────────────────────
async function runAiExtraction(){
  if(!currentId)return;

  // Fetch shop-out + photos
  var soR=await h(SB+'/rest/v1/shop_outs?id=eq.'+currentId+'&select=*,customers(customer_name,country)');
  var so=(await soR.json())[0];
  var photosR=await h(SB+'/rest/v1/shop_out_photos?shop_out_id=eq.'+currentId+'&select=id,photo_sequence_number,file_path,photo_type,ai_processed_at&order=photo_sequence_number');
  var allPhotos=await photosR.json();

  // Exclude storefront and any photos already processed
  var items=allPhotos.filter(function(p){return p.photo_type!=='storefront' && !p.ai_processed_at;});

  if(items.length===0){
    alert('No unprocessed item photos found. (Storefront is skipped automatically.)');
    return;
  }

  // Pair sequentially: i+i+1 = front+back
  var pairs=[];
  for(var i=0;i<items.length;i+=2){
    pairs.push({front:items[i],back:items[i+1]||null});
  }

  if(!confirm('Run AI extraction on '+pairs.length+' item pair(s)? Uses Anthropic API credits (~$0.02 per pair).')){return;}

  var btn=g('run-ai-btn');
  if(btn)btn.disabled=true;
  g('ai-progress-wrap').style.display='block';

  // Mark shop-out as processing
  await h(SB+'/rest/v1/shop_outs?id=eq.'+currentId,{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({status:'processing'})
  });

  var completed=0,failed=0,errors=[];

  for(var p=0;p<pairs.length;p++){
    var pair=pairs[p];
    g('ai-progress-bar').style.width=Math.round((completed/pairs.length)*100)+'%';
    g('ai-progress-text').textContent='Processing pair '+(completed+1)+' of '+pairs.length+'...';

    try{
      var r=await fetch('/api/process-shop-out-pair',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          shopOutId:currentId,
          frontPhotoId:pair.front.id,
          backPhotoId:pair.back?pair.back.id:null,
          frontPath:pair.front.file_path,
          backPath:pair.back?pair.back.file_path:null,
          retailerName:so.customers&&so.customers.customer_name,
          retailerCountry:so.customers&&so.customers.country
        })
      });
      if(!r.ok){
        var errText=await r.text();
        console.warn('Pair '+(p+1)+' failed:',errText);
        errors.push('Pair '+(p+1)+': '+errText.substring(0,140));
        failed++;
      }
    }catch(err){
      console.warn('Pair '+(p+1)+' error:',err);
      errors.push('Pair '+(p+1)+': '+err.message);
      failed++;
    }
    completed++;
  }

  // Final status update
  await h(SB+'/rest/v1/shop_outs?id=eq.'+currentId,{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      status:'reviewing',
      total_observations:completed-failed
    })
  });

  g('ai-progress-bar').style.width='100%';
  g('ai-progress-text').textContent='Done. '+(completed-failed)+' extracted, '+failed+' failed.'+(errors.length?' See console for errors.':'');

  if(errors.length)console.warn('AI extraction errors:',errors);

  // Reload the detail view to show new observations
  setTimeout(function(){selectShopOut(currentId);},1500);
}

// Kick off
init();
</script>
