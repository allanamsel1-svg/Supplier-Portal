<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Outs — TBG Retail Intelligence</title>
<link rel="stylesheet" href="ri_shared.css">
<style>
.layout{display:flex;height:calc(100vh - 52px - 49px);overflow:hidden;}
.list{width:380px;flex-shrink:0;overflow-y:auto;border-right:1px solid #e0e0d8;background:#fff;}
.filters{padding:10px 14px;border-bottom:1px solid #e0e0d8;display:flex;flex-direction:column;gap:6px;}
.filters input,.filters select{padding:6px 9px;font-size:12px;border:1px solid #e0e0d8;border-radius:6px;font-family:inherit;background:#fff;width:100%;}
.filters .toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:#666;cursor:pointer;}
.list-item{padding:12px 14px;border-bottom:0.5px solid #f0f0e8;cursor:pointer;}
.list-item:hover{background:#fafaf8;}
.list-item.sel{background:#eef2ff;border-left:3px solid #2244cc;}
.list-item.archived{opacity:0.55;}
.li-retailer{font-weight:700;font-size:13px;}
.li-date{font-size:11px;color:#888;margin-top:2px;}
.li-meta{font-size:11px;color:#666;margin-top:6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;font-weight:600;}
.b-pending{background:#f0f0e8;color:#888;}
.b-grouping,.b-extracting{background:#fff8e0;color:#664400;}
.b-complete{background:#edfaed;color:#1a7a1a;}
.b-failed{background:#fce8e8;color:#a22;}
.b-archived{background:#e8e8e0;color:#888;}
.detail{flex:1;overflow-y:auto;padding:1.5rem;background:#f5f5f0;}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.75rem;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#bbb;gap:10px;text-align:center;padding:2rem;}
.dropzone{border:2px dashed #c0c0b8;border-radius:14px;padding:3rem 2rem;text-align:center;background:#fff;cursor:pointer;transition:all 0.2s;}
.dropzone:hover,.dropzone.dragover{border-color:#2244cc;background:#fafbff;}
.dropzone-icon{font-size:48px;margin-bottom:1rem;}
.dropzone-text{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:6px;}
.dropzone-hint{font-size:12px;color:#888;}
.upload-status{background:#fff;border:2px solid #2244cc;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.upload-warning{background:#fff8e0;border:1px solid #ffd54a;color:#664400;padding:10px 14px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:12px;}
.progress-bar{height:8px;background:#f0f0e8;border-radius:4px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;background:#2244cc;transition:width 0.3s;}
.failed-list{margin-top:10px;font-size:11px;color:#a22;max-height:140px;overflow-y:auto;}
.failed-list ul{margin-left:1.2rem;}
.btn{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;}
.btn-primary{background:#2244cc;color:#fff;}
.btn-primary:hover{background:#3355dd;}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;}
.btn-secondary{background:#f0f0e8;color:#444;}
.btn-secondary:hover{background:#e0e0d8;}
.btn-danger{background:#fce8e8;color:#a22;}
.btn-danger:hover{background:#f8d4d4;}
.detect-row{display:grid;grid-template-columns:140px 1fr auto;gap:12px;padding:10px 0;border-bottom:0.5px solid #f8f8f4;align-items:center;}
.detect-row:last-child{border-bottom:none;}
.detect-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.04em;}
.detect-val{font-size:14px;color:#1a1a2e;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.photo-thumb{position:relative;aspect-ratio:1;background:#f0f0e8;border-radius:6px;overflow:hidden;cursor:pointer;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-num{position:absolute;top:4px;left:4px;background:rgba(26,26,46,0.85);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;}
.photo-role{position:absolute;bottom:4px;left:4px;background:rgba(255,255,255,0.92);color:#333;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;}
.photo-role.hero{background:#fff8e0;color:#664400;}
.photo-role.storefront{background:#eef2ff;color:#003366;}
.viewer{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:200;}
.viewer.show{display:flex;}
.viewer img{max-width:90vw;max-height:85vh;object-fit:contain;}
.viewer-meta{position:absolute;top:20px;left:20px;color:#fff;font-size:13px;background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:8px;max-width:340px;}
.viewer-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.15);color:#fff;border:none;font-size:24px;width:40px;height:40px;border-radius:20px;cursor:pointer;}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);color:#fff;border:none;font-size:24px;width:50px;height:50px;border-radius:25px;cursor:pointer;}
.viewer-nav.prev{left:20px;}
.viewer-nav.next{right:20px;}
.viewer-actions{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
.obs-row{display:grid;grid-template-columns:60px 2fr 1fr 80px 80px;gap:10px;padding:8px 0;border-bottom:0.5px solid #f8f8f4;font-size:13px;align-items:center;}
.obs-row.head{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;padding:6px 0;border-bottom:1px solid #e0e0d8;}
.obs-brand{font-weight:600;}
.obs-product{color:#666;font-size:11px;margin-top:2px;}
.obs-price{text-align:right;font-weight:600;}
.obs-dept{text-align:center;font-size:10px;background:#eef2ff;color:#003366;padding:2px 6px;border-radius:8px;display:inline-block;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-head{padding:1rem 1.25rem;border-bottom:1px solid #e0e0d8;font-weight:700;font-size:15px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:22px;color:#888;cursor:pointer;line-height:1;}
.modal-body{padding:1.25rem;}
.modal-foot{padding:0.75rem 1.25rem;border-top:1px solid #e0e0d8;display:flex;justify-content:flex-end;gap:8px;}
.modal-body label{display:block;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.05em;margin:12px 0 6px;}
.modal-body label:first-child{margin-top:0;}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid #e0e0d8;border-radius:7px;font-family:inherit;background:#fff;}
.modal-body textarea{resize:vertical;min-height:60px;}

/* Disable tabs during upload */
body.uploading .ri-tab,
body.uploading .ri-top a,
body.uploading #new-btn { pointer-events: none; opacity: 0.4; }
</style>
</head>
<body>

<div class="ri-top">
  <div class="ri-top-title">🎯 Retail Intelligence</div>
  <div class="ri-top-actions">
    <button id="new-btn" class="primary">+ New Shop Out</button>

  </div>
</div>

<div class="ri-tabs">

  <a href="factory_prospects.html" class="ri-tab"><span class="ri-tab-icon">🏭</span> Factory Intel <span class="ri-tab-badge beta">BETA</span></a>

<div class="layout">
  <div class="list">
    <div class="filters">
      <input type="text" id="q-search" placeholder="Search retailer, location..." oninput="renderList()" />
      <select id="q-status" onchange="renderList()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="grouping">Grouping</option>
        <option value="extracting">Extracting</option>
        <option value="complete">Complete</option>
        <option value="failed">Failed</option>
      </select>
      <label class="toggle"><input type="checkbox" id="show-archived" onchange="renderList()" />Show archived</label>
    </div>
    <div id="shop-list"><div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">Loading...</div></div>
  </div>
  <div class="detail" id="shop-detail">
    <div class="empty">
      <div style="font-size:48px;">🛒</div>
      <div>Select a shop-out or click "+ New Shop Out" above</div>
    </div>
  </div>
</div>

<div class="overlay" id="new-modal">
  <div class="modal">
    <div class="modal-head"><div>New Shop Out</div><button class="modal-close" onclick="closeNewModal()">×</button></div>
    <div class="modal-body">
      <label>Retailer *</label>
      <select id="new-customer"><option value="">— Choose a retailer —</option></select>
      <label>Date *</label>
      <input type="date" id="new-date" />
      <label>Store location (optional)</label>
      <input type="text" id="new-location" placeholder="e.g. East Brunswick, NJ" />

</div>

<div class="viewer" id="viewer">

<input type="file" id="file-input" multiple accept="image/*,.heic,.heif" style="display:none;" />

<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
var BUCKET='shop-out-photos';
var UPLOAD_CONCURRENCY=4;
var MAX_UPLOAD_ATTEMPTS=3;
var COST_PER_PHOTO_EST=0.04;

function g(id){return document.getElementById(id);}
function h(url,opts){
  opts=opts||{};
  opts.headers=opts.headers||{};
  opts.headers.apikey=KEY;
  opts.headers.Authorization='Bearer '+KEY;
  return fetch(url,opts);
}
function esc(s){if(s==null)return'';return String(s).replace(/[<>&"]/g,function(c){return'&#'+c.charCodeAt(0)+';';});}

var allShops=[],photoCounts={},customerMap={},customerList=[],currentId=null,confirmFn=null;
var currentPhotos=[],viewerIdx=0;
var uploadCancelled=false,uploadInProgress=false;

// ─── INIT ───────────────────────────────────────────────────────────
async function init(){
  console.log('[shop_outs] init');

  // Load customers
  try {
    var cr=await h(SB+'/rest/v1/customers?select=id,name&order=name&limit=2000');
    if(cr.ok){
      customerList=await cr.json();
      customerMap={};
      customerList.forEach(function(c){customerMap[c.id]=c.name;});
      var sel=g('new-customer');
      sel.innerHTML='<option value="">— Choose a retailer —</option>'+
        customerList.map(function(c){return '<option value="'+c.id+'">'+esc(c.name)+'</option>';}).join('');
    }
  } catch(e) { console.error('customers:',e); }

  // Load shop-outs
  try {
    var r=await h(SB+'/rest/v1/shop_outs?select=*&order=created_at.desc&limit=500');
    if(r.ok)allShops=await r.json();
    else { console.error('shop_outs fetch:',r.status,await r.text()); allShops=[]; }
  } catch(e) { console.error('fetch:',e); allShops=[]; }

  // Load actual photo counts (source of truth — not total_photos column)
  await loadPhotoCounts();

  renderList();

  var params=new URLSearchParams(window.location.search);
  var pre=params.get('id');
  if(pre)selectShop(pre);
}

async function loadPhotoCounts(){
  // Get count of photos per shop_out_id via aggregated query
  // Use a different approach: fetch all photo records grouped
  try {
    var r=await h(SB+'/rest/v1/shop_out_photos?select=shop_out_id&limit=10000');
    if(r.ok){
      var photos=await r.json();
      photoCounts={};
      photos.forEach(function(p){
        photoCounts[p.shop_out_id]=(photoCounts[p.shop_out_id]||0)+1;
      });
    }
  } catch(e) { console.warn('photo counts:',e); }
}

function getPhotoCount(shopId){
  return photoCounts[shopId]||0;
}

// ─── LIST ───────────────────────────────────────────────────────────
function renderList(){
  var q=(g('q-search').value||'').toLowerCase();
  var stat=g('q-status').value;
  var showArch=g('show-archived').checked;

  var filtered=allShops.filter(function(s){
    if(s.deleted_at)return false;
    if(!showArch && s.archived_at)return false;
    if(stat && (s.processing_status||'pending')!==stat)return false;
    if(q){
      var rname=customerMap[s.customer_id]||'';
      var hay=rname+' '+(s.store_location_text||'')+' '+(s.notes||'');
      if(hay.toLowerCase().indexOf(q)===-1)return false;
    }
    return true;
  });

  var html=filtered.map(function(s){
    var sel=s.id===currentId?' sel':'';
    var arch=s.archived_at?' archived':'';
    var statClass='b-'+(s.processing_status||'pending');
    var retailer=customerMap[s.customer_id]||'(unknown retailer)';
    var photoCount=getPhotoCount(s.id);
    return '<div class="list-item'+sel+arch+'" onclick="selectShop(\''+s.id+'\')">'+
      '<div class="li-retailer">'+esc(retailer)+'</div>'+
      '<div class="li-date">'+esc(s.shop_date||'no date')+(s.store_location_text?' · '+esc(s.store_location_text):'')+'</div>'+
      '<div class="li-meta">'+
        '<span class="badge '+statClass+'">'+esc(s.processing_status||'pending')+'</span>'+
        '<span>📸 '+photoCount+'</span>'+
        '<span>🏷 '+(s.total_observations||0)+'</span>'+
        (s.archived_at?'<span class="badge b-archived">archived</span>':'')+
      '</div>'+
    '</div>';
  }).join('');

  g('shop-list').innerHTML=html||'<div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">No shop-outs yet.<br><br>Click "+ New Shop Out" above to start.</div>';
}

// ─── NEW SHOP OUT MODAL ─────────────────────────────────────────────
function openNewModal(){
  g('new-customer').value='';
  g('new-date').value=new Date().toISOString().substring(0,10);
  g('new-location').value='';
  g('new-notes').value='';
  g('new-create').disabled=false;
  g('new-modal').classList.add('show');
}
function closeNewModal(){g('new-modal').classList.remove('show');}

async function createShopOut(){
  var customerId=g('new-customer').value;
  var date=g('new-date').value;
  if(!customerId){alert('Please choose a retailer.');return;}
  if(!date){alert('Please pick a date.');return;}

  var payload={
    customer_id:customerId,
    shop_date:date,
    store_location_text:g('new-location').value.trim()||null,
    notes:g('new-notes').value.trim()||null,
    processing_status:'pending',
    captured_by:'admin',
    total_photos:0,
    total_observations:0
  };
  g('new-create').disabled=true;

  try {
    var r=await h(SB+'/rest/v1/shop_outs',{
      method:'POST',
      headers:{'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify(payload)
    });
    if(!r.ok){
      alert('Failed to create shop-out:\n\n'+await r.text());
      g('new-create').disabled=false;
      return;
    }
    var rows=await r.json();
    var newId=rows[0].id;
    closeNewModal();
    await init();
    selectShop(newId);
  } catch(err) {
    alert('Error: '+err.message);
    g('new-create').disabled=false;
  }
}

function selectShop(id){
  if(uploadInProgress && id!==currentId){
    if(!confirm('Upload is in progress. Switching shop-outs will stop the current upload. Continue?'))return;
    uploadCancelled=true;
  }
  currentId=id;
  renderList();
  window.history.replaceState(null,'','?id='+id);
  renderDetail();
}

async function renderDetail(){
  var s=allShops.find(function(x){return x.id===currentId;});
  if(!s){g('shop-detail').innerHTML='<div class="empty">Not found</div>';return;}

  var retailer=customerMap[s.customer_id]||'(unknown retailer)';
  var stat=s.processing_status||'pending';
  var photoCount=getPhotoCount(s.id);

  var html='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">'+
    '<div>'+
      '<div style="font-size:22px;font-weight:700;">'+esc(retailer)+'</div>'+
      '<div style="font-size:12px;color:#888;margin-top:4px;">'+
        esc(s.shop_date||'no date')+(s.store_location_text?' · '+esc(s.store_location_text):'')+
      '</div>'+
    '</div>'+
    '<span class="badge b-'+stat+'" style="font-size:11px;padding:4px 12px;">'+esc(stat)+'</span>'+
  '</div>';

  if(stat==='pending' && photoCount===0){
    html+='<div class="dropzone" id="dropzone" onclick="document.getElementById(\'file-input\').click()">'+
      '<div class="dropzone-icon">📥</div>'+
      '<div class="dropzone-text">Drop photos here, or click to select</div>'+
      '<div class="dropzone-hint">Any number — JPEG, HEIC, PNG. AI will group products and extract data after upload.</div>'+
    '</div>';
  } else if(stat==='pending' && photoCount>0){
    var estCost=(photoCount*COST_PER_PHOTO_EST).toFixed(2);
    html+='<div class="card">'+
      '<div class="card-title">Ready to process</div>'+
      '<div style="font-size:14px;margin-bottom:1rem;">'+photoCount+' photos uploaded. Est. AI cost: <strong>~$'+estCost+'</strong></div>'+
      '<button class="btn btn-primary" onclick="triggerProcessing(\''+s.id+'\')">🧠 Process with AI</button>'+
      '<button class="btn btn-secondary" style="margin-left:8px;" onclick="document.getElementById(\'file-input\').click()">+ Add more photos</button>'+
    '</div>';
  } else if(stat==='grouping' || stat==='extracting'){
    html+='<div class="card">'+
      '<div class="card-title">AI processing</div>'+
      '<div style="font-size:13px;color:#666;margin-bottom:0.5rem;">Status: <strong>'+stat+'</strong></div>'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+(stat==='grouping'?'40%':'80%')+';"></div></div>'+
      '<div style="font-size:11px;color:#888;margin-top:6px;">Auto-refreshes. Typical: 1-4 min per 100 photos.</div>'+
    '</div>';
    setTimeout(function(){if(currentId===s.id){refreshShop(s.id);}},8000);
  } else {
    if(stat==='failed'){
      html+='<div class="card" style="border-color:#fce8e8;">'+
        '<div class="card-title" style="color:#a22;">Processing failed</div>'+
        '<div style="font-size:13px;">'+esc(s.processing_error||'Unknown error')+'</div>'+
        '<button class="btn btn-primary" style="margin-top:10px;" onclick="triggerProcessing(\''+s.id+'\')">🔄 Retry</button>'+
      '</div>';
    }
    html+='<div class="card">'+
      '<div class="card-title">Summary</div>'+
      '<div class="detect-row"><div class="detect-label">Retailer</div><div class="detect-val">'+esc(retailer)+'</div><div></div></div>'+
      '<div class="detect-row"><div class="detect-label">Date</div><div class="detect-val">'+esc(s.shop_date||'—')+'</div><div></div></div>'+
      '<div class="detect-row"><div class="detect-label">Location</div><div class="detect-val">'+esc(s.store_location_text||'—')+'</div><div></div></div>'+
      '<div class="detect-row"><div class="detect-label">Total photos</div><div class="detect-val">'+photoCount+'</div><div></div></div>'+
      '<div class="detect-row"><div class="detect-label">Observations</div><div class="detect-val">'+(s.total_observations||0)+'</div><div></div></div>'+
    '</div>';
    html+='<div class="card"><div class="card-title">Photos</div><div id="photos-container">Loading photos...</div></div>';
    html+='<div class="card"><div class="card-title">Extracted Observations</div><div id="obs-container">Loading observations...</div></div>';
  }

  html+='<div class="card">'+
    '<div class="card-title">Actions</div>'+
    '<button class="btn btn-secondary" onclick="toggleArchive(\''+s.id+'\','+(s.archived_at?'true':'false')+')">'+(s.archived_at?'Restore from archive':'Archive shop-out')+'</button> '+
    '<button class="btn btn-danger" onclick="confirmDeleteShopOut(\''+s.id+'\')">Delete shop-out</button>'+
  '</div>';

  g('shop-detail').innerHTML=html;

  var dz=g('dropzone');
  if(dz){
    dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover');});
    dz.addEventListener('dragleave',function(){dz.classList.remove('dragover');});
    dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('dragover');handleFiles(e.dataTransfer.files);});
  }
  g('file-input').onchange=function(e){handleFiles(e.target.files);};

  if(stat==='complete'||stat==='failed' || photoCount>0){
    loadPhotos(s.id);
    if(stat==='complete')loadObservations(s.id);
  }
}

async function refreshShop(id){
  var r=await h(SB+'/rest/v1/shop_outs?id=eq.'+id+'&select=*');
  if(!r.ok)return;
  var rows=await r.json();
  if(rows.length===0)return;
  var idx=allShops.findIndex(function(x){return x.id===id;});
  if(idx>=0)allShops[idx]=rows[0];
  await loadPhotoCounts();
  if(currentId===id)renderDetail();
}

// ─── UPLOAD — with navigation guards + per-photo counts ─────────────
function setUploadInProgress(active){
  uploadInProgress=active;
  if(active){
    document.body.classList.add('uploading');
    window.addEventListener('beforeunload',preventUnload);
  } else {
    document.body.classList.remove('uploading');
    window.removeEventListener('beforeunload',preventUnload);
  }
}

function preventUnload(e){
  e.preventDefault();
  e.returnValue='Upload still in progress. Photos that completed will be saved; those still uploading will be lost. Leave anyway?';
  return e.returnValue;
}

async function handleFiles(fileList){
  if(!currentId){alert('No active shop-out.');return;}
  var files=Array.from(fileList);
  if(files.length===0)return;

  // Get current count to start sequence numbering
  var startSeq=getPhotoCount(currentId)+1;

  uploadCancelled=false;
  setUploadInProgress(true);

  g('shop-detail').innerHTML='<div class="upload-status">'+
    '<div class="upload-warning">⚠️ <strong>Don\'t switch tabs or close this page.</strong> Photos finish saving one-by-one — interrupting will keep what\'s done but lose the rest.</div>'+
    '<div style="font-weight:700;margin-bottom:6px;">Uploading '+files.length+' photos…</div>'+
    '<div class="progress-bar"><div class="progress-fill" id="up-fill" style="width:0%;"></div></div>'+
    '<div id="up-counter" style="font-size:12px;color:#666;margin-top:6px;">0 of '+files.length+'</div>'+
    '<button class="btn btn-secondary" style="margin-top:12px;" onclick="cancelUpload()">Stop Upload</button>'+
    '<div id="up-failed" class="failed-list"></div>'+
  '</div>';

  var uploaded=0,failed=[];

  for(var i=0;i<files.length;i+=UPLOAD_CONCURRENCY){
    if(uploadCancelled)break;
    var batch=files.slice(i,i+UPLOAD_CONCURRENCY);
    var batchStart=startSeq+i;
    await Promise.all(batch.map(async function(file,bi){
      if(uploadCancelled)return;
      var seq=batchStart+bi;
      var result=await uploadOneWithRetry(file,seq);
      if(result.success){
        uploaded++;
        // Increment photoCounts immediately so the count stays accurate even if interrupted
        photoCounts[currentId]=(photoCounts[currentId]||0)+1;
      }else{
        failed.push({name:file.name,err:result.error});
      }
      var totalDone=uploaded+failed.length;
      var fill=g('up-fill');if(fill)fill.style.width=((totalDone/files.length)*100)+'%';
      var ctr=g('up-counter');if(ctr)ctr.textContent=totalDone+' of '+files.length+(failed.length?' ('+failed.length+' failed)':'');
      if(failed.length>0){
        var fl=g('up-failed');
        if(fl)fl.innerHTML='<strong>Failed uploads:</strong><ul>'+failed.slice(0,20).map(function(f){return '<li>'+esc(f.name)+': '+esc(f.err)+'</li>';}).join('')+'</ul>';
      }
    }));
  }

  // Final total_photos update (best-effort; the photoCounts source-of-truth is the DB)
  try {
    await h(SB+'/rest/v1/shop_outs?id=eq.'+currentId,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({total_photos:photoCounts[currentId]||0,updated_at:new Date().toISOString()})
    });
  } catch(e) {}

  setUploadInProgress(false);
  await init();
  selectShop(currentId);
}

function cancelUpload(){
  if(confirm('Stop upload? Photos already uploaded will be kept.'))uploadCancelled=true;
}

async function uploadOneWithRetry(file,seq){
  for(var attempt=1;attempt<=MAX_UPLOAD_ATTEMPTS;attempt++){
    if(uploadCancelled)return {success:false,error:'cancelled'};
    try{
      return await uploadOne(file,seq,attempt);
    }catch(err){
      if(attempt===MAX_UPLOAD_ATTEMPTS)return {success:false,error:err.message};
      await new Promise(function(r){setTimeout(r,300*attempt);});
    }
  }
}

async function uploadOne(file,seq,attempt){
  var uploadBlob=file;
  var ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  var bytes=await file.slice(0,12).arrayBuffer();
  var arr=new Uint8Array(bytes);
  var isHeic=(arr[4]===0x66 && arr[5]===0x74 && arr[6]===0x79 && arr[7]===0x70)
    && ((arr[8]===0x68 && arr[9]===0x65 && (arr[10]===0x69 || arr[10]===0x76))
        || (arr[8]===0x6d && arr[9]===0x69 && arr[10]===0x66));
  if(isHeic && typeof heic2any!=='undefined'){
    try{uploadBlob=await heic2any({blob:file,toType:'image/jpeg',quality:0.85});ext='jpg';}catch(e){}
  }

  var path=currentId+'/'+Date.now()+'-'+Math.random().toString(36).substring(2,8)+'.'+ext;
  var sr=await fetch(SB+'/storage/v1/object/'+BUCKET+'/'+path,{
    method:'POST',
    headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':uploadBlob.type||'image/jpeg'},
    body:uploadBlob
  });
  if(!sr.ok)throw new Error('Storage '+sr.status);

  var ts=file.lastModified?new Date(file.lastModified).toISOString():null;
  var dbR=await h(SB+'/rest/v1/shop_out_photos',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      shop_out_id:currentId,file_path:path,file_name:file.name,
      photo_sequence_number:seq,exif_timestamp:ts,
      upload_status:'uploaded',upload_attempts:attempt
    })
  });
  if(!dbR.ok){var errBody=await dbR.text();throw new Error('DB '+dbR.status+': '+errBody);}
  return {success:true};
}

// ─── PROCESS ────────────────────────────────────────────────────────
async function triggerProcessing(id){
  var r=await fetch('/api/process-shop-out-v2',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({shop_out_id:id})
  });
  if(!r.ok){alert('Processing failed: '+await r.text());return;}
  await refreshShop(id);
}

// ─── PHOTOS + VIEWER ───────────────────────────────────────────────
async function loadPhotos(id){
  var r=await h(SB+'/rest/v1/shop_out_photos?shop_out_id=eq.'+id+'&order=photo_sequence_number.asc&select=*');
  if(!r.ok)return;
  currentPhotos=await r.json();
  await Promise.all(currentPhotos.map(async function(p){
    var sr=await h(SB+'/storage/v1/object/sign/'+BUCKET+'/'+p.file_path,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({expiresIn:3600})
    });
    if(sr.ok){var sd=await sr.json();p.signed_url=SB+'/storage/v1'+sd.signedURL;}
  }));
  var container=g('photos-container');if(!container)return;
  var html='<div class="photo-grid">'+
    currentPhotos.map(function(p,i){
      return '<div class="photo-thumb" onclick="openViewer('+i+')">'+
        '<img src="'+(p.signed_url||'')+'" loading="lazy" />'+
        '<span class="photo-num">'+(p.photo_sequence_number||i+1)+'</span>'+
        (p.group_role?'<span class="photo-role '+esc(p.group_role)+'">'+esc(p.group_role)+'</span>':'')+
      '</div>';
    }).join('')+'</div>';
  container.innerHTML=html;
}

function openViewer(idx){viewerIdx=idx;showCurrentPhoto();g('viewer').classList.add('show');}
function closeViewer(){g('viewer').classList.remove('show');}
function navViewer(dir){viewerIdx=Math.max(0,Math.min(currentPhotos.length-1,viewerIdx+dir));showCurrentPhoto();}
function showCurrentPhoto(){
  var p=currentPhotos[viewerIdx];if(!p)return;
  g('viewer-img').src=p.signed_url||'';
  g('viewer-meta').innerHTML='Photo '+(viewerIdx+1)+' of '+currentPhotos.length+
    '<br><span style="font-size:11px;color:#bbb;">'+esc(p.file_name||'')+'</span>';
}
async function deleteCurrentPhoto(){
  var p=currentPhotos[viewerIdx];if(!p||!confirm('Delete this photo?'))return;
  await h(SB+'/storage/v1/object/'+BUCKET+'/'+p.file_path,{method:'DELETE'});
  await h(SB+'/rest/v1/shop_out_photos?id=eq.'+p.id,{method:'DELETE'});
  closeViewer();
  await refreshShop(currentId);selectShop(currentId);
}
document.addEventListener('keydown',function(e){
  if(!g('viewer').classList.contains('show'))return;
  if(e.key==='Escape')closeViewer();
  if(e.key==='ArrowLeft')navViewer(-1);
  if(e.key==='ArrowRight')navViewer(1);
});

// ─── OBSERVATIONS ───────────────────────────────────────────────────
async function loadObservations(id){
  var r=await h(SB+'/rest/v1/shop_out_observations?shop_out_id=eq.'+id+'&order=created_at.asc');
  if(!r.ok)return;
  var obs=await r.json();
  var c=g('obs-container');if(!c)return;
  if(obs.length===0){c.innerHTML='<div style="color:#888;font-size:12px;">No observations yet.</div>';return;}
  var html='<div class="obs-row head"><div>#</div><div>Brand · Product</div><div style="text-align:center;">Department</div><div style="text-align:right;">Price</div><div style="text-align:right;">Conf.</div></div>';
  obs.forEach(function(o,i){
    html+='<div class="obs-row">'+
      '<div style="color:#888;">'+(i+1)+'</div>'+
      '<div><div class="obs-brand">'+esc(o.brand||'—')+'</div><div class="obs-product">'+esc(o.product_name||'')+(o.pack_size?' · '+esc(o.pack_size):'')+'</div></div>'+
      '<div style="text-align:center;"><span class="obs-dept">'+esc(o.department||'—')+'</span></div>'+
      '<div class="obs-price">'+(o.retail_price?'$'+Number(o.retail_price).toFixed(2):'—')+'</div>'+
      '<div style="text-align:right;font-size:11px;color:#888;">'+(o.ai_confidence?Number(o.ai_confidence).toFixed(2):'—')+'</div>'+
    '</div>';
  });
  c.innerHTML=html;
}

// ─── ARCHIVE + DELETE ──────────────────────────────────────────────
async function toggleArchive(id,isArchived){
  await h(SB+'/rest/v1/shop_outs?id=eq.'+id,{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(isArchived?{archived_at:null}:{archived_at:new Date().toISOString()})
  });
  await init();selectShop(id);
}
function confirmDeleteShopOut(id){
  g('confirm-title').textContent='Delete shop-out?';
  g('confirm-body').textContent='This permanently deletes the shop-out, all photos, and observations.';
  confirmFn=function(){deleteShopOut(id);};
  g('confirm-modal').classList.add('show');
}
function closeConfirm(){g('confirm-modal').classList.remove('show');confirmFn=null;}
function runConfirm(){if(confirmFn){confirmFn();}closeConfirm();}
async function deleteShopOut(id){
  var rp=await h(SB+'/rest/v1/shop_out_photos?shop_out_id=eq.'+id+'&select=file_path');
  var paths=rp.ok?(await rp.json()).map(function(p){return p.file_path;}):[];
  if(paths.length>0){
    await h(SB+'/storage/v1/object/'+BUCKET,{
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prefixes:paths})
    });
  }
  await h(SB+'/rest/v1/shop_outs?id=eq.'+id,{method:'DELETE'});
  currentId=null;
  await init();
  g('shop-detail').innerHTML='<div class="empty"><div style="font-size:48px;">🛒</div><div>Shop-out deleted</div></div>';
}

document.addEventListener('DOMContentLoaded',function(){
  var btn=g('new-btn');
  if(btn)btn.addEventListener('click',openNewModal);
});

s.src='https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
document.head.appendChild(s);

init();
</script>
