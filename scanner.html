<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Business Card Scanner — Supplier Portal</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W8YDH8LTSB"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-W8YDH8LTSB');</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a2e; min-height: 100vh; }
    .topbar { height: 52px; background: #fff; border-bottom: 1px solid #e0e0d8; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; position: sticky; top: 0; z-index: 50; }
    .topbar-l { display: flex; align-items: center; gap: 10px; }
    .tm { width: 28px; height: 28px; background: #1a1a2e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }
    .topbar-title { font-size: 14px; font-weight: 600; }
    .back-link { font-size: 13px; color: #888; text-decoration: none; }
    .back-link:hover { color: #1a1a2e; }
    .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .page-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #999; margin-bottom: 1.5rem; }
    .top-banner { background: #edfaed; border: 1px solid #a0d8a0; border-radius: 9px; padding: 11px 14px; font-size: 13px; color: #1a6a1a; margin-bottom: 1rem; display: none; }

    /* Upload zone */
    .upload-card { background: #fff; border: 1px solid #e0e0d8; border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; max-width: 800px; }
    .drop-zone { border: 2px dashed #d0d0c8; border-radius: 10px; padding: 2.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.15s; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #1a1a2e; background: #f8f8f4; }
    .drop-icon { font-size: 36px; margin-bottom: 10px; }
    .drop-title { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
    .drop-sub { font-size: 13px; color: #999; margin-bottom: 14px; }
    .browse-btn { display: inline-block; padding: 9px 20px; background: #1a1a2e; color: #fff; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .mobile-btns { display: none; gap: 10px; }
    .mob-btn { flex: 1; padding: 16px 10px; border: 1px solid #e0e0d8; border-radius: 10px; background: #f8f8f4; font-size: 13px; font-weight: 500; color: #1a1a2e; cursor: pointer; text-align: center; position: relative; font-family: inherit; }
    .mob-btn input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    .mob-icon { font-size: 24px; display: block; margin-bottom: 6px; }
    @media(max-width:600px) { .drop-zone{display:none;} .mobile-btns{display:flex;} .main{padding:1rem 0.75rem 4rem;} }

    /* Scan bar */
    .scan-bar { display: none; align-items: center; gap: 12px; margin-bottom: 1rem; max-width: 800px; }
    .btn-scan-all { padding: 11px 20px; background: #1a1a2e; color: #fff; border: none; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-scan-all:hover { opacity: 0.87; }
    .btn-scan-all:disabled { opacity: 0.4; cursor: not-allowed; }
    .scan-count { font-size: 13px; color: #999; }

    /* Card items */
    .queue { display: flex; flex-direction: column; gap: 16px; }
    .card-item { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; overflow: hidden; }
    .card-item.processing { border-color: #c0d0f0; }
    .card-item.done { border-color: #b8ddb8; }
    .card-item.saved { border-color: #a0d8a0; opacity: 0.85; }
    .card-item.error { border-color: #f0c0c0; }
    .card-item.done_err { border-color: #f0d840; }

    /* Header row: small thumb + filename + status */
    .ci-top { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid #f0f0e8; }
    .ci-thumb-mini { width: 48px; height: 32px; object-fit: cover; border-radius: 5px; border: 1px solid #e0e0d8; flex-shrink: 0; background: #f0f0e8; }
    .ci-info { flex: 1; min-width: 0; }
    .ci-filename { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-status { font-size: 12px; color: #999; margin-top: 3px; }
    .ci-status.reading { color: #2266cc; }
    .ci-status.ok { color: #1a7a1a; }
    .ci-status.err { color: #b00; }
    .ci-status.warn { color: #7a6000; }
    .ci-remove { background: none; border: none; font-size: 22px; color: #ccc; cursor: pointer; padding: 2px 6px; flex-shrink: 0; line-height: 1; font-family: inherit; }
    .ci-remove:hover { color: #b00; }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #c0d0f0; border-top-color: #2266cc; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Side-by-side body: image left, form right */
    .ci-body { display: grid; grid-template-columns: 420px 1fr; gap: 0; }
    @media(max-width:900px) { .ci-body { grid-template-columns: 1fr; } }

    .ci-imgcol { background: #fafaf8; padding: 14px; border-right: 1px solid #e0e0d8; position: sticky; top: 52px; align-self: start; max-height: calc(100vh - 52px); overflow-y: auto; }
    @media(max-width:900px) { .ci-imgcol { position: static; max-height: none; border-right: none; border-bottom: 1px solid #e0e0d8; } }
    .ci-imgcol-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-bottom: 8px; }
    .ci-bigimg { width: 100%; border-radius: 8px; border: 1px solid #e0e0d8; background: #fff; cursor: zoom-in; display: block; }
    .ci-bigimg:hover { border-color: #1a1a2e; }
    .ci-imgcol-hint { font-size: 11px; color: #999; margin-top: 6px; text-align: center; }
    .ci-rawtext { margin-top: 12px; background: #fff; border: 1px solid #e0e0d8; border-radius: 7px; padding: 10px; font-size: 11px; color: #555; max-height: 180px; overflow-y: auto; font-family: 'SF Mono',Monaco,Consolas,monospace; white-space: pre-wrap; line-height: 1.5; }
    .ci-rawtext-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin: 10px 0 6px; }

    /* Confidence banner */
    .confidence-banner { background: #fffbea; border: 1px solid #f0d840; border-radius: 8px; padding: 9px 12px; font-size: 12px; color: #7a6000; margin-bottom: 12px; }
    .confidence-banner b { font-weight: 700; }
    .rf input.low-conf, .rf select.low-conf, .rf textarea.low-conf { background: #fffbea; border-color: #f0d840; }
    .rf .conf-pct { font-size: 10px; color: #b08800; margin-left: 6px; }
    .manual-banner { background: #fff0f0; border: 1px solid #f0c0c0; border-radius: 8px; padding: 9px 12px; font-size: 12px; color: #a22; margin-bottom: 12px; }

    /* Review form (right side) */
    .ci-review { padding: 14px; }
    .section-title { font-size: 11px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 0.07em; padding: 12px 0 8px; border-bottom: 1px solid #f5f5f0; margin-bottom: 10px; }
    .section-title:first-child { padding-top: 0; }
    .rf { margin-bottom: 8px; }
    .rf label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .rf input, .rf select, .rf textarea { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 7px; font-family: inherit; color: #1a1a2e; background: #fff; }
    .rf input:focus, .rf select:focus, .rf textarea:focus { outline: none; border-color: #1a1a2e; box-shadow: 0 0 0 2px rgba(26,26,46,0.06); }
    .rf textarea { resize: vertical; min-height: 70px; }
    .rg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .rg3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .rg4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
    @media(max-width:560px) { .rg2,.rg3,.rg4 { grid-template-columns: 1fr; } }

    .sec-contact { background: #fafaf8; border: 1px solid #e8e8e0; border-radius: 7px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
    .sec-contact-name { font-weight: 600; color: #1a1a2e; }
    .sec-contact-meta { font-size: 11px; color: #888; margin-top: 2px; }

    .cat-list { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; border: 1px solid #e8e8e0; border-radius: 8px; padding: 8px; background: #fafaf8; }
    .cat-label { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #1a1a2e; }
    .cat-label:hover { background: #f0f0e8; }
    .cat-label input { width: 14px; height: 14px; flex-shrink: 0; }
    .cat-label:has(input:checked) { background: #eef2ff; }

    .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .photo-preview { position: relative; width: 80px; height: 60px; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0d8; }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .photo-preview-del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 3px; font-size: 10px; cursor: pointer; padding: 1px 4px; line-height: 1.4; }
    .upload-zone-sm { border: 1.5px dashed #d0d0c8; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; color: #999; margin-top: 6px; }
    .upload-zone-sm:hover { border-color: #1a1a2e; background: #f8f8f4; }

    .ci-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-save { flex: 1; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-save:hover { opacity: 0.87; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-discard { padding: 12px 16px; background: #f5f5f0; color: #888; border: 1px solid #e0e0d8; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
    .btn-discard:hover { background: #eee; }
    .ci-msg { font-size: 12px; border-radius: 6px; padding: 8px 10px; margin-top: 8px; display: none; }
    .ci-msg.ok { color: #1a7a1a; background: #edfaed; border: 1px solid #a0d8a0; }
    .ci-msg.err { color: #b00; background: #fff0f0; border: 1px solid #fdd; }

    .cert-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
    .cert-cb { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; cursor: pointer; }
    .cert-cb input { width: 13px; height: 13px; }

    .intel-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; background: #eef2ff; color: #003366; margin-left: 6px; vertical-align: middle; }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; cursor: zoom-out; }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 100%; max-height: 100%; border-radius: 6px; }
    .lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 22px; cursor: pointer; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-l">
    <div class="tm">S</div>
    <div class="topbar-title">Business Card Scanner</div>
  </div>
  <a class="back-link" href="admin.html">← Dashboard</a>
</div>

<div class="main">
  <div class="page-title">Business Card Scanner</div>
  <div class="page-sub">Upload or photograph business cards. AI extracts contact details, flags uncertain fields for review, then saves the factory as an active intel asset.</div>

  <div class="top-banner" id="top-banner"></div>

  <div class="upload-card">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">📇</div>
      <div class="drop-title">Drop business card photos here</div>
      <div class="drop-sub">JPG, PNG, HEIC &nbsp;·&nbsp; Multiple cards at once</div>
      <label class="browse-btn">Browse Files<input type="file" id="file-input" accept="image/*" multiple style="display:none" /></label>
    </div>
    <div class="mobile-btns">
      <label class="mob-btn"><span class="mob-icon">📷</span>Take Photo<input type="file" accept="image/*" capture="environment" style="display:none" id="cam-input" /></label>
      <label class="mob-btn"><span class="mob-icon">🖼</span>Choose Photo<input type="file" accept="image/*" multiple style="display:none" id="lib-input" /></label>
    </div>
  </div>

  <div class="scan-bar" id="scan-bar">
    <button class="btn-scan-all" id="scan-btn" onclick="scanAll()">✦ Scan All Cards with AI</button>
    <span class="scan-count" id="scan-count"></span>
  </div>

  <div class="queue" id="queue"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
var cards=[], counter=0, allCategories=[];

function g(id){return document.getElementById(id);}

window.addEventListener('load',function(){
  g('file-input').addEventListener('change',function(){handleFiles(this.files);this.value='';});
  g('cam-input').addEventListener('change',function(){handleFiles(this.files);this.value='';});
  g('lib-input').addEventListener('change',function(){handleFiles(this.files);this.value='';});
  var dz=g('drop-zone');
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
  dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files);});
  loadCategories();
});

async function loadCategories(){
  try{
    var r=await fetch(SB+'/rest/v1/categories?select=*&order=category,sub_category,sub_sub_category',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    allCategories=await r.json();
  }catch(e){}
}

function openLightbox(src){var lb=g('lightbox');g('lightbox-img').src=src;lb.classList.add('show');}
function closeLightbox(){g('lightbox').classList.remove('show');}

function handleFiles(files){
  if(!files||!files.length)return;
  Array.from(files).forEach(function(file){
    var id='c'+(++counter);
    var card={id:id,file:file,dataUrl:null,status:'pending',data:null,confidence:{},flagged:[],errorMsg:'',multiCount:0,factoryPhotos:[],catalogFile:null,rawTranscription:null};
    cards.push(card);
    renderCard(card);updateBar();
    var url=URL.createObjectURL(file);
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas'),max=2400,w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext('2d');
      ctx.imageSmoothingEnabled=true;
      ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,w,h);
      card.dataUrl=canvas.toDataURL('image/jpeg',0.95);
      URL.revokeObjectURL(url);
      renderCard(card);updateBar();
    };
    img.onerror=function(){
      URL.revokeObjectURL(url);
      var reader=new FileReader();
      reader.onload=function(e){card.dataUrl=e.target.result;renderCard(card);updateBar();};
      reader.readAsDataURL(file);
    };
    img.src=url;
  });
}

function updateBar(){
  var pending=cards.filter(function(c){return c.status==='pending';}).length;
  g('scan-bar').style.display=cards.length?'flex':'none';
  g('scan-count').textContent=pending+' card'+(pending===1?'':'s')+' ready to scan';
  g('scan-btn').disabled=pending===0;
}

function renderCard(card){
  var old=g(card.id);if(old)old.remove();
  var cls='card-item'+(card.status==='processing'?' processing':card.status==='done'?' done':card.status==='done_err'?' done_err':card.status==='saved'?' saved':card.status==='error'?' error':'');
  var stText='',stCls='';
  if(card.status==='pending')stText='Ready to scan';
  else if(card.status==='processing'){stText='<span class="spinner"></span>Reading with AI...';stCls='reading';}
  else if(card.status==='done'){stText=card.multiCount>1?'✓ Found '+card.multiCount+' cards':'✓ Extracted — review and save';stCls='ok';}
  else if(card.status==='done_err'){stText='⚠ AI could not parse — fill in manually';stCls='warn';}
  else if(card.status==='saved'){stText='✓ Saved to database';stCls='ok';}
  else if(card.status==='error'){stText=card.errorMsg||'Could not read card';stCls='err';}

  var miniThumb=card.dataUrl?'<img class="ci-thumb-mini" src="'+card.dataUrl+'" />':'<div class="ci-thumb-mini"></div>';
  var removeBtn=(card.status==='pending'||card.status==='error')?'<button class="ci-remove" onclick="removeCard(\''+card.id+'\')">×</button>':'';

  var topRow='<div class="ci-top">'+miniThumb+'<div class="ci-info"><div class="ci-filename">'+esc(card.file.name)+'</div><div class="ci-status '+stCls+'">'+stText+'</div></div>'+removeBtn+'</div>';

  // For pending/processing/error, no body — just the top row
  if(card.status==='pending' || card.status==='processing' || card.status==='error'){
    var el=document.createElement('div');
    el.id=card.id;el.className=cls;
    el.innerHTML=topRow;
    g('queue').appendChild(el);
    return;
  }

  // For done/done_err/saved, render side-by-side body
  var d=card.data||{};
  var isManual=(card.status==='done_err');

  var leftCol='<div class="ci-imgcol">'+
    '<div class="ci-imgcol-label">Business Card</div>'+
    (card.dataUrl?'<img class="ci-bigimg" src="'+card.dataUrl+'" onclick="openLightbox(\''+card.dataUrl.replace(/'/g,"\\'")+'\')" />':'')+
    '<div class="ci-imgcol-hint">Click image to zoom full-size</div>'+
    (card.rawTranscription && card.rawTranscription.length?'<div class="ci-rawtext-label">Raw text Claude read</div><div class="ci-rawtext">'+esc(card.rawTranscription.join('\n'))+'</div>':'')+
  '</div>';

  var manualBanner=isManual?'<div class="manual-banner"><b>⚠ AI extraction failed for this card.</b> Fill in the fields manually below.</div>':'';

  var flaggedBanner='';
  if(card.flagged && card.flagged.length){
    flaggedBanner='<div class="confidence-banner"><b>⚠ Review these fields:</b> '+card.flagged.map(function(f){return f.replace(/_/g,' ');}).join(', ')+'. Highlighted in yellow below.</div>';
  }

  var secContactsHtml='';
  if(d.secondary_contacts && d.secondary_contacts.length){
    secContactsHtml='<div class="section-title">Additional Contacts on Card <span class="intel-badge">'+d.secondary_contacts.length+'</span></div>';
    d.secondary_contacts.forEach(function(sc){
      secContactsHtml+='<div class="sec-contact"><div class="sec-contact-name">'+esc(sc.name||'')+(sc.title?' — '+esc(sc.title):'')+'</div><div class="sec-contact-meta">'+[sc.email,sc.phone].filter(Boolean).map(esc).join(' · ')+'</div></div>';
    });
  }

  var rightCol='<div class="ci-review">'+
    manualBanner+
    flaggedBanner+

    '<div class="section-title">Company Information</div>'+
    '<div class="rg2">'+fi(card,'name_en','Company Name (English)',d.factory_name_english,'factory_name_english')+fi(card,'name_local','Company Name (Local Language)',d.factory_name_local,'factory_name_local')+'</div>'+
    '<div class="rg3">'+
      fi(card,'founded','Founded Year',d.founded_year,'founded_year')+
      fi(card,'size','Factory Size (from card)',d.factory_size,'factory_size')+
      fi(card,'tagline','Tagline / Positioning',d.company_tagline_positioning,'company_tagline_positioning')+
    '</div>'+

    '<div class="section-title">Primary Sales Contact</div>'+
    '<div class="rg3">'+fi(card,'contact','Contact Name',d.sales_contact_name,'sales_contact_name')+fi(card,'title','Title / Position',d.contact_title,'contact_title')+fi(card,'email','Email',d.sales_email,'sales_email','email')+'</div>'+
    '<div class="rg3">'+fi(card,'mobile','Mobile',d.sales_mobile,'sales_mobile','tel')+fi(card,'telephone','Telephone',d.telephone,'telephone','tel')+fi(card,'wechat','WeChat',d.sales_wechat,'sales_wechat')+'</div>'+
    '<div class="rg2">'+fi(card,'whatsapp','WhatsApp',d.sales_whatsapp,'sales_whatsapp','tel')+fi(card,'website','Website',d.website,'website')+'</div>'+

    secContactsHtml+

    '<div class="section-title">Factory Address</div>'+
    '<div class="rg2">'+fi(card,'address','Street Address',d.address,'address')+fi(card,'city','City',d.city,'city')+'</div>'+
    '<div class="rg3">'+fi(card,'state','State / Province',d.state_province||'','state_province')+fi(card,'postal','Postal Code',d.postal_code||'','postal_code')+fi(card,'country','Country',d.country,'country')+'</div>'+

    '<div class="section-title">Factory Capacity (you fill in)</div>'+

function fi(card,key,label,val,confKey,type){
  var conf=card.confidence?card.confidence[confKey]:null;
  var lowConf=(conf!=null && conf<0.85);
  var cls=lowConf?' low-conf':'';
  var confLabel=lowConf?' <span class="conf-pct">'+Math.round(conf*100)+'% conf</span>':'';
  return '<div class="rf"><label>'+label+confLabel+'</label><input type="'+(type||'text')+'" id="'+card.id+'_'+key+'" value="'+esc(val||'')+'" class="'+cls.trim()+'" /></div>';
}

function fiPlain(cid,key,label,val,type){
  return '<div class="rf"><label>'+label+'</label><input type="'+(type||'text')+'" id="'+cid+'_'+key+'" value="'+esc(val||'')+'" /></div>';
}

function buildCatCheckboxes(cardId){
  if(!allCategories.length)return '<div style="font-size:12px;color:#bbb;padding:8px;">No categories set up yet — add them in Admin → Categories first.</div>';
  return '<div class="cat-list">'+allCategories.map(function(c){
    var key=c.category+'|'+(c.sub_category||'')+'|'+(c.sub_sub_category||'');
    var path=[c.category,c.sub_category,c.sub_sub_category].filter(Boolean).join(' › ');
    return '<label class="cat-label"><input type="checkbox" class="scanner-cat-cb" data-cardid="'+cardId+'" value="'+key+'" data-cat="'+c.category+'" data-sub="'+(c.sub_category||'')+'" data-subsub="'+(c.sub_sub_category||'')+'" /> '+path+(c.is_cosmetic?' <span style="font-size:10px;background:#fce8f0;color:#880044;border:1px solid #f0b8d0;padding:1px 5px;border-radius:8px;margin-left:4px;">Cosmetic</span>':'')+'</label>';
  }).join('')+'</div>';
}

function esc(v){return(v||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function removeCard(id){
  cards=cards.filter(function(c){return c.id!==id;});
  var el=g(id);if(el)el.remove();updateBar();
}

function addFactoryPhotos(cardId,input){
  var card=cards.find(function(c){return c.id===cardId;});if(!card)return;
  Array.from(input.files).forEach(function(file){
    var url=URL.createObjectURL(file);
    card.factoryPhotos.push({file:file,previewUrl:url});
  });
  input.value='';
  renderPhotoGrid(card);
}

function renderPhotoGrid(card){
  var grid=g(card.id+'_photoGrid');if(!grid)return;
  grid.innerHTML=card.factoryPhotos.map(function(p,i){
    return '<div class="photo-preview"><img src="'+p.previewUrl+'" /><button class="photo-preview-del" onclick="removePhoto(\''+card.id+'\','+i+')">✕</button></div>';
  }).join('');
}

function removePhoto(cardId,idx){
  var card=cards.find(function(c){return c.id===cardId;});if(!card)return;
  URL.revokeObjectURL(card.factoryPhotos[idx].previewUrl);
  card.factoryPhotos.splice(idx,1);
  renderPhotoGrid(card);
}

function catalogChosen(cardId,input){
  var file=input.files[0];if(!file)return;
  var card=cards.find(function(c){return c.id===cardId;});if(!card)return;
  card.catalogFile=file;
  var lbl=g(cardId+'_catLabel');if(lbl)lbl.textContent=file.name+' ('+(file.size/1024/1024).toFixed(1)+' MB)';
}

function quoteChosen(cardId,input){
  var file=input.files[0];if(!file)return;
  var card=cards.find(function(c){return c.id===cardId;});if(!card)return;
  card.quoteFile=file;
  var lbl=g(cardId+'_qtLabel');if(lbl)lbl.textContent=file.name+' ('+(file.size/1024/1024).toFixed(1)+' MB)';
}

async function scanAll(){
  var pending=cards.filter(function(c){return c.status==='pending';});
  g('scan-btn').disabled=true;
  for(var i=0;i<pending.length;i++){await scanCard(pending[i]);}
}

async function scanCard(card){
  card.status='processing';renderCard(card);
  try{
    var base64=card.dataUrl.split(',')[1];
    var resp=await fetch('/api/scan-business-card',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageBase64:base64})
    });
    var d=await resp.json();
    if(!resp.ok){
      // Don't fail — still show the manual entry form
      card.status='done_err';
      card.data={};
      card.confidence={};
      card.flagged=[];
      card.errorMsg=d.error||('HTTP '+resp.status);
      renderCard(card);
      return;
    }

    // Stash raw transcription text for the side panel
    if(d.transcription_preview && d.transcription_preview.cards && d.transcription_preview.cards[0]){
      card.rawTranscription=d.transcription_preview.cards[0].raw_text_lines||[];
    }

    if(!d.cards||!d.cards.length){
      // Manual entry mode
      card.status='done_err';
      card.data={};
      card.confidence={};
      card.flagged=[];
      renderCard(card);
      return;
    }

    var first=d.cards[0];
    card.data=first;
    card.confidence=first._confidence||{};
    card.flagged=first._flagged||[];
    card.status='done';

    if(d.cards.length>1){
      card.multiCount=d.cards.length;
      // For multi-card photos, attach the same raw transcription to each
      var multiTrans=d.transcription_preview && d.transcription_preview.cards ? d.transcription_preview.cards : [];
      for(var mi=1;mi<d.cards.length;mi++){
        var nid='c'+(++counter);
        var nc={id:nid,file:card.file,dataUrl:card.dataUrl,status:'done',data:d.cards[mi],confidence:d.cards[mi]._confidence||{},flagged:d.cards[mi]._flagged||[],errorMsg:'',multiCount:0,factoryPhotos:[],catalogFile:null,rawTranscription:(multiTrans[mi] && multiTrans[mi].raw_text_lines)||[]};
        cards.push(nc);renderCard(nc);
      }
    }
  }catch(e){
    // Connection/parse error — still drop into manual entry mode
    card.status='done_err';
    card.data={};
    card.confidence={};
    card.flagged=[];
    card.errorMsg='Connection error: '+e.message;
  }
  renderCard(card);
}

function resizeImg(dataUrl,maxPx,quality){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      var ctx=c.getContext('2d');
      ctx.imageSmoothingEnabled=true;
      ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.src=dataUrl;
  });
}

async function saveDraft(id){
  var card=cards.find(function(c){return c.id===id;});if(!card)return;
  var btn=g(id+'_savebtn');if(btn){btn.disabled=true;btn.textContent='Checking...';}

  var gv=function(k){var el=g(id+'_'+k);return el?el.value.trim():'';};

  var email=gv('email');
  var dupSlot=g(id+'_dup');
  if(dupSlot){dupSlot.style.display='none';dupSlot.innerHTML='';}
  if(email){
    try{
      var dupR=await fetch(SB+'/rest/v1/factories?sales_email=ilike.'+encodeURIComponent(email)+'&select=id,factory_id,factory_name_english,sales_contact_name,sales_email,status,created_at&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
      if(dupR.ok){
        var dupList=await dupR.json();
        if(dupList&&dupList.length){
          var existing=dupList[0];
          var savedDate=existing.created_at?new Date(existing.created_at).toLocaleDateString():'';
          var existingHref='factory-detail.html?id='+encodeURIComponent(existing.id);
          var html='<div style="background:#edfaed;border:1px solid #a0d8a0;border-left:3px solid #1a7a1a;border-radius:7px;padding:12px 14px;font-size:12px;color:#1a4a1a;margin-top:8px;">'+
            '<div style="font-weight:600;margin-bottom:6px;">✓ Already in your database — nothing saved</div>'+
            '<div style="margin-bottom:4px;"><strong>'+escapeHtml(existing.factory_name_english||'(no name)')+'</strong>'+(existing.factory_id?' · '+escapeHtml(existing.factory_id):'')+'</div>'+
            '<div style="margin-bottom:4px;">Contact: '+escapeHtml(existing.sales_contact_name||'(none)')+' · '+escapeHtml(existing.sales_email||email)+'</div>'+
            '<div style="margin-bottom:8px;color:#1a7a1a;">Status: '+escapeHtml(existing.status||'pending')+(savedDate?' · Added '+savedDate:'')+'</div>'+
            '<a href="'+escapeHtml(existingHref)+'" target="_blank" style="display:inline-block;padding:6px 12px;background:#1a7a1a;color:#fff;text-decoration:none;border-radius:5px;font-size:11px;font-weight:600;">View existing factory →</a>'+
            '</div>';
          if(dupSlot){dupSlot.innerHTML=html;dupSlot.style.display='block';}
          if(btn){btn.disabled=true;btn.textContent='Already in database';btn.style.opacity='0.6';}
          return;
        }
      }
    }catch(e){console.log('Duplicate check error (proceeding with save):',e.message);}
  }

  if(btn)btn.textContent='Saving...';

  var nameEn=gv('name_en')||gv('name_local')||gv('contact')||'Unknown Factory';
  var nameEl=g(id+'_name_en');if(nameEl&&!nameEl.value.trim())nameEl.value=nameEn;

  var certs=[];
  document.querySelectorAll('.scanner-cert[data-cardid="'+id+'"]:checked').forEach(function(cb){certs.push(cb.value);});
  var certOther=gv('cert_other');if(certOther)certs.push(certOther);

  var extras=[
    gv('title')?'Title: '+gv('title'):'',
    gv('website')?'Website: '+gv('website'):'',
    gv('founded')?'Founded: '+gv('founded'):'',
    gv('size')?'Factory size on card: '+gv('size'):'',
    gv('tagline')?'Tagline: '+gv('tagline'):'',
    card.data && card.data.secondary_contacts && card.data.secondary_contacts.length?'Additional contacts on card: '+card.data.secondary_contacts.map(function(sc){return (sc.name||'')+(sc.title?' ('+sc.title+')':'')+(sc.email?' '+sc.email:'');}).join('; '):'',
    card.data && card.data.card_quality_indicator?'Card quality: '+card.data.card_quality_indicator:'',
    card.data && card.data.languages_on_card && card.data.languages_on_card.length?'Languages on card: '+card.data.languages_on_card.join(', '):'',
    gv('notes')||''
  ].filter(Boolean).join(' | ');

  var payload={
    factory_name_english:nameEn,
    factory_name_local:gv('name_local')||null,
    sales_contact_name:gv('contact')||null,
    sales_email:gv('email')||null,
    sales_mobile:gv('mobile')||null,
    telephone:gv('telephone')||null,
    sales_wechat:gv('wechat')||null,
    sales_whatsapp:gv('whatsapp')||null,
    address:gv('address')||null,
    city:gv('city')||null,
    state_province:gv('state')||null,
    postal_code:gv('postal')||null,
    country:gv('country')||null,
    years_in_business:gv('founded')?(new Date().getFullYear()-parseInt(gv('founded'))):null,
    product_categories:gv('categories')?[gv('categories')]:[],
    certifications:certs,
    internal_notes:extras||null,
    status:'pending'
  };

  try{
    var r=await fetch(SB+'/rest/v1/factories',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'},
      body:JSON.stringify(payload)
    });

    if(!r.ok){
      var errData=await r.json().catch(function(){return{};});
      showMsg(id,'err','Save failed: '+(errData.message||errData.details||r.status));
      if(btn){btn.disabled=false;btn.textContent='✓ Save Factory to Database';}
      return;
    }

    var result=await r.json();
    var factory=Array.isArray(result)?result[0]:result;
    var factoryId=factory?factory.id:null;

    if(!factoryId){
      showMsg(id,'err','Save failed: could not get factory ID back from database.');
      if(btn){btn.disabled=false;btn.textContent='✓ Save Factory to Database';}
      return;
    }

    var catChecked=[];
    document.querySelectorAll('.scanner-cat-cb[data-cardid="'+id+'"]:checked').forEach(function(cb){
      catChecked.push({factory_id:factoryId,category:cb.dataset.cat,sub_category:cb.dataset.sub||null,sub_sub_category:cb.dataset.subsub||null,is_primary:false});
    });
    if(catChecked.length){
      await fetch(SB+'/rest/v1/factory_categories',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
        body:JSON.stringify(catChecked)
      });
    }

    var emp=parseInt(gv('emp')),eng=parseInt(gv('eng')),qc=parseInt(gv('qc')),lines=parseInt(gv('lines')),sqm=parseInt(gv('sqm')),inj=parseInt(gv('inj')),cap=parseInt(gv('cap')),capnotes=gv('capnotes');
    if(emp||eng||qc||lines||sqm||inj||cap||capnotes){
      await fetch(SB+'/rest/v1/factory_locations',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
        body:JSON.stringify({factory_id:factoryId,location_type:'factory',location_name:'Main Factory',is_primary:true,employees_total:emp||null,employees_engineers:eng||null,employees_qc:qc||null,production_lines:lines||null,floor_space_sqm:sqm||null,injection_machines:inj||null,monthly_capacity_units:cap||null,monthly_capacity_notes:capnotes||null,address:gv('address')||null,city:gv('city')||null,country:gv('country')||null})
      });
    }

    if(card.dataUrl){
      try{
        var bcResized=await resizeImg(card.dataUrl,2000,0.92);
        var bcBlob=await fetch(bcResized).then(function(r2){return r2.blob();});
        var bcPath=factoryId+'/business-card/scan_'+dateStamp()+'_'+Date.now()+'.jpg';
        var bcR=await fetch(SB+'/storage/v1/object/factory-files/'+bcPath,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'image/jpeg','x-upsert':'true'},body:bcBlob});
        if(bcR.ok){
          var bcUrl=SB+'/storage/v1/object/public/factory-files/'+bcPath;
          await fetch(SB+'/rest/v1/factories?id=eq.'+factoryId,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify({business_card_image_url:bcUrl})});
        }
      }catch(e){console.log('Business card upload error:',e.message);}
    }

    for(var pi=0;pi<card.factoryPhotos.length;pi++){
      var photo=card.factoryPhotos[pi];
      try{
        var resized=await resizeImg(await fileToDataUrl(photo.file),1600,0.85);
        var blob=await fetch(resized).then(function(r2){return r2.blob();});
        var photoPath=factoryId+'/photos/'+Date.now()+'_'+pi+'_'+photo.file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        var upR=await fetch(SB+'/storage/v1/object/factory-files/'+photoPath,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob});
        if(upR.ok){
          var photoUrl=SB+'/storage/v1/object/public/factory-files/'+photoPath;
          await fetch(SB+'/rest/v1/factory_photos',{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify({factory_id:factoryId,photo_url:photoUrl,photo_name:photo.file.name,uploaded_by:'admin'})});
        }
      }catch(e){alert('Photo upload error: '+e.message);}
    }

    if(card.catalogFile){
      if(card.catalogFile.size>50*1024*1024){
        alert('Catalog file is too large ('+(card.catalogFile.size/1024/1024).toFixed(1)+'MB). Max is 50MB. Please compress and re-upload from the factory detail page.');
        card.catalogFile=null;
      }
    }
    if(card.catalogFile){
      try{
        var catPath=factoryId+'/catalogs/'+nameEn.replace(/[^a-zA-Z0-9\s]/g,'').trim()+'_Catalog_'+dateStamp()+'.'+card.catalogFile.name.split('.').pop();
        var catR=await fetch(SB+'/storage/v1/object/factory-files/'+catPath,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/octet-stream','x-upsert':'true'},body:card.catalogFile});
        if(!catR.ok){var catE=await catR.json().catch(function(){return{};});alert('Catalog upload failed: '+(catE.message||catE.error||catR.status)+'.\n\nThe factory was saved. You can upload the catalog from the factory detail page.');}
      }catch(e){alert('Catalog upload error: '+e.message);}
    }

    if(card.quoteFile){
      try{
        var qtPath=factoryId+'/quotes/'+nameEn.replace(/[^a-zA-Z0-9\s]/g,'').trim()+'_Quote Sheet_'+dateStamp()+'.'+card.quoteFile.name.split('.').pop();
        var qtR=await fetch(SB+'/storage/v1/object/factory-files/'+qtPath,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/octet-stream','x-upsert':'true'},body:card.quoteFile});
        if(!qtR.ok){var qtE=await qtR.json().catch(function(){return{};});alert('Quote sheet upload failed: '+(qtE.message||qtE.error||qtR.status)+'.\n\nThe factory was saved. You can upload from the factory detail page.');}
      }catch(e){alert('Quote upload error: '+e.message);}
    }

    card.status='saved';
    showMsg(id,'ok','✓ '+nameEn+' saved with all details, categories, and files!');
    if(btn){btn.disabled=true;btn.textContent='✓ Saved';}
    var banner=g('top-banner');
    banner.textContent='✓ '+nameEn+' saved to your supplier database.';
    banner.style.display='block';
    setTimeout(function(){banner.style.display='none';},6000);

  }catch(e){
    showMsg(id,'err','Error: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='✓ Save Factory to Database';}
  }
}

function fileToDataUrl(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(e){resolve(e.target.result);};
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function dateStamp(){var d=new Date();return String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+String(d.getFullYear()).slice(-2);}

function showMsg(id,type,text){var el=g(id+'_'+type);if(el){el.textContent=text;el.style.display='block';}}

function escapeHtml(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

</script>
