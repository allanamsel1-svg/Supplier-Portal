<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Audit Report — TBG Sourcing</title>
<script src="paste-upload.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
  .card{background:#0d1424;border:1px solid #1e2d47;border-radius:16px;padding:2rem;width:520px;max-width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
  .brand .mk{width:34px;height:34px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;}
  .brand .nm{font-size:15px;font-weight:700;}.brand .nm span{display:block;font-size:11px;font-weight:400;color:#94a3b8;}
  h1{font-size:19px;font-weight:700;margin-bottom:4px;}
  .lead{font-size:13px;color:#94a3b8;margin-bottom:1.25rem;line-height:1.5;}
  .det{background:#0a0e1a;border:1px solid #1e2d47;border-radius:10px;padding:14px 16px;margin-bottom:1.25rem;}
  .det-row{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:13px;}.det-row .k{color:#94a3b8;}.det-row .v{font-weight:600;text-align:right;}
  .field{margin-bottom:12px;}.field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:#94a3b8;}
  .field input,.field select,.field textarea{width:100%;background:#0a0e1a;border:1px solid #1e2d47;border-radius:8px;padding:10px;color:#e2e8f0;font-size:13px;font-family:inherit;}
  .field textarea{min-height:70px;resize:vertical;}
  .btn{width:100%;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;background:#16a34a;}
  .btn:hover{background:#15803d;}.btn:disabled{opacity:0.5;cursor:not-allowed;}
  .msg{text-align:center;padding:2rem 0;}.msg .ic{font-size:42px;margin-bottom:12px;}.msg h2{font-size:18px;margin-bottom:6px;}.msg p{font-size:13px;color:#94a3b8;}
  .loading,.err{text-align:center;color:#94a3b8;font-size:14px;padding:2rem 0;}
  .lang-toggle{margin-left:auto;display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:#94a3b8;font-size:12px;font-family:inherit;cursor:pointer;padding:0;}
  .lang-toggle .sep{color:#475569;}
  .lang-toggle [data-lang]{color:inherit;}
  .lang-toggle:hover{color:#e2e8f0;}
</style>
<script src="translations.js"></script>
</head>
<body>
<div class="card">
  <div class="brand"><div class="mk">🗂</div><div class="nm">TBG Sourcing<span data-i18n="audit.brandSub">Audit Report Upload</span></div><button class="lang-toggle" onclick="Lang.set(Lang.get()==='en'?'zh':'en')" aria-label="Toggle language"><span data-lang="en">EN</span><span class="sep">|</span><span data-lang="zh">中文</span></button></div>
  <div id="content"><div class="loading" data-i18n="audit.loading">Loading…</div></div>
</div>
<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
var H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};
function g(id){return document.getElementById(id);}
function esc(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function qp(k){return new URLSearchParams(location.search).get(k);}
var TOKEN=qp('token'), AUDIT=null;
async function sbGet(p){try{var r=await fetch(SB+'/rest/v1/'+p,{headers:H});if(!r.ok)return [];var d=await r.json();return Array.isArray(d)?d:[];}catch(e){return [];}}
async function sbPatch(p,b){try{return (await fetch(SB+'/rest/v1/'+p,{method:'PATCH',headers:Object.assign({},H,{Prefer:'return=minimal'}),body:JSON.stringify(b)})).ok;}catch(e){return false;}}

// Re-render dispatcher: each view sets CUR to a closure; onLangChange replays it.
var CUR=null;
window.onLangChange=function(){ if(typeof CUR==='function') CUR(); };
function showErr(key){ CUR=function(){g('content').innerHTML='<div class="err">'+t(key)+'</div>';}; CUR(); }
function showMsg(titleKey,bodyKey){ CUR=function(){g('content').innerHTML='<div class="msg"><div class="ic">✅</div><h2>'+t(titleKey)+'</h2><p>'+t(bodyKey)+'</p></div>';}; CUR(); }

async function load(){
  if(!TOKEN){showErr('audit.invalidLink');return;}
  var rows=await sbGet('factory_audits?report_upload_token=eq.'+encodeURIComponent(TOKEN)+'&select=id,status,report_url,scheduled_date,factories(factory_name_english),factory_audit_types(name)&limit=1');
  if(!rows.length){showErr('audit.invalidLink');return;}
  AUDIT=rows[0];
  if(AUDIT.report_url){showMsg('audit.thankYou','audit.alreadyReceived');return;}
  render();
}
function render(){
  CUR=render;
  var fac=AUDIT.factories&&AUDIT.factories.factory_name_english||'—';
  var at=AUDIT.factory_audit_types&&AUDIT.factory_audit_types.name||t('audit.auditLabel');
  g('content').innerHTML=
    '<h1>'+t('audit.title')+'</h1><p class="lead">'+t('audit.lead')+'</p>'+
    '<div class="det">'+
      '<div class="det-row"><span class="k">'+t('audit.factory')+'</span><span class="v">'+esc(fac)+'</span></div>'+
      '<div class="det-row"><span class="k">'+t('audit.auditLabel')+'</span><span class="v">'+esc(at)+'</span></div>'+
      '<div class="det-row"><span class="k">'+t('audit.scheduled')+'</span><span class="v">'+esc(AUDIT.scheduled_date||'—')+'</span></div>'+
    '</div>'+
    '<div class="field"><label>'+t('audit.conductedDate')+'</label><input id="f-date" type="date" required></div>'+
    '<div class="field"><label>'+t('audit.reportFile')+'</label><input id="f-file" type="file" accept="application/pdf,image/*" required></div>'+
    '<div class="field"><label>'+t('audit.overallScore')+'</label><input id="f-pct" type="number" min="0" max="100" step="0.1"></div>'+
    '<div class="field"><label>'+t('audit.colorRating')+'</label><select id="f-color"><option value="">—</option><option value="green">'+t('audit.colorGreen')+'</option><option value="yellow">'+t('audit.colorYellow')+'</option><option value="orange">'+t('audit.colorOrange')+'</option><option value="red">'+t('audit.colorRed')+'</option></select></div>'+
    '<div class="field"><label>'+t('audit.notesOptional')+'</label><textarea id="f-notes"></textarea></div>'+
    '<button class="btn" id="f-submit" onclick="submitUpload()">'+t('audit.uploadBtn')+'</button>'+
    '<div class="err" id="f-err" style="display:none;padding:8px 0;color:#f87171;"></div>';
  setTimeout(function() {
    var uploadArea = document.querySelector('.upload-zone') || document.getElementById('content') || document.querySelector('form') || document.body;
    if (window.registerPasteZone) {
      registerPasteZone(uploadArea, function(file) {
        var input = document.querySelector('input[type=file]');
        if (input) {
          try { var dt = new DataTransfer(); dt.items.add(file); input.files = dt.files; } catch(e) {}
          var hint = uploadArea.querySelector('.paste-hint');
          if (hint) hint.textContent = t('audit.pastedHint');
        }
      });
    }
  }, 100);
}
async function submitUpload(){
  var date=g('f-date').value, file=g('f-file').files[0], err=g('f-err');
  err.style.display='none';
  if(!date){err.textContent=t('audit.dateRequired');err.style.display='block';return;}
  if(!file){err.textContent=t('audit.fileRequired');err.style.display='block';return;}
  var btn=g('f-submit'); btn.disabled=true; btn.textContent=t('audit.uploading');
  try{
    var path=AUDIT.id+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    var up=await fetch(SB+'/storage/v1/object/audit-documents/'+encodeURIComponent(path),{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':file.type||'application/octet-stream'},body:file});
    if(!up.ok){err.textContent=t('audit.uploadFailedStatus',{status:up.status});err.style.display='block';btn.disabled=false;btn.textContent=t('audit.uploadBtn');return;}
    var fileUrl=SB+'/storage/v1/object/public/audit-documents/'+path;
    var patch={report_url:fileUrl,report_filename:file.name,report_uploaded_at:new Date().toISOString(),conducted_date:date,status:'report_pending'};
    var pctv=parseFloat(g('f-pct').value); if(!isNaN(pctv))patch.overall_pct=pctv;
    var color=g('f-color').value; if(color)patch.color_rating=color;
    await sbPatch('factory_audits?id=eq.'+AUDIT.id,patch);
    try{await fetch('/api/audit-report-received',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audit_id:AUDIT.id})});}catch(e){}
    showMsg('audit.uploadedTitle','audit.uploadedBody');
  }catch(e){err.textContent=t('audit.errorMsg',{msg:e.message});err.style.display='block';btn.disabled=false;btn.textContent=t('audit.uploadBtn');}
}
load();
</script>
</body>
</html>
