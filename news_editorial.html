<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>News &amp; Editorial — TBG Retail Intelligence</title>
<link rel="stylesheet" href="ri_shared.css">
<style>
.ne{max-width:1100px;margin:0 auto;padding:1.5rem 2rem;}
.ne-summary{background:linear-gradient(135deg,#1a1a2e 0%,#4a2266 100%);color:#fff;border-radius:14px;padding:1.5rem 1.75rem;margin-bottom:1.25rem;}
.ne-s-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;opacity:0.75;margin-bottom:6px;}
.ne-s-date{font-size:11px;opacity:0.55;margin-bottom:14px;}
.ne-s-text{font-size:14px;line-height:1.65;color:#f0e8ff;}
.ne-s-empty{font-size:13px;opacity:0.7;font-style:italic;}
.ne-controls{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:14px 18px;margin-bottom:1rem;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.ne-ctl-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em;}
.ne-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#1a1a2e;font-weight:600;}
.ne-count{font-size:12px;color:#888;margin-left:auto;}
.ne-refresh{padding:7px 14px;font-size:12px;font-weight:600;background:#2244cc;color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:inherit;}
.ne-refresh:hover{background:#3355dd;}
.ne-refresh:disabled{background:#aaa;cursor:not-allowed;}
.ne-feed{display:flex;flex-direction:column;gap:10px;}
.ne-article{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:1rem 1.25rem;transition:all 0.15s;word-break:break-word;overflow-wrap:anywhere;}
.ne-article:hover{border-color:#2244cc;}
.ne-article.fluff{opacity:0.55;}
.ne-art-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:11px;color:#888;flex-wrap:wrap;}
.ne-art-source{font-weight:700;color:#2244cc;}
.ne-art-fluff-badge{font-size:9px;padding:1px 6px;background:#f0f0e8;color:#888;border-radius:5px;font-weight:700;letter-spacing:0.04em;}
.ne-art-headline{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px;line-height:1.35;overflow-wrap:anywhere;}
.ne-art-headline a{color:inherit;text-decoration:none;}
.ne-art-headline a:hover{color:#2244cc;}
.ne-art-highlight{font-size:13px;line-height:1.55;color:#444;margin-bottom:8px;overflow-wrap:anywhere;}
.ne-art-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.ne-tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;}
.ne-tag-brand{background:#fff0f8;color:#aa2266;}
.ne-tag-ingredient{background:#f0faf0;color:#1a7a1a;}
.ne-tag-celebrity{background:#eef2ff;color:#003366;}
.ne-tag-retailer{background:#fff8e0;color:#664400;}
.ne-tag-signal{background:#1a1a2e;color:#fff;}
.ne-empty{padding:3rem;text-align:center;color:#888;font-size:14px;background:#fff;border:1px solid #e0e0d8;border-radius:10px;}
.ne-loading{padding:2rem;text-align:center;color:#888;}
.ne-streams{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.ne-stream-tab{padding:7px 16px;font-size:13px;font-weight:600;background:#fff;color:#555;border:1px solid #e0e0d8;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .12s;}
.ne-stream-tab:hover{border-color:#2244cc;color:#2244cc;}
.ne-stream-tab.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e;}
</style>
</head>
<body>

<div class="ri-top">
  <div class="ri-top-title">🎯 Retail Intelligence</div>
  <div class="ri-top-actions">
    <a href="admin.html">← Admin</a>
  </div>
</div>

<div class="ri-tabs">
  <a href="intelligence_hub.html" class="ri-tab"><span class="ri-tab-icon">🎯</span> Cross Source Intel</a>
  <a href="shop_outs.html" class="ri-tab"><span class="ri-tab-icon">🛒</span> Shop Outs</a>
  <a href="factory_prospects.html" class="ri-tab"><span class="ri-tab-icon">🏭</span> Factory Intel <span class="ri-tab-badge beta">BETA</span></a>
  <a href="brand_watch.html" class="ri-tab"><span class="ri-tab-icon">💎</span> Brand Watch <span class="ri-tab-badge beta">BETA</span></a>
  <a href="online_catalog.html" class="ri-tab"><span class="ri-tab-icon">🌐</span> Online Catalog <span class="ri-tab-badge soon">SOON</span></a>
  <a href="retailer_intel.html" class="ri-tab"><span class="ri-tab-icon">🏬</span> Retailer Intel <span class="ri-tab-badge beta">BETA</span></a>
  <a href="social_trends.html" class="ri-tab"><span class="ri-tab-icon">📈</span> Social Trends <span class="ri-tab-badge soon">SOON</span></a>
  <a href="news_editorial.html" class="ri-tab active"><span class="ri-tab-icon">📰</span> News &amp; Editorial</a>
</div>

<div class="ne">

  <div class="ne-summary">
    <div class="ne-s-label">Daily Trend Summary</div>
    <div class="ne-s-date" id="ne-s-date">—</div>
    <div class="ne-s-text" id="ne-s-text"><span class="ne-s-empty">Generating today's trend summary…</span></div>
  </div>

  <div class="ne-controls">
    <div class="ne-ctl-label">Filters</div>
    <label class="ne-toggle"><input type="checkbox" id="hide-fluff" checked onchange="renderFeed()"> Hide fluff</label>
    <span class="ne-count" id="ne-count">—</span>
    <button class="ne-refresh" id="refresh-btn" onclick="refresh()">↻ Refresh Feed</button>
  </div>

  <div class="ne-streams" id="ne-streams">
    <button class="ne-stream-tab active" data-stream="all" onclick="setStream('all')">All</button>
    <button class="ne-stream-tab" data-stream="trade" onclick="setStream('trade')">Trade</button>
    <button class="ne-stream-tab" data-stream="consumer" onclick="setStream('consumer')">Consumer</button>
    <button class="ne-stream-tab" data-stream="celebrity" onclick="setStream('celebrity')">Celebrity</button>
    <button class="ne-stream-tab" data-stream="lifestyle" onclick="setStream('lifestyle')">Lifestyle</button>
  </div>

  <div class="ne-feed" id="ne-feed">
    <div class="ne-loading">Loading articles…</div>
  </div>

</div>

<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';

function sb(path){
  return fetch(SB+'/rest/v1/'+path,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}}).then(function(r){return r.json();});
}

var allArticles=[];
var currentStream='all';
var STREAM_THRESHOLD=0.35; // min weight for an article to appear in a specific stream

function setStream(s){
  currentStream=s;
  var tabs=document.querySelectorAll('.ne-stream-tab');
  for(var i=0;i<tabs.length;i++){
    tabs[i].className='ne-stream-tab'+(tabs[i].getAttribute('data-stream')===s?' active':'');
  }
  renderFeed();
}

function streamWeight(a,stream){
  var w=a.stream_weights||{};
  var v=w[stream];
  return typeof v==='number'?v:0;
}

function escapeHtml(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

// Defensive: even if backend stored raw HTML in snippet, strip it before display
function cleanText(s){
  if(!s)return '';
  // Strip HTML tags
  s=String(s).replace(/<[^>]+>/g,' ');
  // Decode common entities
  s=s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ');
  // Strip Google News URLs that leak through
  s=s.replace(/https?:\/\/news\.google\.com\/[^\s]+/g,'');
  return s.replace(/\s+/g,' ').trim();
}

function timeAgo(iso){
  if(!iso)return '';
  var diff=Date.now()-new Date(iso).getTime();
  var hrs=Math.floor(diff/3600000);
  if(hrs<1)return Math.floor(diff/60000)+'m ago';
  if(hrs<24)return hrs+'h ago';
  return Math.floor(hrs/24)+'d ago';
}

function loadSummary(){
  sb('news_daily_summaries?order=summary_date.desc&limit=1').then(function(rows){
    if(rows && rows.length){
      var d=new Date(rows[0].summary_date);
      document.getElementById('ne-s-date').textContent=d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' · '+(rows[0].article_count||0)+' articles';
      document.getElementById('ne-s-text').textContent=rows[0].summary_text;
    } else {
      var today=new Date();
      document.getElementById('ne-s-date').textContent=today.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      document.getElementById('ne-s-text').innerHTML='<span class="ne-s-empty">No summary yet. Trigger a refresh to ingest today\'s news.</span>';
    }
  });
}

function loadArticles(){
  sb('news_articles?order=published_at.desc.nullslast,ingested_at.desc&limit=200').then(function(rows){
    allArticles=rows||[];
    renderFeed();
  });
}

function renderFeed(){
  var hideFluff=document.getElementById('hide-fluff').checked;
  var filtered=hideFluff?allArticles.filter(function(a){return !a.is_fluff;}):allArticles;

  // Stream filter: on a specific stream, keep articles above the weight threshold
  // and sort by that stream's weight (strongest first). "All" keeps date order.
  if(currentStream!=='all'){
    filtered=filtered.filter(function(a){return streamWeight(a,currentStream)>=STREAM_THRESHOLD;})
      .sort(function(x,y){return streamWeight(y,currentStream)-streamWeight(x,currentStream);});
  }

  var feed=document.getElementById('ne-feed');
  document.getElementById('ne-count').textContent=filtered.length+' of '+allArticles.length+' articles';
  if(!filtered.length){
    feed.innerHTML='<div class="ne-empty">No articles in this stream yet. Try <strong>All</strong>, or click <strong>Refresh Feed</strong>.</div>';
    return;
  }
  feed.innerHTML=filtered.map(function(a){
    var tags='';
    (a.mentioned_brands||[]).slice(0,4).forEach(function(b){tags+='<span class="ne-tag ne-tag-brand">'+escapeHtml(b)+'</span>';});
    (a.mentioned_celebrities||[]).slice(0,3).forEach(function(c){tags+='<span class="ne-tag ne-tag-celebrity">'+escapeHtml(c)+'</span>';});
    (a.mentioned_ingredients||[]).slice(0,3).forEach(function(i){tags+='<span class="ne-tag ne-tag-ingredient">'+escapeHtml(i)+'</span>';});
    (a.mentioned_retailers||[]).slice(0,3).forEach(function(r){tags+='<span class="ne-tag ne-tag-retailer">'+escapeHtml(r)+'</span>';});
    (a.signal_types||[]).forEach(function(s){tags+='<span class="ne-tag ne-tag-signal">'+escapeHtml(s)+'</span>';});
    var highlight=a.ai_highlight?cleanText(a.ai_highlight):'';
    return '<div class="ne-article '+(a.is_fluff?'fluff':'')+'">'+
      '<div class="ne-art-meta">'+
        '<span class="ne-art-source">'+escapeHtml(a.source_name||'Source')+'</span>'+
        '<span>'+timeAgo(a.published_at||a.ingested_at)+'</span>'+
        (a.is_fluff?'<span class="ne-art-fluff-badge">FLUFF</span>':'')+
      '</div>'+
      '<div class="ne-art-headline"><a href="'+escapeHtml(a.external_url)+'" target="_blank">'+escapeHtml(cleanText(a.headline))+'</a></div>'+
      (highlight?'<div class="ne-art-highlight">'+escapeHtml(highlight)+'</div>':'')+
      (tags?'<div class="ne-art-tags">'+tags+'</div>':'')+
    '</div>';
  }).join('');
}

function refresh(){
  var btn=document.getElementById('refresh-btn');
  btn.disabled=true;btn.textContent='Fetching…';
  fetch('/api/fetch-news-alerts',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(function(r){return r.json();}).then(function(d){
    if(d.success){
      btn.textContent='✓ '+d.new_articles+' new';
      setTimeout(function(){
        loadSummary();
        loadArticles();
        btn.disabled=false;btn.textContent='↻ Refresh Feed';
      },500);
    } else {
      btn.disabled=false;btn.textContent='↻ Refresh Feed';
      alert('Refresh failed: '+(d.error||'unknown'));
    }
  }).catch(function(e){
    btn.disabled=false;btn.textContent='↻ Refresh Feed';
    alert('Error: '+e.message);
  });
}

loadSummary();
loadArticles();
</script>

</body>
</html>
