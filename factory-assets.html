<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Upload Portal — TBG Sourcing</title>
<style>
  :root{ --blue:#2563eb; --green:#16a34a; --ink:#1a1a2e; --muted:#6b7280; --line:#e6e6e0; --bg:#f5f5ef; }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;}
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:10px;}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex:0 0 auto;}
  .brand{font-size:15px;font-weight:800;letter-spacing:0.01em;}
  .brand small{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;}
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,0.03);}
  h1{font-size:20px;margin:0 0 4px;}
  .product{font-size:15px;color:var(--blue);font-weight:700;margin-bottom:2px;}
  .sub{font-size:13px;color:var(--muted);}
  .progress-wrap{margin:16px 0 4px;}
  .progress-track{height:10px;background:#eceae2;border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .3s ease;width:0;}
  .progress-label{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
  .asset{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-top:1px solid var(--line);}
  .asset:first-child{border-top:none;}
  .asset-status{font-size:18px;line-height:1.4;flex:0 0 auto;width:22px;text-align:center;}
  .asset-main{flex:1;min-width:0;}
  .asset-name{font-size:14px;font-weight:600;word-break:break-word;}
  .asset-recv{font-size:12px;color:var(--green);font-weight:600;margin-top:2px;}
  .asset-actions{margin-top:8px;}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .upmsg{font-size:12px;margin-top:7px;min-height:1px;}
  .done-banner{background:#ecfdf3;border:1px solid #abefc6;color:#067647;border-radius:12px;padding:16px;font-size:14px;font-weight:600;text-align:center;}
  .center-state{max-width:520px;margin:14vh auto 0;text-align:center;padding:0 18px;}
  .center-state .big{font-size:42px;margin-bottom:10px;}
  .center-state h2{font-size:19px;margin:0 0 6px;}
  .center-state p{color:var(--muted);font-size:14px;}
  .footer{text-align:center;color:var(--muted);font-size:11px;margin-top:24px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">T</div>
  <div class="brand">TBG Sourcing<small>Asset Upload Portal</small></div>
</div>

<div id="root" class="wrap">
  <div class="center-state"><div class="big">⏳</div><h2>Loading…</h2><p>Checking your secure link.</p></div>
</div>

<script>
var SUPA_URL = 'https://mjkjubctswjwjihxjpnd.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
var H = { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };

var TOKEN = (function(){ try { return new URL(location.href).searchParams.get('token') || ''; } catch(e){ return ''; } })();
var PROJECT = null;   // loaded artwork_projects row

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function root(){ return document.getElementById('root'); }
function fileSize(b){ b=Number(b)||0; if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; if(b<1073741824)return (b/1048576).toFixed(1)+' MB'; return (b/1073741824).toFixed(2)+' GB'; }

// Map a required-asset display name (e.g. "Packaging dieline (structural)") to a valid
// artwork_assets.asset_type code. The column has a DB CHECK constraint limiting it to this
// fixed vocabulary (the same codes the designer portal groups by); sending the raw name
// fails the constraint with a 400. Unknown names fall back to 'other'.
function assetTypeCode(name){
  var n = (name||'').toLowerCase();
  if (/step|3d|cad/.test(n)) return 'step_file';
  if (/render/.test(n)) return 'rendering';
  if (/die\s*-?\s*line|dieline/.test(n)) return 'dieline';
  if (/image|photo|lifestyle|in[\s-]?use/.test(n)) return 'hi_res_image';
  if (/manual|quick\s*-?\s*start/.test(n)) return 'user_manual';
  if (/brand\s*guideline/.test(n)) return 'brand_guidelines';
  if (/colou?r\s*standard|pantone/.test(n)) return 'color_standard';
  if (/reference\s*sample/.test(n)) return 'reference_sample';
  return 'other';
}

function showInvalid(){
  root().innerHTML = '<div class="center-state"><div class="big">🔒</div><h2>Invalid or expired link</h2>'+
    '<p>This upload link is not valid or has expired. Please contact your TBG Sourcing representative for a new link.</p></div>';
}

function normAssets(ar){
  // assets_required is a jsonb array of {name, received}. Tolerate plain strings / stringified json.
  var raw = ar;
  if (typeof raw === 'string'){ try { raw = JSON.parse(raw); } catch(e){ raw = []; } }
  if (!Array.isArray(raw)) return [];
  return raw.map(function(a){
    if (a && typeof a === 'object') return { name: a.name || '', received: a.received === true };
    return { name: String(a||''), received: false };
  }).filter(function(a){ return a.name; });
}

async function loadProject(){
  if (!TOKEN){ showInvalid(); return; }
  try {
    var sel = 'id,product_name,status,assets_required,factory_link_expires_at,factory_download_count';
    var r = await fetch(SUPA_URL + '/rest/v1/artwork_projects?factory_link_token=eq.' + encodeURIComponent(TOKEN) + '&select=' + encodeURIComponent(sel) + '&limit=1', { headers: H });
    var rows = r.ok ? await r.json() : [];
    var p = Array.isArray(rows) ? rows[0] : null;
    if (!p){ showInvalid(); return; }
    if (p.factory_link_expires_at && new Date(p.factory_link_expires_at) < new Date()){ showInvalid(); return; }
    PROJECT = p;
    render();
  } catch(e){ showInvalid(); }
}

function render(){
  var assets = normAssets(PROJECT.assets_required);
  var total = assets.length;
  var done = assets.filter(function(a){ return a.received; }).length;
  var pct = total ? Math.round(done/total*100) : 0;
  var allDone = total > 0 && done === total;

  // FIX 1: once every required asset is in, show a full-page thank-you screen with a
  // Close Window button — no further action is required from the factory.
  if (allDone){
    root().innerHTML = '<div class="center-state">'+
      '<div class="big">✅</div>'+
      '<h2>All assets submitted successfully! Thank you.</h2>'+
      '<p>The design team will now begin working on your artwork. You may close this window.</p>'+
      '<button class="btn" style="margin-top:18px;" onclick="window.close()">Close Window</button>'+
      '</div>';
    return;
  }

  var html = '';
  html += '<div class="card">';
  html += '<div class="product">'+esc(PROJECT.product_name || 'Your Product')+'</div>';
  html += '<h1>Asset Upload Portal</h1>';
  html += '<div class="sub">Please upload each required asset below. Files are sent directly to the TBG Sourcing design team.</div>';
  html += '<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  html += '<div class="progress-label">'+done+' of '+total+' assets submitted</div></div>';
  html += '</div>';

  html += '<div class="card">';
  if (!total){
    html += '<div class="sub">No specific assets are listed for this order yet. Please contact your TBG Sourcing representative.</div>';
  } else {
    assets.forEach(function(a, i){
      html += '<div class="asset">';
      html += '<div class="asset-status">'+(a.received ? '✅' : '⬜')+'</div>';
      html += '<div class="asset-main">';
      html += '<div class="asset-name">'+esc(a.name)+'</div>';
      if (a.received){
        html += '<div class="asset-recv">Received</div>';
      } else {
        html += '<div class="asset-actions">';
        html += '<input type="file" id="file-'+i+'" style="display:none" onchange="onPick('+i+',this)">';
        html += '<button class="btn" id="btn-'+i+'" onclick="document.getElementById(\'file-'+i+'\').click()">Upload File</button>';
        html += '</div>';
        html += '<div class="upmsg" id="msg-'+i+'"></div>';
      }
      html += '</div></div>';
    });
  }
  html += '</div>';
  html += '<div class="footer">Secure upload link · TBG Sourcing</div>';
  root().innerHTML = html;
}

function onPick(i, input){
  var f = input.files && input.files[0];
  input.value = '';
  if (f) uploadAsset(i, f);
}

async function uploadAsset(i, file){
  var assets = normAssets(PROJECT.assets_required);
  var asset = assets[i];
  if (!asset) return;
  var msg = document.getElementById('msg-'+i);
  var btn = document.getElementById('btn-'+i);
  if (btn){ btn.disabled = true; }
  if (msg){ msg.style.color = '#6b7280'; msg.textContent = 'Uploading '+file.name+' ('+fileSize(file.size)+')…'; }
  try {
    // 1) Upload the file to R2 (authorized by the factory_link_token).
    var safeName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    var folder = 'factory-assets/' + PROJECT.id;
    var ctype = file.type || 'application/octet-stream';
    var up = await fetch('/api/r2-upload?folder=' + encodeURIComponent(folder) + '&filename=' + encodeURIComponent(safeName) + '&contentType=' + encodeURIComponent(ctype),
      { method: 'POST', headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': ctype }, body: file });
    var upj = await up.json().catch(function(){ return { error: true }; });
    if (!up.ok || !upj || upj.error || !upj.url){
      if (msg){ msg.style.color = '#dc2626'; msg.textContent = 'Upload failed: ' + ((upj && upj.message) || up.status); }
      if (btn){ btn.disabled = false; }
      return;
    }

    // 2) Record the asset in artwork_assets. asset_type must be a constrained code (the raw
    //    asset name fails the DB CHECK constraint with a 400); the original required-asset name
    //    is preserved in notes. Check response.ok and surface failures instead of swallowing them.
    var insRes = await fetch(SUPA_URL + '/rest/v1/artwork_assets', { method: 'POST', headers: Object.assign({}, H, { Prefer: 'return=minimal' }),
      body: JSON.stringify({ artwork_project_id: PROJECT.id, asset_type: assetTypeCode(asset.name), file_name: file.name, file_url: upj.url, file_size_bytes: file.size, notes: asset.name }) });
    if (!insRes.ok){
      var insErr = await insRes.text().catch(function(){ return ''; });
      console.error('artwork_assets insert failed', insRes.status, insErr);
      if (msg){ msg.style.color = '#dc2626'; msg.textContent = 'File uploaded but could not be recorded (' + insRes.status + '). Please try again.'; }
      if (btn){ btn.disabled = false; }
      return;
    }

    // 3) Mark this asset received in assets_required — ONLY after the insert above succeeded.
    var updated = assets.map(function(a){ return { name: a.name, received: a.received || a.name === asset.name }; });
    PROJECT.assets_required = updated;

    // 4) Bump factory download counters.
    var newCount = (Number(PROJECT.factory_download_count) || 0) + 1;
    PROJECT.factory_download_count = newCount;

    var patch = { assets_required: updated, factory_last_download_at: new Date().toISOString(), factory_download_count: newCount };

    // 5) If every asset is now received, move the project into the design queue.
    var allDone = updated.every(function(a){ return a.received; });
    if (allDone){ patch.status = 'ready_for_design'; PROJECT.status = 'ready_for_design'; }

    await fetch(SUPA_URL + '/rest/v1/artwork_projects?id=eq.' + encodeURIComponent(PROJECT.id), { method: 'PATCH', headers: Object.assign({}, H, { Prefer: 'return=minimal' }), body: JSON.stringify(patch) });

    // 6) Refresh the checklist; surface a transient confirmation (re-render replaced the inline msg DOM).
    render();
    showToast('✅ ' + asset.name + ' uploaded successfully');
  } catch(e){
    if (msg){ msg.style.color = '#dc2626'; msg.textContent = 'Error: ' + (e && e.message || e); }
    if (btn){ btn.disabled = false; }
  }
}

function showToast(text){
  var t = document.getElementById('toast');
  if (!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;left:50%;top:14px;transform:translateX(-50%);background:#16a34a;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,0.18);z-index:1000;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = text;
  t.style.display = 'block';
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(function(){ if (t) t.style.display = 'none'; }, 3000);
}

loadProject();
</script>
</body>
</html>
