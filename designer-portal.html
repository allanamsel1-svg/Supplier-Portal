<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Portal — TBG Sourcing</title>
<link rel="stylesheet" href="tenant-portal.css">
<script src="paste-upload.js"></script>
<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);}
  .topbar-l{display:flex;align-items:center;gap:12px;}
  .tm{width:30px;height:30px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .topbar-title{font-size:15px;font-weight:700;}
  .topbar-r{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2);}
  .topbar-r select{background:var(--card-bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit;}
  .btn-out{background:none;border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;}
  .wrap{max-width:980px;margin:0 auto;padding:1.5rem;}
  .dtabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
  .dtab{padding:10px 18px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-family:inherit;}
  .dtab.active{color:var(--text);border-bottom-color:#3b82f6;}
  .dpane{display:none;}.dpane.active{display:block;}
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:18px;min-height:200px;display:flex;flex-direction:column;margin-bottom:16px;}
  .card.auto{min-height:0;}
  .card h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text2);margin-bottom:12px;}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;margin-right:5px;}
  .kvr{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
  .kvr .k{color:var(--text2);}.kvr .v{font-weight:600;text-align:right;}
  .chip{display:inline-block;font-size:11px;padding:3px 9px;border-radius:12px;margin:2px;border:1px solid var(--border);}
  .upc-num{font-size:28px;font-weight:800;letter-spacing:2px;font-family:monospace;cursor:pointer;}
  .barcode{display:flex;gap:1px;height:54px;align-items:stretch;margin:10px 0;}
  .barcode span{display:block;}
  .amberbox{background:rgba(245,158,11,0.12);border:1px solid #f59e0b;border-radius:8px;padding:12px;font-size:13px;line-height:1.55;color:var(--text);}
  .ffield{margin:10px 0;}.ffield label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--text2);}
  .ffield input,.ffield select,.ffield textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;}
  .ffield textarea{min-height:70px;resize:vertical;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .dropzone{border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;color:var(--text2);}
  .dropzone:hover{border-color:#3b82f6;}
  .btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn:disabled{opacity:0.55;cursor:not-allowed;}
  .asset-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
  .asset-row .an{flex:1;min-width:160px;}
  .cmt{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;}
  .cmt .ch{font-size:11px;color:var(--text2);margin-bottom:4px;}
  .empty{color:var(--text2);font-size:13px;padding:14px;text-align:center;}
  .loading{color:var(--text2);font-size:14px;padding:2rem;text-align:center;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-l"><div class="tm">🎨</div><div class="topbar-title">Creative Portal</div></div>
  <div class="topbar-r">
    <span id="dName">—</span>
    <select id="projSelect" onchange="selectProject(this.value)" style="display:none;"></select>
    <button class="btn-out" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div class="wrap">
  <div class="dtabs">
    <button class="dtab active" data-t="brief" onclick="showDTab('brief')">Brief</button>
    <button class="dtab" data-t="assets" onclick="showDTab('assets')">Assets</button>
    <button class="dtab" data-t="submit" onclick="showDTab('submit')">Submit</button>
  </div>
  <div class="dpane active" id="pane-brief"><div class="loading">Loading…</div></div>
  <div class="dpane" id="pane-assets"><div class="loading">Loading…</div></div>
  <div class="dpane" id="pane-submit"><div class="loading">Loading…</div></div>
</div>

<script src="tenant-shared.js"></script>
<script>
var ME = null, PROJECTS = [], PROJ = null, SKU = null;
function tok(){return localStorage.getItem('tenant_token');}
function awHeaders(){return {apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json'};}
async function awPost(path, body, rep){try{const r=await fetch(SUPA_URL+'/rest/v1/'+path,{method:'POST',headers:Object.assign({},awHeaders(),{Prefer:rep?'return=representation':'return=minimal'}),body:JSON.stringify(body)});if(!r.ok)return null;return rep?await r.json():true;}catch(e){return null;}}
async function awPatch(path, body){try{return (await fetch(SUPA_URL+'/rest/v1/'+path,{method:'PATCH',headers:Object.assign({},awHeaders(),{Prefer:'return=minimal'}),body:JSON.stringify(body)})).ok;}catch(e){return false;}}
function signOut(){localStorage.removeItem('tenant_token');location.href='designer-login.html';}
function showDTab(t){document.querySelectorAll('.dtab').forEach(function(b){b.classList.toggle('active',b.dataset.t===t);});['brief','assets','submit'].forEach(function(p){g('pane-'+p).classList.toggle('active',p===t);});}
function g(id){return document.getElementById(id);}

function statusBadgeAW(s){
  var amber=['submitted','internal_review','tenant_review','in_progress','factory_reviewing','negotiating'];
  var green=['tenant_approved','factory_approved','locked','sent_to_factory'];
  var red=['revision_requested','factory_flagged'];
  var c=red.indexOf(s)>-1?['#ef4444','rgba(239,68,68,0.15)']:green.indexOf(s)>-1?['#22c55e','rgba(34,197,94,0.15)']:amber.indexOf(s)>-1?['#f59e0b','rgba(245,158,11,0.15)']:['#94a3b8','rgba(148,163,184,0.15)'];
  return '<span class="badge" style="color:'+c[0]+';background:'+c[1]+';">'+esc((s||'').replace(/_/g,' '))+'</span>';
}
function typeBadges(types){return (Array.isArray(types)?types:[]).map(function(t){return '<span class="badge" style="background:rgba(59,130,246,0.12);color:#60a5fa;">'+esc(t)+'</span>';}).join('');}
function fileSize(b){b=Number(b)||0;if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';return (b/1073741824).toFixed(2)+' GB';}
function barcode(upc){var s=String(upc||'').replace(/\D/g,'');if(!s)return '';var html='';for(var i=0;i<s.length;i++){var d=parseInt(s[i],10);var w=1+(d%4);html+='<span style="width:'+w+'px;background:var(--text);"></span><span style="width:2px;background:transparent;"></span>';}return '<div class="barcode">'+html+'</div>';}

async function validateMe(){
  if(!tok()){location.href='designer-login.html';return null;}
  try{
    var r=await fetch('/api/tenant-auth?action=validate',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok()}});
    var d=await r.json().catch(function(){return {};});
    if(!r.ok||!d.valid||!d.user){location.href='designer-login.html';return null;}
    if(d.user.role!=='designer'){location.href='designer-login.html';return null;}
    return d.user;
  }catch(e){location.href='designer-login.html';return null;}
}

async function loadProjects(){
  PROJECTS = await supa('artwork_projects?designer_id=eq.'+ME.id+'&order=due_date.asc.nullslast&select=*,skus(model_number,description,unit_length_cm,unit_width_cm,unit_height_cm,unit_weight_kg,inner_length_cm,inner_width_cm,inner_height_cm,master_length_cm,master_width_cm,master_height_cm,packaging_primary,packaging_primary_material,packaging_finish,packaging_decoration,upc_code)');
  var sel=g('projSelect');
  if(PROJECTS.length>1){sel.style.display='inline-block';sel.innerHTML=PROJECTS.map(function(p){return '<option value="'+p.id+'">'+esc(p.product_name||'Untitled')+'</option>';}).join('');}
  if(!PROJECTS.length){g('pane-brief').innerHTML='<div class="empty">No design briefs assigned to you yet.</div>';g('pane-assets').innerHTML='';g('pane-submit').innerHTML='';return;}
  selectProject(PROJECTS[0].id);
}
function selectProject(id){PROJ=PROJECTS.find(function(p){return p.id===id;});if(!PROJ)return;SKU=PROJ.skus||{};g('projSelect').value=id;renderBrief();renderAssets();renderSubmit();}

// ── TAB 1: Brief ──
async function renderBrief(){
  var p=PROJ, sku=SKU;
  var due=p.due_date?(' · due '+fmtDate(p.due_date)):'';
  var dleft=null; if(p.due_date){var t=new Date();t.setHours(0,0,0,0);var dd=new Date(p.due_date+'T00:00:00');dleft=Math.round((dd-t)/864e5);}
  var dueColor=dleft==null?'':dleft<7?'#ef4444':dleft<14?'#f59e0b':'#22c55e';
  var dueTxt=dleft==null?'':(dleft<0?Math.abs(dleft)+' days overdue':dleft+' days remaining');
  var pantones=(Array.isArray(p.pantone_colors)?p.pantone_colors:[]);
  var html='';
  html+='<div class="card auto"><h3>Project Overview</h3>'+
    '<div style="font-size:22px;font-weight:800;margin-bottom:8px;">'+esc(p.product_name||'Untitled')+'</div>'+
    '<div style="margin-bottom:8px;">'+typeBadges(p.artwork_types)+'</div>'+
    '<div>'+statusBadgeAW(p.status)+(dueTxt?' <span style="font-size:12px;color:'+dueColor+';font-weight:600;">'+esc(dueTxt)+'</span>':'')+'<span style="font-size:12px;color:var(--text2);">'+esc(due)+'</span></div></div>';
  html+='<div class="card auto"><h3>Specifications</h3>'+
    '<div class="kvr"><span class="k">Color profile</span><span class="v">'+esc(p.color_profile||'—')+'</span></div>'+
    '<div class="kvr"><span class="k">Print finish</span><span class="v">'+esc(p.print_finish||'—')+'</span></div>'+
    '<div class="kvr"><span class="k">Print material</span><span class="v">'+esc(p.print_material||'—')+'</span></div>'+
    '<div class="kvr"><span class="k">Pantone colors</span><span class="v">'+(pantones.length?pantones.map(function(c){return '<span class="chip">'+esc(c)+'</span>';}).join(''):'—')+'</span></div>'+
    '<div class="kvr"><span class="k">Dieline</span><span class="v">'+(p.dieline_approved?'Approved ✓':'Awaiting approval')+'</span></div></div>';
  html+='<div class="card auto"><h3>Dimensions</h3>'+
    '<div class="kvr"><span class="k">Unit (L×W×H cm)</span><span class="v">'+[sku.unit_length_cm,sku.unit_width_cm,sku.unit_height_cm].map(function(x){return x!=null?x:'—';}).join(' × ')+'</span></div>'+
    '<div class="kvr"><span class="k">Unit weight</span><span class="v">'+(sku.unit_weight_kg!=null?sku.unit_weight_kg+' kg':'—')+'</span></div>'+
    '<div class="kvr"><span class="k">Inner carton (cm)</span><span class="v">'+[sku.inner_length_cm,sku.inner_width_cm,sku.inner_height_cm].map(function(x){return x!=null?x:'—';}).join(' × ')+'</span></div>'+
    '<div class="kvr"><span class="k">Master carton (cm)</span><span class="v">'+[sku.master_length_cm,sku.master_width_cm,sku.master_height_cm].map(function(x){return x!=null?x:'—';}).join(' × ')+'</span></div>'+
    '<div class="kvr"><span class="k">Packaging</span><span class="v">'+esc([sku.packaging_primary,sku.packaging_primary_material].filter(Boolean).join(' · ')||'—')+'</span></div>'+
    '<div class="kvr"><span class="k">Finish / decoration</span><span class="v">'+esc([sku.packaging_finish,sku.packaging_decoration].filter(Boolean).join(' · ')||'—')+'</span></div></div>';
  var upc=sku.upc_code||'';
  html+='<div class="card auto"><h3>UPC</h3>'+
    '<div class="upc-num" title="Click to copy" onclick="copyUPC(\''+esc(upc)+'\')">'+(upc?esc(upc):'— not set —')+'</div>'+
    barcode(upc)+
    '<div style="font-size:12px;color:var(--text2);">This UPC must appear on your artwork and will be AI-verified before approval.</div></div>';
  html+='<div class="card auto"><h3>Brief Notes</h3>'+
    '<div style="font-size:13px;white-space:pre-wrap;line-height:1.6;margin-bottom:12px;">'+esc(p.brief_notes||'No brief notes provided.')+'</div>'+
    (p.special_instructions?'<div class="amberbox"><strong>Special instructions:</strong><br>'+esc(p.special_instructions)+'</div>':'')+'</div>';
  // Revision history
  var revs=await supa('artwork_revisions?artwork_project_id=eq.'+p.id+'&order=requested_at.desc&select=*');
  if(revs.length){
    html+='<div class="card auto"><h3>Revision History</h3>'+revs.map(function(r){return '<div class="kvr"><span class="k">'+esc((r.reason_category||'other').replace(/_/g,' '))+(r.resolved?' (resolved)':'')+'</span><span class="v" style="text-align:right;max-width:60%;font-weight:400;">'+esc(r.reason_notes||'')+'<br><span style="font-size:11px;color:var(--text2);">'+fmtDate(r.requested_at)+'</span></span></div>';}).join('')+'</div>';
  }
  g('pane-brief').innerHTML=html;
}
function copyUPC(u){if(!u)return;try{navigator.clipboard.writeText(u);}catch(e){}}

// ── TAB 2: Assets ──
var ASSET_SECTIONS=[['dieline','📐 Dielines'],['step_file','🧊 STEP Files'],['rendering','🧊 3D Renderings'],['hi_res_image','📸 Hi-Res Images'],['user_manual','📖 User Manual'],['brand_guidelines','🎨 Brand Guidelines'],['color_standard','🎨 Color Standards'],['reference_sample','📎 Reference Samples'],['other','📁 Other']];
async function renderAssets(){
  var assets=await supa('artwork_assets?artwork_project_id=eq.'+PROJ.id+'&order=created_at.desc&select=*');
  var byType={}; assets.forEach(function(a){(byType[a.asset_type]=byType[a.asset_type]||[]).push(a);});
  var html='';
  ASSET_SECTIONS.forEach(function(sec){
    var list=byType[sec[0]]||[];
    html+='<div class="card auto"><h3>'+sec[1]+'</h3>';
    if(!list.length)html+='<div class="empty">No '+sec[1].replace(/^[^ ]+ /,'').toLowerCase()+' files uploaded yet</div>';
    else html+=list.map(function(a){return '<div class="asset-row"><span class="an">'+esc(a.file_name||'file')+'</span>'+
      '<span class="badge" style="background:rgba(148,163,184,0.15);color:var(--text2);">'+esc((a.file_name||'').split('.').pop().toUpperCase())+'</span>'+
      '<span style="font-size:11px;color:var(--text2);">'+fileSize(a.file_size_bytes)+'</span>'+
      (a.notes?'<span style="font-size:11px;color:var(--text2);">'+esc(a.notes)+'</span>':'')+
      '<a class="btn-out" style="text-decoration:none;" href="'+esc(a.file_url||'#')+'" target="_blank">Download</a>'+
      '<span style="font-size:11px;color:var(--text2);">'+fmtDate(a.created_at)+'</span></div>';}).join('');
    html+='</div>';
  });
  // Comments (non-internal only)
  var cmts=await supa('artwork_comments?artwork_project_id=eq.'+PROJ.id+'&is_internal=eq.false&order=created_at.asc&select=*');
  html+='<div class="card auto"><h3>Comments</h3><div id="cmtList">'+(cmts.length?cmts.map(function(c){return '<div class="cmt"><div class="ch">'+esc(c.author_name||c.author_type||'')+' · '+fmtDate(c.created_at)+'</div>'+esc(c.comment_text||'')+'</div>';}).join(''):'<div class="empty">No comments yet.</div>')+'</div>'+
    '<div class="ffield" style="margin-top:10px;"><textarea id="cmtInput" placeholder="Add a comment…"></textarea></div><button class="btn" onclick="postComment()">Post Comment</button></div>';
  g('pane-assets').innerHTML=html;
}
async function postComment(){
  var txt=(g('cmtInput')||{}).value||''; if(!txt.trim())return;
  await awPost('artwork_comments',{artwork_project_id:PROJ.id,author_id:ME.id,author_type:'designer',author_name:ME.full_name||'Designer',comment_text:txt.trim(),is_internal:false});
  renderAssets();
}

// ── TAB 3: Submit ──
function renderSubmit(){
  var html='<div class="card auto"><h3>Upload Artwork</h3>'+
    '<div class="dropzone" id="dropzone" onclick="g(\'awfile\').click()">📤 Drag &amp; drop, click to browse, or paste (Ctrl+V)<div style="font-size:11px;margin-top:6px;">PDF, AI, EPS, PNG, JPG — up to 500MB</div></div>'+
    '<input type="file" id="awfile" style="display:none" accept=".pdf,.ai,.eps,.png,.jpg,.jpeg" onchange="onFilePick()">'+
    '<div style="font-size:12px;color:var(--text2);margin-top:8px;">Submit print-ready PDF for production files. Include AI/EPS source files as a separate upload if required.</div>'+
    '<div id="awfile-name" style="font-size:12px;color:#22c55e;margin-top:6px;"></div></div>';
  html+='<div class="card auto"><h3>Print Spec Sheet</h3>'+
    '<div class="row2"><div class="ffield"><label>Final dimensions (mm)</label><input id="sp-dim"></div>'+
    '<div class="ffield"><label>Resolution (DPI)</label><input id="sp-dpi" type="number"></div></div>'+
    '<div class="row2"><div class="ffield"><label>Bleed (mm)</label><input id="sp-bleed" type="number" value="3"></div>'+
    '<div class="ffield"><label>Safe zone (mm)</label><input id="sp-safe" type="number" value="5"></div></div>'+
    '<div class="row2"><div class="ffield"><label>Color profile</label><select id="sp-color"><option>CMYK</option><option>Pantone</option><option>CMYK+Pantone</option><option>RGB</option></select></div>'+
    '<div class="ffield"><label>Finish</label><select id="sp-finish"><option>Gloss</option><option>Matte</option><option>Soft Touch</option><option>Uncoated</option><option>Other</option></select></div></div>'+
    '<div class="ffield"><label>Pantone colors used (comma separated)</label><input id="sp-pantone"></div>'+
    '<div class="ffield"><label>Material</label><input id="sp-material"></div>'+
    '<div class="ffield"><label>UPC on artwork (required — must match the brief)</label><input id="sp-upc" placeholder="'+esc(SKU.upc_code||'')+'"></div>'+
    '<div class="ffield"><label>Designer notes</label><textarea id="sp-notes"></textarea></div>'+
    '<button class="btn" id="submitBtn" onclick="submitArtwork()">Submit for Review</button>'+
    '<div id="submitStatus" style="font-size:13px;margin-top:10px;"></div></div>';
  html+='<div class="card auto"><h3>Version History</h3><div id="versionList"><div class="loading">Loading…</div></div></div>';
  g('pane-submit').innerHTML=html;
  setTimeout(function(){var dz=g('dropzone');if(dz&&window.registerPasteZone){registerPasteZone(dz,function(file){setPickedFile(file);});}},50);
  loadVersions();
}
var PICKED=null;
function onFilePick(){var f=g('awfile').files[0];if(f)setPickedFile(f);}
function setPickedFile(f){PICKED=f;var n=g('awfile-name');if(n)n.textContent='Selected: '+f.name+' ('+fileSize(f.size)+')';}
async function loadVersions(){
  var vs=await supa('artwork_versions?artwork_project_id=eq.'+PROJ.id+'&order=version_number.desc&select=*');
  var el=g('versionList'); if(!el)return;
  if(!vs.length){el.innerHTML='<div class="empty">No versions submitted yet.</div>';return;}
  el.innerHTML=vs.map(function(v){return '<div class="asset-row"><span class="an">v'+esc(v.version_number)+' · '+fmtDate(v.submitted_at||v.created_at)+'</span>'+statusBadgeAW(v.status)+
    (v.designer_notes?'<span style="font-size:11px;color:var(--text2);">'+esc(v.designer_notes)+'</span>':'')+
    (v.file_url?'<a class="btn-out" style="text-decoration:none;" href="'+esc(v.file_url)+'" target="_blank">Download</a>':'')+'</div>';}).join('');
}
async function submitArtwork(){
  var st=g('submitStatus'), btn=g('submitBtn');
  var upc=(g('sp-upc').value||'').trim()||(SKU.upc_code||'');
  if(!PICKED){st.style.color='#f87171';st.textContent='Please select an artwork file to upload.';return;}
  if(!upc){st.style.color='#f87171';st.textContent='UPC on artwork is required.';return;}
  btn.disabled=true; st.style.color='var(--text2)'; st.textContent='Submitting for review…';
  // version number
  var existing=await supa('artwork_versions?artwork_project_id=eq.'+PROJ.id+'&select=version_number&order=version_number.desc&limit=1');
  var vnum=(existing[0]&&existing[0].version_number?Number(existing[0].version_number):0)+1;
  var path=PROJ.id+'/v'+vnum+'/'+Date.now()+'_'+PICKED.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  var up=await fetch(SUPA_URL+'/storage/v1/object/artwork-files/'+encodeURIComponent(path),{method:'POST',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':PICKED.type||'application/octet-stream'},body:PICKED});
  if(!up.ok){st.style.color='#f87171';st.textContent='Upload failed ('+up.status+').';btn.disabled=false;return;}
  var fileUrl=SUPA_URL+'/storage/v1/object/public/artwork-files/'+path;
  var pantone=(g('sp-pantone').value||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
  var created=await awPost('artwork_versions',{artwork_project_id:PROJ.id,version_number:vnum,file_name:PICKED.name,file_url:fileUrl,file_size_bytes:PICKED.size,file_type:(PICKED.name.split('.').pop()||'').toLowerCase(),dimensions_mm:g('sp-dim').value||null,bleed_mm:parseFloat(g('sp-bleed').value)||null,safe_zone_mm:parseFloat(g('sp-safe').value)||null,color_profile:g('sp-color').value,pantone_colors:pantone,finish:g('sp-finish').value,material:g('sp-material').value||null,resolution_dpi:parseInt(g('sp-dpi').value,10)||null,upc_on_artwork:upc,submitted_by:ME.id,submitted_at:new Date().toISOString(),designer_notes:g('sp-notes').value||null,status:'pending_review'},true);
  var versionId=(created&&created[0]&&created[0].id)||null;
  if(versionId){
    try{await fetch('/api/artwork-upc-verify',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok()},body:JSON.stringify({version_id:versionId,upc_on_artwork:upc,upc_from_brief:SKU.upc_code||''})});}catch(e){}
  }
  await awPatch('artwork_projects?id=eq.'+PROJ.id,{status:'submitted'});
  await awPost('tenant_action_items',{tenant_id:PROJ.tenant_id,type:'artwork_submitted',reference_id:PROJ.id,reference_type:'artwork_project',title:'Artwork submitted for review — '+(PROJ.product_name||''),description:'Version '+vnum+' submitted by '+(ME.full_name||'designer'),priority:'high',status:'open'});
  st.style.color='#22c55e'; st.textContent='✓ Submitted — awaiting review';
  PICKED=null; var n=g('awfile-name'); if(n)n.textContent='';
  PROJ.status='submitted';
  loadVersions(); renderBrief();
}

(async function init(){
  ME = await validateMe();
  if(!ME)return;
  g('dName').textContent=ME.full_name||ME.email||'Designer';
  await loadProjects();
})();
</script>
