<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designer Portal</title>
<link rel="stylesheet" href="tenant-portal.css">
<script src="paste-upload.js"></script>
<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);}
  .topbar-l{display:flex;align-items:center;gap:12px;}
  .tm{width:30px;height:30px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .topbar-title{font-size:15px;font-weight:700;}
  .topbar-r{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2);}
  .btn-out{background:none;border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;}
  .topnav{display:flex;align-items:center;gap:4px;margin-left:6px;}
  .topnav a{display:inline-flex;align-items:center;gap:6px;font-size:13px;text-decoration:none;color:var(--text2);padding:6px 12px;border-radius:7px;font-weight:600;}
  .topnav a.active{background:rgba(37,99,235,0.15);color:#60a5fa;}
  .topnav a:hover{background:var(--bg);color:var(--text);}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;text-decoration:none;margin-bottom:6px;}
  .back-btn:hover{border-color:#3b82f6;}
  .wrap{max-width:980px;margin:0 auto;padding:1.5rem;}
  .sec-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin:1.5rem 0 0.75rem;display:flex;align-items:center;gap:8px;}
  .sec-count{font-size:11px;background:rgba(148,163,184,0.18);color:var(--text2);border-radius:10px;padding:1px 8px;font-weight:600;}
  .qcard{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
  .qcard-head{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;}
  .qcard-thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
  .qcard-title{font-size:16px;font-weight:700;}
  .qcard-sku{font-size:12px;color:var(--text2);font-family:monospace;margin-top:2px;}
  .chip{display:inline-block;font-size:11px;padding:3px 9px;border-radius:12px;margin:2px 4px 2px 0;border:1px solid var(--border);}
  .chip.pk{background:rgba(59,130,246,0.12);color:#60a5fa;border-color:rgba(59,130,246,0.3);}
  .days{font-size:12px;color:var(--text2);}
  .qcard-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn:disabled{opacity:0.55;cursor:not-allowed;}
  .btn.alt{background:none;border:1px solid var(--border);color:var(--text);}
  .brief-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
  .brief-body.open{display:block;}
  .brief-text{font-size:13px;white-space:pre-wrap;line-height:1.6;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;}
  .checklist{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .checklist label{font-size:13px;display:flex;align-items:center;gap:8px;}
  .ref-full{max-width:100%;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;}
  .dropzone{border:2px dashed var(--border);border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;margin-top:10px;}
  .dropzone:hover{border-color:#3b82f6;}
  .empty{color:var(--text2);font-size:13px;padding:18px;text-align:center;border:1px dashed var(--border);border-radius:10px;}
  .loading{color:var(--text2);font-size:14px;padding:2rem;text-align:center;}
  .wait-row{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:13px;flex-wrap:wrap;}
  .upmsg{font-size:12px;margin-top:8px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-l">
    <div class="tm">🎨</div><div class="topbar-title">Designer Portal</div>
    <nav class="topnav">
      <a href="designer-portal.html" class="active">🎨 Designer Queue</a>
      <a href="tenant-communications.html">💬 Communications</a>
    </nav>
  </div>
  <div class="topbar-r">
    <span id="dName">—</span>
    <button class="btn-out" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div class="wrap">
  <a href="designer-portal.html" class="back-btn">← Back to Dashboard</a>
  <div class="sec-title">🎯 My Queue <span class="sec-count" id="cnt-queue">0</span></div>
  <div id="queueList"><div class="loading">Loading…</div></div>

  <div class="sec-title">⏳ Waiting for Assets <span class="sec-count" id="cnt-wait">0</span></div>
  <div id="waitList"><div class="loading">Loading…</div></div>
</div>

<script src="tenant-shared.js"></script>
<script>
var ME = null;
function tok(){return localStorage.getItem('tenant_token');}
function g(id){return document.getElementById(id);}
function awHeaders(rep){return {apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:rep?'return=representation':'return=minimal'};}
async function awPost(path, body, rep){try{const r=await fetch(SUPA_URL+'/rest/v1/'+path,{method:'POST',headers:awHeaders(rep),body:JSON.stringify(body)});if(!r.ok)return null;return rep?await r.json():true;}catch(e){return null;}}
async function awPatch(path, body){try{return (await fetch(SUPA_URL+'/rest/v1/'+path,{method:'PATCH',headers:awHeaders(false),body:JSON.stringify(body)})).ok;}catch(e){return false;}}
function signOut(){localStorage.removeItem('tenant_token');location.href='designer-login.html';}
function fileSize(b){b=Number(b)||0;if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';return (b/1073741824).toFixed(2)+' GB';}
function daysSince(s){if(!s)return null;var d=Math.floor((Date.now()-new Date(s).getTime())/86400000);return d;}
function pkgList(p){
  // Prefer packaging_selections (jsonb array from the brief), fall back to artwork_types.
  var sel=p.packaging_selections;
  if(Array.isArray(sel)&&sel.length)return sel;
  if(Array.isArray(p.artwork_types))return p.artwork_types;
  return [];
}
function chips(arr){return (arr||[]).map(function(t){var label=(t&&typeof t==='object')?(t.name||''):t;return label?'<span class="chip pk">'+esc(label)+'</span>':'';}).join('');}

async function validateMe(){
  if(!tok()){location.href='designer-login.html';return null;}
  try{
    var r=await fetch('/api/tenant-auth?action=validate',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok()}});
    var d=await r.json().catch(function(){return {};});
    if(!r.ok||!d.valid||!d.user){location.href='designer-login.html';return null;}
    if(d.user.role!=='designer'){location.href='designer-login.html';return null;}
    return d.user;
  }catch(e){location.href='designer-login.html';return null;}
}
function myTenantId(){ return ME && (ME.tenant_id || (ME.tenant && ME.tenant.id)) || ''; }

// ── SECTION A: My Queue (status='ready_for_design', priority ASC then created_at ASC) ──
async function loadQueue(){
  var tid=myTenantId();
  var path='artwork_projects?status=eq.ready_for_design&order=priority.asc.nullslast,created_at.asc&select=*,skus(model_number,description)';
  if(tid)path+='&tenant_id=eq.'+tid;
  var rows=await supa(path);
  g('cnt-queue').textContent=rows.length;
  var el=g('queueList');
  if(!rows.length){el.innerHTML='<div class="empty">Your queue is clear — no briefs ready for design.</div>';return;}
  el.innerHTML=rows.map(queueCard).join('');
  rows.forEach(function(p){ var dz=g('dz-'+p.id); if(dz&&window.registerPasteZone){registerPasteZone(dz,function(file){doUpload(p.id,file);});} });
}
function queueCard(p){
  var sku=p.skus||{};
  var pk=pkgList(p);
  var d=daysSince(p.created_at);
  var thumb=p.reference_image_url?'<img class="qcard-thumb" src="'+esc(p.reference_image_url)+'" alt="reference">':'<div class="qcard-thumb" style="display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text2);">🎨</div>';
  return '<div class="qcard" id="card-'+p.id+'">'+
    '<div class="qcard-head">'+thumb+
      '<div style="flex:1;min-width:0;">'+
        '<div class="qcard-title">'+esc(p.product_name||sku.description||'Untitled')+'</div>'+
        '<div class="qcard-sku">'+esc(sku.model_number||'— no SKU —')+'</div>'+
        '<div style="margin-top:6px;">'+chips(pk)+'</div>'+
        '<div class="days" style="margin-top:4px;">'+(d!=null?('Brief created '+d+' day'+(d===1?'':'s')+' ago'):'')+(p.priority!=null?' · priority '+p.priority:'')+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="qcard-actions">'+
      '<button class="btn alt" onclick="toggleBrief(\''+p.id+'\')">Open Brief</button>'+
      '<button class="btn" onclick="g(\'awfile-'+p.id+'\').click()">Upload Artwork Files</button>'+
      '<input type="file" id="awfile-'+p.id+'" style="display:none" accept=".pdf,.ai,.eps,.png,.jpg,.jpeg" onchange="onPick('+'\''+p.id+'\''+',this)">'+
    '</div>'+
    '<div class="brief-body" id="brief-'+p.id+'">'+
      '<div class="brief-text">'+esc(p.ai_brief||'No brief text provided.')+'</div>'+
      (pk.length?'<div class="checklist">'+pk.map(function(t){return '<label><input type="checkbox" disabled> '+esc(t)+'</label>';}).join('')+'</div>':'')+
      (p.reference_image_url?'<img class="ref-full" src="'+esc(p.reference_image_url)+'" alt="reference packaging">':'')+
      '<div class="dropzone" id="dz-'+p.id+'" onclick="g(\'awfile-'+p.id+'\').click()">📤 Drag &amp; drop, click, or paste artwork (PDF, AI, EPS, PNG, JPG)</div>'+
      '<div class="upmsg" id="upmsg-'+p.id+'"></div>'+
    '</div>'+
  '</div>';
}
function toggleBrief(id){var b=g('brief-'+id);if(b)b.classList.toggle('open');}
function onPick(id,input){var f=input.files&&input.files[0];if(f)doUpload(id,f);input.value='';}

async function doUpload(projectId, file){
  if(!file)return;
  var msg=g('upmsg-'+projectId);
  if(msg){msg.style.color='var(--text2)';msg.textContent='Uploading '+file.name+' ('+fileSize(file.size)+')…';}
  try{
    // Next version number for this project
    var existing=await supa('artwork_versions?artwork_project_id=eq.'+projectId+'&select=version_number&order=version_number.desc&limit=1');
    var vnum=(existing[0]&&existing[0].version_number?Number(existing[0].version_number):0)+1;
    var safeName=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    var folder='artwork/'+projectId+'/v'+vnum;
    var ctype=file.type||'application/octet-stream';
    var up=await fetch('/api/r2-upload?folder='+encodeURIComponent(folder)+'&filename='+encodeURIComponent(safeName)+'&contentType='+encodeURIComponent(ctype),{method:'POST',headers:{'Authorization':'Bearer '+tok(),'Content-Type':ctype},body:file});
    var upj=await up.json().catch(function(){return{error:true};});
    if(!up.ok||!upj||upj.error||!upj.url){if(msg){msg.style.color='#f87171';msg.textContent='Upload failed: '+((upj&&upj.message)||up.status);}return;}
    // artwork_versions has submitted_by (no uploaded_by column); status pending_review per spec.
    var created=await awPost('artwork_versions',{
      artwork_project_id:projectId,
      version_number:vnum,
      file_name:file.name,
      file_url:upj.url,
      file_size_bytes:file.size,
      file_type:(file.name.split('.').pop()||'').toLowerCase(),
      submitted_by:ME.id,
      submitted_at:new Date().toISOString(),
      status:'pending_review'
    },false);
    if(created===null){if(msg){msg.style.color='#f87171';msg.textContent='Could not save the version record.';}return;}
    // After upload the project moves to in_review → card leaves My Queue.
    await awPatch('artwork_projects?id=eq.'+projectId,{status:'in_review',updated_at:new Date().toISOString()});
    if(msg){msg.style.color='#22c55e';msg.textContent='✓ Uploaded v'+vnum+' — sent for review.';}
    setTimeout(function(){ loadQueue(); loadWaiting(); },700);
  }catch(e){ if(msg){msg.style.color='#f87171';msg.textContent='Error: '+(e&&e.message||e);} }
}

// ── SECTION B: Waiting for Assets (status='waiting_for_assets') — read-only ──
async function loadWaiting(){
  var tid=myTenantId();
  var path='artwork_projects?status=eq.waiting_for_assets&order=created_at.asc&select=*,skus(model_number,description)';
  if(tid)path+='&tenant_id=eq.'+tid;
  var rows=await supa(path);
  g('cnt-wait').textContent=rows.length;
  var el=g('waitList');
  if(!rows.length){el.innerHTML='<div class="empty">Nothing waiting on factory assets.</div>';return;}
  el.innerHTML=rows.map(function(p){
    var sku=p.skus||{};
    var pend=[];
    // assets_required (jsonb) lists what the factory still owes, if present.
    if(p.assets_required){ try{ var ar=Array.isArray(p.assets_required)?p.assets_required:JSON.parse(p.assets_required); if(Array.isArray(ar))pend=ar; }catch(e){} }
    var d=daysSince(p.created_at);
    return '<div class="wait-row">'+
      '<div style="min-width:0;"><div style="font-weight:600;">'+esc(p.product_name||sku.description||'Untitled')+'</div>'+
        '<div style="font-size:11px;color:var(--text2);font-family:monospace;">'+esc(sku.model_number||'')+'</div>'+
        (pend.length?'<div style="margin-top:4px;">'+chips(pend)+'</div>':'')+
      '</div>'+
      '<div class="days">'+(d!=null?('waiting '+d+' day'+(d===1?'':'s')):'')+'</div>'+
    '</div>';
  }).join('');
}

(async function init(){
  ME = await validateMe();
  if(!ME)return;
  g('dName').textContent=(ME.full_name||ME.email||'Designer');
  await Promise.all([loadQueue(), loadWaiting()]);
})();
</script>
</body>
</html>
