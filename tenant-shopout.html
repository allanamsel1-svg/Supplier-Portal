<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Out — TBG Sourcing</title>
<link rel="stylesheet" href="tenant-portal.css">
<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
<style>
  .obs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .obs-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
  .obs-card:hover { border-color: #2563eb; }
  .obs-thumb { width: 100%; height: 150px; object-fit: cover; background: var(--bg2); display: block; }
  .obs-thumb-ph { width: 100%; height: 150px; background: var(--bg2); display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 30px; }
  .obs-info { padding: 12px 14px; }
  .obs-brand { font-size: 13px; font-weight: 600; color: var(--text); }
  .obs-prod { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .obs-meta { font-size: 12px; color: var(--text2); margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .obs-detail { grid-column: 1 / -1; background: var(--bg2); border: 1px solid var(--sidebar-active); border-radius: 10px; padding: 18px; }
  .obs-photos { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .obs-photos img { width: 160px; height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .back-link { color: #3b82f6; cursor: pointer; font-size: 13px; display: inline-block; margin-bottom: 14px; }
  /* FIX: keep the observations panel light/readable regardless of theme */
  .obs-card, .obs-detail, .obs-li { background: #ffffff !important; color: #1a1a2e !important; box-sizing: border-box; overflow-wrap: break-word; }
  .obs-card *, .obs-detail *, .obs-li * { box-sizing: border-box; overflow-wrap: break-word; }
  .obs-info { background: #ffffff !important; }
  .obs-brand, .obs-li .si-title { color: #1a1a2e !important; }
  .obs-prod, .obs-meta, .obs-li .si-meta { color: #666666 !important; }
  .obs-thumb-ph { background: #f0f0e8 !important; color: #666666 !important; }
  .obs-detail .kv dt { color: #666666 !important; }
  .obs-detail .kv dd { color: #1a1a2e !important; }
  .obs-detail .back-link { color: #3b82f6 !important; }
</style>
</head>
<body>
<div id="sidebar"></div>

<div class="main">
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
    <div>
      <div class="page-title">Shop Out</div>
      <div class="page-sub" id="pageSub">Retail intelligence from store visits</div>
    </div>
    <button id="video-shopout-btn" onclick="openVideoShopoutModal()" style="background:#2244cc;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;">📹 Upload Video Shop Out</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-tab="runs">Runs <span class="tab-count" id="cnt-runs"></span></button>
    <button class="tab" data-tab="observations">Observations <span class="tab-count" id="cnt-observations"></span></button>
    <button class="tab" data-tab="pipeline">RFQ Pipeline <span class="tab-count" id="cnt-pipeline"></span></button>
  </div>

  <div class="tab-pane" id="pane-runs"><div id="box-runs"><div class="loading">Loading runs…</div></div></div>
  <div class="tab-pane" id="pane-observations">
    <div class="toolbar"><input class="search-input" id="obsSearch" placeholder="Search by brand or product…"></div>
    <div id="box-observations"><div class="loading">Loading observations…</div></div>
  </div>
  <div class="tab-pane" id="pane-pipeline"><div id="box-pipeline"><div class="loading">Loading pipeline…</div></div></div>
</div>

<script src="tenant-shared.js"></script>
<script>
let TID = null;
let runs = [], observations = [], photoMap = {};
let editingMeta = false;
const loaded = {};
function photoUrl(fp) { if (/^https?:\/\//.test(fp)) return fp; return SUPA_URL + '/storage/v1/object/public/shop-out-photos/' + fp; }
function brandLetter(b) { return ((b || '?').trim().charAt(0).toUpperCase()) || '?'; }

function route() {
  const h = location.hash || '#runs';
  if (h.startsWith('#detail/')) { activateTab('runs'); return showRunDetail(h.slice('#detail/'.length)); }
  const tab = h.slice(1) || 'runs';
  activateTab(['runs', 'observations', 'pipeline'].includes(tab) ? tab : 'runs');
}
function activateTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  if (tab === 'runs') renderRuns();
  if (tab === 'observations' && !loaded.observations) { loaded.observations = true; loadObservations(); }
  if (tab === 'pipeline' && !loaded.pipeline) { loaded.pipeline = true; loadPipeline(); }
}
function goTab(tab) { location.hash = tab === 'runs' ? '' : '#' + tab; }

const cnt = a => (Array.isArray(a) && a[0] && a[0].count) || 0;

// TAB 1 — Runs
async function loadRuns() {
  runs = await supa(`shop_outs?tenant_id=eq.${TID}&order=shop_date.desc&select=*,shop_out_sections(count),shop_out_observations(count)`);
  document.getElementById('cnt-runs').textContent = runs.length;
  renderRuns();
}
function renderRuns() {
  const box = document.getElementById('box-runs');
  if (!runs.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🛍️</span>No shop-out runs yet.</div>'; return; }
  box.innerHTML = `<table class="data-table"><thead><tr><th>Location</th><th>Visit date</th><th>Sections</th><th>Observations</th><th>Status</th></tr></thead><tbody>${
    runs.map(r => `<tr class="clickable" data-id="${esc(r.id)}">
      <td>${esc(r.store_location_text || 'Unnamed Shop Out')}</td><td>${fmtDate(r.shop_date)}</td>
      <td>${cnt(r.shop_out_sections)}</td><td>${r.total_observations != null ? r.total_observations : cnt(r.shop_out_observations)}</td>
      <td>${statusBadge(r.status || r.processing_status)}</td></tr>`).join('')
  }</tbody></table>`;
  box.querySelectorAll('tr.clickable').forEach(tr => tr.addEventListener('click', () => { location.hash = 'detail/' + tr.dataset.id; }));
}

async function showRunDetail(id) {
  const box = document.getElementById('box-runs');
  const r = runs.find(x => x.id === id);
  box.innerHTML = '<div class="loading">Loading run…</div>';
  const [sections, obs] = await Promise.all([
    supa(`shop_out_sections?shop_out_id=eq.${id}&tenant_id=eq.${TID}&order=sequence_number.asc`),
    supa(`shop_out_observations?shop_out_id=eq.${id}&tenant_id=eq.${TID}&order=created_at.desc`),
  ]);
  // Resolve front-photo paths for thumbnails in the observation list.
  const photoPathMap = {};
  const frontIds = [...new Set(obs.map(o => o.front_photo_id).filter(Boolean))];
  if (frontIds.length) {
    const photos = await supa(`shop_out_photos?id=in.(${frontIds.join(',')})&select=id,file_path`);
    photos.forEach(p => { photoPathMap[p.id] = p.file_path; });
  }
  const metaHeader = !r ? '' : (editingMeta
    ? `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
         <input id="meta-name-input" type="text" value="${esc(r.store_location_text || '')}" placeholder="Store name" style="font-size:15px;font-weight:600;padding:6px 9px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);min-width:220px;">
         <input id="meta-date-input" type="date" value="${esc(r.shop_date || '')}" style="font-size:13px;padding:6px 9px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);">
         <button class="btn btn-primary" style="padding:6px 14px;font-size:13px;" onclick="saveShopMeta('${esc(id)}')">Save</button>
         <button class="btn" style="padding:6px 14px;font-size:13px;" onclick="cancelShopMeta('${esc(id)}')">Cancel</button>
       </div>`
    : `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
         <span style="font-size:16px;font-weight:700;color:var(--text);">${esc((r.store_location_text && r.store_location_text.trim()) ? r.store_location_text : 'Unnamed Shop Out')}</span>
         <span style="cursor:pointer;font-size:14px;" title="Edit store name & date" onclick="editShopMeta('${esc(id)}')">✏️</span>
         <button title="Add a video to this shop out" style="background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;padding:3px 9px;color:var(--text);" onclick="openVideoShopoutAppend('${esc(id)}')">📹 Add Video</button>
         <span style="color:var(--text2);font-size:13px;">· ${fmtDate(r.shop_date)}</span>
       </div>`);
  const head = r ? (metaHeader + kv([
    ['Status', statusBadge(r.status || r.processing_status), true],
    ['Photos', r.total_photos], ['Observations', r.total_observations], ['Description', r.description],
  ])) : '';
  const secList = sections.length ? sections.map(s => `<div class="sub-item">
      <div class="si-title">${esc(s.department || s.category_detected || 'Section')}</div>
      <div class="si-meta">${[s.brand_summary && preview(s.brand_summary, 120), s.estimated_linear_feet && s.estimated_linear_feet + ' ft'].filter(Boolean).map(esc).join(' · ') || '—'}</div>
    </div>`).join('') : '<div class="empty" style="padding:12px;">No sections.</div>';
  const obsList = obs.length ? obs.map(o => {
      const fp = photoPathMap[o.front_photo_id];
      const thumb = fp
        ? `<img src="${esc(photoUrl(fp))}" loading="lazy" onerror="this.style.display='none'" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;">`
        : `<div style="width:60px;height:60px;border-radius:8px;background:#f0f0e8;display:flex;align-items:center;justify-content:center;color:#666666;font-size:22px;font-weight:700;flex-shrink:0;">${esc(brandLetter(o.brand))}</div>`;
      return `<div class="sub-item obs-li" style="display:flex;gap:10px;align-items:center;">${thumb}<div style="min-width:0;flex:1;">
        <div class="si-title">${esc(o.brand || '—')}${o.product_name ? ' — ' + esc(o.product_name) : ''}</div>
        <div class="si-meta">${[o.retail_price != null && money(o.retail_price), o.upc && 'UPC ' + o.upc].filter(v => v || v === 0).map(esc).join(' · ')}</div>
      </div></div>`;
    }).join('') : '<div class="empty" style="padding:12px;">No observations.</div>';
  box.innerHTML = `<span class="back-link" id="backToRuns">← All runs</span>
    <div class="panel-section"><h3>Run</h3>${head}</div>
    <div class="panel-section"><h3>Sections (${sections.length})</h3><div class="sub-list">${secList}</div></div>
    <div class="panel-section"><h3>Observations (${obs.length})</h3><div class="sub-list">${obsList}</div></div>`;
  document.getElementById('backToRuns').addEventListener('click', () => { location.hash = ''; });
}
function preview(t, n) { t = (t || '').replace(/\s+/g, ' ').trim(); return t.length > n ? t.slice(0, n) + '…' : t; }

// Edit store name + date on a run.
function editShopMeta(id) { editingMeta = true; showRunDetail(id); }
function cancelShopMeta(id) { editingMeta = false; showRunDetail(id); }
async function saveShopMeta(id) {
  const nameEl = document.getElementById('meta-name-input'), dateEl = document.getElementById('meta-date-input');
  if (!nameEl || !dateEl) return;
  const newName = nameEl.value.trim(), newDate = dateEl.value || null;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/shop_outs?id=eq.${id}&tenant_id=eq.${TID}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ store_location_text: newName || null, shop_date: newDate }),
    });
    if (!res.ok) { alert('Failed: ' + await res.text()); return; }
    const rr = runs.find(x => x.id === id);
    if (rr) { rr.store_location_text = newName || null; rr.shop_date = newDate; }
    editingMeta = false;
    showRunDetail(id);
    renderRuns();
    soToast('Shop out updated');
  } catch (e) { alert('Error: ' + e.message); }
}
function soToast(msg) {
  let t = document.getElementById('so-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'so-toast';
    t.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;box-shadow:0 8px 28px rgba(0,0,0,0.25);z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

// TAB 2 — Observations
async function loadObservations() {
  observations = await supa(`shop_out_observations?tenant_id=eq.${TID}&order=created_at.desc&select=*,shop_outs(store_location_text,shop_date)`);
  document.getElementById('cnt-observations').textContent = observations.length;
  // Batch-resolve front photo file paths.
  const ids = observations.map(o => o.front_photo_id).filter(Boolean);
  if (ids.length) {
    const photos = await supa(`shop_out_photos?id=in.(${ids.join(',')})&select=id,file_path`);
    photoMap = {};
    photos.forEach(p => { photoMap[p.id] = p.file_path; });
  }
  renderObservations();
}
function renderObservations() {
  const q = (document.getElementById('obsSearch').value || '').toLowerCase().trim();
  let rows = observations.slice();
  if (q) rows = rows.filter(o => [o.brand, o.product_name, o.sub_brand].some(v => (v || '').toLowerCase().includes(q)));
  const box = document.getElementById('box-observations');
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🔍</span>No observations found.</div>'; return; }
  box.innerHTML = '<div class="obs-grid">' + rows.map(o => {
    const fp = photoMap[o.front_photo_id];
    const thumb = fp ? `<img class="obs-thumb" src="${esc(photoUrl(fp))}" loading="lazy" onerror="this.style.display='none'">` : `<div class="obs-thumb-ph">${esc(brandLetter(o.brand))}</div>`;
    const store = o.shop_outs && o.shop_outs.store_location_text;
    return `<div class="obs-card" data-id="${esc(o.id)}">
      ${thumb}
      <div class="obs-info">
        <div class="obs-brand">${esc(o.brand || '—')}</div>
        <div class="obs-prod">${esc(o.product_name || '')}</div>
        <div class="obs-meta">${[o.retail_price != null && money(o.retail_price), store].filter(v => v || v === 0).map(esc).join(' · ')}</div>
      </div>
    </div>`;
  }).join('') + '</div>';
  box.querySelectorAll('.obs-card').forEach(c => c.addEventListener('click', () => toggleObs(c.dataset.id)));
}

async function toggleObs(id) {
  // Render an inline detail row right after the grid.
  const o = observations.find(x => x.id === id);
  if (!o) return;
  let detail = document.getElementById('obs-detail');
  if (detail && detail.dataset.id === id) { detail.remove(); return; }
  if (detail) detail.remove();

  const grid = document.querySelector('#box-observations .obs-grid');
  detail = document.createElement('div');
  detail.className = 'obs-detail'; detail.id = 'obs-detail'; detail.dataset.id = id;
  detail.innerHTML = '<div class="loading">Loading observation…</div>';
  grid.appendChild(detail);

  const photoIds = [o.front_photo_id, o.back_photo_id].concat(Array.isArray(o.supplemental_photo_ids) ? o.supplemental_photo_ids : []).filter(Boolean);
  let paths = [];
  if (photoIds.length) {
    const photos = await supa(`shop_out_photos?id=in.(${photoIds.join(',')})&select=id,file_path,photo_type`);
    paths = photos.map(p => p.file_path).filter(Boolean);
  }
  const info = kv([
    ['Brand', o.brand], ['Sub-brand', o.sub_brand], ['Product', o.product_name],
    ['Retailer / store', o.shop_outs && o.shop_outs.store_location_text],
    ['Retail price', o.retail_price != null ? money(o.retail_price) : null],
    ['Compare-at', o.compare_at_price != null ? money(o.compare_at_price) : null],
    ['Unit price', o.unit_price != null ? money(o.unit_price) : null],
    ['Pack size', [o.pack_size, o.pack_size_unit].filter(Boolean).join(' ')],
    ['UPC', o.upc], ['Country of origin', o.country_of_origin],
    ['Department', o.department], ['Clearance', o.is_clearance ? 'Yes' : null],
    ['Review status', o.review_status],
    ['ML comment', o.ml_observation_comment || o.ml_observation],
  ]);
  const photoHtml = paths.length ? `<div class="obs-photos">${paths.map(p => `<img src="${esc(photoUrl(p))}" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>` : '';
  detail.innerHTML = `<span class="back-link" id="obsClose">✕ Close</span>${info}${photoHtml}`;
  document.getElementById('obsClose').addEventListener('click', () => detail.remove());
}

// TAB 3 — RFQ Pipeline
async function loadPipeline() {
  const box = document.getElementById('box-pipeline');
  const rows = await supa(`shop_out_rfq_pipeline?tenant_id=eq.${TID}&order=created_at.desc&select=*,shop_outs(store_location_text)`);
  document.getElementById('cnt-pipeline').textContent = rows.length;
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">📈</span>No items in the RFQ pipeline.</div>'; return; }
  box.innerHTML = `<table class="data-table"><thead><tr><th>Stage</th><th>Brand</th><th>Product</th><th>Retailer</th><th>Retail</th><th>Target wholesale</th></tr></thead><tbody>${
    rows.map(p => `<tr><td>${statusBadge(p.status)}</td><td>${esc(p.spotted_brand || '—')}</td>
      <td>${esc(p.spotted_product || '—')}</td><td>${esc(p.shop_outs && p.shop_outs.store_location_text || '—')}</td>
      <td>${money(p.spotted_retail_price)}</td><td>${money(p.target_wholesale)}</td></tr>`).join('')
  }</tbody></table>`;
}

(async function init() {
  const user = await tenantAuth();
  if (!user || !user.tenant) return;
  TID = user.tenant.id;
  renderSidebar(user);
  document.getElementById('pageSub').textContent = user.tenant.name + ' · shop-out intelligence';
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => goTab(t.dataset.tab)));
  document.getElementById('obsSearch').addEventListener('input', renderObservations);
  window.addEventListener('hashchange', route);
  await loadRuns();
  route();
})();
</script>

<!-- 📹 Video Shop Out processor (browser-side frame extraction + AI analysis) -->
<div id="vso-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:14px;max-width:900px;width:100%;max-height:90vh;overflow:auto;padding:24px;box-shadow:0 12px 48px rgba(0,0,0,0.35);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <div id="vso-title" style="font-size:18px;font-weight:700;color:#1a1a2e;">Video Shop Out</div>
      <button onclick="vsoClose()" style="background:none;border:none;font-size:26px;cursor:pointer;color:#888;line-height:1;">×</button>
    </div>
    <div id="vso-setup">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div id="vso-field-store"><label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;">Store name *</label>
          <input id="vso-store" type="text" oninput="vsoTitle()" placeholder="e.g. Five Below — Brooklyn" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d8d8d0;border-radius:7px;font-size:13px;"></div>
        <div id="vso-field-date"><label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;">Visit date</label>
          <input id="vso-date" type="date" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d8d8d0;border-radius:7px;font-size:13px;"></div>
        <div><label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;">Video file</label>
          <input id="vso-file" type="file" accept="video/*" style="width:100%;font-size:13px;"></div>
        <div><label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;">Frames per second</label>
          <select id="vso-fps" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d8d8d0;border-radius:7px;font-size:13px;"><option value="0.5">0.5</option><option value="1" selected>1</option><option value="2">2</option></select></div>
      </div>
      <div style="margin-top:18px;text-align:right;">
        <button onclick="vsoClose()" style="background:#f0f0e8;color:#444;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px;">Cancel</button>
        <button onclick="vsoStart()" style="background:#2244cc;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;">Start Processing</button>
      </div>
    </div>
    <div id="vso-progress" style="display:none;">
      <div id="vso-status" style="font-size:14px;color:#333;margin-bottom:12px;">Extracting frames…</div>
      <div style="background:#eee;border-radius:8px;height:14px;overflow:hidden;"><div id="vso-bar" style="background:#2244cc;height:100%;width:0%;transition:width 0.2s;"></div></div>
    </div>
    <div id="vso-results" style="display:none;">
      <div id="vso-summary" style="font-size:13px;color:#444;margin-bottom:12px;"></div>
      <div style="overflow:auto;max-height:50vh;border:1px solid #eee;border-radius:8px;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="background:#f6f6f0;">
            <th style="padding:8px;text-align:left;">Product</th><th style="padding:8px;text-align:left;">Brand</th>
            <th style="padding:8px;text-align:left;">Category</th><th style="padding:8px;text-align:left;">Price</th>
            <th style="padding:8px;text-align:left;">Packaging</th><th style="padding:8px;text-align:left;">Qty on Shelf</th>
            <th style="padding:8px;text-align:left;">Notes</th>
          </tr></thead>
          <tbody id="vso-tbody"></tbody>
        </table>
      </div>
      <div id="vso-save-status" style="font-size:13px;min-height:18px;margin-top:10px;"></div>
      <div style="margin-top:14px;display:flex;justify-content:space-between;">
        <button onclick="vsoDownloadCsv()" style="background:#f0f0e8;color:#444;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;">⬇ Download CSV</button>
        <div>
          <button onclick="vsoClose()" style="background:#f0f0e8;color:#444;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px;">Close</button>
          <button id="vso-save-btn" onclick="vsoSave()" style="background:#1a8a3a;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;">Save to Portal</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  // Tenant portal config: tenant token, scope rows to this tenant (TID), refresh runs.
  var VSO = {
    token: function(){ return localStorage.getItem('tenant_token')||localStorage.getItem('admin_session')||''; },
    tenantId: function(){ return (typeof TID!=='undefined') ? TID : null; },
    refresh: function(){ if(typeof loadRuns==='function') loadRuns(); },
    refreshDetail: function(id){ if(typeof loadRuns==='function') loadRuns(); if(typeof showRunDetail==='function') showRunDetail(id); },
    fetchExisting: async function(id){
      try{ return await supa('shop_out_observations?shop_out_id=eq.'+id+'&tenant_id=eq.'+(typeof TID!=='undefined'?TID:'')+'&select=brand,product_name,retail_price'); }
      catch(e){ return []; }
    }
  };
  var frames=[], products=[], storeName='', visitDate='', objUrl=null, appendShopOutId=null;
  function gid(id){ return document.getElementById(id); }
  function setStatus(t){ gid('vso-status').textContent=t; }
  function setBar(pct){ gid('vso-bar').style.width=Math.max(0,Math.min(100,pct))+'%'; }
  function esc2(s){ return String(s==null?'':s).replace(/[<>&]/g,function(c){return'&#'+c.charCodeAt(0)+';';}); }
  function priceKey(v){ var n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?'':String(n); }
  function dedupKey(brand,product,price){ return (brand||'').toLowerCase().trim()+'|'+(product||'').toLowerCase().trim()+'|'+priceKey(price); }

  function resetModal(){
    gid('vso-setup').style.display=''; gid('vso-progress').style.display='none'; gid('vso-results').style.display='none';
    gid('vso-file').value=''; gid('vso-fps').value='1'; gid('vso-save-status').textContent='';
  }
  window.openVideoShopoutModal=function(){
    appendShopOutId=null;
    resetModal();
    gid('vso-field-store').style.display=''; gid('vso-field-date').style.display='';
    gid('vso-store').value='';
    var d=new Date(); gid('vso-date').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    vsoTitle(); gid('vso-modal').style.display='flex';
  };
  // Append mode: add a video to an existing shop-out (no new record; skip name/date fields).
  window.openVideoShopoutAppend=function(id){
    appendShopOutId=id;
    resetModal();
    gid('vso-field-store').style.display='none'; gid('vso-field-date').style.display='none';
    gid('vso-title').textContent='Add Video to Shop Out';
    gid('vso-modal').style.display='flex';
  };
  window.vsoClose=function(){ gid('vso-modal').style.display='none'; if(objUrl){URL.revokeObjectURL(objUrl);objUrl=null;} };
  window.vsoTitle=function(){ if(appendShopOutId)return; var s=(gid('vso-store').value||'').trim(); gid('vso-title').textContent='Video Shop Out'+(s?' — '+s:''); };

  window.vsoStart=async function(){
    if(!appendShopOutId){
      storeName=(gid('vso-store').value||'').trim();
      if(!storeName){ alert('Store name is required.'); return; }
      visitDate=gid('vso-date').value||new Date().toISOString().split('T')[0];
    }
    var file=gid('vso-file').files[0];
    if(!file){ alert('Please choose a video file.'); return; }
    var fps=parseFloat(gid('vso-fps').value)||1;
    gid('vso-setup').style.display='none'; gid('vso-progress').style.display=''; setBar(0); setStatus('Extracting frames…');
    try { frames=await extractFrames(file,fps); }
    catch(e){ setStatus('❌ '+(e.message||'Could not read video.')); return; }
    if(!frames.length){ setStatus('❌ No frames extracted.'); return; }
    var batches=[]; for(var i=0;i<frames.length;i+=5) batches.push(frames.slice(i,i+5));
    var all=[];
    for(var b=0;b<batches.length;b++){
      setStatus('Analyzing with AI… (batch '+(b+1)+' of '+batches.length+')'); setBar(Math.round((b/batches.length)*100));
      try{
        var r=await fetch('/api/analyze-shopout-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({frames:batches[b],store_name:storeName,batch_index:b,total_batches:batches.length})});
        var d=await r.json(); if(d&&Array.isArray(d.products)) all=all.concat(d.products);
      }catch(e){}
    }
    setBar(100); products=dedup(all); renderResults();
  };

  function extractFrames(file,fps){
    return new Promise(function(resolve,reject){
      var video=document.createElement('video'); video.preload='auto'; video.muted=true; video.playsInline=true;
      objUrl=URL.createObjectURL(file); video.src=objUrl;
      var canvas=document.createElement('canvas'); var ctx=canvas.getContext('2d');
      var out=[]; var idx=0; var total=0; var MAXF=300;
      video.onloadedmetadata=function(){
        var dur=video.duration||0; total=Math.min(MAXF,Math.max(1,Math.floor(dur*fps)));
        canvas.width=video.videoWidth||1280; canvas.height=video.videoHeight||720; seek();
      };
      function seek(){ if(idx>=total){ resolve(out); return; } var t=idx/fps; video.currentTime=Math.min(t,(video.duration||t)-0.05); }
      video.onseeked=function(){
        try{ ctx.drawImage(video,0,0,canvas.width,canvas.height); out.push(canvas.toDataURL('image/jpeg',0.7).split(',')[1]); }catch(e){}
        idx++; setStatus('Extracted '+idx+' of '+total+' frames'); setBar(Math.round((idx/total)*100)); seek();
      };
      video.onerror=function(){ reject(new Error('Could not load video')); };
    });
  }

  function dedup(list){
    var seen={}; var out=[];
    list.forEach(function(p){ var k=((p.brand||'')+'_'+(p.product_name||'')+'_'+(p.price||'')).toLowerCase(); if(!seen[k]){ seen[k]=1; out.push(p); } });
    return out;
  }

  function renderResults(){
    gid('vso-progress').style.display='none'; gid('vso-results').style.display='';
    var byCat={}; products.forEach(function(p){var c=p.category||'Uncategorized'; byCat[c]=(byCat[c]||0)+1;});
    var breakdown=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];}).map(function(c){return c+': '+byCat[c];}).join(' · ');
    gid('vso-summary').innerHTML='<b>'+products.length+'</b> products'+(breakdown?' · '+esc2(breakdown):'');
    gid('vso-save-btn').textContent='Save '+products.length+' Products to Portal';
    var fields=['product_name','brand','category','price','packaging','quantity_on_shelf','notes'];
    var tb=gid('vso-tbody'); tb.innerHTML='';
    products.forEach(function(p,i){
      var tr=document.createElement('tr'); tr.style.borderTop='1px solid #eee';
      fields.forEach(function(f){
        var td=document.createElement('td'); td.contentEditable='true'; td.style.padding='6px 8px'; td.style.outline='none';
        td.textContent=p[f]==null?'':p[f];
        td.addEventListener('input',function(){ products[i][f]=td.textContent; });
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });
  }

  window.vsoDownloadCsv=function(){
    var headers=['product_name','brand','category','price','price_confidence','packaging','size','upc','quantity_on_shelf','notes'];
    var rows=[headers.join(',')].concat(products.map(function(p){return headers.map(function(h){var v=p[h]==null?'':p[h]; v=String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(',');}));
    var blob=new Blob([rows.join('\n')],{type:'text/csv'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='shopout_'+storeName.replace(/[^a-z0-9]+/gi,'_')+'.csv'; a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  };

  // Convert raw base64 → Blob for the R2 upload body.
  function b64ToBlob(b64,type){ var bin=atob(b64),len=bin.length,arr=new Uint8Array(len); for(var i=0;i<len;i++)arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:type||'image/jpeg'}); }
  // Downscale a full-res frame (base64) to a ≤400x300 JPEG thumbnail, return base64.
  function makeThumb(srcB64){
    return new Promise(function(resolve){
      var img=new Image();
      img.onload=function(){
        var w=img.width||400,h=img.height||300,scale=Math.min(400/w,300/h,1);
        var cw=Math.max(1,Math.round(w*scale)),ch=Math.max(1,Math.round(h*scale));
        var c=document.createElement('canvas'); c.width=cw; c.height=ch;
        c.getContext('2d').drawImage(img,0,0,cw,ch);
        try{ resolve(c.toDataURL('image/jpeg',0.6).split(',')[1]); }catch(e){ resolve(null); }
      };
      img.onerror=function(){ resolve(null); };
      img.src='data:image/jpeg;base64,'+srcB64;
    });
  }
  async function uploadThumb(shopOutId,key,b64){
    var url='/api/r2-upload?folder=shop-out-thumbs&filename='+encodeURIComponent('shopout_'+shopOutId+'_'+key+'.jpg')+'&contentType='+encodeURIComponent('image/jpeg');
    var r=await fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+VSO.token(),'Content-Type':'image/jpeg'},body:b64ToBlob(b64,'image/jpeg')});
    var d=await r.json().catch(function(){return null;});
    return (d&&d.success&&(d.url||d.file_url))?(d.url||d.file_url):null;
  }
  // Capture a representative frame per product, upload to R2, attach thumbnail_url.
  // A per-save token keeps filenames unique so repeated appends never overwrite each other in R2.
  async function attachThumbnails(shopOutId,list){
    var saveToken=Date.now().toString(36);
    for(var i=0;i<list.length;i++){
      gid('vso-save-status').textContent='Saving thumbnails '+(i+1)+' of '+list.length+'…';
      var fr=parseInt(list[i].frame,10);
      var idx=(!isNaN(fr)&&fr>=1)?(fr-1):Math.floor(frames.length/2);
      if(idx<0)idx=0; if(idx>frames.length-1)idx=frames.length-1;
      var srcB64=frames[idx]; if(!srcB64)continue;
      try{ var thumb=await makeThumb(srcB64); if(thumb){ var u=await uploadThumb(shopOutId,saveToken+'_'+i,thumb); if(u)list[i].thumbnail_url=u; } }catch(e){}
    }
  }
  async function finalizeProducts(shopOutId,list){
    var r=await fetch('/api/shopout-upload',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+VSO.token()},body:JSON.stringify({phase:'finalize',shop_out_id:shopOutId,products:list})});
    return r.json();
  }

  window.vsoSave=async function(){
    var st=gid('vso-save-status'); var btn=gid('vso-save-btn'); btn.disabled=true;
    var token=VSO.token(); var tid=VSO.tenantId();
    try{
      // ── APPEND MODE: add this video's products to an existing shop-out ──
      if(appendShopOutId){
        var shopId=appendShopOutId;
        st.style.color='#666'; st.textContent='Checking for duplicates…';
        var existing=await VSO.fetchExisting(shopId);
        var seen={}; (existing||[]).forEach(function(o){ seen[dedupKey(o.brand,o.product_name,o.retail_price)]=1; });
        var newProducts=[]; var dupCount=0;
        products.forEach(function(p){ if(seen[dedupKey(p.brand,p.product_name,p.price)])dupCount++; else newProducts.push(p); });
        if(newProducts.length===0){
          st.style.color='#1a8a3a'; st.textContent='✅ Added 0 new products ('+dupCount+' duplicates skipped).';
          if(typeof soToast==='function')soToast('Added 0 new products ('+dupCount+' duplicates skipped)');
          try{VSO.refreshDetail(shopId);}catch(e){}
          return;
        }
        await attachThumbnails(shopId,newProducts);
        st.style.color='#666'; st.textContent='Saving '+newProducts.length+' products…';
        var afd=await finalizeProducts(shopId,newProducts);
        if(afd&&afd.success){
          var amsg='Added '+afd.count+' new products ('+dupCount+' duplicates skipped)';
          st.style.color='#1a8a3a'; st.textContent='✅ '+amsg+'.';
          if(typeof soToast==='function')soToast(amsg);
          try{VSO.refreshDetail(shopId);}catch(e){}
        } else { st.style.color='#cc2222'; st.textContent=(afd&&afd.error)||'Save failed.'; btn.disabled=false; }
        return;
      }

      // ── NEW SHOP-OUT: create record, thumbnails, observations ──
      st.style.color='#666'; st.textContent='Creating shop out…';
      var meta={store:storeName,total_products:products.length};
      var createBody={phase:'create',store_name:storeName,visit_date:visitDate,metadata:meta};
      if(tid)createBody.tenant_id=tid;
      var cr=await fetch('/api/shopout-upload',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(createBody)});
      var cd=await cr.json();
      if(!cr.ok||!cd||!cd.success){ st.style.color='#cc2222'; st.textContent=(cd&&cd.error)||'Create failed.'; btn.disabled=false; return; }
      var newId=cd.shop_out_id;
      await attachThumbnails(newId,products);
      st.style.color='#666'; st.textContent='Saving '+products.length+' products…';
      var fd=await finalizeProducts(newId,products);
      if(fd&&fd.success){ st.style.color='#1a8a3a'; st.textContent='✅ Saved '+fd.count+' products from '+storeName+' to portal.'; try{VSO.refresh();}catch(e){} }
      else { st.style.color='#cc2222'; st.textContent=(fd&&fd.error)||'Save failed.'; btn.disabled=false; }
    }catch(e){ st.style.color='#cc2222'; st.textContent=e.message; btn.disabled=false; }
  };
})();
</script>
</body>
</html>
