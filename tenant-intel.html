<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Hub — TBG Sourcing</title>
<link rel="stylesheet" href="tenant-portal.css">
<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
<style>
  .acc-list { display: flex; flex-direction: column; gap: 10px; max-width: 900px; }
  .acc { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .acc-head { padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
  .acc-head:hover { background: var(--card-hover); }
  .acc-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .acc-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .acc-right { font-size: 12px; color: var(--text2); white-space: nowrap; flex-shrink: 0; text-align: right; }
  .acc-body { padding: 0 16px 16px; font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; border-top: 1px solid var(--border); display: none; }
  .acc.open .acc-body { display: block; padding-top: 14px; }
  .news-item { display: block; padding: 13px 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); text-decoration: none; }
  .news-item:hover { border-color: #2563eb; background: var(--card-hover); }
  .news-head { font-size: 14px; color: var(--text); font-weight: 600; }
  .news-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
</style>
</head>
<body>
<div id="sidebar"></div>

<div class="main">
  <div class="page-header">
    <div class="page-title">Intelligence Hub</div>
    <div class="page-sub" id="pageSub">Retailer, brand, trade & news intelligence</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-tab="retailer">Retailer Intel <span class="tab-count" id="cnt-retailer"></span></button>
    <button class="tab" data-tab="brandwatch">Brand Watch <span class="tab-count" id="cnt-brandwatch"></span></button>
    <button class="tab" data-tab="trade">Trade Intel <span class="tab-count" id="cnt-trade"></span></button>
    <button class="tab" data-tab="crosssource">Cross Source <span class="tab-count" id="cnt-crosssource"></span></button>
    <button class="tab" data-tab="news">News <span class="tab-count" id="cnt-news"></span></button>
    <button class="tab" data-tab="shopout">Shop Out Obs. <span class="tab-count" id="cnt-shopout"></span></button>
    <button class="tab" data-tab="pricetrends">Price Trends <span class="tab-count" id="cnt-pricetrends"></span></button>
    <button class="tab" data-tab="daily">Daily Intel <span class="tab-count" id="cnt-daily"></span></button>
    <button class="tab" data-tab="importgenius">Import Genius</button>
  </div>

  <div class="tab-pane" id="pane-retailer"><div id="box-retailer"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-brandwatch"><div id="box-brandwatch"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-trade"><div id="box-trade"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-crosssource"><div id="box-crosssource"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-news"><div id="box-news"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-shopout"><div id="box-shopout"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-pricetrends"><div id="box-pricetrends"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-daily">
    <div id="box-daily"><div class="loading">Loading…</div></div>
    <div class="section-h" style="font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:#3b82f6;font-weight:700;margin:28px 0 12px;max-width:900px;">Recent News — last 7 days</div>
    <div id="box-daily-news"><div class="loading">Loading…</div></div>
  </div>
  <div class="tab-pane" id="pane-importgenius"></div>
</div>

<script src="tenant-shared.js"></script>
<script>
const TABS = ['retailer', 'brandwatch', 'trade', 'crosssource', 'news', 'shopout', 'pricetrends', 'daily', 'importgenius'];
let TID = null;
const loaded = {};

function showTab(tab) {
  if (!TABS.includes(tab)) tab = 'retailer';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  if (!loaded[tab]) { loaded[tab] = true; LOADERS[tab](); }
}
function goTab(tab) { location.hash = tab === 'retailer' ? '' : '#' + tab; }

function wireAccordion(box, onOpen) {
  box.querySelectorAll('.acc').forEach(el => {
    el.querySelector('.acc-head').addEventListener('click', () => {
      const opening = !el.classList.contains('open');
      el.classList.toggle('open');
      if (opening && onOpen) onOpen(el);
    });
  });
}
function preview(text, n) { text = (text || '').replace(/\s+/g, ' ').trim(); return text.length > n ? text.slice(0, n) + '…' : text; }

// TAB 1 — Retailer Intel
async function loadRetailer() {
  const box = document.getElementById('box-retailer');
  const rows = await supa(`retailer_intel_summaries?tenant_id=eq.${TID}&order=summary_date.desc&select=*,retailers(name)`);
  document.getElementById('cnt-retailer').textContent = rows.length;
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🏬</span>No retailer intel summaries yet.</div>'; return; }
  box.innerHTML = '<div class="acc-list">' + rows.map(r => `<div class="acc">
    <div class="acc-head"><div><div class="acc-title">${esc(r.retailers && r.retailers.name || 'Retailer')}</div>
      <div class="acc-meta">${esc(preview(r.summary_text, 120) || 'No summary')}</div></div>
      <div class="acc-right">${fmtDate(r.summary_date)}</div></div>
    <div class="acc-body">${esc(r.summary_text || 'No summary text.')}</div></div>`).join('') + '</div>';
  wireAccordion(box);
}

// TAB 2 — Brand Watch
async function loadBrandwatch() {
  const box = document.getElementById('box-brandwatch');
  const runs = await supa(`brand_watch_runs?tenant_id=eq.${TID}&order=started_at.desc&select=*,brand_watch_brands(name)`);
  document.getElementById('cnt-brandwatch').textContent = runs.length;
  if (!runs.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">👁️</span>No brand watch runs yet.</div>'; return; }
  box.innerHTML = '<div class="acc-list">' + runs.map(r => `<div class="acc" data-run="${esc(r.id)}">
    <div class="acc-head"><div><div class="acc-title">${esc(r.brand_watch_brands && r.brand_watch_brands.name || 'Brand')}</div>
      <div class="acc-meta">${r.products_discovered != null ? r.products_discovered + ' products' : '—'} · ${statusBadge(r.status)}</div></div>
      <div class="acc-right">${fmtDate(r.started_at)}</div></div>
    <div class="acc-body"><div class="loading" style="padding:10px;">Loading products…</div></div></div>`).join('') + '</div>';
  wireAccordion(box, async (el) => {
    const body = el.querySelector('.acc-body');
    if (body.dataset.done) return;
    body.dataset.done = '1';
    const prods = await supa(`brand_watch_products?run_id=eq.${el.dataset.run}&order=product_title.asc&select=product_title,vendor,product_type,price_current_cents,currency,in_stock,product_url`);
    body.innerHTML = prods.length ? '<div class="sub-list">' + prods.map(p => `<div class="sub-item">
      <div class="si-title">${esc(p.product_title || 'Product')}</div>
      <div class="si-meta">${[p.vendor, p.product_type, p.price_current_cents != null && money(p.price_current_cents / 100), p.in_stock ? 'in stock' : 'out of stock'].filter(v => v || v === 0).map(esc).join(' · ')}${p.product_url ? ' · <a href="' + esc(p.product_url) + '" target="_blank" style="color:#60a5fa;">view</a>' : ''}</div>
    </div>`).join('') + '</div>' : '<div class="empty" style="padding:10px;">No products captured in this run.</div>';
  });
}

// TAB 3 — Trade Intel (search log; results are not persisted on this table)
async function loadTrade() {
  const box = document.getElementById('box-trade');
  const rows = await supa(`trade_intelligence_searches?tenant_id=eq.${TID}&order=searched_at.desc`);
  document.getElementById('cnt-trade').textContent = rows.length;
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🌐</span>No trade intelligence searches yet.</div>'; return; }
  box.innerHTML = '<div class="acc-list">' + rows.map(r => {
    const q = r.keyword || r.hts_code || r.ruling_number || 'Search';
    return `<div class="acc"><div class="acc-head"><div>
      <div class="acc-title">${esc(q)}</div>
      <div class="acc-meta">${[r.hts_code && 'HTS ' + r.hts_code, r.ruling_number && 'Ruling ' + r.ruling_number].filter(Boolean).map(esc).join(' · ') || 'Keyword search'}</div></div>
      <div class="acc-right">${fmtDate(r.searched_at)}</div></div>
    <div class="acc-body">${kv([['Keyword', r.keyword], ['HTS code', r.hts_code], ['Ruling #', r.ruling_number], ['Searched', fmtDate(r.searched_at)]])}</div></div>`;
  }).join('') + '</div>';
  wireAccordion(box);
}

// TAB 4 — Cross Source
async function loadCrosssource() {
  const box = document.getElementById('box-crosssource');
  const rows = await supa(`cross_source_summaries?tenant_id=eq.${TID}&order=summary_date.desc`);
  document.getElementById('cnt-crosssource').textContent = rows.length;
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🔗</span>No cross-source summaries yet.</div>'; return; }
  box.innerHTML = '<div class="acc-list">' + rows.map(r => {
    let counts = '';
    try { const mc = typeof r.module_counts === 'string' ? JSON.parse(r.module_counts) : r.module_counts; if (mc) counts = Object.entries(mc).map(([k, v]) => k + ': ' + v).join(' · '); } catch (e) {}
    return `<div class="acc"><div class="acc-head"><div>
      <div class="acc-title">Daily cross-source brief</div>
      <div class="acc-meta">${esc(counts || preview(r.summary_text, 110))}</div></div>
      <div class="acc-right">${fmtDate(r.summary_date)}</div></div>
    <div class="acc-body">${esc(r.summary_text || 'No summary text.')}</div></div>`;
  }).join('') + '</div>';
  wireAccordion(box);
}

// TAB 5 — News
async function loadNews() {
  const box = document.getElementById('box-news');
  const rows = await supa(`retailer_news?tenant_id=eq.${TID}&order=ingested_at.desc&limit=100&select=id,ingested_at,news_articles(headline,source_name,external_url,published_at,snippet),retailers(name)`);
  document.getElementById('cnt-news').textContent = rows.length;
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">📰</span>No news yet.</div>'; return; }
  box.innerHTML = '<div class="acc-list">' + rows.map(r => {
    const a = r.news_articles || {};
    const url = a.external_url || '#';
    return `<a class="news-item" href="${esc(url)}" target="_blank" rel="noopener">
      <div class="news-head">${esc(a.headline || '(Untitled)')}</div>
      <div class="news-meta">${[a.source_name, r.retailers && r.retailers.name, fmtDate(a.published_at || r.ingested_at)].filter(Boolean).map(esc).join(' · ')} ↗</div>
    </a>`;
  }).join('') + '</div>';
}

// TAB 6 — Shop Out Observations (summary; full detail on tenant-shopout.html)
async function loadShopout() {
  const box = document.getElementById('box-shopout');
  const obs = await supa(`shop_out_observations?tenant_id=eq.${TID}&order=created_at.desc&limit=25&select=brand,product_name,retail_price,created_at,shop_outs(store_location_text)`);
  document.getElementById('cnt-shopout').textContent = obs.length;
  const head = '<div style="margin-bottom:14px;"><a href="tenant-shopout.html" style="color:#3b82f6;font-size:13px;">Open full Shop Out workspace →</a></div>';
  if (!obs.length) { box.innerHTML = head + '<div class="empty"><span class="empty-icon">🛍️</span>No shop-out observations yet.</div>'; return; }
  box.innerHTML = head + '<div class="acc-list">' + obs.map(o => `<div class="acc"><div class="acc-head"><div>
      <div class="acc-title">${esc(o.brand || '—')}${o.product_name ? ' — ' + esc(o.product_name) : ''}</div>
      <div class="acc-meta">${[o.retail_price != null && money(o.retail_price), o.shop_outs && o.shop_outs.store_location_text].filter(v => v || v === 0).map(esc).join(' · ')}</div></div>
      <div class="acc-right">${fmtDate(o.created_at)}</div></div></div>`).join('') + '</div>';
}

// TAB 7 — Price Trends (shop_out_price_history; no tenant_id → scope via shop_outs)
async function loadPricetrends() {
  const box = document.getElementById('box-pricetrends');
  const rows = await supa(`shop_out_price_history?select=brand,product_name,retailer,previous_price,retail_price,unit_price,price_change_pct,price_change_direction,shop_date,created_at,shop_outs!inner(tenant_id)&shop_outs.tenant_id=eq.${TID}&order=created_at.desc&limit=100`);
  document.getElementById('cnt-pricetrends').textContent = rows.length;
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">📉</span>No price changes recorded.</div>'; return; }
  box.innerHTML = `<table class="data-table"><thead><tr><th>Product</th><th>Retailer</th><th>Was</th><th>Now</th><th>Change</th><th>Date</th></tr></thead><tbody>${
    rows.map(r => {
      const pctv = r.price_change_pct != null ? (r.price_change_pct > 0 ? '+' : '') + Number(r.price_change_pct).toFixed(0) + '%' : '—';
      const color = (r.price_change_direction || '').toLowerCase() === 'up' ? '#f87171' : '#4ade80';
      return `<tr><td>${esc(r.product_name || r.brand || '—')}</td><td>${esc(r.retailer || '—')}</td>
        <td>${money(r.previous_price)}</td><td>${money(r.retail_price != null ? r.retail_price : r.unit_price)}</td>
        <td style="color:${color};font-weight:600;">${esc(pctv)}</td><td>${fmtDate(r.shop_date || r.created_at)}</td></tr>`;
    }).join('')
  }</tbody></table>`;
}

// TAB 8 — Daily Intel (news_daily_summaries + recent news)
async function loadDaily() {
  const box = document.getElementById('box-daily');
  const rows = await supa(`news_daily_summaries?tenant_id=eq.${TID}&order=summary_date.desc&limit=30`);
  document.getElementById('cnt-daily').textContent = rows.length;
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">🗞️</span>No daily summaries yet.</div>'; }
  else {
    box.innerHTML = '<div class="acc-list">' + rows.map(r => `<div class="acc"><div class="acc-head"><div>
      <div class="acc-title">${fmtDate(r.summary_date)}</div>
      <div class="acc-meta">${[r.article_count != null && r.article_count + ' headlines', r.signal_article_count != null && r.signal_article_count + ' signal'].filter(Boolean).map(esc).join(' · ') || preview(r.summary_text, 110)}</div></div>
      <div class="acc-right">${r.article_count != null ? r.article_count + ' 📰' : ''}</div></div>
      <div class="acc-body">${esc(r.summary_text || 'No summary text.')}</div></div>`).join('') + '</div>';
    wireAccordion(box);
  }
  // recent news (7 days)
  const nbox = document.getElementById('box-daily-news');
  const since = new Date(Date.now() - 7 * 864e5).toISOString();
  let news = await supa(`retailer_news?tenant_id=eq.${TID}&select=id,ingested_at,news_articles!inner(headline,source_name,external_url,published_at),retailers(name)&news_articles.published_at=gte.${since}&order=ingested_at.desc&limit=50`);
  if (!news.length) news = await supa(`retailer_news?tenant_id=eq.${TID}&select=id,ingested_at,news_articles(headline,source_name,external_url,published_at),retailers(name)&order=ingested_at.desc&limit=50`);
  nbox.innerHTML = news.length ? '<div class="acc-list">' + news.map(r => {
    const a = r.news_articles || {};
    return `<a class="news-item" href="${esc(a.external_url || '#')}" target="_blank" rel="noopener">
      <div class="news-head">${esc(a.headline || '(Untitled)')}</div>
      <div class="news-meta">${[a.source_name, r.retailers && r.retailers.name, fmtDate(a.published_at || r.ingested_at)].filter(Boolean).map(esc).join(' · ')} ↗</div></a>`;
  }).join('') + '</div>' : '<div class="empty">No recent news.</div>';
}

// TAB 9 — Import Genius (placeholder)
function loadImportgenius() {
  document.getElementById('pane-importgenius').innerHTML =
    '<div style="max-width:680px;opacity:0.55;">' +
    '<div class="toolbar"><input class="search-input" placeholder="Search import/export shipment records…" disabled>' +
    '<button class="tab" disabled style="border:1px solid var(--border);border-radius:8px;">Search</button></div>' +
    '<div class="empty"><span class="empty-icon">🚢</span>Import Genius Integration — Coming Soon</div></div>';
}

const LOADERS = { retailer: loadRetailer, brandwatch: loadBrandwatch, trade: loadTrade, crosssource: loadCrosssource, news: loadNews, shopout: loadShopout, pricetrends: loadPricetrends, daily: loadDaily, importgenius: loadImportgenius };

(async function init() {
  const user = await tenantAuth();
  if (!user || !user.tenant) return;
  TID = user.tenant.id;
  renderSidebar(user);
  document.getElementById('pageSub').textContent = user.tenant.name + ' · intelligence';
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => goTab(t.dataset.tab)));
  window.addEventListener('hashchange', () => showTab((location.hash || '#retailer').slice(1)));
  showTab((location.hash || '#retailer').slice(1));
})();
</script>
</body>
</html>
