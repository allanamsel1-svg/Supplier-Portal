<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
<style>
  /* shared intel bits (dark, variable-driven) */

  .mod:hover { border-color:#2563eb; } .mod .m-name { font-size:14px; font-weight:600; color:var(--text); } .mod .m-sub { font-size:12px; color:var(--text2); margin-top:3px; } .mod .m-val { font-size:22px; font-weight:700; color:#3b82f6; }

  .tier-sec { margin-bottom:24px; max-width:1100px; } .tier-head { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .tier-name { font-size:13px; font-weight:700; color:var(--text); } .tier-count { font-size:11px; color:var(--text2); } .tier-desc { font-size:11px; color:var(--text2); font-style:italic; margin-left:auto; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
  .dcard { background:var(--card-bg); border:1px solid var(--border); border-radius:9px; padding:14px; cursor:pointer; transition:border-color .15s; }
  .dcard:hover { border-color:#2563eb; } .dcard.sel { border-color:#3b82f6; background:var(--card-hover); }
  .dcard-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:6px; word-break:break-word; } .dcard-sub { font-size:10px; color:var(--text2); margin-bottom:8px; word-break:break-all; }
  .dcard-foot { display:flex; justify-content:space-between; align-items:center; } .dcard-meta { font-size:10px; color:var(--text2); }
  .pill { font-size:9px; font-weight:700; padding:2px 7px; border-radius:7px; letter-spacing:.04em; white-space:nowrap; }
  .pill.live { background:rgba(74,222,128,0.14); color:#4ade80; } .pill.awaiting { background:rgba(148,163,184,0.14); color:var(--text2); } .pill.failed { background:rgba(248,113,113,0.14); color:#f87171; }
  .tier-badge { display:inline-block; font-size:9px; padding:2px 8px; border-radius:7px; font-weight:700; }
  .tb1 { background:rgba(236,72,153,0.16); color:#f472b6; } .tb2 { background:rgba(96,165,250,0.16); color:#60a5fa; } .tb3 { background:rgba(74,222,128,0.16); color:#4ade80; } .tb4 { background:rgba(251,191,36,0.16); color:#fbbf24; }
  .split { display:flex; gap:16px; align-items:flex-start; }
  .split-left { flex:1; min-width:0; } .split-right { width:560px; max-width:48%; flex-shrink:0; background:var(--bg2); border:1px solid var(--border); border-radius:10px; min-height:200px; }
  .dstat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:12px; }
  .dstat { background:var(--card-bg); border:1px solid var(--border); border-radius:7px; padding:10px 12px; } .dstat-l { font-size:9px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--text2); } .dstat-v { font-size:15px; font-weight:700; color:var(--text); margin-top:3px; word-break:break-word; }
  .d-head { padding:18px; border-bottom:1px solid var(--border); } .d-name { font-size:20px; font-weight:700; color:var(--text); margin-bottom:6px; } .d-sub { font-size:12px; color:var(--text2); } .d-sub a { color:#60a5fa; text-decoration:none; }
  .d-actions { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap; }
  .btn { padding:8px 14px; font-size:12px; font-weight:600; border:none; border-radius:7px; cursor:pointer; }
  .btn-pri { background:#2563eb; color:rgb(255,255,255); } .btn-pri:disabled { background:#1e3a6e; cursor:not-allowed; } .btn-sec { background:var(--card-bg); border:1px solid var(--border); color:var(--text); }
  .prod { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; overflow:hidden; }
  .prod-head { display:flex; gap:10px; padding:10px 12px; cursor:pointer; align-items:center; } .prod-head:hover { background:var(--card-hover); }
  .prod-img { width:42px; height:42px; background:var(--bg2); border-radius:5px; flex-shrink:0; overflow:hidden; } .prod-img img { width:100%; height:100%; object-fit:cover; }
  .prod-title { font-size:12px; font-weight:600; color:var(--text); } .prod-meta { font-size:10px; color:var(--text2); } .prod-price { font-size:12px; font-weight:700; color:#60a5fa; white-space:nowrap; }
  .variants { padding:8px 12px; border-top:1px solid var(--border); display:none; } .prod.open .variants { display:block; }
  .vrow { display:grid; grid-template-columns:1fr auto auto; gap:8px; padding:6px 0; border-bottom:.5px solid var(--border); font-size:11px; align-items:center; color:var(--text); }
  .vstock { font-size:9px; padding:1px 5px; border-radius:5px; font-weight:700; } .vstock.in { background:rgba(74,222,128,0.14); color:#4ade80; } .vstock.out { background:rgba(248,113,113,0.14); color:#f87171; }
  .subtabs { display:flex; gap:4px; border-bottom:1px solid var(--border); padding:0 18px; } .subtab { padding:10px 14px; font-size:12px; font-weight:600; color:var(--text2); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; } .subtab.active { color:#3b82f6; border-bottom-color:#3b82f6; }
  .rtag { display:inline-block; font-size:10px; padding:2px 8px; border-radius:6px; background:rgba(148,163,184,0.14); color:var(--text2); border:1px solid var(--border); margin:2px 4px 2px 0; }
  .rtag.inv-rising { color:#f87171; } .rtag.inv-falling { color:#4ade80; } .rtag.margin-high { color:#fbbf24; } .rtag.private-label { color:#60a5fa; }
  .ne-streams { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; } .ne-stream { padding:7px 16px; font-size:13px; font-weight:600; background:var(--card-bg); color:var(--text2); border:1px solid var(--border); border-radius:20px; cursor:pointer; } .ne-stream.active { background:#1e3a6e; color:#93c5fd; border-color:#3b82f6; }
  .ne-art { border:1px solid var(--border); border-radius:10px; background:var(--card-bg); padding:14px 16px; margin-bottom:8px; } .ne-art.fluff { opacity:.55; }
  .ne-src { font-size:11px; color:var(--text2); } .ne-head { font-size:14px; font-weight:600; color:var(--text); margin:4px 0; } .ne-head a { color:var(--text); text-decoration:none; } .ne-head a:hover { color:#60a5fa; } .ne-hl { font-size:12px; color:var(--text2); line-height:1.5; }
  .netag { display:inline-block; font-size:10px; padding:2px 7px; border-radius:6px; margin:3px 4px 0 0; background:rgba(96,165,250,0.12); color:#93c5fd; border:1px solid var(--border); }
  /* shop out */
  .so-wrap { display:flex; gap:16px; align-items:flex-start; }
  .so-left { width:340px; flex-shrink:0; }
  .so-right { flex:1; min-width:0; background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:18px; min-height:300px; }
  .so-item { background:var(--card-bg); border:1px solid var(--border); border-radius:9px; padding:12px 14px; margin-bottom:8px; cursor:pointer; } .so-item:hover { border-color:#2563eb; } .so-item.sel { border-color:#3b82f6; background:var(--card-hover); }
  .so-item-name { font-size:13px; font-weight:600; color:var(--text); } .so-item-meta { font-size:11px; color:var(--text2); margin-top:3px; }
  .dropzone { border:2px dashed var(--border); border-radius:12px; padding:40px 20px; text-align:center; color:var(--text2); cursor:pointer; background:var(--card-bg); }
  .dropzone.over { border-color:#3b82f6; color:#93c5fd; }
  .obs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .obs-card { background:var(--card-bg); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .obs-thumb { width:100%; height:140px; object-fit:cover; background:var(--bg2); display:block; } .obs-thumb-ph { width:100%; height:140px; background:var(--bg2); display:flex; align-items:center; justify-content:center; color:var(--text2); font-size:28px; }
  .obs-info { padding:12px 14px; } .obs-brand { font-size:13px; font-weight:600; color:var(--text); } .obs-prod { font-size:12px; color:var(--text2); margin-top:2px; } .obs-meta { font-size:12px; color:var(--text2); margin-top:6px; }
  .ml-box { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; padding:6px 8px; margin-top:6px; font-family:inherit; }
  .match-badge { font-size:10px; padding:2px 7px; border-radius:5px; background:rgba(74,222,128,0.12); color:#4ade80; border:1px solid #166534; margin-left:6px; }
  .so-status { font-size:12px; color:var(--text2); margin-top:8px; }
  .back-link { color:#3b82f6; cursor:pointer; font-size:13px; display:inline-block; margin-bottom:12px; }
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:80; display:none; align-items:center; justify-content:center; } .lightbox.open { display:flex; }
  .lightbox img { max-width:90vw; max-height:88vh; border-radius:8px; } .lb-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); color:rgb(255,255,255); border:none; width:44px; height:44px; border-radius:50%; font-size:22px; cursor:pointer; } .lb-prev { left:20px; } .lb-next { right:20px; } .lb-close { position:absolute; top:18px; right:20px; background:rgba(255,255,255,0.12); color:rgb(255,255,255); border:none; width:40px; height:40px; border-radius:50%; font-size:20px; cursor:pointer; }
  .modal-ov { position:fixed; inset:0; background:rgba(2,6,16,0.6); z-index:75; display:none; align-items:center; justify-content:center; } .modal-ov.open { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:24px; width:420px; max-width:92vw; } .modal h3 { color:var(--text); font-size:16px; margin-bottom:16px; }
  .modal input, .modal select { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:7px; padding:9px 11px; color:var(--text); font-size:13px; margin-bottom:12px; }
  .cbp-card { background:var(--card-bg); border:1px solid var(--border); border-radius:10px; padding:16px; max-width:1000px; }
  .chip { display:inline-block; font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(148,163,184,0.12); color:var(--text2); border:1px solid var(--border); margin:2px 4px 2px 0; }
</style>

<body>
<div id="sidebar"></div>

<div class="main">
  <div class="page-header">
    <div class="page-title">Intelligence Hub</div>
    <div class="page-sub" id="pageSub">Cross-source sourcing &amp; retail intelligence</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-tab="crosssource">Cross Source Intel</button>
    <button class="tab" data-tab="shopout">Shop Outs <span class="tab-count" id="cnt-shopout"></span></button>
    <button class="tab" data-tab="factory">Factory Intel <span class="beta-tag">BETA</span></button>
    <button class="tab" data-tab="brandwatch">Brand Watch <span class="beta-tag">BETA</span></button>
    <button class="tab" data-tab="catalog">Online Catalog <span class="beta-tag">SOON</span></button>
    <button class="tab" data-tab="retailer">Retailer Intel <span class="beta-tag">BETA</span></button>
    <button class="tab" data-tab="social">Social Trends <span class="beta-tag">SOON</span></button>
    <button class="tab" data-tab="news">News &amp; Editorial</button>
    <button class="tab" data-tab="trade">Trade Intel <span class="beta-tag">BETA</span></button>
    <button class="tab" data-tab="fx">FX Watch</button>
  </div>

  <div class="tab-pane" id="pane-crosssource"><div id="box-crosssource"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-shopout"><div id="box-shopout"><div class="loading">Loading shop-outs…</div></div></div>
  <div class="tab-pane" id="pane-factory"><div id="box-factory"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-brandwatch"><div id="box-brandwatch"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-catalog"><div id="box-catalog"></div></div>
  <div class="tab-pane" id="pane-retailer"><div id="box-retailer"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-social"><div id="box-social"></div></div>
  <div class="tab-pane" id="pane-news"><div id="box-news"><div class="loading">Loading…</div></div></div>
  <div class="tab-pane" id="pane-trade"><div id="box-trade"></div></div>
  <div class="tab-pane" id="pane-fx"><div id="box-fx"><div class="loading">Loading…</div></div></div>
</div>

<div class="lightbox" id="lightbox"><button class="lb-close" id="lbClose">×</button><button class="lb-nav lb-prev" id="lbPrev">‹</button><img id="lbImg" src=""><button class="lb-nav lb-next" id="lbNext">›</button></div>
<div class="modal-ov" id="modalOv"><div class="modal" id="modalBox"></div></div>

<script src="tenant-shared.js"></script>
<script>
const TABS = ['crosssource', 'shopout', 'factory', 'brandwatch', 'catalog', 'retailer', 'social', 'news', 'trade', 'fx'];
var JS = JSON['stringify'];  // request-body serializer (display rendering never dumps JSON)
const UPLOAD_CONCURRENCY = 8, MAX_UPLOAD_ATTEMPTS = 4, CLASSIFY_CONCURRENCY = 4, PAIR_CONCURRENCY = 5;
let TID = null, TOKEN = null;
const loaded = {};
// shop-out-photos is a private bucket → use signed URLs (cached per file_path)
const _signCache = {};
function photoSrc(fp) { return _signCache[fp] || ''; }
async function signPhotos(paths) {
  const uniq = [...new Set((paths || []).filter(Boolean))].filter(fp => !_signCache[fp]);
  await Promise.all(uniq.map(async fp => {
    try {
      const r = await fetch(SUPA_URL + '/storage/v1/object/sign/shop-out-photos/' + fp, { method: 'POST', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' }, body: JS({ expiresIn: 3600, transform: { width: 400, height: 400, resize: 'contain', format: 'origin' } }) });
      const d = await r.json().catch(() => ({}));
      if (d && d.signedURL) _signCache[fp] = SUPA_URL + '/storage/v1' + d.signedURL;
    } catch (e) {}
  }));
  return _signCache;
}
function preview(t, n) { t = (t || '').replace(/\s+/g, ' ').trim(); return t.length > n ? t.slice(0, n) + '…' : t; }
function timeAgo(s) { if (!s) return ''; const d = (Date.now() - new Date(s).getTime()) / 1000; if (d < 3600) return Math.floor(d / 60) + 'm ago'; if (d < 86400) return Math.floor(d / 3600) + 'h ago'; return Math.floor(d / 86400) + 'd ago'; }
function sbPost(path, body, prefer) { return fetch(SUPA_URL + '/rest/v1/' + path, { method: 'POST', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', Prefer: prefer || 'return=minimal' }, body: JS(body) }); }
function sbPatch(path, body) { return fetch(SUPA_URL + '/rest/v1/' + path, { method: 'PATCH', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' }, body: JS(body) }); }

function showTab(tab) {
  if (!TABS.includes(tab)) tab = 'crosssource';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  if (!loaded[tab]) { loaded[tab] = true; (LOADERS[tab] || function(){})(); }
}
function goTab(tab) { location.hash = tab === 'crosssource' ? '' : '#' + tab; }
function wireAccordion(box) { box.querySelectorAll('.acc').forEach(el => el.querySelector('.acc-head').addEventListener('click', () => el.classList.toggle('open'))); }
function comingSoon(box, label, icon) { document.getElementById(box).innerHTML = `<div class="empty"><span class="empty-icon">${icon}</span><div style="font-size:16px;color:var(--text);margin-bottom:6px;">${esc(label)}</div>Coming Soon</div>`; }
async function countRows(path) { try { const r = await fetch(SUPA_URL + '/rest/v1/' + path, { method: 'HEAD', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, Prefer: 'count=exact', Range: '0-0' } }); const cr = r.headers.get('content-range') || ''; const t = cr.split('/')[1]; return t && t !== '*' ? parseInt(t, 10) : 0; } catch (e) { return 0; } }

// ── TAB 1: Cross Source Intel ──
async function loadCrosssource() {
  const box = document.getElementById('box-crosssource');
  const brief = (await supa(`cross_source_summaries?tenant_id=eq.${TID}&order=summary_date.desc&limit=1`))[0];
  const today = new Date().toISOString().slice(0, 10);
  const [obs, fac, brands, news, retl, fx] = await Promise.all([
    countRows('shop_out_observations?select=id'),
    countRows('factories?tenant_id=eq.' + TID + '&select=id'),
    countRows('brand_watch_brands?status=eq.active&select=id'),
    countRows('news_articles?is_fluff=eq.false&ingested_at=gte.' + today + '&select=id'),
    countRows('retailers?status=eq.active&select=id'),
    supa('fx_rates?pair=eq.USD%2FCNY&order=rate_date.desc&limit=1'),
  ]);
  const fxRate = fx[0] ? Number(fx[0].rate).toFixed(4) : '—';
  const mods = [
    { t: 'shopout', n: 'Shop Outs', s: 'observations captured', v: obs },
    { t: 'factory', n: 'Factory Intel', s: 'factories', v: fac },
    { t: 'brandwatch', n: 'Brand Watch', s: 'active brands', v: brands },
    { t: 'news', n: 'News & Editorial', s: 'signal articles today', v: news },
    { t: 'catalog', n: 'Online Catalog', s: 'coming soon', v: '—' },
    { t: 'retailer', n: 'Retailer Intel', s: 'active retailers', v: retl },
    { t: 'social', n: 'Social Trends', s: 'coming soon', v: '—' },
    { t: 'fx', n: 'FX Watch', s: 'USD/CNY', v: fxRate },
  ];
  box.innerHTML =
    `<div class="grad"><div class="g-label">Daily Briefing</div><div class="g-date">${brief ? fmtDate(brief.summary_date) : ''}</div><div class="g-text">${esc(brief ? (brief.summary_text || 'No summary text.') : 'No cross-source briefing yet.')}</div></div>
     <div class="ai-search"><div class="ai-row"><input class="ai-input" id="aiInput" placeholder="Ask anything about your sourcing, factories, products, intel..."><button class="ai-send" id="aiSend">➤</button></div><div class="ai-result" id="aiResult"></div></div>
     <div class="mods">${mods.map(m => `<div class="mod" data-go="${m.t}"><div><div class="m-name">${esc(m.n)}</div><div class="m-sub">${esc(m.s)}</div></div><div class="m-val">${esc(String(m.v))}</div></div>`).join('')}</div>`;
  box.querySelectorAll('.mod').forEach(el => el.addEventListener('click', () => goTab(el.dataset.go)));
  document.getElementById('aiSend').addEventListener('click', runSearch);
  document.getElementById('aiInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
}
async function runSearch() {
  const q = document.getElementById('aiInput').value.trim(); if (!q) return;
  const btn = document.getElementById('aiSend'), res = document.getElementById('aiResult');
  btn.disabled = true; res.classList.add('open'); res.textContent = 'Thinking…';
  try {
    const r = await fetch('/api/tenant-search', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN }, body: JS({ query: q, tenant_id: TID }) });
    const d = await r.json().catch(() => ({}));

async function uploadOneWithRetry(id, file, seq) {

  const path = id + '/' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '-' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_').replace(/\.heic$/i, '.jpg');
  for (let attempt = 1; attempt <= MAX_UPLOAD_ATTEMPTS; attempt++) {
    try {
      const r = await fetch(SUPA_URL + '/storage/v1/object/shop-out-photos/' + path, { method: 'POST', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': ct }, body });

async function triggerProcessing(id) {

  if (!photos.length) { status.textContent = 'No photos to process.'; return; }
  await sbPatch('shop_outs?id=eq.' + id, { processing_status: 'processing' }).catch(() => {});
  const s = shops.find(x => x.id === id); const rname = retailerName(s);

    status.textContent = 'Pass 0/3 — classifying photos…';
    await pool(photos, CLASSIFY_CONCURRENCY, p => fetch('/api/classify-shop-out-photo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JS({ photoId: p.id, photoPath: p.file_path, shopOutId: id }) }).catch(() => {}));
    // PASS 1 — sections

    // PASS 2 — pair products (front+back)

    const prods = photos.filter(p => p.photo_type !== 'section');
    const pairs = []; for (let k = 0; k < prods.length; k += 2) pairs.push([prods[k], prods[k + 1]]);
    await pool(pairs, PAIR_CONCURRENCY, async pr => { for (let a = 0; a < 3; a++) { const r = await fetch('/api/process-shop-out-pair', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JS({ shopOutId: id, frontPhotoId: pr[0] && pr[0].id, backPhotoId: pr[1] && pr[1].id, frontPath: pr[0] && pr[0].file_path, backPath: pr[1] && pr[1].file_path, retailerName: rname, retailerCountry: 'USA' }) }).catch(() => ({ status: 0 })); if (r && r.status !== 429) break; await new Promise(res => setTimeout(res, 1500 * (a + 1))); } });
    // PASS 3 + location

}

      <div class="ne-head">${x.url || x.link ? '<a href="' + esc(x.url || x.link) + '" target="_blank">' + esc(x.subject || x.title || 'Ruling') + ' ↗</a>' : esc(x.subject || x.title || 'Ruling')}</div>
      ${(x.categories || []).length ? '<div>' + (x.categories || []).map(c => '<span class="chip">' + esc(c) + '</span>').join('') + '</div>' : ''}
      ${(x.tariffs || x.hts || []).length ? '<div>' + (x.tariffs || x.hts || []).map(t => '<span class="chip">' + esc(t) + '</span>').join('') + '</div>' : ''}</div>`).join('') + '</div>';
  } catch (e) { res.innerHTML = '<div class="empty">Search error: ' + esc(e.message) + '</div>'; }
}

// ── TAB 10: FX Watch ──
async function loadFx() {
  const box = document.getElementById('box-fx');
  const rows = await supa('fx_rates?pair=eq.USD%2FCNY&order=rate_date.desc&limit=30');
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">💱</span>No FX data yet.</div>'; return; }
  const latest = rows[0], prior = rows[1];
  const delta = prior ? ((Number(latest.rate) - Number(prior.rate)) / Number(prior.rate)) * 100 : null;
  const absD = delta == null ? 0 : Math.abs(delta);
  const cls = absD >= 2 ? 'alert' : (absD >= 1 ? 'warn' : '');
  const arrow = delta == null ? '—' : (delta > 0 ? '▲' : (delta < 0 ? '▼' : '·'));
  const dtxt = delta == null ? 'no prior day' : ((delta > 0 ? '+' : '') + delta.toFixed(3) + '% d/d');
  const note = absD >= 2 ? '⚠ Drift exceeds 2% d/d — material impact on landed cost from CN factories.' : (absD >= 1 ? '⚠ Drift exceeds 1% d/d — worth monitoring.' : '');
  // chart
  const data = rows.slice().reverse(); const W = 720, H = 200, padL = 48, padR = 14, padT = 14, padB = 26;
  const rates = data.map(r => Number(r.rate)); let min = Math.min(...rates), max = Math.max(...rates); if (min === max) { min -= 0.01; max += 0.01; }
  const X = i => padL + (W - padL - padR) * i / (data.length - 1), Y = v => padT + (H - padT - padB) * (1 - (v - min) / (max - min));
  const pts = data.map((r, i) => X(i).toFixed(1) + ',' + Y(Number(r.rate)).toFixed(1)).join(' ');
  const grid = [max, (min + max) / 2, min].map(v => { const yy = Y(v).toFixed(1); return `<line x1="${padL}" x2="${W - padR}" y1="${yy}" y2="${yy}" stroke="#1e2d47" stroke-width="1"/><text x="${padL - 6}" y="${Number(yy) + 3.5}" text-anchor="end" font-size="10" fill="#6b7280">${v.toFixed(3)}</text>`; }).join('');
  const svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:200px;">${grid}<polyline fill="none" stroke="#60a5fa" stroke-width="2" points="${pts}"/><circle cx="${X(data.length - 1).toFixed(1)}" cy="${Y(rates[rates.length - 1]).toFixed(1)}" r="3.5" fill="#60a5fa"/></svg>`;
  const t14 = rows.slice(0, 14);
  const tbl = t14.map((r, i) => { const prev = t14[i + 1]; const d = prev ? ((Number(r.rate) - Number(prev.rate)) / Number(prev.rate)) * 100 : null; const col = d == null ? 'var(--text2)' : (d > 0 ? '#f87171' : (d < 0 ? '#4ade80' : 'var(--text2)')); const ar = d == null ? '—' : (d > 0 ? '▲' : (d < 0 ? '▼' : '·')); const tx = d == null ? '—' : ((d > 0 ? '+' : '') + d.toFixed(3) + '%'); return `<tr><td>${esc(fmtDate(r.rate_date))}</td><td style="text-align:right;">${Number(r.rate).toFixed(4)}</td><td style="text-align:right;color:${col};">${ar} ${esc(tx)}</td></tr>`; }).join('');
  box.innerHTML = `<div class="grad ${cls}"><div class="g-label">USD → CNY · Daily Reference Rate</div><div class="g-date">${esc(fmtDate(latest.rate_date))} · source: ${esc(latest.source || '—')}</div>
      <div style="display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;"><div style="font-size:44px;font-weight:700;line-height:1;">${Number(latest.rate).toFixed(4)}</div><div style="font-size:15px;font-weight:600;padding:5px 11px;background:rgba(255,255,255,0.14);border-radius:8px;">${arrow} ${esc(dtxt)}</div></div>${note ? '<div style="font-size:11.5px;opacity:.85;margin-top:14px;">' + esc(note) + '</div>' : ''}</div>
    <div class="panel-section"><h3>30-Day Trend</h3>${svg}</div>
    <div class="panel-section"><h3>Recent Rates (last 14 days)</h3><table class="data-table"><thead><tr><th>Date</th><th style="text-align:right;">Rate</th><th style="text-align:right;">Δ d/d</th></tr></thead><tbody>${tbl}</tbody></table></div>`;
}

// ── lightbox + modal ──
let lbImgs = [], lbIdx = 0;
function openLightbox(imgs, idx) { lbImgs = imgs; lbIdx = idx || 0; document.getElementById('lbImg').src = lbImgs[lbIdx]; document.getElementById('lightbox').classList.add('open'); }
function lbStep(n) { if (!lbImgs.length) return; lbIdx = (lbIdx + n + lbImgs.length) % lbImgs.length; document.getElementById('lbImg').src = lbImgs[lbIdx]; }
function openModal(html) { document.getElementById('modalBox').innerHTML = html; document.getElementById('modalOv').classList.add('open'); }
function closeModal() { document.getElementById('modalOv').classList.remove('open'); }

const LOADERS = { crosssource: loadCrosssource, shopout: loadShops, factory: loadFactory, brandwatch: loadBrandwatch, catalog: loadCatalog, retailer: loadRetailer, social: loadSocial, news: loadNews, trade: loadTrade, fx: loadFx };

(async function init() {
  const user = await tenantAuth();
  if (!user || !user.tenant) return;
  TID = user.tenant.id;
  TOKEN = localStorage.getItem('tenant_token');
  renderSidebar(user);
  document.getElementById('pageSub').textContent = user.tenant.name + ' · intelligence';
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => goTab(t.dataset.tab)));
  document.getElementById('lbClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lbPrev').addEventListener('click', () => lbStep(-1));
  document.getElementById('lbNext').addEventListener('click', () => lbStep(1));
  document.getElementById('modalOv').addEventListener('click', e => { if (e.target.id === 'modalOv') closeModal(); });
  window.addEventListener('hashchange', () => showTab((location.hash || '#crosssource').slice(1)));
  showTab((location.hash || '#crosssource').slice(1));
})();
