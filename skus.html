<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SKU Library — TBG Sourcing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
/* Overflow safety net: clamp media/form controls so nothing bleeds past its container; wrap long unbroken strings. */
img,video,table,input,select,textarea{max-width:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a2e;font-size:14px;overflow-wrap:break-word;}
.top{background:#1a1a2e;color:#fff;padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;}
.top-title{font-size:15px;font-weight:700;}
.top a{color:#aaa;font-size:12px;text-decoration:none;margin-left:16px;}
.top a:hover{color:#fff;}
.filters{background:#fff;border-bottom:1px solid #e0e0d8;padding:8px 1.5rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.filters input,.filters select{padding:6px 9px;font-size:12px;border:1px solid #e0e0d8;border-radius:6px;font-family:inherit;background:#fff;}
.filters input{width:220px;}
.main{display:flex;height:calc(100vh - 93px);overflow:hidden;}
.list{width:300px;max-width:90vw;flex-shrink:0;overflow-y:auto;border-right:1px solid #e0e0d8;background:#fff;}
.list-item{padding:11px 14px;border-bottom:0.5px solid #f0f0e8;cursor:pointer;}
.list-item:hover{background:#fafaf8;}
.list-item.sel{background:#eef2ff;border-left:3px solid #2244cc;}
.detail{flex:1;overflow-y:auto;padding:1.5rem;background:#f5f5f0;}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1rem;padding-bottom:8px;border-bottom:0.5px solid #f0f0e8;}
.stat{background:#f8f8f4;border-radius:7px;padding:10px 12px;}
.stat-lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.stat-val{font-size:16px;font-weight:700;}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block;}
.dim-est{background:#f5f5e8;color:#886600;}
.dim-conf{background:#fff8e0;color:#664400;}
.dim-ver{background:#edfaed;color:#1a7a1a;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:6px 10px;background:#f8f8f4;color:#888;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.04em;}
td{padding:7px 10px;border-top:0.5px solid #f0f0e8;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#bbb;gap:10px;}
</style></head>
<body>
<div id="admin-sidebar"></div>
<div class="top">
  <div style="display:flex;align-items:center;"><div class="top-title">📦 SKU Library</div><a class="dash-back" href="admin.html" style="margin-left:24px;color:#888;font-size:13px;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">← Dashboard</a></div>
  <div>
    <a href="setup.html">⚙ Setup</a>
  </div>
</div>
<div class="filters">
  <input type="text" id="q-search" placeholder="Search model # or description..." oninput="filterList()" />
  <select id="q-brand" onchange="filterList()"><option value="">All Brands</option></select>
  <select id="q-cat" onchange="filterList()"><option value="">All Categories</option></select>
  <select id="q-status" onchange="filterList()">
    <option value="">All Statuses</option>
    <option value="active">Active</option>
    <option value="draft">Draft</option>
    <option value="discontinued">Discontinued</option>
  </select>
  <select id="q-cust" onchange="filterList()"><option value="">All Customers</option></select>
  <span id="q-count" style="font-size:11px;color:#888;margin-left:auto;"></span>
</div>
<div class="main">
  <div class="list" id="sku-list"><div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">Loading...</div></div>
  <div class="detail" id="sku-detail"><div class="empty"><div style="font-size:40px;">📦</div><div>Select a SKU</div></div></div>
</div>
<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
function g(id){return document.getElementById(id);}
function h(url,opts){opts=opts||{};opts.headers=Object.assign({'apikey':KEY,'Authorization':'Bearer '+KEY},opts.headers||{});return fetch(url,opts);}

var allSkus=[],currentId=null;

async function init(){
  var params=new URLSearchParams(window.location.search);
  var pre=params.get('id');

  var results=await Promise.all([
    h(SB+'/rest/v1/skus?select=*,brands(brand_name,brand_code),categories(category,sub_category)&order=model_number').then(function(r){return r.json();}),
    h(SB+'/rest/v1/brands?select=id,brand_name&order=brand_name').then(function(r){return r.json();}),
    h(SB+'/rest/v1/categories?select=id,category,sub_category&order=category').then(function(r){return r.json();}),
    h(SB+'/rest/v1/customers?select=id,customer_name&order=customer_name').then(function(r){return r.json();})
  ]);

  allSkus=results[0];
  g('q-brand').innerHTML='<option value="">All Brands</option>'+results[1].map(function(b){return '<option value="'+b.id+'">'+b.brand_name+'</option>';}).join('');
  g('q-cat').innerHTML='<option value="">All Categories</option>'+results[2].map(function(c){return '<option value="'+c.id+'">'+c.category+(c.sub_category?' › '+c.sub_category:'')+'</option>';}).join('');
  g('q-cust').innerHTML='<option value="">All Customers</option>'+results[3].map(function(c){return '<option value="'+c.id+'">'+c.customer_name+'</option>';}).join('');

  filterList();
  if(pre)openSku(pre);
}

function filterList(){
  var q=(g('q-search').value||'').toLowerCase();
  var brand=g('q-brand').value;
  var cat=g('q-cat').value;
  var status=g('q-status').value;
  var cust=g('q-cust').value;

  var list=allSkus.filter(function(s){
    if(q&&!(s.model_number||'').toLowerCase().includes(q)&&!(s.description||'').toLowerCase().includes(q))return false;
    if(brand&&s.brand_id!==brand)return false;
    if(cat&&s.category_id!==cat)return false;
    if(status&&s.status!==status)return false;
    if(cust&&s.customer_id!==cust)return false;
    return true;
  });

  g('q-count').textContent=list.length+' SKU'+(list.length===1?'':'s');
  var sc={active:'#e8f8e8',draft:'#f5f5e8',discontinued:'#fff0f0',archived:'#f0f0f0'};

  if(!list.length){g('sku-list').innerHTML='<div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">No SKUs found.</div>';return;}

  g('sku-list').innerHTML=list.map(function(s){
    var b=s.brands||{};
    var sel=s.id===currentId;
    return '<div class="list-item'+(sel?' sel':'')+'" data-sid="'+s.id+'" onclick="openSku(this.dataset.sid)">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;">'+
        '<div style="font-size:11px;font-weight:600;font-family:monospace;color:#1a1a2e;">'+s.model_number+'</div>'+
        '<span class="badge" style="background:'+(sc[s.status]||'#f5f5f0')+';color:#555;">'+s.status+'</span>'+
      '</div>'+
      '<div style="font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;">'+s.description+'</div>'+
      '<div style="font-size:10px;color:#aaa;">'+(b.brand_name||'')+(s.customer_suffix?' · '+s.customer_suffix:'')+'</div>'+
    '</div>';
  }).join('');
}

async function openSku(skuId){
  currentId=skuId;
  filterList();
  var det=g('sku-detail');
  det.innerHTML='<div style="color:#bbb;font-size:13px;padding:2rem;text-align:center;">Loading...</div>';

  var results=await Promise.all([
    h(SB+'/rest/v1/skus?id=eq.'+skuId+'&select=*,brands(brand_name),categories(category,sub_category,sub_sub_category)').then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_packaging?sku_id=eq.'+skuId).then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_variations?sku_id=eq.'+skuId+'&order=created_at').then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_factory_sources?sku_id=eq.'+skuId+'&select=*,factories(factory_name_english,country)').then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_costing?sku_id=eq.'+skuId+'&order=created_at.desc&limit=1').then(function(r){return r.json();}),
    h(SB+'/rest/v1/inventory_positions?sku_id=eq.'+skuId+'&select=*,warehouses(name,type,city)').then(function(r){return r.json();}),
    h(SB+'/rest/v1/production_runs?sku_id=eq.'+skuId+'&select=*,factories(factory_name_english)&order=created_at.desc&limit=10').then(function(r){return r.json();}),
    // Manufacturing variants (new arch: one row per SKU × factory)
    h(SB+'/rest/v1/sku_factory_variants?sku_id=eq.'+skuId+'&select=*,factories(factory_name_english,country)&order=is_primary.desc,created_at').then(function(r){return r.ok?r.json():[];}).catch(function(){return [];}),
    // SKU-level product documents (factory-agnostic: artwork, marketing, etc.)
    h(SB+'/rest/v1/sku_documents?sku_id=eq.'+skuId+'&is_current=eq.true&order=uploaded_at.desc').then(function(r){return r.ok?r.json():[];}).catch(function(){return [];})
  ]);

  var sku=results[0][0];if(!sku)return;
  var pkg=results[1][0]||null;
  var vars=results[2]||[];
  var sources=results[3]||[];
  var costing=results[4][0]||null;
  var inv=results[5]||[];
  var runs=results[6]||[];
  var variants=results[7]||[];
  var skuDocs=results[8]||[];

  // ── Build the variants tree: revisions per variant + docs per revision ──
  var variantsTree=[];
  if(variants.length){
    var variantIds=variants.map(function(v){return v.id;});
    var revQ=variantIds.map(function(id){return 'variant_id=eq.'+id;}).join(',');
    var revR=await h(SB+'/rest/v1/sku_factory_variant_revisions?or=('+revQ+')&order=revision_number');
    var allRevs=revR.ok?await revR.json():[];

    var docsByRev={};
    if(allRevs.length){
      var revIds=allRevs.map(function(r){return r.id;});
      var docQ=revIds.map(function(id){return 'revision_id=eq.'+id;}).join(',');
      var docR=await h(SB+'/rest/v1/variant_revision_documents?or=('+docQ+')&order=uploaded_at.desc');
      var allDocs=docR.ok?await docR.json():[];
      allDocs.forEach(function(d){
        if(!docsByRev[d.revision_id])docsByRev[d.revision_id]=[];
        docsByRev[d.revision_id].push(d);
      });
    }

    variants.forEach(function(v){
      var revsForV=allRevs.filter(function(r){return r.variant_id===v.id;});
      var currentRev=revsForV.filter(function(r){return r.state==='published' && !r.effective_to;})[0];
      var draft=revsForV.filter(function(r){return r.state==='draft';})[0];
      variantsTree.push({v:v, currentRev:currentRev, draft:draft, allRevs:revsForV, docsByRev:docsByRev});
    });
  }

  // Load certs from sources
  var certs=[];
  if(sources.length){
    var qIds=sources.map(function(s){return s.rfq_quote_id;}).filter(Boolean);
    if(qIds.length){
      var certQ=qIds.map(function(id){return 'quote_id=eq.'+id;}).join(',');
      var cr=await h(SB+'/rest/v1/rfq_quote_cert_assets?or=('+certQ+')');
      if(cr.ok)certs=await cr.json();
      // INCI docs
      var ir=await h(SB+'/rest/v1/rfq_quotes?or=('+qIds.map(function(id){return 'id=eq.'+id;}).join(',')+')'+'&select=id,inci_document_url');
      if(ir.ok){var irows=await ir.json();irows.forEach(function(row){if(row.inci_document_url)certs.push({id:'i_'+row.id,file_url:row.inci_document_url,file_name:'INCI List',cert_type:'INCI'});});}
    }
  }

  var b=sku.brands||{};
  var c=sku.categories||{};
  var catStr=[c.category,c.sub_category,c.sub_sub_category].filter(Boolean).join(' › ');
  var sc={active:'badge dim-ver',draft:'badge dim-est',discontinued:'badge',archived:'badge'};
  var dSt=function(s){var m={estimated:'dim-est',factory_confirmed:'dim-conf',admin_verified:'dim-ver'};return '<span class="badge '+(m[s]||'dim-est')+'">'+(s||'estimated').replace('_',' ')+'</span>';};

  // Inventory totals
  var totOnHand=inv.reduce(function(a,p){return a+(p.qty_on_hand||0);},0);
  var totAvail=inv.reduce(function(a,p){return a+(p.qty_available||0);},0);
  var totOnOrder=inv.reduce(function(a,p){return a+(p.qty_on_order||0);},0);
  var totInTransit=inv.reduce(function(a,p){return a+(p.qty_in_transit||0);},0);

  var html=
  // Header
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">'+
    '<div>'+
      '<div style="font-size:20px;font-weight:700;font-family:monospace;color:#1a1a2e;">'+sku.model_number+'</div>'+
      '<div style="font-size:14px;color:#555;margin-top:3px;">'+sku.description+'</div>'+
      '<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">'+
        '<span class="badge" style="background:#f0f0e8;color:#555;">'+sku.status+'</span>'+
        '<span style="font-size:11px;color:#888;">'+b.brand_name+'</span>'+
        (catStr?'<span style="font-size:11px;color:#bbb;">·</span><span style="font-size:11px;color:#888;">'+catStr+'</span>':'')+
        (sku.is_cosmetic?'<span class="badge" style="background:#fce8f0;color:#880044;">Cosmetic</span>':'')+
        (sku.is_customer_specific?'<span class="badge" style="background:#eef2ff;color:#2244cc;">'+sku.customer_suffix+'</span>':'')+
        (sku.shelf_life_days?'<span style="font-size:11px;color:#888;">'+sku.shelf_life_days+'d shelf life</span>':'')+
      '</div>'+
    '</div>'+
    '<a href="setup.html" style="padding:7px 12px;background:#f5f5f0;border:1px solid #e0e0d8;border-radius:7px;font-size:12px;text-decoration:none;color:#555;">Edit SKU</a>'+
  '</div>'+

  // Inventory
  '<div class="card">'+
    '<div class="card-title">Inventory Positions</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:'+(inv.length?'1rem':'0')+';">'+
      '<div class="stat"><div class="stat-lbl">On Hand</div><div class="stat-val">'+totOnHand.toLocaleString()+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">Available</div><div class="stat-val" style="color:'+(totAvail>0?'#1a7a1a':'#b00')+'">'+totAvail.toLocaleString()+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">On Order</div><div class="stat-val">'+totOnOrder.toLocaleString()+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">In Transit</div><div class="stat-val">'+totInTransit.toLocaleString()+'</div></div>'+
    '</div>'+
    (inv.length?
      '<table><thead><tr><th>Warehouse</th><th>Type</th><th>On Hand</th><th>Reserved</th><th>Available</th><th>In Transit</th></tr></thead><tbody>'+
      inv.map(function(p){var w=p.warehouses||{};return '<tr><td>'+w.name+'</td><td><span class="badge" style="background:#f5f5f0;color:#888;">'+w.type+'</span></td><td>'+p.qty_on_hand+'</td><td>'+p.qty_reserved+'</td><td style="font-weight:500;color:'+(p.qty_available>0?'#1a7a1a':'#b00')+'">'+p.qty_available+'</td><td>'+p.qty_in_transit+'</td></tr>';}).join('')+
      '</tbody></table>'
    :'<div style="font-size:12px;color:#bbb;">No inventory positions on record.</div>')+
  '</div>'+

  // Costing
  '<div class="card">'+
    '<div class="card-title">Costing</div>'+
    (costing?
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;">'+
        '<div class="stat"><div class="stat-lbl">FOB Price</div><div class="stat-val">$'+parseFloat(costing.fob_price||0).toFixed(2)+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Landed (est)</div><div class="stat-val">'+(costing.freight_per_unit?'$'+(parseFloat(costing.fob_price||0)+parseFloat(costing.freight_per_unit||0)+(parseFloat(costing.fob_price||0)*(parseFloat(costing.duty_pct||0)+parseFloat(costing.tariff_pct||0))/100)).toFixed(2):'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Wholesale</div><div class="stat-val">'+(costing.wholesale_price?'$'+parseFloat(costing.wholesale_price).toFixed(2):'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Retail</div><div class="stat-val">'+(costing.retail_price?'$'+parseFloat(costing.retail_price).toFixed(2):'—')+'</div></div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;">'+
        '<div class="stat"><div class="stat-lbl">HTS Code</div><div class="stat-val" style="font-size:13px;font-family:monospace;">'+(costing.hts_code||'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Country of Origin</div><div class="stat-val" style="font-size:13px;">'+(costing.country_of_origin||'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">FOB Port</div><div class="stat-val" style="font-size:13px;">'+(costing.fob_port||'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Duty / Tariff</div><div class="stat-val" style="font-size:13px;">'+(costing.duty_pct||0)+'% / '+(costing.tariff_pct||0)+'%</div></div>'+
      '</div>'
    :'<div style="font-size:12px;color:#bbb;">No costing data yet.</div>')+
  '</div>'+

  // Dimensions
  '<div class="card">'+
    '<div class="card-title">Packaging & Dimensions</div>'+
    (pkg?
      '<table><thead><tr><th>Level</th><th>Qty</th><th>L × W × H (cm)</th><th>Weight (kg)</th><th>CBM</th><th>Status</th></tr></thead><tbody>'+
      '<tr><td>Unit</td><td>1</td>'+
        '<td>'+(pkg.unit_length_cm?pkg.unit_length_cm+' × '+pkg.unit_width_cm+' × '+pkg.unit_height_cm:'—')+'</td>'+
        '<td>'+(pkg.unit_weight_kg||'—')+'</td>'+
        '<td>'+(pkg.unit_cbm||'—')+'</td>'+
        '<td>'+dSt(pkg.unit_dim_status)+'</td></tr>'+
      (sku.has_inner_carton?
        '<tr><td>Inner</td><td>'+(pkg.inner_qty||'—')+'</td>'+
        '<td>'+(pkg.inner_length_cm?pkg.inner_length_cm+' × '+pkg.inner_width_cm+' × '+pkg.inner_height_cm:'—')+'</td>'+
        '<td>'+(pkg.inner_weight_kg||'—')+'</td><td>—</td>'+
        '<td>'+dSt(pkg.inner_dim_status)+'</td></tr>':'')+
      '<tr><td>Master</td><td>'+(pkg.master_qty||'—')+'</td>'+
        '<td>'+(pkg.master_length_cm?pkg.master_length_cm+' × '+pkg.master_width_cm+' × '+pkg.master_height_cm:'—')+'</td>'+
        '<td>'+(pkg.master_weight_kg||'—')+'</td><td>—</td>'+
        '<td>'+dSt(pkg.master_dim_status)+'</td></tr>'+
      (sku.has_pallet?
        '<tr><td>Pallet</td><td>'+(pkg.pallet_qty||'—')+'</td>'+
        '<td>'+(pkg.pallet_length_cm?pkg.pallet_length_cm+' × '+pkg.pallet_width_cm+' × '+pkg.pallet_height_cm:'—')+'</td>'+
        '<td>'+(pkg.pallet_weight_kg||'—')+'</td><td>—</td><td>—</td></tr>':'')+
      '</tbody></table>'+
      renderContainerCalc(pkg)
    :'<div style="font-size:12px;color:#bbb;">No packaging data.</div>')+
  '</div>'+

  // Variations
  (vars.length?
    '<div class="card">'+
      '<div class="card-title">Variations</div>'+
      '<table><thead><tr><th>Type</th><th>Value</th><th>Model #</th><th>Unit UPC</th></tr></thead><tbody>'+
      vars.map(function(v){return '<tr><td>'+v.variation_type+'</td><td>'+v.variation_value+'</td><td style="font-family:monospace;font-size:11px;">'+v.model_number_full+'</td><td style="font-family:monospace;font-size:11px;">'+(v.upc_unit||'Pending')+'</td></tr>';}).join('')+
      '</tbody></table>'+
    '</div>'
  :'')+

  // Factory Sources
  '<div class="card">'+
    '<div class="card-title">Factory Sources</div>'+
    (sources.length?
      '<table><thead><tr><th>Factory</th><th>Country</th><th>FOB Price</th><th>Status</th><th>Effective</th></tr></thead><tbody>'+

// Full inventory ledger for a SKU: position (states), key stats, purchase + sales history.
// NOTE: purchases come from purchase_orders (header-level, carries sku_id) — purchase_order_lines
// is empty and has no FK to purchase_orders, so it can't be embedded.
async function loadInvStatus(skuId) {
  var el = document.getElementById('inv-status-' + skuId);
  if (!el) return;
  try {
    var res = await Promise.all([
      h(SB+'/rest/v1/sku_inventory_states?sku_id=eq.'+skuId+'&select=*,purchase_orders(po_number)&order=created_at.desc').then(function(r){return r.ok?r.json():[];}).catch(function(){return [];}),
      h(SB+'/rest/v1/purchase_orders?sku_id=eq.'+skuId+'&select=po_number,status,created_at,quantity,unit_fob_price,factories(factory_name_english)&order=created_at.desc').then(function(r){return r.ok?r.json():[];}).catch(function(){return [];}),
      h(SB+'/rest/v1/customer_order_lines?sku_id=eq.'+skuId+'&select=qty_ordered,unit_price,total_price,customer_orders(order_number,order_date,customers(customer_name))&order=created_at.desc').then(function(r){return r.ok?r.json():[];}).catch(function(){return [];})
    ]);
    var states = res[0]||[], purchases = res[1]||[], sales = res[2]||[];

    // A) POSITION SUMMARY — pills for all 13 states + editable state rows (admin)
    var counts = {};
    states.forEach(function(s){ if(s.current_state) counts[s.current_state]=(counts[s.current_state]||0)+1; });
    var pills = INV_STATES.map(function(st){
      var n = counts[st]||0;
      if (n>0) { var col=INV_COLORS[st]||'#888'; return '<span style="background:'+col+'22;color:'+col+';padding:3px 9px;border-radius:11px;font-size:11px;font-weight:600;margin:0 5px 5px 0;display:inline-block;">'+st.replace(/_/g,' ')+' ('+n+')</span>'; }
      return '<span style="background:#f0f0e8;color:#bbb;padding:3px 9px;border-radius:11px;font-size:11px;margin:0 5px 5px 0;display:inline-block;">'+st.replace(/_/g,' ')+'</span>';
    }).join('');
    var pending = states.filter(function(s){return s.proposed_state;});
    var pendingBanner = pending.length ? '<div style="background:#fff8e0;border:1px solid #e0c040;border-radius:7px;padding:8px 12px;margin:8px 0;font-size:12px;">⚠️ <strong>'+pending.length+' pending state transition'+(pending.length>1?'s':'')+'</strong> awaiting approval</div>' : '';
    var stateRows = states.map(function(row){
      var cur=row.current_state||'—', cc=INV_COLORS[cur]||'#888', prop=row.proposed_state, pc=INV_COLORS[prop]||'#888';
      var po=row.purchase_orders?(row.purchase_orders.po_number||'PO'):'—';
      var action = prop
        ? '<button onclick="approveStateTransition(\''+row.id+'\',\''+prop+'\')" style="background:#1a7a1a;color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;margin-right:4px;">✓ Approve</button><button onclick="rejectStateTransition(\''+row.id+'\')" style="background:#a22;color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;">✗ Reject</button>'
        : '<button onclick="manualStateChange(\''+row.id+'\',\''+cur+'\')" style="background:none;border:1px solid #e0e0d8;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;color:#666;">Change</button>';
      return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px dashed #f0f0e8;font-size:12px;">'+
        '<span style="color:#888;min-width:60px;">'+po+'</span>'+
        '<span style="background:'+cc+'22;color:'+cc+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">'+cur.replace(/_/g,' ')+'</span>'+
        (prop?'<span style="color:#aaa;">→</span><span style="background:'+pc+'22;color:'+pc+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">'+prop.replace(/_/g,' ')+'</span>':'')+
        '<span style="margin-left:auto;">'+action+'</span>'+
        '</div>';
    }).join('');

    // B) KEY STATS
    var totPurch = purchases.reduce(function(a,p){return a+(parseInt(p.quantity,10)||0);},0);
    var totSold = sales.reduce(function(a,s){return a+(parseInt(s.qty_ordered,10)||0);},0);
    var lastPurch = purchases.length ? ((purchases[0].created_at||'').slice(0,10)||'—') : '—';
    var saleDates = sales.map(function(s){return s.customer_orders&&s.customer_orders.order_date;}).filter(Boolean).sort();
    var lastSale = saleDates.length ? saleDates[saleDates.length-1] : '—';
    var statsHtml = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">'+
      invStatBox('Units Purchased', totPurch.toLocaleString())+invStatBox('Units Sold', totSold.toLocaleString())+
      invStatBox('Last Purchase', lastPurch)+invStatBox('Last Sale', lastSale)+'</div>';

    // C) PURCHASE HISTORY
    var purchHtml = purchases.length
      ? '<table style="width:100%;border-collapse:collapse;font-size:12px;">'+invTh(['Date','PO #','Factory','Qty','FOB Price','Status'])+'<tbody>'+
        purchases.map(function(p){var fac=(p.factories&&p.factories.factory_name_english)||'—';return '<tr>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;white-space:nowrap;">'+((p.created_at||'').slice(0,10)||'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;font-family:monospace;font-size:11px;">'+(p.po_number||'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;">'+fac+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;text-align:right;">'+(p.quantity!=null?Number(p.quantity).toLocaleString():'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;text-align:right;">'+(p.unit_fob_price!=null?'$'+parseFloat(p.unit_fob_price).toFixed(4):'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;">'+(p.status||'—')+'</td>'+
        '</tr>';}).join('')+'</tbody></table>'
      : '<div style="font-size:12px;color:#bbb;">No purchases on record.</div>';

    // D) SALES HISTORY
    var salesHtml = sales.length
      ? '<table style="width:100%;border-collapse:collapse;font-size:12px;">'+invTh(['Date','Order #','Customer','Qty','Unit Price','Total'])+'<tbody>'+
        sales.map(function(s){var o=s.customer_orders||{};var c=o.customers||{};return '<tr>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;white-space:nowrap;">'+(o.order_date||'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;font-family:monospace;font-size:11px;">'+(o.order_number||'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;">'+(c.customer_name||'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;text-align:right;">'+(s.qty_ordered!=null?Number(s.qty_ordered).toLocaleString():'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;text-align:right;">'+(s.unit_price!=null?'$'+parseFloat(s.unit_price).toFixed(2):'—')+'</td>'+
          '<td style="padding:6px 8px;border-bottom:0.5px dashed #f0f0e8;text-align:right;font-weight:500;">'+(s.total_price!=null?'$'+parseFloat(s.total_price).toFixed(2):'—')+'</td>'+
        '</tr>';}).join('')+'</tbody></table>'
      : '<div style="font-size:12px;color:#bbb;">No sales on record.</div>';

    el.innerHTML =
      invSub('Position', pills + pendingBanner + (stateRows?'<div style="margin-top:6px;">'+stateRows+'</div>':'')) +
      invSub('Key Stats', statsHtml) +
      invSub('Purchase History', purchHtml) +
      invSub('Sales History', salesHtml);
  } catch(e) {
    el.innerHTML = '<div style="font-size:12px;color:#a22;">Could not load inventory status.</div>';
  }
}

// Admin state writes go through the gated, service-role /api/sku-state endpoint
// (RLS allows anon SELECT only). Sends the admin session token, same as admin.html.
async function postSkuState(payload) {
  var resp = await fetch('/api/sku-state', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('admin_session')||'')},
    body: JSON.stringify(payload)
  });
  var d = await resp.json().catch(function(){return {};});
  if (resp.status===401) { alert('Session expired — please sign in to the admin portal again.'); throw new Error('Unauthorized'); }
  if (!resp.ok) { alert('Action failed: ' + (d.error || ('HTTP '+resp.status))); throw new Error(d.error || 'failed'); }
  return d;
}
function reloadInvStatus(){ var el=document.querySelector('[id^="inv-status-"]'); if(el) loadInvStatus(el.id.replace('inv-status-','')); }

async function approveStateTransition(stateId, newState) {
  var note = prompt('Approval note (optional):') || '';
  try { await postSkuState({ action:'approve', state_id:stateId, new_state:newState, note:note, approved_by:localStorage.getItem('admin_user')||'admin' }); }
  catch(e){ return; }
  reloadInvStatus();
}

async function rejectStateTransition(stateId) {
  var note = prompt('Reason for rejection:') || 'Rejected';
  try { await postSkuState({ action:'reject', state_id:stateId, note:note }); }
  catch(e){ return; }
  reloadInvStatus();
}

async function manualStateChange(stateId, currentState) {
  var states = ['in_development','on_rfq','on_order','in_production','pending_inspection','at_forwarder','in_transit','at_port','in_warehouse','allocated_sales','shipped','sold_through','written_off'];
  var newState = prompt('Change state to (type exactly):\n\n' + states.filter(function(s){return s!==currentState;}).join('\n'));
  if (!newState || !states.includes(newState)) { alert('Invalid state.'); return; }
  var note = prompt('Note (optional):') || '';
  try { await postSkuState({ action:'manual_change', state_id:stateId, new_state:newState, note:note }); }
  catch(e){ return; }
  reloadInvStatus();
}

function docIcon(t){
  t=(t||'').toLowerCase();
  if(t.indexOf('inci')>=0)return '🧴';
  if(t.indexOf('coa')>=0||t.indexOf('test')>=0||t.indexOf('lab')>=0||t.indexOf('stability')>=0||t.indexOf('micro')>=0||t.indexOf('heavy')>=0||t.indexOf('allergen')>=0)return '🧪';
  if(t.indexOf('cert')>=0||t.indexOf('gmp')>=0||t.indexOf('iso')>=0||t.indexOf('brc')>=0||t.indexOf('fda')>=0)return '🏅';
  if(t.indexOf('formula')>=0||t.indexOf('spec')>=0)return '📋';
  if(t.indexOf('image')>=0||t.indexOf('art')>=0||t.indexOf('photo')>=0)return '🖼️';
  if(t.indexOf('die')>=0||t.indexOf('drawing')>=0||t.indexOf('step')>=0)return '📐';
  if(t.indexOf('manual')>=0)return '📖';
  return '📄';
}

// ── Shared container calculator ──
function calcContainers(masterCbm,masterQty,innerQty){
  var containers={'20gp':25.0*0.85,'40gp':54.0*0.85,'40hc':67.0*0.85,'45hc':86.0*0.85};
  var result={};
  Object.keys(containers).forEach(function(type){
    var cbm=containers[type];
    var masters=masterCbm>0?Math.floor(cbm/masterCbm):0;
    var units=masters*(masterQty||0);
    var inners=innerQty&&innerQty>0?Math.floor(masters*(masterQty/innerQty)):null;
    result[type]={masters:masters,units:units,inners:inners};
  });
  return result;
}

function renderContainerCalc(pkg){
  var mCbm=null;
  if(pkg&&pkg.master_length_cm&&pkg.master_width_cm&&pkg.master_height_cm){
    mCbm=parseFloat(((pkg.master_length_cm*pkg.master_width_cm*pkg.master_height_cm)/1000000).toFixed(6));
  }
  var mQty=pkg?pkg.master_qty:0;
  var iQty=pkg?pkg.inner_qty:0;

  if(!mCbm||!mQty){
    return '<div style="font-size:11px;color:#bbb;margin-top:8px;">Enter master carton dimensions and qty/master to see container calculations.</div>';
  }

  var calc=calcContainers(mCbm,mQty,iQty);
  var types=[['20gp','20GP','25'],['40gp','40GP','54'],['40hc','40HC','67'],['45hc','45HC','86']];

  return '<div style="background:#eef2ff;border:1px solid #c0d0f0;border-radius:8px;padding:10px 12px;margin-top:10px;">'+
    '<div style="font-size:10px;font-weight:600;color:#2244cc;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Container Calculator <span style="font-weight:400;color:#888;">(85% efficiency)</span></div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">'+
    types.map(function(t){
      var type=t[0];var label=t[1];var cbm=t[2];
      var c=calc[type];
      var isMain=type==='40hc';
      return '<div style="text-align:center;'+(isMain?'border:2px solid #c0d0f0;border-radius:7px;padding:4px;':'')+'">'+
        '<div style="font-size:10px;color:'+(isMain?'#2244cc':'#555')+';font-weight:'+(isMain?'600':'400')+';margin-bottom:3px;">'+label+' ('+cbm+' CBM)'+(isMain?' ★':'')+'</div>'+
        '<div style="font-size:15px;font-weight:700;color:#1a1a2e;">'+c.masters.toLocaleString()+'</div>'+
        '<div style="font-size:10px;color:#888;">masters</div>'+
        '<div style="font-size:11px;color:#555;margin-top:2px;">'+c.units.toLocaleString()+' units</div>'+
        (c.inners?'<div style="font-size:10px;color:#888;">'+c.inners.toLocaleString()+' inners</div>':'')+
      '</div>';
    }).join('')+
    '</div>'+
    '<div style="font-size:10px;color:#888;margin-top:6px;">'+mCbm+' CBM/master · '+mQty+' units/master'+(iQty?' · '+iQty+' units/inner':'')+'</div>'+
  '</div>';
}


init();
</script>
<script src="admin-shared.js"></script>
</body>
</html>
