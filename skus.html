<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SKU Library — TBG Sourcing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a2e;font-size:14px;}
.top{background:#1a1a2e;color:#fff;padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;}
.top-title{font-size:15px;font-weight:700;}
.top a{color:#aaa;font-size:12px;text-decoration:none;margin-left:16px;}
.top a:hover{color:#fff;}
.filters{background:#fff;border-bottom:1px solid #e0e0d8;padding:8px 1.5rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.filters input,.filters select{padding:6px 9px;font-size:12px;border:1px solid #e0e0d8;border-radius:6px;font-family:inherit;background:#fff;}
.filters input{width:220px;}
.main{display:flex;height:calc(100vh - 93px);overflow:hidden;}
.list{width:300px;flex-shrink:0;overflow-y:auto;border-right:1px solid #e0e0d8;background:#fff;}
.list-item{padding:11px 14px;border-bottom:0.5px solid #f0f0e8;cursor:pointer;}
.list-item:hover{background:#fafaf8;}
.list-item.sel{background:#eef2ff;border-left:3px solid #2244cc;}
.detail{flex:1;overflow-y:auto;padding:1.5rem;background:#f5f5f0;}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1rem;padding-bottom:8px;border-bottom:0.5px solid #f0f0e8;}
.stat{background:#f8f8f4;border-radius:7px;padding:10px 12px;}
.stat-lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.stat-val{font-size:16px;font-weight:700;}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block;}
.dim-est{background:#f5f5e8;color:#886600;}
.dim-conf{background:#fff8e0;color:#664400;}
.dim-ver{background:#edfaed;color:#1a7a1a;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:6px 10px;background:#f8f8f4;color:#888;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.04em;}
td{padding:7px 10px;border-top:0.5px solid #f0f0e8;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#bbb;gap:10px;}
</style>
</head>
<body>
<div class="top">
  <div class="top-title">📦 SKU Library</div>
  <div>
    <a href="setup.html">⚙ Setup</a>
    <a href="admin.html">← Admin</a>
  </div>
</div>
<div class="filters">
  <input type="text" id="q-search" placeholder="Search model # or description..." oninput="filterList()" />
  <select id="q-brand" onchange="filterList()"><option value="">All Brands</option></select>
  <select id="q-cat" onchange="filterList()"><option value="">All Categories</option></select>
  <select id="q-status" onchange="filterList()">
    <option value="">All Statuses</option>
    <option value="active">Active</option>
    <option value="draft">Draft</option>
    <option value="discontinued">Discontinued</option>
  </select>
  <select id="q-cust" onchange="filterList()"><option value="">All Customers</option></select>
  <span id="q-count" style="font-size:11px;color:#888;margin-left:auto;"></span>
</div>
<div class="main">
  <div class="list" id="sku-list"><div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">Loading...</div></div>
  <div class="detail" id="sku-detail"><div class="empty"><div style="font-size:40px;">📦</div><div>Select a SKU</div></div></div>
</div>
<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
function g(id){return document.getElementById(id);}
function h(url){return fetch(url,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});}

var allSkus=[],currentId=null;

async function init(){
  var params=new URLSearchParams(window.location.search);
  var pre=params.get('id');

  var results=await Promise.all([
    h(SB+'/rest/v1/skus?select=*,brands(brand_name,brand_code),categories(category,sub_category)&order=model_number').then(function(r){return r.json();}),
    h(SB+'/rest/v1/brands?select=id,brand_name&order=brand_name').then(function(r){return r.json();}),
    h(SB+'/rest/v1/categories?select=id,category,sub_category&order=category').then(function(r){return r.json();}),
    h(SB+'/rest/v1/customers?select=id,customer_name&order=customer_name').then(function(r){return r.json();})
  ]);

  allSkus=results[0];
  g('q-brand').innerHTML='<option value="">All Brands</option>'+results[1].map(function(b){return '<option value="'+b.id+'">'+b.brand_name+'</option>';}).join('');
  g('q-cat').innerHTML='<option value="">All Categories</option>'+results[2].map(function(c){return '<option value="'+c.id+'">'+c.category+(c.sub_category?' › '+c.sub_category:'')+'</option>';}).join('');
  g('q-cust').innerHTML='<option value="">All Customers</option>'+results[3].map(function(c){return '<option value="'+c.id+'">'+c.customer_name+'</option>';}).join('');

  filterList();
  if(pre)openSku(pre);
}

function filterList(){
  var q=(g('q-search').value||'').toLowerCase();
  var brand=g('q-brand').value;
  var cat=g('q-cat').value;
  var status=g('q-status').value;
  var cust=g('q-cust').value;

  var list=allSkus.filter(function(s){
    if(q&&!(s.model_number||'').toLowerCase().includes(q)&&!(s.description||'').toLowerCase().includes(q))return false;
    if(brand&&s.brand_id!==brand)return false;
    if(cat&&s.category_id!==cat)return false;
    if(status&&s.status!==status)return false;
    if(cust&&s.customer_id!==cust)return false;
    return true;
  });

  g('q-count').textContent=list.length+' SKU'+(list.length===1?'':'s');
  var sc={active:'#e8f8e8',draft:'#f5f5e8',discontinued:'#fff0f0',archived:'#f0f0f0'};

  if(!list.length){g('sku-list').innerHTML='<div style="padding:2rem;text-align:center;color:#bbb;font-size:12px;">No SKUs found.</div>';return;}

  g('sku-list').innerHTML=list.map(function(s){
    var b=s.brands||{};
    var sel=s.id===currentId;
    return '<div class="list-item'+(sel?' sel':'')+'" data-sid="'+s.id+'" onclick="openSku(this.dataset.sid)">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;">'+
        '<div style="font-size:11px;font-weight:600;font-family:monospace;color:#1a1a2e;">'+s.model_number+'</div>'+
        '<span class="badge" style="background:'+(sc[s.status]||'#f5f5f0')+';color:#555;">'+s.status+'</span>'+
      '</div>'+
      '<div style="font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;">'+s.description+'</div>'+
      '<div style="font-size:10px;color:#aaa;">'+(b.brand_name||'')+(s.customer_suffix?' · '+s.customer_suffix:'')+'</div>'+
    '</div>';
  }).join('');
}

async function openSku(skuId){
  currentId=skuId;
  filterList();
  var det=g('sku-detail');
  det.innerHTML='<div style="color:#bbb;font-size:13px;padding:2rem;text-align:center;">Loading...</div>';

  var results=await Promise.all([
    h(SB+'/rest/v1/skus?id=eq.'+skuId+'&select=*,brands(brand_name),categories(category,sub_category,sub_sub_category)').then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_packaging?sku_id=eq.'+skuId).then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_variations?sku_id=eq.'+skuId+'&order=created_at').then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_factory_sources?sku_id=eq.'+skuId+'&select=*,factories(factory_name_english,country)').then(function(r){return r.json();}),
    h(SB+'/rest/v1/sku_costing?sku_id=eq.'+skuId+'&order=created_at.desc&limit=1').then(function(r){return r.json();}),
    h(SB+'/rest/v1/inventory_positions?sku_id=eq.'+skuId+'&select=*,warehouses(name,type,city)').then(function(r){return r.json();}),
    h(SB+'/rest/v1/production_runs?sku_id=eq.'+skuId+'&select=*,factories(factory_name_english)&order=created_at.desc&limit=10').then(function(r){return r.json();}),
    h(SB+'/rest/v1/customer_order_lines?sku_id=eq.'+skuId+'&select=*,customer_orders(order_number,order_date,customers(customer_name))&order=created_at.desc&limit=10').then(function(r){return r.json();})
  ]);

  var sku=results[0][0];if(!sku)return;
  var pkg=results[1][0]||null;
  var vars=results[2]||[];
  var sources=results[3]||[];
  var costing=results[4][0]||null;
  var inv=results[5]||[];
  var runs=results[6]||[];
  var sales=results[7]||[];

  // Load certs from sources
  var certs=[];
  if(sources.length){
    var qIds=sources.map(function(s){return s.rfq_quote_id;}).filter(Boolean);
    if(qIds.length){
      var certQ=qIds.map(function(id){return 'quote_id=eq.'+id;}).join(',');
      var cr=await h(SB+'/rest/v1/rfq_quote_cert_assets?or=('+certQ+')');
      if(cr.ok)certs=await cr.json();
      // INCI docs
      var ir=await h(SB+'/rest/v1/rfq_quotes?or=('+qIds.map(function(id){return 'id=eq.'+id;}).join(',')+')'+'&select=id,inci_document_url');
      if(ir.ok){var irows=await ir.json();irows.forEach(function(row){if(row.inci_document_url)certs.push({id:'i_'+row.id,file_url:row.inci_document_url,file_name:'INCI List',cert_type:'INCI'});});}
    }
  }

  var b=sku.brands||{};
  var c=sku.categories||{};
  var catStr=[c.category,c.sub_category,c.sub_sub_category].filter(Boolean).join(' › ');
  var sc={active:'badge dim-ver',draft:'badge dim-est',discontinued:'badge',archived:'badge'};
  var dSt=function(s){var m={estimated:'dim-est',factory_confirmed:'dim-conf',admin_verified:'dim-ver'};return '<span class="badge '+(m[s]||'dim-est')+'">'+(s||'estimated').replace('_',' ')+'</span>';};

  // Inventory totals
  var totOnHand=inv.reduce(function(a,p){return a+(p.qty_on_hand||0);},0);
  var totAvail=inv.reduce(function(a,p){return a+(p.qty_available||0);},0);
  var totOnOrder=inv.reduce(function(a,p){return a+(p.qty_on_order||0);},0);
  var totInTransit=inv.reduce(function(a,p){return a+(p.qty_in_transit||0);},0);

  var html=
  // Header
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">'+
    '<div>'+
      '<div style="font-size:20px;font-weight:700;font-family:monospace;color:#1a1a2e;">'+sku.model_number+'</div>'+
      '<div style="font-size:14px;color:#555;margin-top:3px;">'+sku.description+'</div>'+
      '<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">'+
        '<span class="badge" style="background:#f0f0e8;color:#555;">'+sku.status+'</span>'+
        '<span style="font-size:11px;color:#888;">'+b.brand_name+'</span>'+
        (catStr?'<span style="font-size:11px;color:#bbb;">·</span><span style="font-size:11px;color:#888;">'+catStr+'</span>':'')+
        (sku.is_cosmetic?'<span class="badge" style="background:#fce8f0;color:#880044;">Cosmetic</span>':'')+
        (sku.is_customer_specific?'<span class="badge" style="background:#eef2ff;color:#2244cc;">'+sku.customer_suffix+'</span>':'')+
        (sku.shelf_life_days?'<span style="font-size:11px;color:#888;">'+sku.shelf_life_days+'d shelf life</span>':'')+
      '</div>'+
    '</div>'+
    '<a href="setup.html" style="padding:7px 12px;background:#f5f5f0;border:1px solid #e0e0d8;border-radius:7px;font-size:12px;text-decoration:none;color:#555;">Edit SKU</a>'+
  '</div>'+

  // Inventory
  '<div class="card">'+
    '<div class="card-title">Inventory Positions</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:'+(inv.length?'1rem':'0')+';">'+
      '<div class="stat"><div class="stat-lbl">On Hand</div><div class="stat-val">'+totOnHand.toLocaleString()+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">Available</div><div class="stat-val" style="color:'+(totAvail>0?'#1a7a1a':'#b00')+'">'+totAvail.toLocaleString()+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">On Order</div><div class="stat-val">'+totOnOrder.toLocaleString()+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">In Transit</div><div class="stat-val">'+totInTransit.toLocaleString()+'</div></div>'+
    '</div>'+
    (inv.length?
      '<table><thead><tr><th>Warehouse</th><th>Type</th><th>On Hand</th><th>Reserved</th><th>Available</th><th>In Transit</th></tr></thead><tbody>'+
      inv.map(function(p){var w=p.warehouses||{};return '<tr><td>'+w.name+'</td><td><span class="badge" style="background:#f5f5f0;color:#888;">'+w.type+'</span></td><td>'+p.qty_on_hand+'</td><td>'+p.qty_reserved+'</td><td style="font-weight:500;color:'+(p.qty_available>0?'#1a7a1a':'#b00')+'">'+p.qty_available+'</td><td>'+p.qty_in_transit+'</td></tr>';}).join('')+
      '</tbody></table>'
    :'<div style="font-size:12px;color:#bbb;">No inventory positions on record.</div>')+
  '</div>'+

  // Costing
  '<div class="card">'+
    '<div class="card-title">Costing</div>'+
    (costing?
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;">'+
        '<div class="stat"><div class="stat-lbl">FOB Price</div><div class="stat-val">$'+parseFloat(costing.fob_price||0).toFixed(2)+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Landed (est)</div><div class="stat-val">'+(costing.freight_per_unit?'$'+(parseFloat(costing.fob_price||0)+parseFloat(costing.freight_per_unit||0)+(parseFloat(costing.fob_price||0)*(parseFloat(costing.duty_pct||0)+parseFloat(costing.tariff_pct||0))/100)).toFixed(2):'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Wholesale</div><div class="stat-val">'+(costing.wholesale_price?'$'+parseFloat(costing.wholesale_price).toFixed(2):'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Retail</div><div class="stat-val">'+(costing.retail_price?'$'+parseFloat(costing.retail_price).toFixed(2):'—')+'</div></div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;">'+
        '<div class="stat"><div class="stat-lbl">HTS Code</div><div class="stat-val" style="font-size:13px;font-family:monospace;">'+(costing.hts_code||'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Country of Origin</div><div class="stat-val" style="font-size:13px;">'+(costing.country_of_origin||'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">FOB Port</div><div class="stat-val" style="font-size:13px;">'+(costing.fob_port||'—')+'</div></div>'+
        '<div class="stat"><div class="stat-lbl">Duty / Tariff</div><div class="stat-val" style="font-size:13px;">'+(costing.duty_pct||0)+'% / '+(costing.tariff_pct||0)+'%</div></div>'+
      '</div>'
    :'<div style="font-size:12px;color:#bbb;">No costing data yet.</div>')+
  '</div>'+

  // Dimensions
  '<div class="card">'+
    '<div class="card-title">Packaging & Dimensions</div>'+
    (pkg?
      '<table><thead><tr><th>Level</th><th>Qty</th><th>L × W × H (cm)</th><th>Weight (kg)</th><th>CBM</th><th>Status</th></tr></thead><tbody>'+
      '<tr><td>Unit</td><td>1</td>'+
        '<td>'+(pkg.unit_length_cm?pkg.unit_length_cm+' × '+pkg.unit_width_cm+' × '+pkg.unit_height_cm:'—')+'</td>'+
        '<td>'+(pkg.unit_weight_kg||'—')+'</td>'+
        '<td>'+(pkg.unit_cbm||'—')+'</td>'+
        '<td>'+dSt(pkg.unit_dim_status)+'</td></tr>'+
      (sku.has_inner_carton?
        '<tr><td>Inner</td><td>'+(pkg.inner_qty||'—')+'</td>'+
        '<td>'+(pkg.inner_length_cm?pkg.inner_length_cm+' × '+pkg.inner_width_cm+' × '+pkg.inner_height_cm:'—')+'</td>'+
        '<td>'+(pkg.inner_weight_kg||'—')+'</td><td>—</td>'+
        '<td>'+dSt(pkg.inner_dim_status)+'</td></tr>':'')+
      '<tr><td>Master</td><td>'+(pkg.master_qty||'—')+'</td>'+
        '<td>'+(pkg.master_length_cm?pkg.master_length_cm+' × '+pkg.master_width_cm+' × '+pkg.master_height_cm:'—')+'</td>'+
        '<td>'+(pkg.master_weight_kg||'—')+'</td><td>—</td>'+
        '<td>'+dSt(pkg.master_dim_status)+'</td></tr>'+
      (sku.has_pallet?
        '<tr><td>Pallet</td><td>'+(pkg.pallet_qty||'—')+'</td>'+
        '<td>'+(pkg.pallet_length_cm?pkg.pallet_length_cm+' × '+pkg.pallet_width_cm+' × '+pkg.pallet_height_cm:'—')+'</td>'+
        '<td>'+(pkg.pallet_weight_kg||'—')+'</td><td>—</td><td>—</td></tr>':'')+
      '</tbody></table>'
    :'<div style="font-size:12px;color:#bbb;">No packaging data.</div>')+
  '</div>'+

  // Variations
  (vars.length?
    '<div class="card">'+
      '<div class="card-title">Variations</div>'+
      '<table><thead><tr><th>Type</th><th>Value</th><th>Model #</th><th>Unit UPC</th></tr></thead><tbody>'+
      vars.map(function(v){return '<tr><td>'+v.variation_type+'</td><td>'+v.variation_value+'</td><td style="font-family:monospace;font-size:11px;">'+v.model_number_full+'</td><td style="font-family:monospace;font-size:11px;">'+(v.upc_unit||'Pending')+'</td></tr>';}).join('')+
      '</tbody></table>'+
    '</div>'
  :'')+

  // Factory Sources
  '<div class="card">'+
    '<div class="card-title">Factory Sources</div>'+
    (sources.length?
      '<table><thead><tr><th>Factory</th><th>Country</th><th>FOB Price</th><th>Status</th><th>Effective</th></tr></thead><tbody>'+
      sources.map(function(s){var f=s.factories||{};var sc={active:'dim-ver',backup:'dim-est',discontinued:''};return '<tr><td style="font-weight:500;">'+f.factory_name_english+'</td><td>'+(f.country||'China')+'</td><td>$'+parseFloat(s.fob_price||0).toFixed(2)+'</td><td><span class="badge '+(sc[s.status]||'')+'">'+s.status+'</span></td><td style="font-size:11px;color:#aaa;">'+(s.effective_date||'—')+'</td></tr>';}).join('')+
      '</tbody></table>'
    :'<div style="font-size:12px;color:#bbb;">No factory sources.</div>')+
  '</div>'+

  // Certifications
  '<div class="card">'+
    '<div class="card-title">Certifications & Documents</div>'+
    (certs.length?
      '<div style="display:flex;flex-wrap:wrap;gap:8px;">'+
      certs.map(function(c){
        return '<a href="'+c.file_url+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:#f8f8f4;border:1px solid #e0e0d8;border-radius:7px;font-size:12px;text-decoration:none;color:#1a1a2e;">'+
          (c.cert_type==='INCI'?'🧴':'🏅')+' '+(c.cert_type||'Document')+
          (c.file_name&&c.file_name!==c.cert_type?'<span style="color:#aaa;font-size:10px;"> · '+c.file_name+'</span>':'')+
        '</a>';
      }).join('')+
      '</div>'
    :'<div style="font-size:12px;color:#bbb;">No certifications uploaded yet. Factories upload certs when submitting quotes.</div>')+
  '</div>'+

  // Production Runs
  '<div class="card">'+
    '<div class="card-title">Production Runs</div>'+
    (runs.length?
      '<table><thead><tr><th>Run #</th><th>Factory</th><th>Qty</th><th>Production Date</th><th>Expiry Date</th><th>Status</th></tr></thead><tbody>'+
      runs.map(function(r){
        var f=r.factories||{};
        var sc={planned:'#f0f0e8',in_production:'#eef2ff',qc:'#fff8e0',ready:'#edfaed',shipped:'#e0f0ff',received:'#edfaed',cancelled:'#fff0f0'};
        return '<tr>'+
          '<td style="font-family:monospace;font-size:11px;">'+r.run_number+'</td>'+
          '<td>'+f.factory_name_english+'</td>'+
          '<td>'+r.qty_ordered.toLocaleString()+'</td>'+
          '<td style="font-size:11px;">'+(r.production_date||'—')+'</td>'+
          '<td style="font-size:11px;color:'+(r.expiry_date?'#b00':'#aaa')+'">'+(r.expiry_date||'—')+'</td>'+
          '<td><span style="font-size:10px;padding:2px 6px;border-radius:5px;background:'+(sc[r.status]||'#f5f5f0')+';">'+r.status+'</span></td>'+
        '</tr>';
      }).join('')+
      '</tbody></table>'
    :'<div style="font-size:12px;color:#bbb;">No production runs yet.</div>')+
  '</div>'+

  // Sales History
  '<div class="card">'+
    '<div class="card-title">Sales History</div>'+
    (sales.length?
      '<table><thead><tr><th>Order #</th><th>Customer</th><th>Date</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody>'+
      sales.map(function(l){
        var o=l.customer_orders||{};var c=o.customers||{};
        return '<tr>'+
          '<td style="font-family:monospace;font-size:11px;">'+(o.order_number||'—')+'</td>'+
          '<td>'+(c.customer_name||'—')+'</td>'+
          '<td style="font-size:11px;">'+(o.order_date||'—')+'</td>'+
          '<td>'+l.qty_ordered.toLocaleString()+'</td>'+
          '<td>$'+parseFloat(l.unit_price||0).toFixed(2)+'</td>'+
          '<td style="font-weight:500;">$'+parseFloat(l.total_price||0).toFixed(2)+'</td>'+
        '</tr>';
      }).join('')+
      '</tbody></table>'
    :'<div style="font-size:12px;color:#bbb;">No sales history yet.</div>')+
  '</div>';

  det.innerHTML=html;
}

init();
</script>
</body>
</html>
