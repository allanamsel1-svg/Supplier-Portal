<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — TBG Sourcing</title>
<link rel="stylesheet" href="tenant-portal.css">
<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
<style>
  .ai-search { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 22px; }
  .ai-row { display: flex; gap: 10px; }
  .ai-input {
    flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 13px 16px; font-size: 14px; color: var(--text); outline: none;
  }
  .ai-input:focus { border-color: #3b82f6; }
  .ai-input::placeholder { color: var(--text2); }
  .ai-send {
    background: #2563eb; color: rgb(255,255,255); border: none; border-radius: 8px; padding: 0 18px;
    font-size: 18px; cursor: pointer; min-width: 52px;
  }
  .ai-send:hover { background: #1d4ed8; }
  .ai-send:disabled { background: #1e3a6e; cursor: not-allowed; }
  .ai-result { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; display: none; }
  .ai-result.open { display: block; }
  .ai-answer { font-size: 14px; line-height: 1.65; color: var(--text); white-space: pre-wrap; }
  .ai-sources { font-size: 11px; color: var(--text2); margin-top: 12px; }

  .widgets { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .widget {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px;
    cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; min-height: 200px;
  }
  .widget:hover { border-color: #2563eb; }
  .w-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .w-icon { font-size: 16px; }
  .w-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .w-count { font-size: 26px; font-weight: 700; color: var(--text); margin: 6px 0 10px; }
  .w-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .w-item { font-size: 12px; color: var(--text2); line-height: 1.4; }
  .w-item strong { color: var(--text); font-weight: 600; }
  .w-empty { font-size: 12px; color: var(--text2); flex: 1; display: flex; align-items: center; }
  .w-foot { margin-top: 12px; font-size: 12px; color: #3b82f6; text-align: right; }
  .up { color: #f87171; } .down { color: #4ade80; }

  .gauge-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; min-height: 200px; display: flex; flex-direction: column; }
  .gauge-card.warn { border-color: #f59e0b; }
  .gauge-card.danger { border-color: #ef4444; }
  .gauge-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .gauge-sub { font-size: 11px; color: var(--text2); margin-bottom: 14px; }
  .gauge-bar-wrap { position: relative; height: 20px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
  .gauge-bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
  .gauge-bar-pct { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 700; color: #fff; }
  .gauge-detail { font-size: 12px; color: var(--text2); display: flex; gap: 16px; flex-wrap: wrap; }
  .gauge-detail strong { color: var(--text); }
  .gauge-banner { border-radius: 8px; padding: 10px 14px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
  .gauge-banner.amber { background: rgba(251,191,36,0.12); border: 1px solid #f59e0b; color: #fbbf24; }
  .gauge-banner.red { background: rgba(239,68,68,0.12); border: 1px solid #ef4444; color: #f87171; }
  @keyframes gauge-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .gauge-bar-fill.capped { animation: gauge-pulse 1.5s infinite; }

  .gauge-actions { margin-top: auto; }
  .gauge-add-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; }
  .gauge-add-btn:hover { border-color: #3b82f6; color: #3b82f6; }
  .gauge-add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .gauge-confirm { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .gauge-confirm-yes { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .gauge-confirm-no { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 12px; color: var(--text2); cursor: pointer; }
</style>
</head>
<body>
<div id="sidebar"></div>

<div class="main">
  <div class="page-header">
    <div class="page-title">Dashboard</div>
    <div class="page-sub" id="welcomeMsg">Welcome back</div>
  </div>

  <!-- ROW 1 — AI Search -->
  <div class="ai-search">
    <div class="ai-row">
      <input class="ai-input" id="aiInput" type="search" placeholder="Ask anything about your sourcing, factories, products, intel..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="AI search">
      <button class="ai-send" id="aiSend" title="Ask">➤</button>
    </div>
    <div class="ai-result" id="aiResult">
      <div class="ai-answer" id="aiAnswer"></div>
      <div class="ai-sources" id="aiSources"></div>
    </div>
  </div>

  <!-- ROW 2 — Alert widgets -->
  <div class="widgets">
    <div class="widget" data-href="tenant-intel.html#pricetrends">
      <div class="w-head"><span class="w-icon">📉</span><span class="w-title">Price Tremors</span></div>
      <div class="w-count" id="pt-count">—</div>
      <div class="w-list" id="pt-list"></div>
      <div class="w-foot">View All →</div>
    </div>
    <div class="widget" data-href="tenant-operations.html#orders">
      <div class="w-head"><span class="w-icon">🏭</span><span class="w-title">Production Pipeline</span></div>
      <div class="w-count" id="pp-count">—</div>
      <div class="w-list" id="pp-list"></div>
      <div class="w-foot">View All →</div>
    </div>
    <div class="widget" data-href="tenant-rfq.html#pd">
      <div class="w-head"><span class="w-icon">🧪</span><span class="w-title">Sample Approval Queue</span></div>
      <div class="w-count" id="sa-count">—</div>
      <div class="w-list" id="sa-list"></div>
      <div class="w-foot">View All →</div>
    </div>
    <div class="widget" data-href="tenant-rfq.html#pd">
      <div class="w-head"><span class="w-icon">📋</span><span class="w-title">Product Development</span></div>
      <div class="w-count" id="pd-count">—</div>
      <div class="w-list" id="pd-list"></div>
      <div class="w-foot">View All →</div>
    </div>

    <div class="widget" id="inspectionWidget" data-href="tenant-operations.html#orders">
      <div class="w-head"><span class="w-icon">🔍</span><span class="w-title">Upcoming Inspections</span></div>
      <div class="w-count" id="insp-count">—</div>
      <div class="w-list" id="insp-list"></div>
      <div class="w-foot">View All →</div>
    </div>

    <div class="widget" id="actionWidget" data-href="tenant-operations.html#actions">
      <div class="w-head"><span class="w-icon">⚡</span><span class="w-title">Action Required</span></div>
      <div class="w-count" id="act-count">—</div>
      <div class="w-list" id="act-list"></div>
      <div class="w-foot">View All →</div>
    </div>

    <!-- 5th card — AI usage fuel gauge -->
    <div id="gaugeWidget" class="gauge-card"><div class="loading">Loading usage…</div></div>
  </div>
</div>

<script src="tenant-shared.js"></script>
<script>
let TID = null, TOKEN = null, user = null;
function daysSince(iso) { if (!iso) return null; const d = new Date(iso); if (isNaN(d)) return null; return Math.max(0, Math.floor((Date.now() - d.getTime()) / 864e5)); }

// ── AI Search ──
async function runSearch() {
  const input = document.getElementById('aiInput');
  const q = input.value.trim();
  if (!q) return;
  const btn = document.getElementById('aiSend');
  const result = document.getElementById('aiResult');
  const answerEl = document.getElementById('aiAnswer');
  const sourcesEl = document.getElementById('aiSources');
  btn.disabled = true;
  result.classList.add('open');
  answerEl.textContent = 'Thinking…';
  sourcesEl.textContent = '';
  try {
    const res = await fetch('/api/tenant-search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body: JSON.stringify({ query: q, tenant_id: TID }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok && !data.mode) { answerEl.textContent = data.error || 'Search failed.'; btn.disabled = false; return; }

    if (data.mode === 'action') {
      // Stash the extracted params so the destination page can pre-populate its form.
      try { sessionStorage.setItem('ai_action_params', JSON.stringify({ action: data.action, params: data.params || {}, ts: Date.now() })); } catch (e) {}
      answerEl.textContent = data.message || 'Opening…';
      sourcesEl.textContent = '';
      setTimeout(() => { location.href = data.url || 'tenant-dashboard.html'; }, 1200);
    } else if (data.mode === 'comparison') {
      answerEl.innerHTML = '<div style="border-left:3px solid #3b82f6;padding-left:12px;">' + renderMarkdown(data.answer || '') + '</div>';
      sourcesEl.textContent = (data.sources && data.sources.length) ? 'Sources: ' + data.sources.join(', ') : '';
    } else {
      // query mode (and any default)
      answerEl.innerHTML = renderMarkdown(data.answer || 'No answer returned.');
      sourcesEl.textContent = (data.sources && data.sources.length) ? 'Sources: ' + data.sources.join(', ') : '';
    }
  } catch (e) {
    answerEl.textContent = 'Connection error. Please try again.';
  }
  btn.disabled = false;
}

// Minimal markdown renderer: bold, ## headers, | tables |, - bullets, paragraphs.
function mdInline(s) {
  return esc(s)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(148,163,184,0.15);padding:1px 4px;border-radius:4px;">$1</code>');
}
function renderMarkdown(text) {
  const lines = String(text || '').replace(/\r/g, '').split('\n');
  let html = '', i = 0;
  const flushPara = (buf) => { if (buf.length) { html += '<p style="margin:6px 0;line-height:1.55;">' + buf.join('<br>') + '</p>'; } return []; };
  let para = [];
  while (i < lines.length) {
    let line = lines[i];
    // Table block: a line with | and the next line a separator row of ---
    if (/^\s*\|.*\|/.test(line) && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(lines[i + 1])) {
      para = flushPara(para);
      const headerCells = line.split('|').map(c => c.trim()).filter((c, idx, arr) => !(idx === 0 && c === '') && !(idx === arr.length - 1 && c === ''));
      i += 2; // skip header + separator
      let rows = '';
      while (i < lines.length && /^\s*\|.*\|/.test(lines[i])) {
        const cells = lines[i].split('|').map(c => c.trim()).filter((c, idx, arr) => !(idx === 0 && c === '') && !(idx === arr.length - 1 && c === ''));
        rows += '<tr>' + cells.map(c => `<td style="border:1px solid var(--border);padding:6px 9px;">${mdInline(c)}</td>`).join('') + '</tr>';
        i++;
      }
      html += `<table style="border-collapse:collapse;width:100%;margin:8px 0;font-size:12px;"><thead><tr>${headerCells.map(c => `<th style="border:1px solid var(--border);padding:6px 9px;text-align:left;background:rgba(148,163,184,0.12);">${mdInline(c)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;
      continue;
    }
    // Headers
    const h = line.match(/^(#{1,4})\s+(.*)$/);
    if (h) { para = flushPara(para); html += `<h3 style="font-size:14px;font-weight:700;margin:10px 0 4px;">${mdInline(h[2])}</h3>`; i++; continue; }
    // Bullets
    if (/^\s*[-*]\s+/.test(line)) {
      para = flushPara(para);
      let items = '';
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) { items += `<li style="margin:2px 0;">${mdInline(lines[i].replace(/^\s*[-*]\s+/, ''))}</li>`; i++; }
      html += `<ul style="margin:6px 0 6px 18px;line-height:1.5;">${items}</ul>`;
      continue;
    }
    // Blank line → paragraph break
    if (line.trim() === '') { para = flushPara(para); i++; continue; }
    para.push(mdInline(line));
    i++;
  }
  flushPara(para);
  return html || esc(text || '');
}

// ── Widget 1: Price Tremors ──
async function loadPriceTremors() {
  const rows = await supa(`shop_out_price_history?select=brand,product_name,previous_price,retail_price,unit_price,price_change_pct,price_change_direction,created_at,shop_outs!inner(tenant_id)&shop_outs.tenant_id=eq.${TID}&order=created_at.desc&limit=20`);
  const recent = rows.filter(r => { const d = daysSince(r.created_at); return d != null && d <= 7; });
  document.getElementById('pt-count').textContent = recent.length || rows.length;
  const list = document.getElementById('pt-list');
  const top = (recent.length ? recent : rows).slice(0, 3);
  if (!top.length) { list.innerHTML = '<div class="w-empty">No price changes detected</div>'; return; }
  list.innerHTML = top.map(r => {
    const dir = (r.price_change_direction || '').toLowerCase() === 'up' ? 'up' : 'down';
    const pctv = r.price_change_pct != null ? (r.price_change_pct > 0 ? '+' : '') + Number(r.price_change_pct).toFixed(0) + '%' : '';
    return `<div class="w-item"><strong>${esc(r.product_name || r.brand || 'Product')}</strong><br>${money(r.previous_price)} → ${money(r.retail_price != null ? r.retail_price : r.unit_price)} <span class="${dir}">${esc(pctv)}</span></div>`;
  }).join('');
}

// ── Widget 2: Production Pipeline ──
async function loadProduction() {
  // Active production = all open PO statuses (everything except closed / cancelled).
  const pos = await supa(`purchase_orders?tenant_id=eq.${TID}&status=in.(draft,pending_admin_signature,sent_to_factory,accepted_by_factory,in_production,shipped,received)&select=id,po_number,status,description_snapshot,factory_name_snapshot,expected_ship_date&order=created_at.desc`);
  console.log('[loadProduction] TID=', TID, '— active POs returned:', pos.length, pos);
  document.getElementById('pp-count').textContent = pos.length;
  const list = document.getElementById('pp-list');
  if (!pos.length) { list.innerHTML = '<div class="w-empty">No active production</div>'; return; }
  const ids = pos.map(p => p.id);
  const ms = await supa(`po_milestones?purchase_order_id=in.(${ids.join(',')})&select=purchase_order_id,milestone_type,agreed_date,display_order,status,completed_at&order=display_order.asc`);
  // Next incomplete milestone per PO: first one (by display_order) with completed_at null AND status not completed/done.
  const nextMilestone = {};
  ms.forEach(m => {
    if (m.completed_at != null) return;
    if (/^(completed|done)$/i.test((m.status || '').trim())) return;
    if (!nextMilestone[m.purchase_order_id]) nextMilestone[m.purchase_order_id] = m;
  });
  list.innerHTML = pos.slice(0, 3).map(p => {
    const nm = nextMilestone[p.id];
    const next = nm ? `${esc(nm.milestone_type || 'milestone')} · ${fmtDate(nm.agreed_date)}` : 'No upcoming milestone';
    const desc = p.description_snapshot ? esc(p.description_snapshot) : esc(p.factory_name_snapshot || '');
    return `<div class="w-item"><strong>${esc(p.po_number || 'PO')}</strong>${desc ? ' · ' + desc : ''}<br>${next}</div>`;
  }).join('');
}

// ── Widget 3: Sample Approval Queue ──
async function loadSamples() {
  const items = await supa(`product_development_items?tenant_id=eq.${TID}&select=*,product_development(pd_number,item_description)&order=created_at.desc`);
  const pending = items.filter(i => !/approved|rejected|closed|cancelled/i.test(i.status || ''));
  document.getElementById('sa-count').textContent = pending.length;
  const list = document.getElementById('sa-list');
  if (!pending.length) { list.innerHTML = '<div class="w-empty">No samples pending</div>'; return; }
  list.innerHTML = pending.slice(0, 3).map(i => {
    const pd = i.product_development || {};
    const name = pd.item_description || pd.pd_number || 'Item';
    const days = daysSince(i.created_at);
    return `<div class="w-item"><strong>${esc(name)}</strong><br>${esc((i.status || '').replace(/_/g, ' '))}${days != null ? ' · ' + days + 'd waiting' : ''}</div>`;
  }).join('');
}

// ── Widget 4: Product Development Queue ──
async function loadPD() {
  const rows = await supa(`product_development?tenant_id=eq.${TID}&order=created_at.desc&limit=10&select=pd_number,item_description,category,status,sku_lifecycle_status,created_at`);
  const active = rows.filter(r => r.status === 'pending' || r.sku_lifecycle_status === 'in_development');
  document.getElementById('pd-count').textContent = active.length;
  const list = document.getElementById('pd-list');
  if (!active.length) { list.innerHTML = '<div class="w-empty">No active development</div>'; return; }
  list.innerHTML = active.slice(0, 3).map(r => {
    const days = daysSince(r.created_at);
    return `<div class="w-item"><strong>${esc(r.item_description || r.pd_number || 'Project')}</strong><br>${esc(r.category || '—')} · ${esc(r.status || r.sku_lifecycle_status || '')}${days != null ? ' · ' + days + 'd' : ''}</div>`;
  }).join('');
}

// ── Widget 6: Upcoming Inspections ──
function daysUntil(iso) { if (!iso) return null; const d = new Date(iso + 'T00:00:00'); if (isNaN(d)) return null; const t = new Date(); t.setHours(0,0,0,0); return Math.round((d.getTime() - t.getTime()) / 864e5); }
function inspStatusBadge(s) {
  const map = {
    scheduled: ['#6b7280', 'rgba(107,114,128,0.15)'],
    factory_confirmed: ['#3b82f6', 'rgba(59,130,246,0.15)'],
    inspector_booked: ['#f59e0b', 'rgba(245,158,11,0.15)'],
    in_progress: ['#f59e0b', 'rgba(245,158,11,0.15)'],
    conditional_pass: ['#f59e0b', 'rgba(245,158,11,0.15)'],
    rework_required: ['#ef4444', 'rgba(239,68,68,0.15)'],
  };
  const [c, bg] = map[s] || ['#6b7280', 'rgba(107,114,128,0.15)'];
  return `<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;color:${c};background:${bg};">${esc((s || '').replace(/_/g, ' '))}</span>`;
}
async function loadInspections() {
  const today = new Date().toISOString().slice(0, 10);
  const rows = await supa(`inspections?tenant_id=eq.${TID}&scheduled_date=gte.${today}&status=not.in.(pass,fail,waived)&order=scheduled_date.asc&limit=10&select=id,scheduled_date,status,inspection_type,inspection_method,purchase_orders(po_number),factories(factory_name_english)`);
  const next30 = rows.filter(r => { const d = daysUntil(r.scheduled_date); return d != null && d <= 30; });
  const countEl = document.getElementById('insp-count');
  if (countEl) countEl.textContent = next30.length;
  const list = document.getElementById('insp-list');
  if (!list) return;
  if (!rows.length) { list.innerHTML = '<div class="w-empty">No upcoming inspections</div>'; return; }
  list.innerHTML = rows.slice(0, 3).map(r => {
    const po = (r.purchase_orders && r.purchase_orders.po_number) || 'PO';
    const fac = (r.factories && r.factories.factory_name_english) || '—';
    const d = daysUntil(r.scheduled_date);
    const dColor = d != null && d <= 3 ? '#ef4444' : d != null && d <= 7 ? '#f59e0b' : '#4ade80';
    const away = d != null ? `<span style="color:${dColor};font-weight:600;">${d}d away</span>` : '';
    return `<div class="w-item"><strong>${esc(po)}</strong> · ${esc(fac)}<br>${fmtDate(r.scheduled_date)} · ${away} ${inspStatusBadge(r.status)}</div>`;
  }).join('');
}

// ── Widget 7: Action Required ──
function actPriBadge(p) {
  const map = { critical: ['#ef4444', 'rgba(239,68,68,0.15)'], high: ['#f59e0b', 'rgba(245,158,11,0.15)'], medium: ['#3b82f6', 'rgba(59,130,246,0.15)'] };
  const [c, bg] = map[p] || map.medium;
  return `<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;color:${c};background:${bg};">${esc(p || 'medium')}</span>`;
}
async function loadActionItems() {
  const rows = await supa(`tenant_action_items?tenant_id=eq.${TID}&status=in.(open,acknowledged)&order=priority.asc,created_at.asc&limit=10`);
  const countEl = document.getElementById('act-count');
  if (countEl) countEl.textContent = rows.length;
  const list = document.getElementById('act-list');
  const card = document.getElementById('actionWidget');
  const hasCritical = rows.some(r => r.priority === 'critical');
  if (card) card.style.borderColor = hasCritical ? '#ef4444' : '';
  if (!list) return;
  if (!rows.length) { list.innerHTML = '<div class="w-empty">No pending actions</div>'; return; }
  list.innerHTML = rows.slice(0, 3).map(r => {
    const d = daysSince(r.created_at);
    return `<div class="w-item">${actPriBadge(r.priority)} <strong>${esc(r.title || '')}</strong>${d != null ? '<br>' + d + 'd old' : ''}</div>`;
  }).join('');
}

// ── Widget 5: AI Usage Fuel Gauge ──
async function loadGauge() {
  const cap = (user && user.tenant && user.tenant.api_cost_cap_usd) ? Number(user.tenant.api_cost_cap_usd) : 500;
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const monthName = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const nextReset = new Date(now.getFullYear(), now.getMonth() + 1, 1).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  const rows = await supa(`api_cost_log?tenant_id=eq.${TID}&created_at=gte.${monthStart}&select=cost_usd_marked_up`);
  const spent = rows.reduce((sum, r) => sum + (Number(r.cost_usd_marked_up) || 0), 0);
  const pct = cap > 0 ? Math.min((spent / cap) * 100, 100) : 0;
  const remaining = Math.max(cap - spent, 0);

  const color = pct >= 100 ? '#ef4444' : pct >= 90 ? '#f87171' : pct >= 75 ? '#fbbf24' : '#4ade80';
  const cardClass = pct >= 90 ? 'danger' : pct >= 75 ? 'warn' : '';
  const capped = pct >= 100;

  let banner = '';
  if (pct >= 100) banner = '<div class="gauge-banner red">🔴 Monthly AI cap reached. AI-powered features are disabled until next month. Contact your account manager.</div>';
  else if (pct >= 90) banner = '<div class="gauge-banner red">🚨 You are near your monthly AI usage limit. AI features may be restricted soon.</div>';
  else if (pct >= 75) banner = '<div class="gauge-banner amber">⚠ You are approaching your monthly AI usage limit.</div>';

  const el = document.getElementById('gaugeWidget');
  if (!el) return;
  el.className = 'gauge-card' + (cardClass ? ' ' + cardClass : '');
  el.innerHTML = `
    <div class="gauge-title">💡 AI Usage — ${monthName}</div>
    <div class="gauge-sub">$${spent.toFixed(2)} of $${cap.toFixed(2)} used this month · resets ${nextReset}</div>
    ${banner}
    <div class="gauge-bar-wrap">
      <div class="gauge-bar-fill${capped ? ' capped' : ''}" style="width:${pct.toFixed(1)}%;background:${color};"></div>
      <span class="gauge-bar-pct">${pct.toFixed(0)}%</span>
    </div>
    <div class="gauge-detail">
      <span><strong>$${spent.toFixed(2)}</strong> spent</span>
      <span><strong>$${remaining.toFixed(2)}</strong> remaining</span>
      <span>Monthly cap: <strong>$${cap.toFixed(2)}</strong> · resets 1st of each month</span>
    </div>
    <div class="gauge-actions" style="margin-top:12px;">
      <button class="gauge-add-btn" id="gaugeAddBtn" onclick="startCapIncrease()">+ $25 to cap</button>
      <div class="gauge-confirm" id="gaugeConfirm" style="display:none;">
        <span style="font-size:12px;color:var(--text);">Add $25/mo to cap? $${cap.toFixed(2)} → $${(cap+25).toFixed(2)}/mo</span>
        <button class="gauge-confirm-yes" id="gaugeConfirmYes" onclick="confirmCapIncrease()">Confirm</button>
        <button class="gauge-confirm-no" onclick="cancelCapIncrease()">Cancel</button>
      </div>
      <span class="gauge-add-ok" id="gaugeAddOk" style="display:none;font-size:12px;color:#4ade80;font-weight:600;"></span>
    </div>`;

  // Also drive the sticky mini gauge bar pinned below the header.
  const bar = document.getElementById('gaugeStickyFill');
  const tip = document.getElementById('gaugeStickyTip');
  const sticky = document.getElementById('gaugeStickyBar');
  if (bar && sticky) {
    bar.style.width = pct.toFixed(1) + '%';
    bar.style.background = color;
    sticky.style.display = 'block';
    if (tip) tip.textContent = '💡 AI ' + pct.toFixed(0) + '% · $' + spent.toFixed(2) + ' / $' + cap.toFixed(2);
  }
}

function startCapIncrease() {
  const btn = document.getElementById('gaugeAddBtn');
  const conf = document.getElementById('gaugeConfirm');
  if (!btn || !conf) return;
  btn.style.display = 'none';
  conf.style.display = 'flex';
}

function cancelCapIncrease() {
  const btn = document.getElementById('gaugeAddBtn');
  const conf = document.getElementById('gaugeConfirm');
  if (btn) btn.style.display = 'inline-block';
  if (conf) conf.style.display = 'none';
}

async function confirmCapIncrease() {
  const yesBtn = document.getElementById('gaugeConfirmYes');
  const conf = document.getElementById('gaugeConfirm');
  const ok = document.getElementById('gaugeAddOk');
  if (yesBtn) { yesBtn.disabled = true; yesBtn.textContent = 'Adding…'; }
  try {
    const r = await fetch('/api/tenant-cap-increase', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body: JSON.stringify({ amount: 25 })
    });
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.new_cap) {
      if (conf) conf.style.display = 'none';
      if (ok) { ok.textContent = '✓ Cap increased to $' + Number(d.new_cap).toFixed(2); ok.style.display = 'inline'; }
      // Update user tenant cap and reload gauge
      if (user && user.tenant) user.tenant.api_cost_cap_usd = d.new_cap;
      setTimeout(() => loadGauge(), 800);
    } else {
      if (yesBtn) { yesBtn.disabled = false; yesBtn.textContent = 'Confirm'; }
      alert('Could not increase cap: ' + (d.error || 'unknown error'));
    }
  } catch (e) {
    if (yesBtn) { yesBtn.disabled = false; yesBtn.textContent = 'Confirm'; }
    alert('Connection error. Please try again.');
  }
}

(async function init() {
  user = await tenantAuth();
  if (!user || !user.tenant) return;
  TID = user.tenant.id;
  TOKEN = localStorage.getItem('tenant_token');
  renderSidebar(user);
  document.getElementById('welcomeMsg').textContent = 'Welcome back, ' + (user.full_name || (user.email || '').split('@')[0]);
  document.title = user.tenant.name + ' — TBG Sourcing';

  document.getElementById('aiSend').addEventListener('click', runSearch);
  document.getElementById('aiInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
  document.querySelectorAll('.widget').forEach(w => w.addEventListener('click', () => { location.href = w.dataset.href; }));

  loadPriceTremors();
  loadProduction();
  loadSamples();
  loadPD();
  loadInspections();
  loadActionItems();
  loadGauge();
})();
</script>
</body>
</html>
