<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pending Categories — TBG Sourcing Admin</title>
<link rel="stylesheet" href="ri_shared.css">
<script>(function(){var t=localStorage.getItem('admin_theme')||'light';if(t==='dark')document.documentElement.classList.add('admin-dark');})();</script>
<script src="admin-theme.js"></script>
<style>
body{background:var(--bg);}
.wrap{padding:1.5rem;max-width:1100px;margin:0 auto;}
.pg-head{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.pg-sub{font-size:13px;color:#888;margin-bottom:20px;}
.cat-card{background:var(--bg2);border:1px solid var(--border,#e0e0d8);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.cat-name{font-size:16px;font-weight:700;color:var(--text);}
.cat-meta{font-size:12px;color:#888;margin-top:4px;}
.cat-meta b{color:var(--text);font-weight:600;}
.cat-actions{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap;}
.cat-actions input{padding:7px 10px;font-size:13px;border:1px solid var(--border,#e0e0d8);border-radius:7px;font-family:inherit;flex:1;min-width:200px;background:var(--bg);color:var(--text);}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;}
.btn-approve{background:#16a34a;color:#fff;}
.btn-approve:hover{background:#15803d;}
.btn-reject{background:transparent;color:#dc2626;border:1px solid #dc2626;}
.btn-reject:hover{background:rgba(220,38,38,0.08);}
.empty{text-align:center;color:#888;padding:40px;font-size:14px;}
.sec-title{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.05em;margin:28px 0 10px;cursor:pointer;}
.sec-title .chev{font-size:11px;color:#888;}
.done-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:0.5px solid var(--border);font-size:13px;color:var(--text);}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.b-approved{background:rgba(22,163,74,0.12);color:#16a34a;}
.b-rejected{background:rgba(220,38,38,0.12);color:#dc2626;}
.msg{font-size:12px;margin-top:8px;min-height:14px;}
</style>
</head>
<body>

<div class="wrap">
  <div class="pg-head">Pending Categories</div>
  <div class="pg-sub">Category names suggested by tenants while submitting RFQs. Approve to add them to the official product category list.</div>

  <div id="pending-box"><div class="empty">Loading…</div></div>

  <div class="sec-title" onclick="toggleDone()">Reviewed <span class="chev" id="done-chev">▶</span></div>
  <div id="done-box" style="display:none;"></div>
</div>

<script src="admin-shared.js"></script>
<script>
var SB='https://mjkjubctswjwjihxjpnd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
function g(id){return document.getElementById(id);}
function h(url,opts){opts=opts||{};opts.headers=opts.headers||{};opts.headers.apikey=KEY;opts.headers.Authorization='Bearer '+KEY;return fetch(url,opts);}
function esc(s){if(s==null)return'';return String(s).replace(/[<>&"]/g,function(c){return'&#'+c.charCodeAt(0)+';';});}
function fmtDate(s){ if(!s) return ''; try{ var d=new Date(s); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }

var tenantMap = {}, rfqMap = {};

async function jget(path){ try{ var r=await h(SB+'/rest/v1/'+path); return r.ok ? await r.json() : []; }catch(e){ return []; } }

async function loadMaps(rows){
  var tids = {}, rids = {};
  rows.forEach(function(r){ if(r.tenant_id) tids[r.tenant_id]=1; if(r.rfq_id) rids[r.rfq_id]=1; });
  var tlist = Object.keys(tids), rlist = Object.keys(rids);
  if(tlist.length){
    var ts = await jget('tenants?select=id,name&id=in.(' + tlist.map(encodeURIComponent).join(',') + ')');
    ts.forEach(function(t){ tenantMap[t.id]=t.name; });
  }
  if(rlist.length){
    var rs = await jget('rfqs?select=id,item_description&id=in.(' + rlist.map(encodeURIComponent).join(',') + ')');
    rs.forEach(function(r){ rfqMap[r.id]=r.item_description; });
  }
}

async function load(){
  var rows = await jget('pending_categories?select=*&order=created_at.desc');
  await loadMaps(rows);
  var pending = rows.filter(function(r){ return (r.status||'pending')==='pending'; });
  var done = rows.filter(function(r){ return (r.status||'pending')!=='pending'; });

  var box = g('pending-box');
  if(!pending.length){ box.innerHTML = '<div class="empty">🎉 No pending category suggestions.</div>'; }
  else {
    box.innerHTML = pending.map(function(r){
      var tn = tenantMap[r.tenant_id] || '(unknown tenant)';
      var rd = rfqMap[r.rfq_id] || '';
      return '<div class="cat-card" data-id="'+esc(r.id)+'">'
        + '<div class="cat-name">'+esc(r.suggested_name)+'</div>'
        + '<div class="cat-meta">Suggested by <b>'+esc(tn)+'</b>'
        + (rd ? ' · for RFQ: '+esc(rd) : '')
        + ' · '+esc(fmtDate(r.created_at))+'</div>'
        + '<div class="cat-actions">'
        + '<input id="off-'+esc(r.id)+'" placeholder="Official category name" value="'+esc(r.suggested_name)+'">'
        + '<button class="btn btn-approve" onclick="approve(\''+esc(r.id)+'\')">✓ Approve</button>'
        + '<button class="btn btn-reject" onclick="reject(\''+esc(r.id)+'\')">✕ Reject</button>'
        + '</div><div class="msg" id="msg-'+esc(r.id)+'"></div></div>';
    }).join('');
  }

  var dbox = g('done-box');
  dbox.innerHTML = done.length ? done.map(function(r){
    var tn = tenantMap[r.tenant_id] || '(unknown tenant)';
    var badge = r.status==='approved' ? '<span class="badge b-approved">approved'+(r.approved_as?' → '+esc(r.approved_as):'')+'</span>' : '<span class="badge b-rejected">rejected</span>';
    return '<div class="done-row"><span>'+esc(r.suggested_name)+' <span style="color:#888;font-size:12px;">· '+esc(tn)+'</span></span>'+badge+'</div>';
  }).join('') : '<div class="empty">Nothing reviewed yet.</div>';
}

async function approve(id){
  var off = (g('off-'+id) || {}).value || '';
  off = off.trim();
  var msg = g('msg-'+id);
  if(!off){ if(msg){ msg.style.color='#dc2626'; msg.textContent='Enter an official category name.'; } return; }
  if(msg){ msg.style.color='#888'; msg.textContent='Approving…'; }
  try {
    var r1 = await h(SB+'/rest/v1/pending_categories?id=eq.'+encodeURIComponent(id), {
      method:'PATCH',
      headers:{'Content-Type':'application/json', Prefer:'return=minimal'},
      body: JSON.stringify({ status:'approved', approved_as: off })
    });
    if(!r1.ok) throw new Error('patch failed');
    // Add to the official categories list so it appears in the RFQ category dropdowns
    // (tenant + admin). The categories table keys the name on the `category` column
    // (no name/is_active columns exist); other columns have safe defaults.
    await h(SB+'/rest/v1/categories', {
      method:'POST',
      headers:{'Content-Type':'application/json', Prefer:'return=minimal'},
      body: JSON.stringify({ category: off })
    }).catch(function(){});
    await load();
  } catch(e){ if(msg){ msg.style.color='#dc2626'; msg.textContent='Could not approve — try again.'; } }
}

async function reject(id){
  var msg = g('msg-'+id);
  if(msg){ msg.style.color='#888'; msg.textContent='Rejecting…'; }
  try {
    var r = await h(SB+'/rest/v1/pending_categories?id=eq.'+encodeURIComponent(id), {
      method:'PATCH',
      headers:{'Content-Type':'application/json', Prefer:'return=minimal'},
      body: JSON.stringify({ status:'rejected' })
    });
    if(!r.ok) throw new Error('patch failed');
    await load();
  } catch(e){ if(msg){ msg.style.color='#dc2626'; msg.textContent='Could not reject — try again.'; } }
}

function toggleDone(){
  var box = g('done-box'), chev = g('done-chev');
  var open = box.style.display !== 'none';
  box.style.display = open ? 'none' : 'block';
  chev.textContent = open ? '▶' : '▼';
}

load();
</script>
</body>
</html>
