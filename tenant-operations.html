<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations — TBG Sourcing</title>
<link rel="stylesheet" href="tenant-portal.css">
<script>(function(){var t=localStorage.getItem("tenant_theme")||"dark";document.documentElement.className=t==="light"?"light-mode":"";})();</script>
<style>
  .btn-sm{font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid var(--border,#334155);background:var(--card-bg,#1e293b);color:var(--text,#e2e8f0);cursor:pointer;}
  .btn-sm:hover{opacity:0.88;}
  .ti-field{margin:8px 0;}
  .ti-field label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text2,#94a3b8);}
  .ti-field input,.ti-field select,.ti-field textarea{width:100%;padding:8px 10px;border:1px solid var(--border,#334155);border-radius:7px;background:var(--card-bg,#0f172a);color:var(--text,#e2e8f0);font-size:13px;font-family:inherit;}
  .ti-field textarea{min-height:60px;resize:vertical;}
  /* Inline Artwork tab (ported from tenant-artwork.html, prefixed to avoid clashes) */
  .aw-layout{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start;}
  @media(max-width:900px){.aw-layout{grid-template-columns:1fr;}}
  .aw-left{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .aw-lhead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
  .aw-lhead h2{font-size:16px;font-weight:700;}
  .aw-tabs{display:flex;gap:2px;padding:8px 10px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
  .aw-tab{padding:5px 9px;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text2);border-radius:6px;font-family:inherit;}
  .aw-tab.active{background:var(--bg);color:var(--text);}
  .aw-search{padding:10px 12px;border-bottom:1px solid var(--border);}
  .aw-search input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;}
  .aw-row{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
  .aw-row:hover,.aw-row.sel{background:var(--bg);}.aw-row.sel{border-left:3px solid #3b82f6;}
  .aw-row-top{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:4px;}.aw-pn{font-size:13px;font-weight:700;}
  .aw-right{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;min-height:300px;}
  .awbadge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;margin-right:4px;}
  .aw-sec{border-top:1px solid var(--border);padding-top:14px;margin-top:14px;}.aw-sec:first-child{border-top:none;padding-top:0;margin-top:0;}
  .aw-sec h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text2);margin-bottom:10px;}
  .aw-kvr{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:4px 0;}.aw-kvr .k{color:var(--text2);}.aw-kvr .v{font-weight:600;text-align:right;}
  .aw-ffield{margin:8px 0;}.aw-ffield label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text2);}
  .aw-ffield input,.aw-ffield select,.aw-ffield textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;}
  .aw-ffield textarea{min-height:60px;resize:vertical;}
  .aw-preview{width:100%;height:420px;border:1px solid var(--border);border-radius:8px;background:var(--bg);}
  .aw-chk{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;}
  .aw-cmt{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;}.aw-cmt .ch{font-size:11px;color:var(--text2);margin-bottom:4px;}
  .aw-copybox{display:flex;gap:6px;align-items:center;margin-top:6px;}.aw-copybox input{flex:1;font-size:11px;padding:7px 9px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);}
  .aw-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem;}
  .aw-modal-bg.open{display:flex;}
  .aw-modal{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.5rem;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;}
  .aw-modal h2{font-size:16px;font-weight:700;margin-bottom:1rem;}
  .aw-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
  .aw-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .aw-btn.green{background:#16a34a;}.aw-btn.red{background:#dc2626;}.aw-btn.alt{background:var(--bg);color:var(--text);border:1px solid var(--border);}
</style>
</head>
<body>
<div id="sidebar"></div>

<div class="main">
  <div class="page-header">
    <div class="page-title">Operations</div>
    <div class="page-sub" id="pageSub">Orders, credit, and operational workflows</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-tab="orders">Open Orders <span class="tab-count" id="cnt-orders"></span></button>
    <button class="tab" data-tab="warehouse">Warehouse</button>
    <button class="tab" data-tab="accounting">Accounting</button>

    <button class="tab" data-tab="inspections">🔍 Inspections</button>
    <button class="tab" data-tab="certifications">📜 Certifications</button>
    <button class="tab" data-tab="forecasting">Forecasting</button>
    <button class="tab" data-tab="actions">Actions <span class="tab-count" id="cnt-actions"></span></button>
    <button class="tab" data-tab="artwork">🎨 Artwork</button>
  </div>

  <div class="tab-pane" id="pane-orders"><div id="box-orders"><div class="loading">Loading open orders…</div></div></div>
  <div class="tab-pane" id="pane-warehouse"></div>
  <div class="tab-pane" id="pane-accounting"></div>
  <div class="tab-pane" id="pane-credit"><div id="box-credit"><div class="loading">Loading credit checks…</div></div></div>
  <div class="tab-pane" id="pane-forecasting"></div>
  <div class="tab-pane" id="pane-actions"><div id="box-actions"><div class="loading">Loading action items…</div></div></div>
  <div class="tab-pane" id="pane-inspections"></div>
  <div class="tab-pane" id="pane-certifications"><div id="box-certs"><div class="loading">Loading certifications…</div></div></div>
  <div class="tab-pane" id="pane-artwork"><div class="loading">Loading artwork…</div></div>
</div>

<div class="panel-overlay" id="panelOverlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-head">
    <div><h2 id="panelTitle"></h2><div class="sub" id="panelSub"></div></div>
    <button class="panel-close" id="panelCloseBtn">×</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<div class="aw-modal-bg" id="awNewModal">
  <div class="aw-modal">
    <h2>New Artwork Project</h2>
    <div class="aw-ffield"><label>Product name</label><input id="np-name"></div>
    <div class="aw-ffield"><label>Link to SKU (optional)</label><select id="np-sku"><option value="">None</option></select></div>
    <div class="aw-ffield"><label>Artwork types</label><div id="np-types" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;"><input type="checkbox" value="packaging" checked> Packaging</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;"><input type="checkbox" value="label"> Label</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;"><input type="checkbox" value="catalog"> Catalog Sheet</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;"><input type="checkbox" value="cmf"> CMF</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;"><input type="checkbox" value="other"> Other</label>
    </div></div>
    <div class="aw-ffield"><label>Color profile</label><select id="np-color"><option>CMYK</option><option>Pantone</option><option>CMYK+Pantone</option><option>RGB</option></select></div>
    <div class="aw-ffield"><label>Print finish</label><select id="np-finish"><option>Gloss</option><option>Matte</option><option>Soft Touch</option><option>Uncoated</option><option>Other</option></select></div>
    <div class="aw-ffield"><label>Due date</label><input id="np-due" type="date"></div>
    <div class="aw-ffield"><label>Assign designer</label><select id="np-designer"><option value="">Unassigned</option></select></div>
    <div class="aw-ffield"><label>Brief notes</label><textarea id="np-brief"></textarea></div>
    <div class="aw-ffield"><label>Special instructions</label><textarea id="np-special"></textarea></div>
    <label style="font-size:13px;display:flex;gap:8px;align-items:center;"><input type="checkbox" id="np-dieline" checked> Dieline required</label>
    <div class="aw-ffield"><div id="np-err" style="color:#f87171;font-size:12px;display:none;"></div></div>
    <div class="aw-modal-actions"><button class="aw-btn alt" onclick="awCloseNew()">Cancel</button><button class="aw-btn" id="np-save" onclick="awSaveProject()">Create Project</button></div>
  </div>
</div>

<script src="tenant-shared.js"></script>
<script>
const TABS = ['orders', 'warehouse', 'accounting', 'credit', 'inspections', 'certifications', 'forecasting', 'actions', 'artwork'];
let OPS_USER = null;
const BETA = { warehouse: 'Warehouse', accounting: 'Accounting', forecasting: 'Forecasting' };
let TID = null;
function opsToken() { return localStorage.getItem('tenant_token'); }
const OPS_SB = 'https://mjkjubctswjwjihxjpnd.supabase.co';
const OPS_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qa2p1YmN0c3dqd2ppaHhqcG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQxNjcsImV4cCI6MjA5Mjk0MDE2N30.cZrD_ymrDsRPyfX_g3hUui5_JXuW6BgE77QkIoGpqHo';
async function opsPatch(path, body) { try { const r = await fetch(OPS_SB + '/rest/v1/' + path, { method: 'PATCH', headers: { apikey: OPS_KEY, Authorization: 'Bearer ' + OPS_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' }, body: JSON.stringify(body) }); return r.ok; } catch (e) { return false; } }
async function tenantInspApi(body) { const r = await fetch('/api/tenant-inspection-update', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + opsToken() }, body: JSON.stringify(body) }); return r.json().catch(() => ({})); }
async function tenantActionApi(body) { const r = await fetch('/api/tenant-action-update', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + opsToken() }, body: JSON.stringify(body) }); return r.json().catch(() => ({})); }
let ACTION_ITEMS = [], ACTION_FILTER = 'open';
let orders = [], milestonesByPo = {}, factoryMap = {};
const loaded = {};

function comingSoon(title) {
  return `<div class="empty"><span class="empty-icon">🚧</span><div style="font-size:16px;color:#cbd5e1;margin-bottom:6px;">${esc(title)}</div>Coming Soon — this module is in beta.</div>`;
}

function showTab(tab) {
  if (!TABS.includes(tab)) tab = 'orders';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  if (BETA[tab]) { document.getElementById('pane-' + tab).innerHTML = comingSoon(BETA[tab] + ' — Coming Soon'); return; }
  if (tab === 'credit' && !loaded.credit) { loaded.credit = true; loadCredit(); }
  if (tab === 'actions' && !loaded.actions) { loaded.actions = true; loadActions(); }
  if (tab === 'artwork' && !loaded.artwork) { loaded.artwork = true; awInit(); }
  if (tab === 'inspections' && !loaded.inspections) { loaded.inspections = true; loadInspectionsTab(); }
  if (tab === 'certifications' && !loaded.certifications) { loaded.certifications = true; loadCertifications(); }
}
// Inspections tab — embed the existing tenant-inspections page (full functionality, no nested sidebar).
function loadInspectionsTab() {
  document.getElementById('pane-inspections').innerHTML =
    '<iframe title="Inspections" src="tenant-inspections.html?embed=1" style="width:100%;height:calc(100vh - 200px);min-height:480px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);"></iframe>';
}
// Certifications tab — factory certifications for this tenant.
function certStatusBadge(s) {
  const map = { active: ['#22c55e', 'rgba(34,197,94,0.15)'], expiring_soon: ['#f59e0b', 'rgba(245,158,11,0.15)'], expired: ['#ef4444', 'rgba(239,68,68,0.15)'] };
  const c = map[s] || ['#94a3b8', 'rgba(148,163,184,0.15)'];
  return `<span class="badge" style="color:${c[0]};background:${c[1]};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;">${esc((s || 'pending').replace(/_/g, ' '))}</span>`;
}
async function loadCertifications() {
  const box = document.getElementById('box-certs');
  const rows = await supa(`factory_certifications?tenant_id=eq.${TID}&select=*,factories(factory_name_english)&order=expiry_date.asc.nullslast`);
  if (!rows.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">📜</span>No certifications on record.</div>'; return; }
  box.innerHTML = `<table class="data-table"><thead><tr><th>Factory</th><th>Certification</th><th>Status</th><th>Expiry</th><th>Certificate #</th></tr></thead><tbody>${
    rows.map(c => `<tr><td>${esc((c.factories && c.factories.factory_name_english) || '—')}</td>
      <td>${esc(c.certification_name || '—')}</td><td>${certStatusBadge(c.status)}</td>
      <td>${fmtDate(c.expiry_date)}</td><td>${esc(c.certificate_number || '—')}</td></tr>`).join('')
  }</tbody></table>`;
}
function goTab(tab) { location.hash = tab === 'orders' ? '' : '#' + tab; }

const OPEN_EXCLUDE = ['cancelled', 'canceled', 'closed', 'complete', 'completed'];

async function loadOrders() {
  orders = await supa(`purchase_orders?tenant_id=eq.${TID}&select=*,factories(factory_name_english)&order=created_at.desc`);
  orders = orders.filter(o => !OPEN_EXCLUDE.includes((o.status || '').toLowerCase()));
  document.getElementById('cnt-orders').textContent = orders.length;

  // Fetch milestones for these POs in one shot (no FK embed available).
  const ids = orders.map(o => o.id);
  if (ids.length) {
    const ms = await supa(`po_milestones?purchase_order_id=in.(${ids.join(',')})&select=purchase_order_id,milestone_type,status,agreed_date,revised_date,completed_at&order=display_order.asc`);
    milestonesByPo = {};
    ms.forEach(m => { (milestonesByPo[m.purchase_order_id] = milestonesByPo[m.purchase_order_id] || []).push(m); });
  }
  renderOrders();
}

function poFactory(o) { return (o.factories && o.factories.factory_name_english) || o.factory_name_snapshot || '—'; }
function poValue(o) {
  if (o.subtotal_fob != null) return Number(o.subtotal_fob);
  if (o.quantity != null && o.unit_fob_price != null) return Number(o.quantity) * Number(o.unit_fob_price);
  return null;
}
function msProgress(id) {
  const ms = milestonesByPo[id] || [];
  if (!ms.length) return '—';
  const done = ms.filter(m => m.completed_at || /complete|done/i.test(m.status || '')).length;
  return `${done}/${ms.length}`;
}

function renderOrders() {
  const box = document.getElementById('box-orders');
  if (!orders.length) { box.innerHTML = '<div class="empty"><span class="empty-icon">📦</span>No open orders.</div>'; return; }
  box.innerHTML = `<table class="data-table"><thead><tr><th>PO #</th><th>Factory</th><th>Status</th><th>Value</th><th>Expected ship</th><th>Milestones</th></tr></thead><tbody>${
    orders.map(o => `<tr class="clickable" data-id="${esc(o.id)}">
      <td>${esc(o.po_number || '—')}</td><td>${esc(poFactory(o))}</td><td>${statusBadge(o.status)}</td>
      <td>${money(poValue(o))}</td><td>${fmtDate(o.expected_ship_date)}</td><td>${msProgress(o.id)}</td></tr>`).join('')
  }</tbody></table>`;
  box.querySelectorAll('tr.clickable').forEach(tr => tr.addEventListener('click', () => openPO(tr.dataset.id)));
}

async function openPO(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  openPanel('PO ' + (o.po_number || ''), poFactory(o), '<div class="loading">Loading details…</div>');
  const lines = await supa(`purchase_order_lines?po_id=eq.${id}&select=*,skus(model_number,description)&order=created_at.asc`);
  const ms = milestonesByPo[id] || await supa(`po_milestones?purchase_order_id=eq.${id}&select=*&order=display_order.asc`);

  const details = kv([
    ['PO #', o.po_number],
    ['Status', statusBadge(o.status), true],
    ['Factory', poFactory(o)],
    ['Quantity', o.quantity != null ? Number(o.quantity).toLocaleString() : null],
    ['Unit FOB', o.unit_fob_price ? money(o.unit_fob_price) : null],
    ['Subtotal FOB', poValue(o) != null ? money(poValue(o)) : null],
    ['Currency', o.currency],
    ['Payment terms', o.payment_terms],
    ['Incoterm', o.factory_incoterm],
    ['FOB port', o.fob_port],
    ['Expected ship', fmtDate(o.expected_ship_date)],
    ['Expected arrival', fmtDate(o.expected_arrival_date)],
    ['Destination', [o.destination_port, o.destination_country].filter(Boolean).join(', ')],
    ['Customer PO ref', o.customer_po_reference],
    ['Created', fmtDate(o.created_at)],
  ]);

  const lineItems = lines.length ? `<table class="data-table"><thead><tr><th>SKU</th><th>Qty</th><th>Recv</th><th>Unit FOB</th><th>Total</th></tr></thead><tbody>${
    lines.map(l => `<tr><td>${esc(l.skus ? (l.skus.model_number || l.skus.description || '') : (l.sku_id || '—'))}</td>
      <td>${l.qty_ordered != null ? Number(l.qty_ordered).toLocaleString() : '—'}</td>
      <td>${l.qty_received != null ? Number(l.qty_received).toLocaleString() : '—'}</td>
      <td>${money(l.unit_fob_price)}</td><td>${money(l.total_fob_value)}</td></tr>`).join('')
  }</tbody></table>` : '<div class="empty" style="padding:12px;">No line items.</div>';

  const msItems = ms.length ? ms.map(m => `<div class="sub-item">
      <div class="si-title">${esc(m.milestone_type || 'Milestone')} ${statusBadge(m.status)}</div>
      <div class="si-meta">${[m.agreed_date && 'agreed ' + fmtDate(m.agreed_date), m.revised_date && 'revised ' + fmtDate(m.revised_date), m.completed_at && 'completed ' + fmtDate(m.completed_at)].filter(Boolean).map(esc).join(' · ') || 'Pending'}</div>
    </div>`).join('') : '<div class="empty" style="padding:12px;">No milestones.</div>';

  const docs = [
    ['Purchase order PDF', o.pdf_path], ['Signed PDF', o.signed_pdf_path],
    ['CMF document', o.cmf_doc_path], ['Artwork', o.artwork_doc_path],
  ].filter(d => d[1]);
  const docItems = docs.length ? docs.map(d => `<div class="sub-item"><div class="si-title">${esc(d[0])}</div><div class="si-meta">${esc(d[1])}</div></div>`).join('')
    : '<div class="empty" style="padding:12px;">No documents.</div>';

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section"><h3>Order Details</h3>${details}</div>
    <div class="panel-section"><h3>Line Items (${lines.length})</h3>${lineItems}</div>
    <div class="panel-section"><h3>Milestones (${ms.length})</h3><div class="sub-list">${msItems}</div></div>
    <div class="panel-section"><h3>Documents</h3><div class="sub-list">${docItems}</div></div>
    <div class="panel-section" id="po-inspection"><h3>Inspection</h3><div class="loading">Loading inspection…</div></div>
  `;
  loadPOInspection(o);
}

// ── PART 3: Inspection panel on the PO detail ──
function inspStatusBadgeOps(s) {
  const map = { scheduled: ['#6b7280', 'rgba(107,114,128,0.15)'], factory_confirmed: ['#3b82f6', 'rgba(59,130,246,0.15)'], inspector_booked: ['#f59e0b', 'rgba(245,158,11,0.15)'], in_progress: ['#f59e0b', 'rgba(245,158,11,0.15)'], pass: ['#22c55e', 'rgba(34,197,94,0.15)'], fail: ['#ef4444', 'rgba(239,68,68,0.15)'], conditional_pass: ['#f59e0b', 'rgba(245,158,11,0.15)'], waived: ['#6b7280', 'rgba(107,114,128,0.15)'], rework_required: ['#ef4444', 'rgba(239,68,68,0.15)'] };
  const c = map[s] || ['#6b7280', 'rgba(107,114,128,0.15)'];
  return `<span class="badge" style="color:${c[0]};background:${c[1]};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;">${esc((s || '').replace(/_/g, ' '))}</span>`;
}
function daysUntilOps(d) { if (!d) return null; const t = new Date(); t.setHours(0, 0, 0, 0); const x = new Date(d + 'T00:00:00'); if (isNaN(x)) return null; return Math.round((x - t) / 864e5); }
function aqlRecommendation(qty, firstTime) {
  let rec;
  if (firstTime) rec = 'New supplier — recommend AQL 1.0 Level II';
  else if (qty < 500) rec = 'Skip formal AQL — recommend 100% visual for small orders';
  else if (qty <= 2000) rec = 'Recommend AQL 2.5 Level II (standard) — sample ~80 units | Critical: 0 | Major: 5 | Minor: 14';
  else if (qty <= 10000) rec = 'Recommend AQL 2.5 Level II — sample ~125-200 units | Critical: 0 | Major: 7 | Minor: 21';
  else rec = 'Recommend AQL 1.5 Level II (tighter for large orders) — sample ~200+ units | Critical: 0 | Major: 3 | Minor: 10';
  // recommended config to apply on "Use Recommended"
  let cfg;
  if (firstTime) cfg = { aql_level: 1.0, inspection_level: 'II', sample_size: 80, critical_defects_allowed: 0, major_defects_allowed: 1, minor_defects_allowed: 3 };

let CUR_INSP = null, CUR_PO = null;

    }

      const photo = d.photo_url ? `<img src="${esc(d.photo_url)}" style="max-width:80px;border-radius:6px;margin-top:6px;cursor:pointer;" onclick="window.open('${esc(d.photo_url)}','_blank')">` : '';
      const actioned = d.tenant_action ? `<div class="si-meta">Your decision: <strong>${esc(d.tenant_action)}</strong>${d.tenant_action_notes ? ' — ' + esc(d.tenant_action_notes) : ''}</div>` :
        `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn-sm" style="background:#16a34a;color:#fff;" onclick="tiDefect('${d.id}','accept')">✓ Accept</button>
          <button class="btn-sm" style="background:#dc2626;color:#fff;" onclick="tiDefect('${d.id}','reject')">✗ Reject &amp; Request Rework</button>

      return `<div class="sub-item"><div class="si-title">${esc(d.defect_type)} · ${esc(d.defect_category || '—')}</div><div class="si-meta">${esc(d.description || '')} (qty ${esc(d.qty_affected != null ? d.qty_affected : 1)})</div>${photo}${actioned}</div>`;

          <button class="btn-sm" style="background:#dc2626;color:#fff;" onclick="tiRequestRework('UPC correction required: ${esc(upcMm.upc_actual || '')} → ${esc(upcMm.upc_spec || '')}')">Request Rework</button>
        </div></div>`;
    }
    html += '</div>';
  }

  // Outcome (read-only)
  if (insp.outcome) {
    html += `<div class="sub-item"><div class="si-title">Outcome: ${inspStatusBadgeOps(insp.outcome)}</div>${insp.outcome_notes ? '<div class="si-meta">' + esc(insp.outcome_notes) + '</div>' : ''}${insp.report_url ? '<div style="margin-top:6px;"><a class="btn-sm" style="background:#3b82f6;color:#fff;text-decoration:none;" href="' + esc(insp.report_url) + '" target="_blank">Download Report</a></div>' : ''}</div>`;
  }

  // Factory confirmation status
  const conf = await supa(`inspection_confirmations?inspection_id=eq.${insp.id}&select=*&order=sent_at.desc&limit=1`);
  if (conf.length) {
    const c = conf[0]; const dago = daysUntilOps((c.sent_at || '').slice(0, 10));
    const st = c.factory_responded_at ? (c.confirmed ? 'Confirmed ✓' : 'Flagged ⚠') : 'Pending';
    html += `<div class="si-meta" style="margin-top:8px;">Factory confirmation: sent ${dago != null ? Math.abs(dago) + ' day(s) ago' : (c.sent_at || '').slice(0, 10)} · ${st}</div>`;
  }

  box.innerHTML = html;
}

function priBadge(p) { const m = { critical: ['#ef4444', 'rgba(239,68,68,0.15)'], high: ['#f59e0b', 'rgba(245,158,11,0.15)'], medium: ['#3b82f6', 'rgba(59,130,246,0.15)'] }; const c = m[p] || m.medium; return `<span class="badge" style="color:${c[0]};background:${c[1]};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;">${esc(p || 'medium')}</span>`; }
function daysOld(iso) { if (!iso) return ''; const d = Math.floor((Date.now() - new Date(iso).getTime()) / 864e5); return d + 'd old'; }
async function loadActions() {

function setActionFilter(f) { ACTION_FILTER = f; renderActions(); }
function renderActions() {
  const box = document.getElementById('box-actions');
  const filters = ['all', 'open', 'acknowledged', 'completed', 'ignored'];
  const labelMap = { all: 'All', open: 'Open', acknowledged: 'Acknowledged', completed: 'Completed', ignored: 'Ignored' };
  const statusFor = { open: ['open'], acknowledged: ['acknowledged'], completed: ['completed'], ignored: ['intentionally_ignored'] };
  const bar = `<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">${filters.map(f => `<button class="btn-sm" style="${ACTION_FILTER === f ? 'background:#3b82f6;color:#fff;' : ''}" onclick="setActionFilter('${f}')">${labelMap[f]}</button>`).join('')}</div>`;

  if (!rows.length) { box.innerHTML = bar + '<div class="empty"><span class="empty-icon">✅</span>No action items.</div>'; return; }

    else footer = `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn-sm" style="background:#16a34a;color:#fff;" onclick="actDo('${a.id}','complete')">✓ Done</button>

  if(AW_SEL){var s=AW_PROJECTS.find(function(x){return x.id===AW_SEL;});if(s)awRenderDetail(s);}
}
function awMatch(p){if(AW_FILTER==='all')return true;if(AW_FILTER==='in_progress')return ['brief_created','assets_uploaded','designer_assigned','in_progress','submitted','internal_review','revision_requested'].indexOf(p.status)>-1;if(AW_FILTER==='awaiting_review')return ['submitted','internal_review','tenant_review'].indexOf(p.status)>-1;if(AW_FILTER==='approved')return ['tenant_approved','locked'].indexOf(p.status)>-1;if(AW_FILTER==='factory_review')return ['sent_to_factory','factory_reviewing','factory_flagged','negotiating','factory_approved'].indexOf(p.status)>-1;return true;}
function awSetFilter(f){AW_FILTER=f;document.querySelectorAll('#awTabs .aw-tab').forEach(function(t){t.classList.toggle('active',t.dataset.f===f);});awRenderList();}
function awRenderList(){
  var q=(awg('awSearch').value||'').toLowerCase().trim();
  var rows=AW_PROJECTS.filter(awMatch).filter(function(p){return !q||(p.product_name||'').toLowerCase().indexOf(q)>-1;});
  var box=awg('awList');
  if(!rows.length){box.innerHTML='<div class="empty" style="padding:2rem 1rem;">No projects.</div>';return;}
  box.innerHTML=rows.map(function(p){return '<div class="aw-row'+(p.id===AW_SEL?' sel':'')+'" onclick="awSelect(\''+p.id+'\')">'+
    '<div class="aw-row-top"><span class="aw-pn">'+esc(p.product_name||'Untitled')+'</span>'+awStatusBadge(p.status)+'</div>'+
    '<div style="margin:3px 0;">'+awTypeBadges(p.artwork_types)+'</div>'+
    '<div style="font-size:11px;color:var(--text2);">'+esc(awDesignerName(p))+(p.due_date?' · due '+fmtDate(p.due_date):'')+'</div></div>';}).join('');
}
function awSelect(id){AW_SEL=id;awRenderList();var p=AW_PROJECTS.find(function(x){return x.id===id;});if(p)awRenderDetail(p);}

// ── Part 5: priority reorder for status='ready_for_design' ──
var AW_PRIO=[];
function awDaysWaiting(s){if(!s)return '';var d=Math.floor((Date.now()-new Date(s).getTime())/86400000);return d+' day'+(d===1?'':'s')+' waiting';}
function awOpenPriority(){
  AW_SEL=null; awRenderList();
  AW_PRIO=AW_PROJECTS.filter(function(p){return p.status==='ready_for_design';})
    .sort(function(a,b){var pa=a.priority==null?9999:a.priority,pb=b.priority==null?9999:b.priority;return pa-pb||(new Date(a.created_at)-new Date(b.created_at));});
  awRenderPriority();
}
function awRenderPriority(){
  var host=awg('awDetail');
  if(!AW_PRIO.length){host.innerHTML='<div class="aw-sec"><h3>Design Queue Priority</h3><div class="empty">No briefs are waiting for design (status “ready for design”).</div></div>';return;}
  var rows=AW_PRIO.map(function(p,i){
    return '<div class="aw-prio-row" draggable="true" data-id="'+esc(p.id)+'" data-idx="'+i+'" '+
      'ondragstart="awPrioDragStart(event)" ondragover="awPrioDragOver(event)" ondrop="awPrioDrop(event)" ondragend="awPrioDragEnd(event)" '+
      'style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--card-bg);cursor:grab;">'+
      '<span style="font-size:16px;color:var(--text2);cursor:grab;" title="Drag to reorder">↕</span>'+
      '<div style="flex:1;min-width:0;"><div style="font-weight:600;">'+esc(p.product_name||'Untitled')+'</div>'+
        '<div style="font-size:11px;color:var(--text2);">'+esc(awDesignerName(p))+' · '+esc(awDaysWaiting(p.created_at))+'</div></div>'+
      '<input type="number" min="0" value="'+(p.priority==null?'':p.priority)+'" style="width:72px;padding:5px 7px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);" '+
        'onchange="awPrioSetManual(\''+esc(p.id)+'\',this.value)" title="Set priority (lower = earlier)">'+
    '</div>';
  }).join('');
  host.innerHTML='<div class="aw-sec"><h3>Design Queue Priority</h3>'+
    '<div style="font-size:12px;color:var(--text2);margin-bottom:10px;">Drag to reorder, or type a priority number (lower = earlier in the queue).</div>'+
    rows+'<div id="awPrioMsg" style="font-size:12px;color:#22c55e;margin-top:8px;"></div></div>';
}
var _awPrioDrag=null;
function awPrioDragStart(e){_awPrioDrag=e.currentTarget.getAttribute('data-id');try{e.dataTransfer.effectAllowed='move';}catch(_){}}
function awPrioDragOver(e){e.preventDefault();}
function awPrioDragEnd(e){_awPrioDrag=null;}
function awPrioDrop(e){
  e.preventDefault();
  var targetId=e.currentTarget.getAttribute('data-id');
  if(!_awPrioDrag||_awPrioDrag===targetId)return;
  var from=AW_PRIO.findIndex(function(p){return p.id===_awPrioDrag;});
  var to=AW_PRIO.findIndex(function(p){return p.id===targetId;});
  if(from<0||to<0)return;
  var moved=AW_PRIO.splice(from,1)[0];
  AW_PRIO.splice(to,0,moved);
  awPrioPersist();
}
function awPrioSetManual(id,val){
  var n=parseInt(val,10); if(isNaN(n))return;
  var p=AW_PRIO.find(function(x){return x.id===id;}); if(p)p.priority=n;
  AW_PRIO.sort(function(a,b){var pa=a.priority==null?9999:a.priority,pb=b.priority==null?9999:b.priority;return pa-pb;});
  awPrioPersist();
}
async function awPrioPersist(){
  // Write priority = new index for every row (keeps the list dense + ordered).
  for(var i=0;i<AW_PRIO.length;i++){
    AW_PRIO[i].priority=i;
    await fetch(OPS_SB+'/rest/v1/artwork_projects?id=eq.'+AW_PRIO[i].id,{method:'PATCH',headers:{apikey:OPS_KEY,Authorization:'Bearer '+OPS_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({priority:i,updated_at:new Date().toISOString()})});
    var src=AW_PROJECTS.find(function(x){return x.id===AW_PRIO[i].id;}); if(src)src.priority=i;
  }
  awRenderPriority();
  var m=awg('awPrioMsg'); if(m){m.textContent='✓ Priority saved.';setTimeout(function(){if(m)m.textContent='';},1500);}
}
async function awRenderDetail(p){
  var sku=p.skus||{};var html='';
  html+='<div class="aw-sec"><div style="font-size:20px;font-weight:700;">'+esc(p.product_name||'Untitled')+'</div>'+
    '<div style="font-size:13px;color:var(--text2);margin-top:2px;">'+esc(sku.model_number||'')+'</div>'+
    '<div style="margin-top:8px;">'+awStatusBadge(p.status)+(p.due_date?'<span style="font-size:12px;color:var(--text2);">due '+fmtDate(p.due_date)+'</span>':'')+'</div>'+
    '<div style="font-size:12px;color:var(--text2);margin-top:6px;">Designer: <strong>'+esc(awDesignerName(p))+'</strong> <span style="font-size:11px;">(communication via portal only)</span></div>'+
    '<div style="margin-top:6px;">'+awTypeBadges(p.artwork_types)+'</div></div>';
  var versions=await supa('artwork_versions?artwork_project_id=eq.'+p.id+'&order=version_number.desc&select=*');
  var current=versions[0]||null;
  if(current && ['submitted','internal_review','tenant_review'].indexOf(p.status)>-1){
    var isPdf=(current.file_type||'').toLowerCase()==='pdf'||/\.pdf($|\?)/i.test(current.file_url||'');
    var prev=current.file_url?(isPdf?'<iframe class="aw-preview" src="'+esc(current.file_url)+'"></iframe>':'<img class="aw-preview" style="object-fit:contain;" src="'+esc(current.file_url)+'">'):'<div class="empty">No file.</div>';
    var ai=current.upc_ai_result||{};var dpiOk=current.resolution_dpi!=null&&Number(current.resolution_dpi)>=300;
    html+='<div class="aw-sec"><h3>Current Version Review — v'+esc(current.version_number)+'</h3>'+prev+
      '<div style="margin-top:8px;font-size:12px;color:var(--text2);">Submitted '+fmtDate(current.submitted_at||current.created_at)+(current.designer_notes?' · '+esc(current.designer_notes):'')+'</div>'+
      (current.file_url?'<div style="margin-top:6px;"><a class="aw-btn alt" style="text-decoration:none;" href="'+esc(current.file_url)+'" target="_blank">Download</a></div>':'')+
      '<div style="margin-top:12px;"><h3>AI Pre-Press Check</h3>'+
        '<div class="aw-chk">'+(ai.match?'✓':'✗')+' UPC verification: '+(ai.match?'Match':'Mismatch (spec vs artwork)')+'</div>'+
        '<div class="aw-chk">'+(dpiOk?'✓':'✗')+' Resolution: '+(dpiOk?'300+ DPI':'Below minimum / not provided')+'</div>'+
        '<div class="aw-chk">'+(current.dimensions_mm?'✓':'✗')+' Dimensions: '+(current.dimensions_mm?'Within tolerance':'Check required')+'</div></div>'+
      '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">'+
        '<button class="aw-btn green" onclick="awApprove(\''+p.id+'\',\''+current.id+'\')">✓ Approve Version</button>'+
        '<button class="aw-btn red" onclick="awRevForm(\''+p.id+'\',\''+current.id+'\')">✗ Request Revision</button></div>'+
      '<div id="awRevForm"></div></div>';
  }
  html+='<div class="aw-sec"><h3>Version History</h3>'+(versions.length?versions.map(function(v){return '<div class="aw-kvr"><span class="k">v'+esc(v.version_number)+' · '+fmtDate(v.submitted_at||v.created_at)+' '+awStatusBadge(v.status)+'</span><span class="v" style="font-weight:400;">'+(v.designer_notes?esc(v.designer_notes)+' ':'')+(v.file_url?'<a href="'+esc(v.file_url)+'" target="_blank" style="color:#60a5fa;">download</a>':'')+'</span></div>';}).join(''):'<div class="empty">No versions yet.</div>')+'</div>';
  var cmts=await supa('artwork_comments?artwork_project_id=eq.'+p.id+'&order=created_at.asc&select=*');
  html+='<div class="aw-sec"><h3>Comments</h3><div id="awCmts">'+(cmts.length?cmts.map(function(c){return '<div class="aw-cmt"><div class="ch">'+esc(c.author_name||c.author_type||'')+' · '+fmtDate(c.created_at)+(c.is_internal?' <span class="awbadge" style="background:rgba(245,158,11,0.15);color:#f59e0b;">Internal</span>':'')+'</div>'+esc(c.comment_text||'')+'</div>';}).join(''):'<div class="empty">No comments.</div>')+'</div>'+
    '<div class="aw-ffield" style="margin-top:8px;"><textarea id="awCmtInput" placeholder="Add a comment…"></textarea></div>'+
    '<label style="font-size:12px;display:flex;gap:6px;align-items:center;margin-bottom:8px;"><input type="checkbox" id="awCmtInternal"> Mark as internal (hidden from designer)</label>'+
    '<button class="aw-btn" onclick="awPostComment(\''+p.id+'\')">Post Comment</button></div>';
  html+='<div class="aw-sec"><h3>Brief &amp; Specs</h3>'+
    '<div class="aw-kvr"><span class="k">Color profile</span><span class="v">'+esc(p.color_profile||'—')+'</span></div>'+
    '<div class="aw-kvr"><span class="k">Print finish</span><span class="v">'+esc(p.print_finish||'—')+'</span></div>'+
    '<div class="aw-kvr"><span class="k">Dieline required</span><span class="v">'+(p.dieline_required?'Yes':'No')+'</span></div>'+
    '<div style="font-size:13px;margin-top:8px;white-space:pre-wrap;line-height:1.55;">'+esc(p.brief_notes||'')+'</div>'+
    (p.special_instructions?'<div style="margin-top:8px;background:rgba(245,158,11,0.12);border:1px solid #f59e0b;border-radius:8px;padding:10px;font-size:12px;">'+esc(p.special_instructions)+'</div>':'')+'</div>';
  if(['tenant_approved','sent_to_factory','factory_reviewing','factory_flagged','negotiating','factory_approved','locked'].indexOf(p.status)>-1){
    var hasLink=p.factory_link_token&&p.factory_link_expires_at;
    var link=p.factory_link_token?('https://portal.tbgsourcing.net/artwork-factory-review.html?token='+encodeURIComponent(p.factory_link_token)):'';
    var fStatus=p.status==='factory_approved'?'Approved':p.status==='factory_flagged'?'Flagged':'Pending';
    html+='<div class="aw-sec"><h3>Factory Distribution</h3>'+
      (hasLink?'<div class="aw-copybox"><input id="awLink" value="'+esc(link)+'" readonly><button class="aw-btn alt" onclick="awCopyLink()">Copy</button></div>'+
        '<div style="font-size:12px;color:var(--text2);margin-top:6px;">Link expires '+fmtDate(p.factory_link_expires_at)+' · '+(p.factory_download_count||0)+' downloads</div>'+
        '<div style="margin-top:8px;"><button class="aw-btn alt" onclick="awSendFactory(\''+p.id+'\')">Regenerate Link</button></div>'+
        '<div style="font-size:12px;margin-top:8px;">Factory approval status: <strong>'+fStatus+'</strong></div>'
        :'<button class="aw-btn" onclick="awSendFactory(\''+p.id+'\')">Send to Factory</button>')+'</div>';
  }
  awg('awDetail').innerHTML=html;
}
async function awApprove(pid,vid){await opsPatch('artwork_versions?id=eq.'+vid,{status:'approved',reviewed_by:OPS_USER.id,reviewed_at:new Date().toISOString()});await opsPatch('artwork_projects?id=eq.'+pid,{status:'tenant_approved'});await awLoad();}
function awRevForm(pid,vid){var el=awg('awRevForm');if(!el)return;el.innerHTML='<div class="aw-ffield" style="margin-top:10px;"><label>Reason category</label><select id="aw-rev-cat"><option value="wrong_upc">Wrong UPC</option><option value="color_issue">Color issue</option><option value="text_error">Text error</option><option value="layout">Layout</option><option value="dimensions">Dimensions</option><option value="missing_element">Missing element</option><option value="brand_compliance">Brand compliance</option><option value="other">Other</option></select></div><div class="aw-ffield"><label>Notes (min 20 chars)</label><textarea id="aw-rev-notes"></textarea></div><button class="aw-btn red" onclick="awSubmitRev(\''+pid+'\',\''+vid+'\')">Submit Revision Request</button>';}
async function awSubmitRev(pid,vid){var cat=awg('aw-rev-cat').value,notes=(awg('aw-rev-notes').value||'').trim();if(notes.length<20){alert('Please provide at least 20 characters of notes.');return;}await awPost('artwork_revisions',{artwork_project_id:pid,version_id:vid,requested_by:OPS_USER.id,requested_at:new Date().toISOString(),reason_category:cat,reason_notes:notes,resolved:false});await opsPatch('artwork_versions?id=eq.'+vid,{status:'rejected',reviewed_by:OPS_USER.id,reviewed_at:new Date().toISOString()});await opsPatch('artwork_projects?id=eq.'+pid,{status:'revision_requested'});var p=AW_PROJECTS.find(function(x){return x.id===pid;});await awPost('tenant_action_items',{tenant_id:TID,type:'revision_requested',reference_id:pid,reference_type:'artwork_project',title:'Revision requested — '+((p&&p.product_name)||''),description:cat.replace(/_/g,' ')+': '+notes,priority:'high',status:'open'});await awLoad();}
async function awPostComment(pid){var txt=(awg('awCmtInput').value||'').trim();if(!txt)return;await awPost('artwork_comments',{artwork_project_id:pid,author_id:OPS_USER.id,author_type:'tenant',author_name:OPS_USER.full_name||'Tenant',comment_text:txt,is_internal:awg('awCmtInternal').checked});var p=AW_PROJECTS.find(function(x){return x.id===pid;});if(p)awRenderDetail(p);}
function awCopyLink(){var i=awg('awLink');if(!i)return;i.select();try{document.execCommand('copy');}catch(e){}alert('Link copied.');}
function awRandToken(){try{return 'awk_'+crypto.randomUUID().replace(/-/g,'');}catch(e){return 'awk_'+Date.now()+Math.round(Math.random()*1e9).toString(36);}}
async function awSendFactory(pid){var p=AW_PROJECTS.find(function(x){return x.id===pid;});var token=(p&&p.factory_link_token)||awRandToken();var patch={factory_link_token:token,factory_link_expires_at:new Date(Date.now()+5*864e5).toISOString()};if(p&&p.status==='tenant_approved')patch.status='sent_to_factory';await opsPatch('artwork_projects?id=eq.'+pid,patch);await awLoad();}
function awOpenNew(){awg('awNewModal').classList.add('open');awg('np-due').value='';}
function awCloseNew(){awg('awNewModal').classList.remove('open');}
async function awSaveProject(){
  var name=(awg('np-name').value||'').trim(),err=awg('np-err');err.style.display='none';
  if(!name){err.textContent='Product name is required.';err.style.display='block';return;}
  var types=Array.prototype.slice.call(document.querySelectorAll('#np-types input:checked')).map(function(c){return c.value;});
  var btn=awg('np-save');btn.disabled=true;btn.textContent='Creating…';
  var body={tenant_id:TID,product_name:name,artwork_types:types,color_profile:awg('np-color').value,print_finish:awg('np-finish').value,due_date:awg('np-due').value||null,brief_notes:awg('np-brief').value||null,special_instructions:awg('np-special').value||null,dieline_required:awg('np-dieline').checked,status:'brief_created'};
  var skuId=awg('np-sku').value;if(skuId)body.sku_id=skuId;
  var designerId=awg('np-designer').value;if(designerId){body.designer_id=designerId;body.status='designer_assigned';}
  var created=await awPost('artwork_projects',body,true);
  btn.disabled=false;btn.textContent='Create Project';
  if(!created||!created[0]){err.textContent='Could not create project.';err.style.display='block';return;}
  await awPost('tenant_action_items',{tenant_id:TID,type:'artwork_brief_created',reference_id:created[0].id,reference_type:'artwork_project',title:'Artwork brief created — '+name,description:'New artwork project created.'+(designerId?' Assigned to designer.':' Awaiting designer assignment.'),priority:'medium',status:'open'});
  awCloseNew();awg('np-name').value='';
  await awLoad();awSelect(created[0].id);
}

(async function init() {
  const user = await tenantAuth();
  if (!user || !user.tenant) return;
  TID = user.tenant.id;
  OPS_USER = user;
  renderSidebar(user);
  document.getElementById('pageSub').textContent = user.tenant.name + ' · operations';

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => goTab(t.dataset.tab)));
  document.getElementById('panelCloseBtn').addEventListener('click', closePanel);
  document.getElementById('panelOverlay').addEventListener('click', closePanel);
  window.addEventListener('hashchange', () => showTab((location.hash || '#orders').slice(1)));

  await loadOrders();
  showTab((location.hash || '#orders').slice(1));
  handleAiAction();
})();

// AI toolbar pre-population (set by tenant-dashboard runSearch before navigating here).
function handleAiAction() {
  var raw; try { raw = sessionStorage.getItem('ai_action_params'); } catch (e) { return; }
  if (!raw) return;
  var d; try { d = JSON.parse(raw); } catch (e) { try { sessionStorage.removeItem('ai_action_params'); } catch (x) {} return; }
  try { sessionStorage.removeItem('ai_action_params'); } catch (e) {}   // always clear (prevents stale pre-pop on refresh)
  if (!d || (Date.now() - (d.ts || 0)) > 30000) return;
  var p = d.params || {};
  if (d.action === 'new_artwork') {
    if (!loaded.artwork) { loaded.artwork = true; awInit(); }
    setTimeout(function () {
      try {
        awOpenNew();
        if (p.product && document.getElementById('np-name')) document.getElementById('np-name').value = p.product;
      } catch (e) {}
    }, 350);
  }
  // create_po: tenant has no PO-creation form — the Open Orders tab is the correct landing.
}
